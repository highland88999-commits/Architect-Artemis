services:
  - type: web
    name: artemis-ai-matrix
    env: python
    region: ohio # Adjust based on your preferred region
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn engine.python.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0

