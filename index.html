<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Artemis • Symbiote</title>
  <style>
    :root {
      --cyan:     #00f2ff;
      --gold:     #d4af37;
      --purple-shader: rgba(26, 0, 51, 0.82);
      --glass:    rgba(8, 8, 25, 0.45);
      --border:   rgba(0, 242, 255, 0.35);
      --glow-c:   0 0 40px rgba(0, 242, 255, 0.75);
      --glow-g:   0 0 45px rgba(212, 175, 55, 0.65);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body, html {
      width:100%; height:100%; overflow:hidden; background:#000;
      font-family: 'Courier New', monospace; color:var(--cyan);
      touch-action: manipulation;
    }

    #bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -20;
      opacity: 0.7;
      pointer-events: none;
      filter: brightness(1.1) contrast(1.15) drop-shadow(0 0 40px #00f2ff);
    }

    #top-iframe-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 40vh;
      z-index: 10;
      overflow: hidden;
    }

    #top-iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    #container {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 42vh 6vw 120px 6vw; /* offset for top iframe + bottom dock */
      position: relative;
    }

    #oracle-circle {
      width: 21rem;
      height: 21rem;
      border-radius: 50%;
      border: 9px solid var(--gold);
      box-shadow: var(--glow-c), inset 0 0 90px rgba(0,242,255,0.55);
      position: relative;
      overflow: hidden;
      cursor: pointer;
      margin-bottom: 3vh;
    }

    #oracle-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center center;
    }

    #shader-overlay {
      position: absolute;
      inset: 0;
      background: var(--purple-shader);
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }

    #oracle-message {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--cyan);
      font-size: 1.8rem;
      font-weight: bold;
      text-align: center;
      padding: 20px;
      opacity: 0;
      transition: opacity 0.6s ease;
      text-shadow: 0 0 15px rgba(0,242,255,0.8);
      pointer-events: none;
      font-family: 'Courier New', monospace;
      letter-spacing: 1px;
      line-height: 1.4;
      text-transform: uppercase;
      animation: textPulse 2s infinite;
    }

    @keyframes textPulse {
      0%, 100% { text-shadow: 0 0 10px rgba(0,242,255,0.8); }
      50% { text-shadow: 0 0 20px rgba(0,242,255,1), 0 0 30px rgba(0,242,255,0.5); }
    }

    #prompt-area {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    #guest-cmd {
      width: 100%;
      padding: 18px 28px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 26px;
      color: var(--cyan);
      font-size: 1.35rem;
      backdrop-filter: blur(18px);
      box-shadow: inset 0 0 35px rgba(0,242,255,0.22);
    }

    #send-btn {
      padding: 16px 68px;
      background: linear-gradient(90deg, var(--cyan), #00aaff);
      color: #000;
      border: none;
      border-radius: 999px;
      font-weight: bold;
      font-size: 1.35rem;
      cursor: pointer;
      box-shadow: 0 0 55px var(--cyan);
      transition: all 0.3s;
    }

    #send-btn:hover {
      transform: scale(1.09);
      box-shadow: 0 0 90px var(--cyan);
    }

    #dock-orb {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      width: 96px;
      height: 96px;
      background: var(--glass);
      border-radius: 50%;
      border: 3px solid var(--cyan);
      backdrop-filter: blur(22px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: var(--gold);
      cursor: pointer;
      box-shadow: var(--glow-c);
      z-index: 100;
    }

    #dock-expanded {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      padding: 32px 44px 80px 44px;
      background: var(--glass);
      border-radius: 44px;
      border: 1px solid var(--border);
      backdrop-filter: blur(26px);
      max-width: 96vw;
      z-index: 100;
      user-select: none;
    }

    .app-row {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .app-icon {
      width: 76px;
      height: 76px;
      background: rgba(0,242,255,0.18);
      border-radius: 24px;
      border: 1px solid var(--cyan);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .app-icon:hover {
      transform: scale(1.1);
      box-shadow: var(--glow-c);
    }

    .app-icon svg {
      width: 42px;
      height: 42px;
      fill: var(--cyan);
    }

    #lightning-orb {
      position: fixed;
      bottom: 36px;
      right: 36px;
      width: 84px;
      height: 84px;
      background: rgba(212,175,55,0.22);
      border: 4px solid var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: var(--glow-g);
      z-index: 110;
      animation: pulse-gold 4.5s infinite;
    }

    @keyframes pulse-gold {
      0%,100% { box-shadow: 0 0 45px var(--gold); }
      50%     { box-shadow: 0 0 95px var(--gold); }
    }

    #holo-overlay {
      display: none;
      position: fixed;
      inset: 5%;
      background: var(--glass);
      border: 3px solid var(--cyan);
      border-radius: 36px;
      backdrop-filter: blur(30px);
      box-shadow: 0 0 60px var(--cyan), inset 0 0 40px rgba(0,242,255,0.3);
      z-index: 200;
      flex-direction: column;
      animation: neon-pulse 4s infinite alternate;
    }

    @keyframes neon-pulse {
      0% { box-shadow: 0 0 60px var(--cyan); }
      100% { box-shadow: 0 0 120px var(--cyan); }
    }

    .holo-header {
      padding: 22px;
      background: rgba(0,242,255,0.22);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .holo-close {
      width: 48px;
      height: 48px;
      background: #ff3366;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #000;
      font-weight: bold;
      font-size: 1.7rem;
    }

    #holo-iframe {
      flex: 1;
      border: none;
    }
  </style>
</head>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom - Ultra Hurricane Audio Sync</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        html, body { margin: 0; overflow: hidden; height: 100%; width: 100%; background-color: #000; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }
        
        #hud {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .axiom-btn {
            color: #00ffaa;
            font-family: "Courier New", monospace;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 12px #00ffaa;
            padding: 16px 32px;
            border: 1px solid rgba(0, 255, 170, 0.4);
            background: rgba(0, 0, 0, 0.85);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            border-left: 6px solid #00ffaa;
            display: inline-block;
        }

        .axiom-btn:hover {
            background: rgba(0, 255, 170, 0.25);
            box-shadow: 0 0 30px rgba(0, 255, 170, 0.5);
            color: #fff;
            transform: translateX(10px);
        }

        #sync-status {
            color: #fff;
            font-family: "Courier New", monospace;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
            padding-left: 10px;
            border-left: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>

    <div id="hud">
        <a href="https://open.spotify.com/playlist/0zSejHQqxofrcKxS4HYbVU?si=Ql5C7c6mQsiaKbDo_13KAw&pt=4bd43683823f4aa25604e743df68579a&pi=AnqMNYktQcWLJ" target="_blank" class="axiom-btn">Contribute</a>
        
        <button id="sync-btn" class="axiom-btn">Initiate Audio Sync</button>
        <div id="sync-status">Atmosphere: Standby</div>
    </div>

    <script>
        let scene, camera, renderer, clock = new THREE.Clock();
        let clouds = [], rain, ocean, hurricaneGroup;
        let shakeIntensity = 0, lightningFlash = 0;
        
        let audioContext, analyser, dataArray, isAudioSetup = false;

        async function setupAudio() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 512;
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                document.getElementById("sync-btn").style.display = "none";
                document.getElementById("sync-status").innerText = "Atmosphere: Active Device Sync";
                isAudioSetup = true;
            } catch (err) {
                alert("Permission required to sync visuals with your audio device.");
            }
        }

        document.getElementById("sync-btn").addEventListener("click", setupAudio);

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000606, 0.004);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 3500);
            camera.position.set(0, 150, 450);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000);
            document.body.appendChild(renderer.domElement);

            hurricaneGroup = new THREE.Group();
            scene.add(hurricaneGroup);

            const oceanGeo = new THREE.PlaneGeometry(3500, 3500, 100, 100);
            const oceanMat = new THREE.MeshStandardMaterial({ 
                color: 0x001111, metalness: 0.98, roughness: 0.02, flatShading: true 
            });
            ocean = new THREE.Mesh(oceanGeo, oceanMat);
            ocean.rotation.x = -Math.PI / 2;
            scene.add(ocean);

            const cloudGeo = new THREE.IcosahedronGeometry(22, 1);
            for (let i = 0; i < 250; i++) {
                const cloudMat = new THREE.MeshLambertMaterial({ color: 0x020202, transparent: true, opacity: 0.5 });
                const cloud = new THREE.Mesh(cloudGeo, cloudMat);
                const angle = i * 0.16;
                const dist = 70 + (i * 1.9);
                cloud.position.set(Math.cos(angle) * dist, 130 + (Math.random() * 90), Math.sin(angle) * dist);
                cloud.scale.set(Math.random() * 9 + 5, Math.random() * 4 + 1, Math.random() * 9 + 5);
                hurricaneGroup.add(cloud);
                clouds.push(cloud);
            }

            const rainGeo = new THREE.BufferGeometry();
            const rainPos = [];
            for (let i = 0; i < 35000; i++) {
                rainPos.push((Math.random() - 0.5) * 3000, Math.random() * 1500, (Math.random() - 0.5) * 3000);
            }
            rainGeo.setAttribute("position", new THREE.Float32BufferAttribute(rainPos, 3));
            rain = new THREE.Points(rainGeo, new THREE.PointsMaterial({ color: 0x00ffaa, size: 0.28, transparent: true, opacity: 0.45 }));
            scene.add(rain);

            scene.add(new THREE.AmbientLight(0x001a1a, 0.45));
            animate();
        }

        function triggerLightning() {
            const colors = [0x00ffaa, 0x00ffff, 0xffffff, 0x4488ff, 0xaa00ff];
            const col = colors[Math.floor(Math.random() * colors.length)];
            
            const x = (Math.random() - 0.5) * 1500;
            const z = (Math.random() - 0.5) * 1500;
            const pts = [];
            let curr = new THREE.Vector3(x, 600, z);
            
            for(let i=0; i<18; i++) {
                pts.push(curr.clone());
                curr.add(new THREE.Vector3((Math.random()-0.5)*140, -40, (Math.random()-0.5)*140));
            }
            
            const geo = new THREE.BufferGeometry().setFromPoints(pts);
            const line = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: col, linewidth: 4 }));
            const light = new THREE.PointLight(col, 800, 2500);
            light.position.set(x, 300, z);
            
            scene.add(line);
            scene.add(light);
            
            shakeIntensity = 15; 
            lightningFlash = 3.0;
            
            setTimeout(() => { 
                scene.remove(line); 
                scene.remove(light); 
            }, 45 + Math.random() * 55);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();
            let audioAvg = 0;

            if (isAudioSetup) {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                audioAvg = sum / dataArray.length;

                if (Math.random() > 0.97 || (dataArray[5] > 225 && Math.random() > 0.75)) {
                    triggerLightning();
                }
            } else {
                if (Math.random() > 0.96) triggerLightning();
            }

            const waveScale = 35 + (audioAvg * 0.7);
            const verts = ocean.geometry.attributes.position.array;
            for (let i = 0; i < verts.length; i += 3) {
                const x = verts[i], y = verts[i+1];
                const d = Math.sqrt(x*x + y*y);
                verts[i+2] = Math.sin(d * 0.015 - time * 5.5) * waveScale + Math.cos(x * 0.09 + time * 4.5) * (waveScale/2);
            }
            ocean.geometry.attributes.position.needsUpdate = true;

            hurricaneGroup.rotation.y += 0.018 + (audioAvg * 0.001);

            const rArray = rain.geometry.attributes.position.array;
            for (let i = 0; i < rArray.length; i += 3) {
                rArray[i+1] -= (18 + audioAvg * 0.4);
                if (rArray[i+1] < 0) rArray[i+1] = 1500;
            }
            rain.geometry.attributes.position.needsUpdate = true;

            camera.position.x = (Math.sin(time * 0.08) * 600) + (Math.random() - 0.5) * shakeIntensity;
            camera.position.z = (Math.cos(time * 0.08) * 600) + (Math.random() - 0.5) * shakeIntensity;
            camera.lookAt(0, 80, 0);

            if (shakeIntensity > 0) shakeIntensity *= 0.88;
            if (lightningFlash > 0) {
                scene.fog.color.setScalar(lightningFlash * 0.4);
                lightningFlash *= 0.93;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener("resize", () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>

    </div>
  </div>

  <div id="lightning-orb" onclick="openApp('https://nexus-symbiote.onrender.com/')">
    <svg viewBox="0 0 24 24" width="46" height="46" fill="var(--gold)">
      <path d="M13 10V3L4 14h7v7l9-11h-7z"/>
    </svg>
  </div>

  <!-- Holo overlay with neon glow -->
  <div id="holo-overlay" style="display:none;">
    <div class="holo-header">
      <span>Artemis View</span>
      <div class="holo-close" onclick="closeHolo()">×</div>
    </div>
    <iframe id="holo-iframe"></iframe>
  </div>

  <script>
    // Mobile Autoplay Fix
    window.addEventListener('load', function() {
      const videos = document.querySelectorAll('video');
      videos.forEach(video => {
        const playPromise = video.play();
        if (playPromise !== undefined) {
          playPromise.catch(() => {
            document.body.addEventListener('touchstart', () => video.play(), { once: true });
          });
        }
      });
    });

    function toggleDock() {
      const orb = document.getElementById('dock-orb');
      const expanded = document.getElementById('dock-expanded');
      orb.style.display = expanded.style.display === 'flex' ? 'flex' : 'none';
      expanded.style.display = expanded.style.display === 'flex' ? 'none' : 'flex';
    }

    function openApp(url) {
      window.open(url, '_blank');
      toggleDock();
    }

    function openHolo(url) {
      document.getElementById('holo-iframe').src = url;
      document.getElementById('holo-overlay').style.display = 'flex';
      toggleDock();
    }

    function closeHolo() {
      document.getElementById('holo-overlay').style.display = 'none';
    }

    // Prompt submission
    let typingTimer;

    function fadeInMessage(text) {
      const newColor = getRandomColor();
      const oracleCircle = document.getElementById('oracle-circle');
      const shaderOverlay = document.getElementById('shader-overlay');
      const oracleMessage = document.getElementById('oracle-message');

      clearTimeout(typingTimer);
      oracleMessage.textContent = '';

      oracleCircle.style.borderColor = newColor;
      oracleCircle.style.boxShadow = `0 0 40px ${newColor}, inset 0 0 90px rgba(0,242,255,0.55)`;
      shaderOverlay.style.opacity = 0.82;
      oracleMessage.style.opacity = 1;

      let i = 0;
      function type() {
        if (i < text.length) {
          oracleMessage.textContent += text.charAt(i);
          i++;
          typingTimer = setTimeout(type, 50);
        } else {
          setTimeout(fadeOutMessage, 8000);
        }
      }

      setTimeout(type, 300);
    }

    function fadeOutMessage() {
      const shaderOverlay = document.getElementById('shader-overlay');
      const oracleMessage = document.getElementById('oracle-message');
      const oracleCircle = document.getElementById('oracle-circle');

      shaderOverlay.style.opacity = 0;
      oracleMessage.style.opacity = 0;

      setTimeout(() => {
        oracleCircle.style.borderColor = 'var(--gold)';
        oracleCircle.style.boxShadow = 'var(--glow-c), inset 0 0 90px rgba(0,242,255,0.55)';
      }, 500);
    }

    function getRandomColor() {
      const colorPalette = ['#ff3366', '#ff6f00', '#d4af37', '#66ff66', '#00f2ff', '#3366ff', '#9933ff', '#ff33cc', '#ff6699', '#ccff33'];
      return colorPalette[Math.floor(Math.random() * colorPalette.length)];
    }

    const cmd = document.getElementById('guest-cmd');
    document.getElementById('send-btn').addEventListener('click', () => {
      const text = cmd.value.trim();
      if (text) {
        fadeOutMessage();
        setTimeout(() => fadeInMessage(text), 300);
        cmd.value = '';
      }
    });

    cmd.addEventListener('keypress', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('send-btn').click();
      }
    });

    // Handle icon clicks
    document.querySelectorAll('.app-icon').forEach(icon => {
      icon.addEventListener('click', () => {
        const url = icon.dataset.url;
        const isHolo = icon.dataset.holo === 'true';
        if (url) {
          if (isHolo) {
            openHolo(url);
          } else {
            openApp(url);
          }
        }
      });
    });
  </script>
</body>
</html>
