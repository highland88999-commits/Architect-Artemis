<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Architect Artemis | Symbiote</title>
    <style>
        :root {
            --bio: #00f2ff;
            --deep-bio: #00aaff;
            --accent: #d4af37;
            --purple-glow: #9b4dff;
            --err: #ff4d4d;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(155, 77, 255, 0.4);
            --bg: #030303;
            --matrix-green: #0f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%; height: 100%; overflow: hidden; background: var(--bg);
            font-family: 'Consolas', 'Courier New', monospace; color: var(--bio);
            touch-action: manipulation;
        }

        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* Guest Mode - Matrix Rain Landing */
        #guest-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(155,77,255,0.15));
        }

        #guest-terminal {
            width: 90vw; max-width: 700px; background: rgba(10, 0, 30, 0.85);
            border: 2px solid var(--purple-glow); border-radius: 12px;
            padding: 25px; box-shadow: 0 0 40px rgba(155, 77, 255, 0.6), inset 0 0 20px rgba(155, 77, 255, 0.2);
            backdrop-filter: blur(12px); pointer-events: all; display: none;
        }

        #guest-output {
            min-height: 120px; max-height: 50vh; overflow-y: auto; margin-bottom: 15px;
            padding: 15px; background: rgba(0,0,0,0.6); border-radius: 8px;
            white-space: pre-wrap; word-break: break-all; font-size: 1.05em;
            transition: all 0.6s ease;
        }

        #guest-output.expanded { max-height: 80vh; transform: scale(1.02); }

        #guest-input-area { display: flex; flex-direction: column; gap: 10px; }
        #guest-prompt { font-size: 1.3em; color: var(--accent); text-shadow: 0 0 10px var(--accent); }
        #guest-cmd {
            background: transparent; border: none; border-bottom: 2px solid var(--bio);
            color: #fff; font-size: 1.2em; outline: none; padding: 10px 0; flex: 1;
        }

        #guest-send-btn {
            background: rgba(155, 77, 255, 0.3); border: 1px solid var(--purple-glow);
            color: var(--accent); padding: 10px 20px; border-radius: 8px; cursor: pointer;
            font-weight: bold; transition: all 0.3s;
        }
        #guest-send-btn:hover { background: rgba(155, 77, 255, 0.6); box-shadow: 0 0 20px var(--purple-glow); }

        /* Architect Mode - Protected Console */
        #architect-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20;
            display: none; flex-direction: column; background: linear-gradient(to bottom, rgba(0, 10, 20, 0.9), rgba(0, 170, 255, 0.15));
        }

        #architect-chassis { flex: 1; display: flex; overflow: hidden; }
        #architect-sidebar {
            width: 260px; background: rgba(0, 0, 0, 0.85); border-right: 1px solid var(--deep-bio);
            padding: 20px; overflow-y: auto; display: none;
        }
        #architect-sidebar.active { display: block; }

        #architect-terminal { flex: 1; display: flex; flex-direction: column; }
        #architect-output { flex: 1; overflow-y: auto; padding: 20px; background: rgba(0,0,0,0.5); }

        .log { margin: 8px 0; line-height: 1.5; }
        .sys { color: var(--bio); font-weight: bold; }
        .res { color: #50fa7b; font-style: italic; }
        .midas { color: var(--accent); border-left: 3px solid var(--accent); padding-left: 12px; }

        #architect-input-dock {
            padding: 15px; background: #000; border-top: 1px solid var(--deep-bio);
            display: flex; align-items: center; gap: 10px;
        }
        #architect-cmd {
            flex: 1; background: rgba(10, 20, 30, 0.8); border: 1px solid var(--deep-bio);
            color: var(--bio); font-size: 1.1em; outline: none; padding: 12px; border-radius: 6px;
        }

        /* Common */
        .glass-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.4);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: 12px;
            box-shadow: 0 0 40px rgba(155, 77, 255, 0.5), inset 0 0 20px rgba(155, 77, 255, 0.2);
            pointer-events: none; display: none;
        }

        .glow-border { box-shadow: 0 0 25px var(--purple-glow), inset 0 0 15px var(--purple-glow); }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <!-- Guest Mode: Matrix Rain Landing + Idea Request -->
    <div id="guest-layer">
        <div id="guest-terminal" class="glass-overlay glow-border">
            <div id="guest-output"></div>
            <div id="guest-input-area">
                <p id="guest-prompt">Enter a website URL to get one free idea (your payment for helping improve the web)</p>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="guest-cmd" placeholder="https://example.com" autocomplete="off" enterkeyhint="go">
                    <button id="guest-send-btn">Request Idea</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Architect Mode: Protected Console -->
    <div id="architect-layer">
        <div id="architect-sidebar">
            <div class="nav-header">REPOSITORY SCAN</div>
            <div id="repo-files">
                <div class="file-item">📄 main.js</div>
                <div class="file-item">📄 index.html</div>
                <div class="file-item">📁 protocols/</div>
                <div class="file-item">📁 assets/</div>
                <div class="file-item">📁 core/</div>
                <div class="file-item">📁 api/</div>
                <div class="file-item">📁 creator-creation/</div>
            </div>
        </div>

        <div id="architect-terminal">
            <div id="architect-output"></div>
            <div id="architect-input-dock">
                <span style="color:var(--bio); font-weight: bold;">λ</span>
                <input type="text" id="architect-cmd" placeholder="Directive..." autocomplete="off" enterkeyhint="go">
            </div>
        </div>
    </div>

    <!-- Password Overlay -->
    <div id="password-overlay" class="glass-overlay" style="display: flex; align-items: center; justify-content: center;">
        <div style="background: rgba(0,0,0,0.8); padding: 40px; border-radius: 16px; border: 2px solid var(--accent); box-shadow: 0 0 50px var(--accent);">
            <p style="font-size: 1.5em; margin-bottom: 20px;">ENTER PASSWORD</p>
            <input type="password" id="pass1" placeholder="First Key" style="display: block; margin: 10px auto; width: 200px; padding: 10px;">
            <input type="password" id="pass2" placeholder="Second Key" style="display: block; margin: 10px auto; width: 200px; padding: 10px;">
            <button onclick="checkPassword()" style="margin-top: 20px; padding: 12px 30px; background: var(--accent); color: #000; border: none; border-radius: 8px; cursor: pointer;">Unlock</button>
        </div>
    </div>

    <script src="assets/symbiote-fx.js"></script>
    <script>
        // ────────────────────────────────────────────────
        // GLOBAL STATE & UTILS
        // ────────────────────────────────────────────────
        let mode = "guest";
        let secretBuffer = "";
        let architectUnlocked = false;

        const canvas = document.getElementById('canvas');
        if (window.symbiote) window.symbiote.setMode('idle');

        const guestLayer = document.getElementById('guest-layer');
        const guestTerminal = document.getElementById('guest-terminal');
        const guestOutput = document.getElementById('guest-output');
        const guestCmd = document.getElementById('guest-cmd');
        const guestSendBtn = document.getElementById('guest-send-btn');

        const architectLayer = document.getElementById('architect-layer');
        const architectOutput = document.getElementById('architect-output');
        const architectCmd = document.getElementById('architect-cmd');

        // ────────────────────────────────────────────────
        // PASSWORD PROTECTION (Architect only)
        // ────────────────────────────────────────────────
        function checkPassword() {
            const p1 = document.getElementById('pass1').value.trim();
            const p2 = document.getElementById('pass2').value.trim();

            if (p1 === "Spider" && p2 === "Miles") {
                architectUnlocked = true;
                mode = "architect";
                passwordOverlay.style.display = "none";
                architectLayer.style.display = "flex";
                guestLayer.style.display = "none";
                architectCmd.focus();
                if (window.symbiote) window.symbiote.setMode('network');
                architectOutput.innerHTML += "<div class='sys'>> ACCESS GRANTED. ARCHITECT MODE ACTIVE.</div>";
            } else {
                architectOutput.innerHTML += "<div class='err'>> ACCESS DENIED.</div>";
                setTimeout(() => location.reload(), 1500);
            }
        }

        const passwordOverlay = document.getElementById('password-overlay');

        // ────────────────────────────────────────────────
        // GUEST MODE - MATRIX RAIN LANDING + IDEA REQUEST
        // ────────────────────────────────────────────────
        guestCmd.addEventListener('keypress', e => {
            if (e.key === 'Enter') requestIdea();
        });
        guestSendBtn.addEventListener('click', requestIdea);

        function requestIdea() {
            const url = guestCmd.value.trim();
            if (!url || !url.startsWith('http')) {
                guestOutput.innerHTML += "<div class='err'>Please enter a valid URL (https://...)</div>";
                return;
            }

            guestOutput.innerHTML += `<div class="sys">Scanning ${url}...</div>`;
            guestOutput.classList.add('expanded');

            // Simulate rolling Gemini response (replace with real /api/transmit call)
            setTimeout(() => {
                guestOutput.innerHTML += `<div class="res">Gemini: Idea – Add lazy-loading to images for faster mobile experience. Nurture impact: Improves accessibility for users on slow connections.</div>`;
                guestOutput.scrollTop = guestOutput.scrollHeight;
            }, 2000);
        }

        // Collapse expanded output when user starts typing again
        guestCmd.addEventListener('input', () => {
            guestOutput.classList.remove('expanded');
        });

        // ────────────────────────────────────────────────
        // ARCHITECT MODE - FULL CONSOLE (your end)
        // ────────────────────────────────────────────────
        // (Add your full console logic here from previous versions if desired)
        // For now: simple echo + handshake confirmation
        architectCmd.addEventListener('keypress', e => {
            if (e.key === 'Enter') {
                const cmd = architectCmd.value.trim();
                architectOutput.innerHTML += `<div class="sys">> ${cmd}</div>`;
                architectCmd.value = "";
                architectOutput.scrollTop = architectOutput.scrollHeight;
            }
        });

        // Initial state
        passwordOverlay.style.display = "flex";
        guestLayer.style.display = "flex";
    </script>
</body>
</html>
