<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Vortex - R.E.M. ⚡❤️💎</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:#000;
            font-family: 'Orbitron', sans-serif;
            color:#fff;
            overflow:hidden;
            height:100vh;
            cursor:pointer;
        }

        /* Landing / Video Fullscreen */
        #landing {
            position:fixed;
            inset:0;
            z-index:1000;
            background:#000;
            display:flex;
            flex-direction:column;
            justify-content:flex-end; /* Pushes content toward bottom */
            align-items:center;
            padding-bottom:25vh; /* Positions it nicely in lower third */
            transition:opacity 1.2s ease;
        }

        #landing.hidden {
            opacity:0;
            pointer-events:none;
        }

        #landing video {
            width:100%;
            height:100%;
            object-fit:cover;
            position:absolute;
            top:0; left:0;
        }

        .enter-group {
            position:relative;
            z-index:10;
            text-align:center;
            pointer-events:none;
            margin-bottom:10vh;
        }

        #enter-btn {
            font-size:clamp(4rem, 12vw, 10rem);
            font-weight:900;
            letter-spacing:16px;
            color:#d4af37; /* Gold */
            background: rgba(26,0,51,0.65); /* Purple shader */
            padding: 30px 90px;
            border-radius: 40px;
            border: 2px solid rgba(212,175,55,0.5);
            box-shadow: 
                0 0 30px #d4af37,
                0 0 60px #d4af37,
                inset 0 0 30px rgba(212,175,55,0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            cursor:pointer;
            transition:all 0.4s;
            animation: goldPulse 4.5s infinite alternate;
        }

        #enter-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 80px #d4af37, 0 0 140px #d4af37;
        }

        .mouse-clicker {
            font-size:7rem;
            margin-top:40px;
            color:#00f2ff;
            animation:bounce 2.8s infinite;
        }

        @keyframes goldPulse {
            from { opacity:0.7; box-shadow:0 0 30px #d4af37; }
            to   { opacity:1;   box-shadow:0 0 80px #d4af37, 0 0 140px #d4af37; }
        }

        @keyframes bounce {
            0%,100% { transform:translateY(0); }
            50%     { transform:translateY(-35px); }
        }

        /* Main Content (Province Slider) */
        #main-content {
            opacity:0;
            transition:opacity 1.5s ease;
            height:100vh;
            overflow-y:auto;
            -webkit-overflow-scrolling:touch;
        }

        #main-content.visible {
            opacity:1;
        }

        /* Your existing slider styles (copy-pasted from before, unchanged) */
        .slider {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 120px;
        }

        .card {
            width: 100%;
            max-width: 700px;
            transition: transform 0.5s ease, box-shadow 0.5s ease;
        }

        .card:hover {
            transform: scale(1.04);
            box-shadow: 0 0 60px rgba(0,255,255,0.3);
        }

        .card img {
            width: 100%;
            height: auto;
            border-radius: 25px;
            box-shadow: 0 0 40px #0ff, 0 0 60px #f0f;
            border: 2px solid #333;
        }

        .card button {
            margin-top: 35px;
            background: #f0f;
            color: #000;
            border: none;
            padding: 20px 10px;
            font-size: clamp(1.3em, 6vw, 2em);
            font-weight: 900;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 0 35px #f0f;
            transition: 0.4s ease;
            width: 90%;
            max-width: 500px;
            text-transform: uppercase;
        }

        .card button:hover {
            background: #0ff;
            box-shadow: 0 0 55px #0ff;
            color: #000;
        }

        .navigation {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            z-index: 1000;
        }

        .nav-button {
            background: linear-gradient(45deg, #f0f, #ff00ff);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 1.5em;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 0 40px #f0f;
            transition: 0.4s ease;
        }

        .nav-button:hover {
            background: linear-gradient(45deg, #0ff, #00ffff);
            box-shadow: 0 0 60px #0ff;
            transform: scale(1.1);
        }

        @media (max-width:768px) {
            .slider { gap:80px; padding:40px 10px; }
            .card button { font-size:1.6em; padding:18px 8px; }
        }
    </style>
</head>
<body>

    <!-- Landing Video + ENTER Button + Mouse Icon -->
    <div id="landing">
        <video autoplay muted loop playsinline>
            <source src="https://files.catbox.moe/jhxjmx.mp4" type="video/mp4">
        </video>

        <div class="enter-group">
            <button id="enter-btn">ENTER</button>
            <div class="mouse-clicker">🖱️</div>
        </div>
    </div>

    <!-- Main Province Slider (hidden until click) -->
    <div id="main-content">
        <div class="slider">
            <!-- Alberta -->
            <div class="card">
                <img src="https://dl.dropboxusercontent.com/scl/fi/azyu3fs053a5afuijs41d/1000028568.jpg?rlkey=1z34pl8wm8cd63d6e6nkmg1ei&raw=1" alt="Alberta">
                <button onclick="window.location.href='alberta.html'">Alberta</button>
            </div>

            <!-- British Columbia -->
            <div class="card">
                <img src="https://dl.dropboxusercontent.com/scl/fi/h3l70ei4h25ie7dcnoqfh/1000027303.jpg?rlkey=x3tl9ban0u3epbc8s2u9pcs82&raw=1" alt="British Columbia">
                <button onclick="window.location.href='british-columbia.html'">British Columbia</button>
            </div>

            <!-- ... your other province cards here ... -->

            <!-- Yukon -->
            <div class="card">
                <img src="https://www.dropbox.com/scl/fi/yfh5com11c4s70d42j1vr/1000027317.jpg?rlkey=x0ih9kxb2i11fyf12tp6r6d2m&dl=1" alt="Yukon">
                <button onclick="window.location.href='yukon.html'">Yukon</button>
            </div>
        </div>

        <div class="navigation">
            <button class="nav-button" onclick="window.history.back()">← Back</button>
            <button class="nav-button" onclick="window.history.forward()">Forward →</button>
        </div>
    </div>

    <script>
        const landing = document.getElementById('landing');
        const mainContent = document.getElementById('main-content');

        // Click ANYWHERE → proceed to main content
        landing.addEventListener('click', () => {
            landing.classList.add('hidden');
            setTimeout(() => {
                mainContent.classList.add('visible');
            }, 800);
        });
    </script>
</body>
</html>
