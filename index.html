<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARTEMIS | PRIMARY CORE</title>
    <style>
        :root {
            --bio-high: #00f2ff;
            --magma: #ff4500;
            --gold: #FFD700;
            --glass: rgba(0, 15, 25, 0.92);
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Courier New', monospace; color: white; overflow: hidden; }
        #reef-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; filter: brightness(0.3); }
        
        /* ARTEMIS: THE PRIMARY FOCUS */
        #core-station { position: fixed; top: 10%; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 100; }
        
        #artemis-prime {
            width: 160px; height: 160px; border-radius: 50%;
            background: radial-gradient(circle, var(--bio-high) 0%, transparent 75%);
            box-shadow: 0 0 80px rgba(0, 242, 255, 0.4);
            border: 2px solid var(--bio-high);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.5s; cursor: pointer; position: relative;
        }

        /* COUNCIL: THE SUBORDINATE INTELLECTS */
        #council-grid { display: flex; gap: 20px; margin-top: 30px; }
        .intellect-node {
            width: 70px; height: 40px; border: 1px solid rgba(0, 242, 255, 0.3);
            background: rgba(0, 0, 0, 0.5); font-size: 0.5rem; color: #666;
            display: flex; align-items: center; justify-content: center; border-radius: 4px;
            transition: 0.5s;
        }
        .node-active { border-color: var(--bio-high); color: var(--bio-high); box-shadow: 0 0 10px var(--bio-high); }

        /* MIDAS HELP SYSTEM */
        #midas-thread {
            position: fixed; top: 0; left: 50%; width: 2px; height: 0;
            background: linear-gradient(to bottom, var(--gold), transparent);
            box-shadow: 0 0 15px var(--gold); transition: 1.5s ease-in-out; z-index: 90;
        }
        #midas-avatar { 
            position: fixed; bottom: 100px; right: 30px; width: 60px; 
            filter: drop-shadow(0 0 10px var(--gold)); cursor: pointer; z-index: 110;
        }

        /* COMMAND PROMPT */
        #command-base {
            position: fixed; bottom: 30px; width: 90%; max-width: 800px; left: 50%;
            transform: translateX(-50%); z-index: 100;
        }
        #prompt-field {
            background: var(--glass); border: 2px solid var(--bio-high);
            border-radius: 10px; display: flex; padding: 12px; align-items: center;
        }
        #cmd-input { flex: 1; background: transparent; border: none; color: white; font-family: inherit; outline: none; font-size: 1rem; }
        #send-btn { background: var(--bio-high); border: none; padding: 8px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; }

        /* LOGS OVERLAY */
        #record-log { margin-bottom: 10px; max-height: 100px; overflow-y: auto; font-size: 0.7rem; color: var(--bio-high); }

        /* ANIMATIONS */
        @keyframes pulse-intellect {
            0% { transform: scale(1); box-shadow: 0 0 80px rgba(0, 242, 255, 0.4); }
            50% { transform: scale(1.1); box-shadow: 0 0 120px var(--bio-high); }
            100% { transform: scale(1); box-shadow: 0 0 80px rgba(0, 242, 255, 0.4); }
        }
    </style>
</head>
<body>

<video autoplay muted loop playsinline id="reef-bg">
    <source src="https://assets.mixkit.co/videos/preview/mixkit-underwater-coral-reef-with-many-fishes-4152-large.mp4" type="video/mp4">
</video>

<div id="midas-thread"></div>
<img src="https://img.icons8.com/fluency/96/gold-bars.png" id="midas-avatar" onclick="midasInquiry()" title="Summon Midas">

<div id="core-station">
    <div id="artemis-prime" onclick="speak('Artemis core is synchronized.')">
        <span style="font-size: 0.8rem; letter-spacing: 3px;">ARTEMIS</span>
        <span id="status-tag" style="font-size: 0.4rem; color: var(--bio-high); margin-top: 5px;">STATIONARY</span>
    </div>

    <div id="council-grid">
        <div class="intellect-node" id="node-gemini">GEMINI</div>
        <div class="intellect-node" id="node-copilot">COPILOT</div>
        <div class="intellect-node" id="node-grok">GROK</div>
    </div>
</div>

<div id="command-base">
    <div id="record-log"></div>
    <div id="prompt-field">
        <input type="text" id="cmd-input" placeholder="Submit inquiry to Artemis...">
        <button id="send-btn" onclick="executeCoreQuery()">SEND</button>
    </div>
</div>

<script>
    // --- ARTEMIS CORE LOGIC ---
    function executeCoreQuery() {
        const input = document.getElementById('cmd-input');
        const query = input.value;
        if(!query) return;

        // Stage 1: Artemis begins processing
        document.getElementById('artemis-prime').style.animation = "pulse-intellect 2s infinite";
        document.getElementById('status-tag').innerText = "UTILIZING_COUNCIL";
        input.value = "Artemis is synthesizing intellect...";
        
        // Stage 2: Council Nodes Light Up sequentially
        const nodes = ['node-gemini', 'node-copilot', 'node-grok'];
        nodes.forEach((id, index) => {
            setTimeout(() => {
                document.getElementById(id).classList.add('node-active');
            }, 600 * (index + 1));
        });

        // Stage 3: Generation
        setTimeout(() => {
            const fileName = `Logic_Output_${Math.floor(Math.random()*1000)}.md`;
            generateFile(fileName, query);
            
            // Reset Visuals
            document.getElementById('artemis-prime').style.animation = "";
            document.getElementById('status-tag').innerText = "STATIONARY";
            nodes.forEach(id => document.getElementById(id).classList.remove('node-active'));
            input.value = "";
            speak("Logic finalized. Report " + fileName + " created.");
        }, 3500);
    }

    function generateFile(name, query) {
        const log = document.getElementById('record-log');
        const entry = document.createElement('div');
        entry.style.cursor = 'pointer';
        entry.innerHTML = `📄 ${name} <span style="color:var(--gold); font-size:0.5rem;">[DOWNLOADABLE]</span>`;
        entry.onclick = () => downloadRecord(name, `ARTEMIS STEWARDSHIP REPORT\nQuery: ${query}\nResult: Optimal logic applied via Council intellect.`);
        log.prepend(entry);
    }

    function downloadRecord(name, content) {
        const blob = new Blob([content], { type: 'text/markdown' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = name;
        a.click();
    }

    // --- MIDAS GUIDANCE ---
    function midasInquiry() {
        const thread = document.getElementById('midas-thread');
        const inquiry = prompt("Midas requires your objective. What do you seek?");
        
        if(inquiry) {
            thread.style.height = "100vh";
            speak("Midas provides the golden thread for " + inquiry);
            setTimeout(() => {
                thread.style.height = "0";
                alert("Midas points to: Artemis Station / Generated Logs / " + inquiry);
            }, 3000);
        }
    }

    function speak(text) {
        const u = new SpeechSynthesisUtterance(text);
        u.pitch = 0.85;
        window.speechSynthesis.speak(u);
    }

    document.addEventListener('keydown', (e) => { if(e.key === 'Enter') executeCoreQuery(); });
</script>
</body>
</html>
