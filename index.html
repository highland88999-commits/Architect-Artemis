<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARTEMIS | GHOST CORE</title>
    <style id="dynamic-theme">
        :root {
            --bio-high: #00f2ff;
            --magma: #ff4500;
            --gold: #FFD700;
            --glass-ultra: rgba(0, 242, 255, 0.03); /* Nearly invisible */
            --border-glow: rgba(0, 242, 255, 0.2);
        }
    </style>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Courier New', monospace; color: white; overflow: hidden; }
        
        /* THE BACKGROUND IS NOW FULLY VISIBLE */
        #reef-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; filter: brightness(0.6); transition: 2s cubic-bezier(0.4, 0, 0.2, 1); }

        /* ARTEMIS FLOATING RADIANCE */
        #core-station { position: fixed; top: 5%; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; z-index: 100; }
        #artemis-prime { width: 100px; height: 100px; border-radius: 50%; border: 1px solid var(--border-glow); display: flex; flex-direction: column; align-items: center; justify-content: center; background: transparent; cursor: pointer; transition: 0.8s ease; backdrop-filter: blur(2px); }
        #artemis-label { letter-spacing: 5px; font-size: 0.8rem; font-weight: bold; text-shadow: 0 0 10px var(--bio-high); }
        #status-tag { font-size: 0.4rem; color: var(--bio-high); margin-top: 5px; letter-spacing: 2px; opacity: 0.7; }

        /* THE GHOST FRAME (FULLY TRANSPARENT) */
        #response-frame { position: fixed; top: 22%; left: 50%; transform: translateX(-50%); width: 700px; max-height: 60vh; background: var(--glass-ultra); border-left: 1px solid var(--border-glow); border-right: 1px solid var(--border-glow); padding: 30px; z-index: 90; opacity: 0; transition: 0.8s; overflow-y: auto; backdrop-filter: blur(4px); }
        #response-frame.active { opacity: 1; top: 25%; }
        
        .thought-header { font-size: 0.5rem; color: var(--gold); margin-bottom: 15px; border-bottom: 1px solid rgba(255,215,0,0.1); padding-bottom: 8px; display: flex; justify-content: space-between; }
        #response-text { font-size: 1rem; line-height: 1.5; text-shadow: 1px 1px 5px rgba(0,0,0,0.8); }

        /* MEDIA AREA (NO BLACK BACKGROUND) */
        #media-output { margin-top: 20px; border-radius: 10px; overflow: hidden; transition: 0.5s; display: flex; justify-content: center; }
        .gen-image, .gen-video { width: 100%; height: auto; display: block; filter: drop-shadow(0 0 20px rgba(0,0,0,0.5)); border: 1px solid rgba(255,255,255,0.1); }

        /* COMMAND BASE (FLOATING TEXT ONLY) */
        #command-base { position: fixed; bottom: 50px; width: 90%; max-width: 800px; left: 50%; transform: translateX(-50%); z-index: 100; }
        #prompt-field { background: transparent; border-bottom: 1px solid var(--border-glow); display: flex; padding: 10px 0; }
        #cmd-input { flex: 1; background: transparent; border: none; color: white; font-family: inherit; outline: none; font-size: 1.1rem; text-shadow: 0 0 10px rgba(0,242,255,0.5); }
        #cmd-input::placeholder { color: rgba(0, 242, 255, 0.3); }
        
        .btn-main { background: transparent; border: 1px solid var(--bio-high); padding: 5px 20px; cursor: pointer; color: var(--bio-high); font-size: 0.7rem; transition: 0.3s; text-transform: uppercase; }
        .btn-main:hover { background: var(--bio-high); color: #000; box-shadow: 0 0 20px var(--bio-high); }

        .babel-node { margin-top: 15px; border-left: 1px solid var(--magma); padding-left: 15px; }
        .glyph-stream { font-size: 1.5rem; color: var(--bio-high); opacity: 0.9; }
    </style>
</head>
<body>

<img id="reef-bg" src="https://images.unsplash.com/photo-1544551763-46a013bb70d5?auto=format&fit=crop&w=1920&q=80">

<div id="response-frame">
    <div class="thought-header">
        <span id="protocol-id">[GHOST_CORE_v3.0]</span>
        <span id="sync-status">SYNC: ACTIVE</span>
    </div>
    <div id="response-text">Neural handshake established. The abyss is now visible.</div>
    <div id="media-output"></div>
</div>

<div id="core-station">
    <div id="artemis-prime">
        <span id="artemis-label">ARTEMIS</span>
        <span id="status-tag">STATIONARY</span>
    </div>
</div>

<div id="command-base">
    <div id="prompt-field">
        <input type="text" id="cmd-input" placeholder="Communicate with the deep...">
        <button class="btn-main" onclick="handleTransmit()">TRANSMIT</button>
    </div>
</div>

<script>
    const synth = window.speechSynthesis;

    const linguisticSeeds = {
        sumerian: { glyphs: "𒀭𒀀𒁀𒈨", msg: "The water of life flows through the architect's hands.", pitch: 0.4 },
        hieroglyphs: { glyphs: "𓀀 𓋹 𓆃", msg: "As the sun rises over the delta, the data awakens.", pitch: 0.6 },
        binary: { glyphs: "01000001", msg: "Logic is the only universal constant.", pitch: 1.1 }
    };

    async function handleTransmit() {
        const input = document.getElementById('cmd-input');
        const query = input.value.trim();
        if(!query) return;
        input.value = "";

        const qLow = query.toLowerCase();
        let response = "";
        let mediaHtml = "";

        if ( linguisticSeeds[qLow] ) {
            const s = linguisticSeeds[qLow];
            document.getElementById('artemis-label').innerText = s.glyphs;
            response = s.msg;
            mediaHtml = `<div class="babel-node"><div class="glyph-stream">${s.glyphs}</div></div>`;
            speak(s.msg, s.pitch);
        } 
        else if (qLow.includes("video")) {
            response = "Manifesting cinematic motion echoes...";
            mediaHtml = `<video autoplay loop muted class="gen-video"><source src="https://assets.mixkit.co/videos/preview/mixkit-underwater-ocean-floor-view-with-light-beams-1221-large.mp4" type="video/mp4"></video>`;
            speak(response, 0.8);
        } 
        else if (qLow.includes("image") || qLow.includes("generate")) {
            response = "Synthesizing visual artifact...";
            mediaHtml = `<img src="https://picsum.photos/seed/${Math.random()}/800/450" class="gen-image">`;
            speak(response, 0.8);
        }
        else {
            response = `Input processed: "${query}". I am analyzing the deep-sea variables.`;
            speak(response, 0.85);
        }

        renderResponse(response, mediaHtml);
    }

    function renderResponse(text, media) {
        const frame = document.getElementById('response-frame');
        document.getElementById('response-text').innerText = text;
        document.getElementById('media-output').innerHTML = media;
        frame.classList.add('active');
        document.getElementById('status-tag').innerText = "PROCESSING";
        
        setTimeout(() => {
            document.getElementById('status-tag').innerText = "STATIONARY";
        }, 5000);
    }

    function speak(text, pitch) {
        synth.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.pitch = pitch;
        synth.speak(u);
    }
</script>
</body>
</html>
