<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Artemis • Symbiote</title>
    <style>
        :root {
            --cyan: #00f2ff;
            --gold: #d4af37;
            --purple-shader: rgba(26, 0, 51, 0.82);
            --glass: rgba(8, 8, 25, 0.45);
            --border: rgba(0, 242, 255, 0.35);
            --glow-c: 0 0 40px rgba(0, 242, 255, 0.75);
            --glow-g: 0 0 45px rgba(212, 175, 55, 0.65);
            --neon-glow: 0 0 20px #00f2ff, 0 0 40px #00f2ff, inset 0 0 20px #00f2ff;
            
            /* Label Colors */
            --c-maps: #00D2FF; --c-city: #A259FF; --c-pearl: #FFF5E1;
            --c-gully: #FF4B2B; --c-finance: #00FF87; --c-hoodie: #FF8C00;
            --c-symbiote: #00FFFF; --c-starblood: #ff3333; --c-aquarium: #0080ff;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { width:100%; height:100%; overflow:hidden; background:#000; font-family: 'Courier New', monospace; color:var(--cyan); touch-action: manipulation; }

        /* --- Landing Page --- */
        #landing-page { position: fixed; inset: 0; z-index: 1000; background: #000; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1), transform 1.5s ease-in; }
        #landing-video { position: absolute; width: 100%; height: 100%; object-fit: cover; }
        #landing-prompt { position: relative; z-index: 1001; font-size: 1.2rem; letter-spacing: 4px; text-transform: uppercase; text-shadow: 0 0 20px var(--cyan); animation: pulseFade 3s infinite; pointer-events: none; }
        @keyframes pulseFade { 0%, 100% { opacity: 0.3; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1); } }
        .dissolve-effect { opacity: 0 !important; transform: scale(1.5); filter: brightness(2) blur(20px); pointer-events: none; }

        /* --- Rain Effect --- */
        #rain-container { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        .drop { position: absolute; background: linear-gradient(transparent, var(--cyan)); width: 1px; height: 80px; top: -100px; animation: fall 1.5s linear infinite; opacity: 0.3; }
        @keyframes fall { to { transform: translateY(110vh); } }

        /* --- Main UI --- */
        #container { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; padding: 20px; }
        #oracle-circle { width: min(320px, 70vw); height: min(320px, 70vw); border-radius: 50%; border: 9px solid var(--gold); box-shadow: var(--glow-c), inset 0 0 90px rgba(0,242,255,0.55); position: relative; overflow: hidden; margin-bottom: 2vh; }
        #oracle-video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; }
        #shader-overlay { position: absolute; inset: 0; background: var(--purple-shader); opacity: 0; transition: opacity 0.5s ease; pointer-events: none; }
        #oracle-message { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--cyan); font-size: clamp(1.1rem, 3.5vw, 1.6rem); font-weight: bold; text-align: center; padding: 20px; opacity: 0; transition: opacity 0.6s ease; text-shadow: 0 0 15px rgba(0,242,255,0.8); pointer-events: none; letter-spacing: 1px; line-height: 1.4; text-transform: uppercase; animation: textPulse 2s infinite; }
        @keyframes textPulse { 0%, 100% { text-shadow: 0 0 10px rgba(0,242,255,0.8); } 50% { text-shadow: 0 0 20px rgba(0,242,255,1); } }

        #council-pips { display: flex; gap: 8px; margin-bottom: 8px; }
        .pip { width: 6px; height: 6px; border-radius: 50%; background: var(--pip-color); box-shadow: 0 0 10px var(--pip-color); animation: pipPulse 1.5s infinite ease-in-out; }
        .pip:nth-child(1) { --pip-color: #00f2ff; animation-delay: 0s; }
        .pip:nth-child(2) { --pip-color: #ff3366; animation-delay: 0.2s; }
        .pip:nth-child(3) { --pip-color: #66ff66; animation-delay: 0.4s; }
        @keyframes pipPulse { 0%, 100% { opacity: 0.3; transform: scale(0.8); filter: blur(1px); } 50% { opacity: 1; transform: scale(1.2); filter: blur(0px); } }

        #response-field { width: min(400px, 85vw); max-height: 0; overflow: hidden; background: var(--glass); border: 1px solid var(--border); border-radius: 12px; padding: 0 12px; color: #fff; font-size: 0.9rem; line-height: 1.4; text-align: left; transition: max-height 0.5s ease, padding 0.5s ease; backdrop-filter: blur(12px); margin-bottom: 2vh; }
        #response-field.expanded { max-height: 300px; padding: 12px; overflow-y: auto; }

        #prompt-area { width: 100%; max-width: 600px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .input-wrapper { display: flex; align-items: center; width: 100%; background: var(--glass); border: 1px solid var(--border); border-radius: 26px; backdrop-filter: blur(18px); padding: 5px 15px; }
        #guest-cmd { flex: 1; padding: 12px; background: transparent; border: none; color: var(--cyan); font-size: 1.1rem; text-align: center; outline: none; }
        #send-btn { padding: 14px 60px; background: linear-gradient(90deg, var(--cyan), #00aaff); color: #000; border: none; border-radius: 999px; font-weight: bold; cursor: pointer; box-shadow: 0 0 30px var(--cyan); transition: 0.3s; }
        .icon-btn { background: none; border: none; cursor: pointer; color: var(--cyan); font-size: 1.3rem; transition: 0.2s; opacity: 0.7; }
        .icon-btn:hover { opacity: 1; transform: scale(1.1); }

        /* --- Dock --- */
        #bottom-dock { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 100; background: var(--glass); padding: 12px 18px; border-radius: 60px; border: 1px solid var(--border); backdrop-filter: blur(20px); width: fit-content; max-width: 95vw; overflow-x: auto; scrollbar-width: none; }
        #bottom-dock::-webkit-scrollbar { display: none; }
        .dock-icon { flex-shrink: 0; width: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .dock-icon svg { width: 22px; height: 22px; fill: var(--label-color); filter: drop-shadow(0 0 5px var(--label-color)); }
        .guide-text { display: block; font-size: 8px; margin-top: 6px; text-align: center; white-space: nowrap; text-transform: lowercase; opacity: 0; animation: breatheLabel 3s infinite ease-in-out; color: var(--label-color); }
        @keyframes breatheLabel { 0%, 100% { opacity: 0; transform: translateY(2px); } 50% { opacity: 1; transform: translateY(0px); } }
    </style>
</head>
<body>

<div id="landing-page" onclick="enterNexus()">
    <video id="landing-video" autoplay loop muted playsinline>
        <source src="https://files.catbox.moe/jhxjmx.mp4" type="video/mp4">
    </video>
    <div id="landing-prompt">Click anywhere to enter</div>
</div>

<div id="rain-container"></div>

<div id="container">
    <div id="oracle-circle">
        <video id="oracle-video" loop muted playsinline>
            <source src="https://files.catbox.moe/no2e76.mp4" type="video/mp4">
        </video>
        <div id="shader-overlay"></div>
        <div id="oracle-message"></div>
    </div>

    <div id="response-field"></div>

    <div id="council-header" style="display: flex; flex-direction: column; align-items: center;">
        <div id="council-pips">
            <div class="pip"></div><div class="pip"></div><div class="pip"></div>
        </div>
        <div id="council-status" style="font-size: 9px; color: var(--cyan); margin-bottom: 10px; opacity: 0.6; letter-spacing: 2px;">
            [COUNCIL: ACTIVE] <span id="harvest-stats">[OPTIMIZING_NODES...]</span>
        </div>
    </div>

    <div id="prompt-area">
        <div class="input-wrapper">
            <button id="download-btn" class="icon-btn" style="display: none;" title="Download Creation">↓</button>
            <label for="file-upload" class="icon-btn" title="Upload File">↑</label>
            <input type="file" id="file-upload" style="display: none;" />
            
            <input type="text" id="guest-cmd" placeholder="Speak to Artemis..." autocomplete="off"/>
            
            <button id="mic-btn" class="icon-btn" title="Voice Input">🎤</button>
        </div>
        <button id="send-btn">SEND</button>
    </div>
</div>

<div id="bottom-dock">
    <div class="dock-icon" data-url="https://rem-psi-mauve.vercel.app/" style="--label-color: var(--c-maps)"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg><span class="guide-text">Maps</span></div>
    <div class="dock-icon" data-url="https://georgia-aquarium.vercel.app/" style="--label-color: var(--c-aquarium)"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-5-9h10v2H7z"/></svg><span class="guide-text">Aquarium</span></div>
</div>

<script>
    let currentFiles = [];

    function enterNexus() {
        const landing = document.getElementById('landing-page');
        landing.classList.add('dissolve-effect');
        document.getElementById('oracle-video').play();
        createRain();
        setTimeout(() => { landing.style.display = 'none'; }, 1500);
    }

    function createRain() {
        const container = document.getElementById('rain-container');
        for(let i=0; i<60; i++) {
            const drop = document.createElement('div');
            drop.className = 'drop';
            drop.style.left = Math.random() * 100 + 'vw';
            drop.style.animationDuration = (Math.random() * 0.5 + 0.5) + 's';
            drop.style.animationDelay = Math.random() * 2 + 's';
            container.appendChild(drop);
        }
    }

    function typeResponse(text) {
        const field = document.getElementById('response-field');
        field.innerHTML = '';
        field.classList.add('expanded');
        let i = 0;
        function type() {
            if (i < text.length) {
                field.innerHTML += text.charAt(i) === '\n' ? '<br>' : text.charAt(i);
                i++;
                setTimeout(type, 25);
            } else {
                document.getElementById('shader-overlay').style.opacity = 0;
                document.getElementById('oracle-message').style.opacity = 0;
            }
        }
        type();
    }

    async function sendToArtemis() {
        const cmdInput = document.getElementById('guest-cmd');
        const val = cmdInput.value.trim(); if (!val) return;
        cmdInput.value = '';

        document.getElementById('oracle-message').textContent = 'SYNCING...';
        document.getElementById('oracle-message').style.opacity = 1;
        document.getElementById('shader-overlay').style.opacity = 0.8;

        // Handshake Establishment
        if(val.toLowerCase().startsWith('handshake:')) {
            const secret = val.split(':')[1].trim();
            localStorage.setItem('artemis_handshake', secret);
            typeResponse(`!! Identity lock established. Welcome, Architect.`);
            return;
        }

        try {
            // Using /api/transmit to match your new Bridge
            const response = await fetch('/api/transmit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    prompt: val, 
                    handshake: localStorage.getItem('artemis_handshake') || 'stranger' 
                })
            });
            const data = await response.json();
            
            // Extract the 'verdict' and 'files' from the Bridge payload
            const aiReply = data.verdict || data.error || "Core silent.";
            currentFiles = data.files || [];
            
            // Show Download button if files exist
            document.getElementById('download-btn').style.display = currentFiles.length > 0 ? 'block' : 'none';

            typeResponse(aiReply);
        } catch (err) {
            typeResponse("!! Connection Error: Synapse failure.");
        }
    }

    document.getElementById('send-btn').addEventListener('click', sendToArtemis);
    document.getElementById('guest-cmd').addEventListener('keypress', e => { if(e.key==='Enter') sendToArtemis(); });

    document.getElementById('mic-btn').addEventListener('click', () => {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.start();
        recognition.onresult = (e) => {
            document.getElementById('guest-cmd').value = e.results[0][0].transcript;
            sendToArtemis();
        };
    });

    document.getElementById('download-btn').addEventListener('click', () => {
        currentFiles.forEach(url => {
            const a = document.createElement('a');
            a.href = url;
            a.target = '_blank';
            a.download = 'artemis_creation';
            a.click();
        });
    });

    document.querySelectorAll('.dock-icon').forEach(icon => {
        icon.addEventListener('click', () => {
            window.location.href = icon.getAttribute('data-url');
        });
    });
</script>
</body>
</html>
