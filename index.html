<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARTEMIS | OLYMPIAN HUB</title>
    <style>
        :root {
            --bio-high: #00f2ff;
            --bio-low: #001a33;
            --fire: #ff4500;
            --gold: #FFD700;
            --glass: rgba(0, 8, 15, 0.85);
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Courier New', monospace; color: white; overflow: hidden; }
        
        /* THE FOCAL POINT: VOLCANO FRACTAL CANVAS */
        canvas#fractalCanvas { position: fixed; top: 0; left: 0; z-index: 0; pointer-events: none; filter: blur(1px); }

        #ui-layer { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 20px; }

        /* SECURITY GATE */
        #gate-zone, #auth-zone { position: fixed; top: 40%; text-align: center; width: 100%; z-index: 100; }
        .handshake-input { background: transparent; border: none; border-bottom: 2px solid var(--bio-high); color: var(--bio-high); text-align: center; font-size: 1.8rem; outline: none; width: 250px; text-transform: uppercase; letter-spacing: 5px; }

        /* COLLAPSIBLE WIDGET PANELS */
        .widget-panel {
            position: fixed; bottom: 220px; width: 90%; max-width: 500px;
            background: var(--glass); border: 1px solid var(--bio-high);
            backdrop-filter: blur(15px); padding: 15px; display: none;
            box-shadow: 0 0 30px var(--bio-low);
        }
        .widget-label { color: var(--gold); font-size: 0.6rem; letter-spacing: 2px; margin-bottom: 10px; border-bottom: 1px solid rgba(0,242,255,0.2); }

        /* SMARTPHONE STYLE ICON DOCK */
        #icon-dock { 
            display: flex; gap: 15px; margin-bottom: 15px; 
            background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 30px;
            border: 1px solid rgba(0,242,255,0.1);
        }
        .app-icon {
            width: 50px; height: 50px; border-radius: 12px;
            border: 1px solid var(--bio-high); background: var(--bio-low);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; cursor: pointer; transition: 0.3s;
        }
        .app-icon:active { transform: scale(0.9); border-color: var(--fire); }

        /* THE FORGE (TEXT SECTION) */
        #forge-container {
            width: 95%; max-width: 600px; background: rgba(0,0,0,0.8);
            border: 1px solid var(--bio-high); padding: 10px;
        }
        textarea { 
            width: 100%; height: 50px; background: transparent; border: none; 
            color: #fff; font-family: inherit; outline: none; resize: none; 
        }
        .action-row { display: flex; justify-content: space-between; margin-top: 5px; }
        .mini-btn { font-size: 0.6rem; padding: 5px 10px; border: 1px solid var(--bio-high); background: transparent; color: var(--bio-high); cursor: pointer; }
        .mini-btn.gold { border-color: var(--gold); color: var(--gold); }

        /* COUNCIL GRID INSIDE PANEL */
        .council-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .model-box { border: 1px solid rgba(0,242,255,0.2); padding: 5px; height: 80px; font-size: 0.65rem; overflow: hidden; }
        .active-speaker { border-color: var(--bio-high); box-shadow: inset 0 0 10px var(--bio-high); }
    </style>
</head>
<body>

<canvas id="fractalCanvas"></canvas>

<div id="ui-layer">
    <div id="gate-zone">
        <div style="font-size: 0.7rem; letter-spacing: 5px; margin-bottom: 10px;">AWAKEN ARTEMIS?</div>
        <input type="text" id="gate-input" class="handshake-input" placeholder="..." autocomplete="off" autofocus>
    </div>

    <div id="auth-zone" style="display:none;">
        <div style="font-size: 0.7rem; color: var(--gold); letter-spacing: 5px; margin-bottom: 10px;">ARCHITECT VERIFICATION</div>
        <input type="password" id="pass-input" class="handshake-input" placeholder="PASSKEY" autocomplete="off">
    </div>

    <div id="panel-council" class="widget-panel">
        <div class="widget-label">🏛️ THE COUNCIL</div>
        <div class="council-grid">
            <div class="model-box" id="box-gemini"><strong>GEMINI</strong><div class="content">...</div></div>
            <div class="model-box" id="box-copilot"><strong>COPILOT</strong><div class="content">...</div></div>
            <div class="model-box" id="box-grok"><strong>GROK</strong><div class="content">...</div></div>
        </div>
        <div id="verdict-content" style="font-size: 0.7rem; margin-top:10px; color:var(--bio-high)">Consensus: Standing by...</div>
    </div>

    <div id="panel-logs" class="widget-panel">
        <div class="widget-label">📂 STEWARDSHIP LOGS</div>
        <div style="font-size: 0.7rem; color: var(--gold);">/Artemis_Log/Stewardship/Active</div>
        <div id="log-feed" style="font-size: 0.6rem; margin-top:10px; opacity:0.7;">> System Mirror Linked...</div>
    </div>

    <div id="panel-status" class="widget-panel">
        <div class="widget-label">⚡ SYSTEM METRICS</div>
        <div style="font-size: 0.7rem;">
            ATMOSPHERE: <span style="color:var(--fire)">VOLCANIC</span><br>
            OCTOKIT: <span style="color:var(--bio-high)">CONNECTED</span><br>
            MODE: ARCHITECT_24
        </div>
    </div>

    <div id="main-station" style="display:none; width: 100%; align-items: center; flex-direction: column; display: flex;">
        
        <div id="icon-dock">
            <div class="app-icon" onclick="togglePanel('panel-council')">🏛️</div>
            <div class="app-icon" onclick="togglePanel('panel-logs')">📂</div>
            <div class="app-icon" onclick="togglePanel('panel-status')">⚡</div>
            <div class="app-icon" onclick="triggerBatch()" style="border-color:var(--gold)">🌀</div>
        </div>

        <div id="forge-container">
            <div style="font-size: 0.5rem; color: var(--gold); margin-bottom: 5px;">🔨 FORGE BLUEPRINT</div>
            <input type="text" id="app-name-input" placeholder="APP_NAME" style="background:transparent; border:none; border-bottom:1px solid #333; color:var(--bio-high); font-size:0.7rem; width:100%; margin-bottom:5px; outline:none;">
            <textarea id="cmd-input" placeholder="Enter logic or command..."></textarea>
            <div class="action-bar">
                <button class="mini-btn" onclick="invokeCouncil()">TRANSMIT</button>
                <button class="mini-btn gold" onclick="forgeApp()">FORGE APP</button>
            </div>
        </div>
    </div>
</div>

<script>
// --- SECURITY HANDSHAKE ---
document.getElementById('gate-input').addEventListener('input', (e) => {
    if (e.target.value.toLowerCase() === 'ant') {
        document.getElementById('gate-zone').style.display = 'none';
        document.getElementById('auth-zone').style.display = 'block';
        document.getElementById('pass-input').focus();
    }
});

document.getElementById('pass-input').addEventListener('input', (e) => {
    if (e.target.value.toLowerCase() === 'dad') {
        document.getElementById('auth-zone').style.display = 'none';
        document.getElementById('main-station').style.display = 'flex';
        speak("Architect recognized. Hub online.", "Artemis");
    }
});

// --- UI LOGIC ---
function togglePanel(panelId) {
    const panel = document.getElementById(panelId);
    const isVisible = panel.style.display === 'block';
    document.querySelectorAll('.widget-panel').forEach(p => p.style.display = 'none');
    panel.style.display = isVisible ? 'none' : 'block';
}

function speak(text, entity) {
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.pitch = (entity === 'Artemis') ? 0.9 : 1.1;
    window.speechSynthesis.speak(utterance);
}

async function invokeCouncil() {
    togglePanel('panel-council');
    const prompt = document.getElementById('cmd-input').value;
    const models = ['gemini', 'copilot', 'grok'];
    for (let m of models) {
        const box = document.getElementById(`box-${m}`);
        box.classList.add('active-speaker');
        box.querySelector('.content').innerText = `Analyzing...`;
        await new Promise(r => setTimeout(r, 800));
        box.classList.remove('active-speaker');
    }
    document.getElementById('verdict-content').innerText = "Artemis: Consensus Reached. Logs Updated.";
}

function forgeApp() { speak("Forging digital asset in sandbox.", "Artemis"); }
function triggerBatch() { speak("Batch sequence initiated.", "Artemis"); }

// --- THE VOLCANO FRACTAL ENGINE (AXIOM/OLYMPIAN STYLE) ---
const canvas = document.getElementById('fractalCanvas');
const ctx = canvas.getContext('2d');
let w, h, sparks = [], trees = [];

function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }

function createTree(x, y, angle, len, depth) {
    if (depth > 7) return;
    const x2 = x + Math.cos(angle) * len;
    const y2 = y + Math.sin(angle) * len;
    trees.push({x1:x, y1:y, x2:x2, y2:y2, depth});
    createTree(x2, y2, angle - 0.4, len * 0.75, depth + 1);
    createTree(x2, y2, angle + 0.4, len * 0.75, depth + 1);
}

function draw() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.15)";
    ctx.fillRect(0, 0, w, h);
    
    // Draw Trees (Fractal Veins)
    trees.forEach(t => {
        ctx.strokeStyle = `rgba(255, ${60 + (t.depth * 20)}, 0, ${1 - (t.depth/8)})`;
        ctx.lineWidth = 2 / (t.depth + 1);
        ctx.beginPath(); ctx.moveTo(t.x1, t.y1); ctx.lineTo(t.x2, t.y2); ctx.stroke();
    });

    // Rising Embers
    if (sparks.length < 60) sparks.push({ x: Math.random() * w, y: h, v: Math.random() * 2 + 0.5, size: Math.random() * 2 });
    sparks.forEach((s, i) => {
        s.y -= s.v;
        ctx.fillStyle = `rgba(255, 180, 0, ${Math.random()})`;
        ctx.fillRect(s.x, s.y, s.size, s.size);
        if (s.y < 0) sparks.splice(i, 1);
    });

    requestAnimationFrame(draw);
}

window.onresize = resize;
resize();
createTree(w/2, h + 50, -Math.PI/2, 120, 0); // Root from bottom
draw();
</script>
</body>
</html>
