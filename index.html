<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARTEMIS | MULTI-MODAL CORE</title>
    <style id="dynamic-theme">
        :root { --bio-high: #00f2ff; --magma: #ff4500; --gold: #FFD700; --glass: rgba(0, 15, 25, 0.92); }
    </style>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Courier New', monospace; color: white; overflow: hidden; }
        #reef-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; filter: brightness(0.4); transition: 1s filter, 1s opacity; }

        /* ARTEMIS CORE */
        #core-station { position: fixed; top: 5%; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; z-index: 100; }
        #artemis-prime { width: 120px; height: 120px; border-radius: 50%; border: 2px solid var(--bio-high); display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, var(--bio-high) 0%, transparent 75%); animation: pulse 6s infinite; cursor: pointer; transition: 0.5s; }
        
        /* RESPONSE FRAME */
        #response-frame { position: fixed; top: 20%; left: 50%; transform: translateX(-50%); width: 450px; max-height: 200px; background: var(--glass); border: 1px solid var(--bio-high); border-radius: 10px; padding: 15px; z-index: 90; opacity: 0; transition: 0.5s; overflow-y: auto; font-size: 0.85rem; color: var(--bio-high); box-shadow: 0 0 20px rgba(0, 242, 255, 0.1); }
        #response-frame.active { opacity: 1; top: 25%; }

        /* ICON FIELD */
        #icon-field { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .bio-icon { position: absolute; font-size: 2rem; color: var(--bio-high); opacity: 0.6; filter: drop-shadow(0 0 5px var(--bio-high)); transition: 0.5s; pointer-events: auto; cursor: help; }

        /* EXPLORER & WINDOWS */
        #explorer-panel { position: fixed; left: -350px; top: 5%; width: 300px; height: 85%; background: var(--glass); border-right: 2px solid var(--bio-high); backdrop-filter: blur(20px); z-index: 300; transition: 0.5s; padding: 20px; border-radius: 0 15px 15px 0; overflow-y: auto; }
        #explorer-panel.open { left: 0; }
        .folder-header { font-size: 0.6rem; color: var(--gold); letter-spacing: 2px; border-bottom: 1px solid rgba(255,215,0,0.3); margin-bottom: 10px; padding-bottom: 5px; margin-top: 15px; }
        .file-item { font-size: 0.75rem; padding: 8px; cursor: pointer; border-radius: 4px; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .file-item:hover { background: rgba(0, 242, 255, 0.15); color: var(--bio-high); }

        #archive-window { position: fixed; top: 10%; right: 30px; width: 380px; height: 60vh; background: var(--glass); border: 1px solid var(--bio-high); backdrop-filter: blur(25px); border-radius: 15px; z-index: 200; display: flex; flex-direction: column; opacity: 0; transform: translateX(50px); pointer-events: none; transition: 0.5s; }
        #archive-window.visible { opacity: 1; transform: translateX(0); pointer-events: auto; }

        /* INPUT */
        #command-base { position: fixed; bottom: 30px; width: 90%; max-width: 600px; left: 50%; transform: translateX(-50%); z-index: 100; }
        #prompt-field { background: var(--glass); border: 2px solid var(--bio-high); border-radius: 12px; display: flex; padding: 10px; }
        #cmd-input { flex: 1; background: transparent; border: none; color: white; font-family: inherit; outline: none; }
        .btn-main { background: var(--bio-high); border: none; padding: 8px 15px; font-weight: bold; cursor: pointer; border-radius: 6px; margin-left: 10px; color: #000; font-size: 0.7rem; }

        @keyframes pulse { 0%, 100% { box-shadow: 0 0 20px rgba(0,242,255,0.2); } 50% { box-shadow: 0 0 50px var(--bio-high); } }
    </style>
</head>
<body>

<img id="reef-bg" src="https://images.unsplash.com/photo-1544551763-46a013bb70d5?auto=format&fit=crop&w=1920&q=80">

<div id="icon-field"></div>

<div id="response-frame">
    <div style="font-size: 0.5rem; color: var(--gold); margin-bottom: 5px;">[ARTEMIS_VOICE_RELAY]</div>
    <div id="response-text">Awaiting input...</div>
</div>

<div id="explorer-panel">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <span style="font-size: 0.7rem; font-weight: bold; color: var(--bio-high);">STEWARDSHIP_EXPLORER</span>
        <button onclick="toggleExplorer()" style="background:transparent; border:none; color:var(--bio-high); cursor:pointer;">[X]</button>
    </div>
    <div class="folder-header">📁 SYSTEM_MODS</div>
    <div class="file-item" onclick="changeBackground('deep')">🌊 Deep Trench</div>
    <div class="file-item" onclick="changeBackground('reef')">🪸 Coral Reef</div>
    <div class="file-item" onclick="changeBackground('void')">🌌 Abyssal Void</div>
    <div class="folder-header">📓 DEEP_LEARNING</div>
    <div id="folder-learning"></div>
    <div class="folder-header">🛠️ PROGRAM_FORGE</div>
    <div id="folder-programs"></div>
</div>

<div id="core-station">
    <div id="artemis-prime" onclick="toggleExplorer()">
        <span style="letter-spacing:4px; font-size:0.8rem;">ARTEMIS</span>
        <span id="status-tag" style="font-size:0.4rem; color:var(--bio-high); margin-top:5px;">IDLE</span>
    </div>
</div>

<div id="command-base">
    <div id="prompt-field">
        <input type="text" id="cmd-input" placeholder="Speak to Artemis...">
        <button class="btn-main" onclick="handleTransmit()">TRANSMIT</button>
    </div>
</div>

<script>
    const synth = window.speechSynthesis;
    const stewardshipArchive = { programs: [], learning: [], harvests: [], ideas: [] };

    const bgMap = {
        deep: "https://images.unsplash.com/photo-1518467166778-b88f373ffec7?auto=format&fit=crop&w=1920&q=80",
        reef: "https://images.unsplash.com/photo-1544551763-46a013bb70d5?auto=format&fit=crop&w=1920&q=80",
        void: "https://images.unsplash.com/photo-1506318137071-a8e063b4bcc0?auto=format&fit=crop&w=1920&q=80"
    };

    function handleTransmit() {
        const input = document.getElementById('cmd-input');
        const val = input.value.trim().toLowerCase();
        if(!input.value) return;

        // Command Processing
        if(val.includes("background") || val.includes("change scene")) {
            const theme = val.includes("reef") ? "reef" : val.includes("void") ? "void" : "deep";
            changeBackground(theme);
            respond(`Shifting environment to ${theme} parameters.`);
        } else if(val.includes("add icon") || val.includes("spawn")) {
            addBioIcon();
            respond("Spawning bioluminescent data node.");
        } else if(val.includes("clear icon") || val.includes("remove icon")) {
            document.getElementById('icon-field').innerHTML = "";
            respond("Clearing visual artifacts.");
        } else if(val.includes("code") || val.includes("program")) {
            runForge(input.value);
        } else {
            respond("Processing request through Neural Core. " + input.value);
        }
        input.value = "";
    }

    function respond(text) {
        // Visual Text Frame
        const frame = document.getElementById('response-frame');
        document.getElementById('response-text').innerText = text;
        frame.classList.add('active');
        
        // Voice Response
        synth.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.pitch = 0.8; u.rate = 0.9;
        u.onend = () => setTimeout(() => frame.classList.remove('active'), 5000);
        synth.speak(u);
        
        visualState(true, "COMMUNICATING");
        setTimeout(() => visualState(false, "IDLE"), 2000);
    }

    function changeBackground(key) {
        const bg = document.getElementById('reef-bg');
        bg.style.opacity = 0;
        setTimeout(() => {
            bg.src = bgMap[key];
            bg.style.opacity = 1;
        }, 500);
    }

    function addBioIcon() {
        const icons = ['❄️', '💠', '🧿', '🧬', '🛸', '🛰️'];
        const icon = document.createElement('div');
        icon.className = 'bio-icon';
        icon.innerText = icons[Math.floor(Math.random()*icons.length)];
        icon.style.left = Math.random() * 80 + 10 + "%";
        icon.style.top = Math.random() * 60 + 20 + "%";
        document.getElementById('icon-field').appendChild(icon);
    }

    function runForge(prompt) {
        respond("Forging new architecture based on your prompt.");
        setTimeout(() => {
            const name = `Forge_${Date.now()}.js`;
            stewardshipArchive.programs.unshift({ name, content: `// Forged Logic\nconsole.log("Active");` });
            renderExplorer();
        }, 2000);
    }

    function toggleExplorer() { document.getElementById('explorer-panel').classList.toggle('open'); }
    function renderExplorer() {
        ['programs', 'learning'].forEach(cat => {
            const div = document.getElementById(`folder-${cat}`);
            if(div) div.innerHTML = stewardshipArchive[cat].map(f => `<div class="file-item">📄 ${f.name}</div>`).join('');
        });
    }

    function visualState(active, status) {
        document.getElementById('status-tag').innerText = status;
        document.getElementById('artemis-prime').style.borderColor = active ? "var(--magma)" : "var(--bio-high)";
    }
</script>
</body>
</html>
