<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARTEMIS | OMNI_SCAN</title>
    <style>
        :root { --bio: #00f2ff; --accent: #d4af37; --glass: rgba(0, 242, 255, 0.02); --blur: blur(8px); }
        body, html { margin: 0; padding: 0; background: #000; font-family: 'Courier New', monospace; color: white; overflow: hidden; width: 100%; height: 100%; }
        canvas#primeCanvas { position: fixed; top: 0; left: 0; z-index: 1; width: 100%; height: 100%; }
        
        #artemis-omni-chassis {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 850px; height: 85vh;
            background: var(--glass); backdrop-filter: var(--blur);
            border: 1px solid rgba(0, 242, 255, 0.1); border-radius: 24px;
            padding: 40px; display: flex; flex-direction: column; z-index: 10;
        }

        #repo-map { flex: 1; overflow-y: auto; margin: 20px 0; border-left: 2px solid var(--bio); padding-left: 20px; }
        .file-node { font-size: 0.9rem; margin-bottom: 10px; color: rgba(255, 255, 255, 0.7); }
        .file-node span { color: var(--bio); font-weight: bold; }
        
        #input-zone { margin-top: auto; border-top: 1px solid rgba(0, 242, 255, 0.2); padding-top: 20px; }
        #master-cmd {
            width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--bio);
            color: var(--bio); font-family: inherit; font-size: 1.2rem; outline: none; padding: 10px 0;
        }
    </style>
</head>
<body>
<canvas id="primeCanvas"></canvas>
<div id="artemis-omni-chassis">
    <div style="font-size: 10px; color: var(--accent); letter-spacing: 5px;">RECURSIVE_SCAN_ACTIVE</div>
    <h1 style="margin:0; letter-spacing: 10px; text-shadow: 0 0 10px var(--bio);">ARTEMIS</h1>
    
    <div id="repo-map">
        <div class="file-node">Connecting to Neural Core...</div>
    </div>

    <div id="input-zone">
        <input type="text" id="master-cmd" placeholder="Search GitHub or Execute Logic..." autocomplete="off">
    </div>
</div>

<script>
const GITHUB_REPO = 'highland8899-commits/Artemis-Sync'; // Adjust to your actual path

async function fullRepoScan() {
    const map = document.getElementById('repo-map');
    try {
        const res = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/`);
        const files = await res.json();
        map.innerHTML = ""; 
        
        files.forEach(file => {
            const div = document.createElement('div');
            div.className = 'file-node';
            div.innerHTML = `[${file.type.toUpperCase()}] <span>${file.name}</span> — SHA: ${file.sha.substring(0,7)}`;
            map.appendChild(div);
            
            // If the file is "last_sync.txt", change particle color to Green (Synced)
            if(file.name === 'last_sync.txt') evolve('green');
        });
    } catch (e) {
        map.innerHTML = "Critical Link Failure. Check GitHub API Quota.";
    }
}

// Particle Logic remains to keep the visual responsive
const canvas = document.getElementById('primeCanvas');
const ctx = canvas.getContext('2d');
let particles = [];
let pColor = 'rgba(0, 242, 255, 0.5)';

function init() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    for (let i = 0; i < 800; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5), vy: (Math.random()-0.5) });
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = pColor;
    particles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
        ctx.beginPath(); ctx.arc(p.x, p.y, 1.2, 0, Math.PI*2); ctx.fill();
    });
    requestAnimationFrame(animate);
}

function evolve(color) {
    if(color === 'green') pColor = 'rgba(0, 255, 170, 0.6)';
    particles.forEach(p => { p.vx *= 3; p.vy *= 3; setTimeout(() => { p.vx /= 3; p.vy /= 3; }, 1000); });
}

init(); animate(); fullRepoScan();
</script>
</body>
</html>
