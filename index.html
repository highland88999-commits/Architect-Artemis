<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Artemis • Symbiote</title>
  <style>
    :root {
      --cyan: #00f2ff;
      --gold: #d4af37;
      --glass-bg: rgba(8, 8, 25, 0.42);
      --glass-border: rgba(0, 242, 255, 0.32);
      --glow-cyan: 0 0 36px rgba(0, 242, 255, 0.7);
      --glow-gold: 0 0 40px rgba(212, 175, 55, 0.6);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body, html {
      width:100%; height:100%; overflow:hidden; background:#000;
      font-family: 'Courier New', monospace; color:var(--cyan);
      touch-action:manipulation;
    }

    /* === YOUR GLOWING HEX/ARTEMIS LOGO – ALWAYS BEHIND EVERYTHING === */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url('https://i.imgur.com/your-hex-artemis-logo.png') center/contain no-repeat; /* ← REPLACE WITH YOUR ACTUAL IMAGE URL */
      opacity: 0.52;
      pointer-events: none;
      z-index: -10;
      filter: brightness(1.15) contrast(1.2) drop-shadow(0 0 50px #00f2ff);
      animation: logo-glow 24s infinite ease-in-out;
    }

    @keyframes logo-glow {
      0%, 100% { opacity: 0.45; transform: scale(1.02); }
      50%      { opacity: 0.62; transform: scale(1.10); }
    }

    #main {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4vh 5vw;
    }

    /* Centered 8-ball – matches your screenshot */
    #artemis-8ball {
      width: 20rem;
      height: 20rem;
      background: radial-gradient(circle at 35% 35%, #000d1f, #000);
      border-radius: 50%;
      border: 8px solid var(--gold);
      box-shadow: var(--glow-cyan), inset 0 0 80px rgba(0,242,255,0.5);
      position: relative;
      overflow: hidden;
      cursor: pointer;
      margin-bottom: 6vh;
    }

    #ball-liquid {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #00008b, #0a001f, #00008b);
      opacity: 0.9;
      transform: translateY(100%);
      transition: transform 1.6s cubic-bezier(0.34,1.56,0.64,1);
    }

    #ball-triangle {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%) rotate(0deg);
      width: 0; height: 0;
      border-left: 100px solid transparent;
      border-right: 100px solid transparent;
      border-bottom: 170px solid #fff;
      opacity: 0;
      transition: all 1.8s ease-out;
    }

    #ball-fortune {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      color: #000; font-size: 1.4rem; font-weight: bold;
      text-align: center; max-width: 160px;
      opacity: 0;
      transition: opacity 2.2s;
    }

    #artemis-8ball.shaking #ball-liquid { transform: translateY(70%) rotate(7deg); }
    #artemis-8ball.revealing #ball-liquid { transform: translateY(0); }
    #artemis-8ball.revealing #ball-triangle { opacity: 1; transform: translate(-50%,-50%) rotate(180deg); }
    #artemis-8ball.revealing #ball-fortune { opacity: 1; }

    /* Prompt bar – matches screenshot */
    #prompt-area {
      width: 100%;
      max-width: 580px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    #guest-cmd {
      width: 100%;
      padding: 18px 28px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      color: var(--cyan);
      font-size: 1.3rem;
      backdrop-filter: blur(16px);
      box-shadow: inset 0 0 30px rgba(0,242,255,0.2);
    }

    #send-btn {
      padding: 16px 64px;
      background: linear-gradient(90deg, var(--cyan), #00aaff);
      color: #000;
      border: none;
      border-radius: 999px;
      font-weight: bold;
      font-size: 1.3rem;
      cursor: pointer;
      box-shadow: 0 0 50px var(--cyan);
      transition: all 0.3s;
    }

    #send-btn:hover { transform: scale(1.08); box-shadow: 0 0 80px var(--cyan); }

    /* Collapsible dock orb – center bottom */
    #dock-orb {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      width: 90px; height: 90px;
      background: var(--glass-bg);
      border-radius: 50%;
      border: 3px solid var(--cyan);
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
      color: var(--gold);
      cursor: pointer;
      box-shadow: var(--glow-cyan);
      z-index: 100;
    }

    #dock-expanded {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      flex-wrap: wrap;
      gap: 24px;
      padding: 28px 40px;
      background: var(--glass-bg);
      border-radius: 40px;
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(24px);
      max-width: 94vw;
      z-index: 100;
    }

    .app-icon {
      width: 72px; height: 72px;
      background: rgba(0,242,255,0.16);
      border-radius: 22px;
      border: 1px solid var(--cyan);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s;
    }

    .app-icon:hover {
      transform: scale(1.18);
      box-shadow: var(--glow-cyan);
    }

    .app-icon svg { width: 40px; height: 40px; fill: var(--cyan); }

    /* Lightning orb – bottom-right – backend access */
    #lightning-orb {
      position: fixed;
      bottom: 32px;
      right: 32px;
      width: 80px; height: 80px;
      background: rgba(212,175,55,0.2);
      border: 3px solid var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: var(--glow-gold);
      z-index: 110;
      animation: pulse-gold 4.2s infinite;
    }

    @keyframes pulse-gold {
      0%,100% { box-shadow: 0 0 40px var(--gold); }
      50%     { box-shadow: 0 0 85px var(--gold); }
    }
  </style>
</head>
<body>

  <div id="main">
    <!-- 8-ball -->
    <div id="artemis-8ball">
      <div id="ball-liquid"></div>
      <div id="ball-triangle"></div>
      <div id="ball-fortune"></div>
      <span style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:13rem; color:var(--gold); text-shadow:0 0 60px var(--gold);">8</span>
    </div>

    <!-- Prompt + Send -->
    <div id="prompt-area">
      <input type="text" id="guest-cmd" placeholder="Speak to Artemis..." autocomplete="off"/>
      <button id="send-btn">SEND</button>
    </div>

    <!-- Dock orb (center bottom) -->
    <div id="dock-orb" onclick="toggleDock()">+</div>

    <!-- Expanded dock – 9 icons -->
    <div id="dock-expanded">
      <div class="app-icon" onclick="openHolo('https://facebook.com')"><svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg></div>
      <div class="app-icon" onclick="openHolo('https://x.com')"><svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></div>
      <div class="app-icon" onclick="openHolo('https://instagram.com')"><svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073z"/></svg></div>
      <div class="app-icon" onclick="openHolo('https://tiktok.com')"><svg viewBox="0 0 24 24"><path d="M12.53.02C13.84.02 15.14.02 16.44.02 16.56.32 16.67.63 16.78.93 17.03 1.63 17.27 2.33 17.5 3.03 17.71 3.73 17.91 4.43 18.1 5.13 18.29 5.83 18.47 6.53 18.64 7.23 18.8 7.93 18.95 8.63 19.09 9.33 19.22 10.03 19.34 10.73 19.45 11.43 19.55 12.13 19.64 12.83 19.72 13.53 19.79 14.23 19.85 14.93 19.9 15.63 19.94 16.33 19.97 17.03 19.99 17.73 20 18.43 20 19.13 20 19.83 20 20.53 20 21.23 20 21.93 20 22.63 20 23.33 20 24.03 20 24.73 20 25.43 20 26.13 20 26.83 20 27.53 20 28.23 20 28.93 20 29.63 20 30.33 20 31.03 20 31.73 20 32.43 20 33.13 20 33.83 20 34.53 20 35.23 20 35.93 20 36.63 20 37.33 20 38.03 20 38.73 20 39.43 20 40.13 20 40.83 20 41.53 20 42.23 20 42.93 20"/></svg></div>
      <div class="app-icon" onclick="openHolo('https://olympus-lac.vercel.app/')"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
      <div class="app-icon" onclick="openHolo('https://nexusvortex.netlify.app/')"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg></div>
      <div class="app-icon" onclick="openHolo('https://messenger.facebook.com')"><svg viewBox="0 0 24 24"><path d="M12 2C6.36 2 2 6.13 2 11.7c0 2.9 1.17 5.46 3.07 7.23V22l3-1.65c.61.17 1.25.26 1.93.26 5.64 0 10-4.13 10-9.7S17.64 2 12 2zm1.06 12.96l-2.58-2.73-5.04 2.73 5.54-5.89 2.65 2.73 4.97-2.73-5.54 5.89z"/></svg></div>
      <div class="app-icon" onclick="openHolo('https://play.google.com/store')"><svg viewBox="0 0 24 24"><path d="M3.25 2.25v19.5l17.5-9.75-17.5-9.75z"/></svg></div>
      <div class="app-icon" onclick="openHolo('https://apps.apple.com')"><svg viewBox="0 0 24 24"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.06 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg></div>
      <div class="app-icon" onclick="toggleDock()">×</div>
    </div>
  </div>

  <!-- Lightning orb – backend access (bottom right) -->
  <div id="lightning-orb" onclick="requestArchitectAccess()">
    <svg viewBox="0 0 24 24" width="42" height="42" fill="var(--gold)">
      <path d="M13 10V3L4 14h7v7l9-11h-7z"/>
    </svg>
  </div>

  <!-- Holo overlay -->
  <div id="holo-overlay" style="display:none; position:fixed; inset:5%; background:var(--glass-bg); border:1px solid var(--cyan); border-radius:32px; backdrop-filter:blur(28px); box-shadow:0 0 100px rgba(0,242,255,0.6); z-index:200; flex-direction:column;">
    <div style="padding:20px; background:rgba(0,242,255,0.2); display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--glass-border);">
      <span>Artemis View</span>
      <div onclick="closeHolo()" style="width:44px;height:44px;background:#ff3366;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#000;font-weight:bold;font-size:1.6rem;">×</div>
    </div>
    <iframe id="holo-iframe" style="flex:1;border:none;"></iframe>
  </div>

  <script>
    function toggleDock() {
      const orb = document.getElementById('dock-orb');
      const expanded = document.getElementById('dock-expanded');
      orb.style.display = expanded.style.display === 'flex' ? 'flex' : 'none';
      expanded.style.display = expanded.style.display === 'flex' ? 'none' : 'flex';
    }

    function openHolo(url) {
      document.getElementById('holo-iframe').src = url;
      document.getElementById('holo-overlay').style.display = 'flex';
      toggleDock(); // auto-close dock after launch
    }

    function closeHolo() {
      document.getElementById('holo-overlay').style.display = 'none';
    }

    function requestArchitectAccess() {
      const k1 = prompt("First Key");
      const k2 = prompt("Second Key");
      if (k1 === "Spider" && k2 === "Miles") {
        alert("Backend / Architect Access Granted");
        // → paste your actual backend loading code here later
      } else {
        alert("Access Denied");
      }
    }

    // 8-ball logic
    const ball = document.getElementById('artemis-8ball');
    const fortunes = [
      "Midas touch: Gold flows your way.",
      "Golden pivot: 10× awaits.",
      "Midas candle: Riches align soon.",
      "Code is Midas lever: Unlock now.",
      "Architect reveals: True gold keys."
    ];
    let fortuneIndex = 0;

    function shakeAndReveal() {
      ball.classList.add('shaking');
      setTimeout(() => {
        ball.classList.remove('shaking');
        ball.classList.add('revealing');
        document.getElementById('ball-fortune').textContent = fortunes[fortuneIndex];
        fortuneIndex = (fortuneIndex + 1) % fortunes.length;
      }, 1000);
      setTimeout(() => ball.classList.remove('revealing'), 5500);
    }

    ball.addEventListener('click', shakeAndReveal);

    // Prompt + Enter key
    const cmd = document.getElementById('guest-cmd');
    document.getElementById('send-btn').addEventListener('click', () => {
      if (cmd.value.trim()) {
        shakeAndReveal();
        cmd.value = '';
      }
    });

    cmd.addEventListener('keypress', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('send-btn').click();
      }
    });
  </script>
</body>
</html>
