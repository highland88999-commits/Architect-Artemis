<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Project Artemis • Symbiote</title>
  <style>
    :root {
      --neon-cyan: #00f2ff;
      --neon-pink: #ff00aa;
      --accent-gold: #d4af37;
      --glass: rgba(10, 10, 30, 0.35);
      --glass-border: rgba(0, 242, 255, 0.25);
      --glow: 0 0 30px rgba(0, 242, 255, 0.6);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body, html {
      width:100%; height:100%; overflow:hidden; background:#000;
      font-family: 'Courier New', monospace; color:var(--neon-cyan);
      touch-action:manipulation;
    }

    /* Persistent glowing Artemis logo background */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url('https://files.catbox.moe/...your-uploaded-image-url-here...') center/contain no-repeat;
      opacity: 0.45;
      pointer-events: none;
      z-index: -2;
      filter: brightness(1.1) contrast(1.15) drop-shadow(0 0 40px #00f2ff);
      animation: logo-breath 20s infinite ease-in-out;
    }

    @keyframes logo-breath {
      0%,100% { opacity:0.38; transform:scale(1.02); }
      50% { opacity:0.55; transform:scale(1.08); }
    }

    #container {
      position: relative;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2vh 4vw;
    }

    /* Large centered 8-ball */
    #artemis-8ball {
      width: 18rem;
      height: 18rem;
      background: radial-gradient(circle at 30% 30%, #000033, #000);
      border-radius: 50%;
      border: 5px solid var(--accent-gold);
      box-shadow: var(--glow), inset 0 0 60px rgba(0,242,255,0.4);
      position: relative;
      overflow: hidden;
      cursor: pointer;
      margin-bottom: 4vh;
    }

    #ball-liquid {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #00008b, #0a001f, #00008b);
      opacity: 0.88;
      transform: translateY(100%);
      transition: transform 1.4s cubic-bezier(0.34,1.56,0.64,1);
    }

    #ball-triangle {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(0deg);
      width: 0; height: 0;
      border-left: 90px solid transparent;
      border-right: 90px solid transparent;
      border-bottom: 150px solid #fff;
      opacity: 0;
      transition: all 1.5s ease-out;
    }

    #ball-fortune {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #000; font-size: 1.3rem; font-weight: bold;
      text-align: center; max-width: 140px;
      opacity: 0;
      transition: opacity 1.8s;
    }

    #artemis-8ball.shaking #ball-liquid { transform: translateY(70%) rotate(5deg); }
    #artemis-8ball.revealing #ball-liquid { transform: translateY(0); }
    #artemis-8ball.revealing #ball-triangle { opacity: 1; transform: translate(-50%, -50%) rotate(180deg); }
    #artemis-8ball.revealing #ball-fortune { opacity: 1; }

    /* Prompt bar */
    #prompt-area {
      width: 100%;
      max-width: 540px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    #guest-cmd {
      width: 100%;
      padding: 16px 20px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      color: var(--neon-cyan);
      font-size: 1.2rem;
      backdrop-filter: blur(12px);
      box-shadow: inset 0 0 20px rgba(0,242,255,0.15);
    }

    #send-btn {
      padding: 14px 48px;
      background: linear-gradient(90deg, var(--neon-cyan), #00aaff);
      color: #000;
      border: none;
      border-radius: 999px;
      font-weight: bold;
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: 0 0 40px var(--neon-cyan);
      transition: all 0.3s;
    }

    #send-btn:hover { transform: scale(1.08); box-shadow: 0 0 60px var(--neon-cyan); }

    /* Bottom orb dock */
    #dock-orb {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px; height: 80px;
      background: var(--glass);
      border-radius: 50%;
      border: 2px solid var(--neon-cyan);
      backdrop-filter: blur(16px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: var(--accent-gold);
      cursor: pointer;
      box-shadow: 0 0 50px rgba(0,242,255,0.4);
      z-index: 100;
    }

    #dock-expanded {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      flex-wrap: wrap;
      gap: 20px;
      padding: 20px 32px;
      background: var(--glass);
      border-radius: 32px;
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      max-width: 90vw;
      z-index: 100;
    }

    .app-icon {
      width: 64px; height: 64px;
      background: rgba(0,242,255,0.12);
      border-radius: 18px;
      border: 1px solid var(--neon-cyan);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s;
    }

    .app-icon:hover {
      transform: scale(1.15);
      box-shadow: 0 0 30px var(--neon-cyan);
    }

    .app-icon svg { width: 36px; height: 36px; fill: var(--neon-cyan); }
  </style>
</head>
<body>

  <div id="container">
    <!-- Magic 8-Ball (Artemis response) -->
    <div id="artemis-8ball">
      <div id="ball-liquid"></div>
      <div id="ball-triangle"></div>
      <div id="ball-fortune"></div>
      <span style="font-size:10rem; color:var(--accent-gold); text-shadow:0 0 40px var(--accent-gold);">8</span>
    </div>

    <!-- Prompt + Send -->
    <div id="prompt-area">
      <input type="text" id="guest-cmd" placeholder="Speak to Artemis..." autocomplete="off"/>
      <button id="send-btn">SEND</button>
    </div>

    <!-- Dock orb -->
    <div id="dock-orb" onclick="toggleDock()">⚡</div>
    <div id="dock-expanded">
      <!-- Icons here – add your own links / SVGs -->
      <div class="app-icon" onclick="openHolo('https://facebook.com')"><svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg></div>
      <!-- Add more icons -->
      <div class="app-icon" onclick="toggleDock()">×</div>
    </div>
  </div>

  <!-- Holo window -->
  <div id="holo" style="display:none; position:fixed; inset:4%; background:var(--glass); border:1px solid var(--neon-cyan); border-radius:24px; backdrop-filter:blur(24px); box-shadow:0 0 80px rgba(0,242,255,0.5); z-index:200; flex-direction:column;">
    <div style="padding:16px; background:rgba(0,242,255,0.15); display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--glass-border);">
      <span>Artemis View</span>
      <div onclick="closeHolo()" style="width:36px;height:36px;background:var(--err);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#000;font-weight:bold;">×</div>
    </div>
    <iframe id="holo-frame" style="flex:1;border:none;"></iframe>
  </div>

  <script>
    function toggleDock() {
      document.getElementById('dock-orb').style.display = document.getElementById('dock-expanded').style.display === 'flex' ? 'flex' : 'none';
      document.getElementById('dock-expanded').style.display = document.getElementById('dock-expanded').style.display === 'flex' ? 'none' : 'flex';
    }

    function openHolo(url) {
      document.getElementById('holo-frame').src = url;
      document.getElementById('holo').style.display = 'flex';
    }

    function closeHolo() {
      document.getElementById('holo').style.display = 'none';
    }

    // 8-ball shake + reveal
    const ball = document.getElementById('artemis-8ball');
    const fortunes = ["Midas awakens.", "Gold flows.", "10× pivot.", "Lever unlocked.", "True keys revealed."];
    let i = 0;

    function shakeReveal() {
      ball.classList.add('shaking');
      setTimeout(() => {
        ball.classList.remove('shaking');
        ball.classList.add('revealing');
        document.getElementById('ball-fortune').textContent = fortunes[i];
        i = (i + 1) % fortunes.length;
      }, 900);
      setTimeout(() => ball.classList.remove('revealing'), 5000);
    }

    ball.onclick = shakeReveal;

    // Prompt send
    const input = document.getElementById('guest-cmd');
    document.getElementById('send-btn').onclick = () => {
      if (input.value.trim()) {
        shakeReveal();
        input.value = '';
      }
    };
    input.onkeypress = e => { if (e.key === 'Enter') document.getElementById('send-btn').click(); };
  </script>
</body>
</html>
