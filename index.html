<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Artemis • Symbiote</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>

  <style>
    :root {
      --cyan: #00f2ff; 
      --gold: #d4af37; 
      --red: #ff3366;
      --active-color: var(--cyan);
      --glass: rgba(8, 8, 25, 0.7); 
      --border: rgba(0, 242, 255, 0.2);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body, html { 
      width:100%; height:100%; overflow:hidden; 
      background:#000; font-family: 'Courier New', monospace; 
      color:var(--active-color); 
    }

    /* Background Video Layer */
    .video-container { position: fixed; inset: 0; z-index: 0; opacity: 0.4; }
    #bg-video { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%) brightness(0.5); }

    /* Main UI Container */
    #container { 
      position: relative; z-index: 10; display: flex; flex-direction: column; 
      align-items: center; justify-content: center; gap: 2vh;
      height: 100vh; padding: 20px 16px 140px 16px; 
    }

    /* The Oracle Visualizer */
    #oracle-circle { 
      width: clamp(160px, 28vh, 260px); height: clamp(160px, 28vh, 260px); 
      border-radius: 50%; border: 4px solid var(--active-color);
      box-shadow: 0 0 30px var(--active-color), inset 0 0 50px var(--active-color);
      position: relative; overflow: hidden; transition: all 1s ease; flex-shrink: 0;
    }
    
    #council-status { 
      font-size: 10px; color: var(--active-color); background: rgba(0,0,0,0.8); 
      padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
      transition: all 0.5s ease; letter-spacing: 2px; text-transform: uppercase;
    }

    /* Particle Text Mall Portal */
    #mall-link-container {
      width: 100%; max-width: 500px; height: 60px; 
      position: relative; overflow: hidden; border-radius: 12px;
      border: 1px solid var(--border); background: rgba(0,0,0,0.9);
      display: flex; align-items: center; justify-content: center;
      text-decoration: none; margin-bottom: 5px; transition: 0.3s ease;
    }
    
    #mall-link-container:hover {
        border-color: var(--active-color);
        transform: scale(1.02);
        box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
    }

    #starfield-canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }

    /* Response Area */
    #response-field { 
      width: 100%; max-width: 500px; max-height: 0; overflow: hidden; 
      background: var(--glass); border: 1px solid var(--border); border-radius: 12px; 
      color: #eee; font-size: 0.9rem; transition: all 0.8s ease; backdrop-filter: blur(15px);
      line-height: 1.5;
    }
    #response-field.active { max-height: 30vh; padding: 18px; overflow-y: auto; border-color: var(--active-color); }

    /* Input Area */
    #prompt-area { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 10px; }
    .input-wrapper { 
      background: var(--glass); border: 1px solid var(--border); 
      border-radius: 50px; padding: 8px 20px; display: flex; align-items: center; 
    }
    #guest-cmd { 
      flex: 1; background: transparent; border: none; color: #fff; 
      outline: none; text-align: center; font-size: 1rem; 
    }
    #send-btn { 
      background: var(--active-color); color: #000; border-radius: 50px; 
      padding: 12px; font-weight: bold; border: none; cursor: pointer; 
      transition: 0.3s; box-shadow: 0 0 15px var(--active-color); 
    }

    .pip { width: 8px; height: 8px; border-radius: 50%; background: var(--active-color); box-shadow: 0 0 10px var(--active-color); transition: 0.5s; }
    
    #bottom-dock { 
      position: fixed; bottom: 15px; height: 60px; width: 90%; 
      background: var(--glass); border-radius: 40px; border: 1px solid var(--border); 
      left: 50%; transform: translateX(-50%); z-index: 100; 
      display: flex; align-items: center; padding: 0 25px; gap: 15px; 
    }
  </style>
</head>
<body>

<div class="video-container">
  <video id="bg-video" autoplay loop muted playsinline src="https://www.dropbox.com/scl/fi/x93qcdd64hcpedqn2murk/grok_video_2026-02-20-06-12-55.mp4?rlkey=q51etky32dg2gsrx3w3sez1s8&raw=1"></video>
</div>

<div id="container">
  <div id="oracle-circle">
    <video id="oracle-video" autoplay loop muted playsinline style="width:100%; height:100%; object-fit:cover;" src="https://files.catbox.moe/no2e76.mp4"></video>
  </div>

  <div id="council-header">
    <div style="display:flex; justify-content: center; gap:8px; margin-bottom:8px;" id="pips-container">
      <div class="pip"></div><div class="pip"></div><div class="pip"></div>
    </div>
    <div id="council-status">[SENSE: NEUTRAL]</div>
  </div>

  <div id="response-field"></div>

  <a href="https://hermes-landing-nu.vercel.app/" id="mall-link-container" target="_blank">
      <canvas id="starfield-canvas"></canvas>
  </a>

  <div id="prompt-area">
    <div class="input-wrapper">
      <input type="text" id="guest-cmd" placeholder="Command Artemis..." autocomplete="off">
    </div>
    <button id="send-btn">TRANSMIT</button>
  </div>
</div>

<div id="bottom-dock">
    <div style="color:var(--active-color); font-size: 10px; white-space: nowrap; letter-spacing: 2px;">PORTALS CONNECTED // OLYMPUS_ROOT</div>
</div>

<script>
  // --- THREE.JS PARTICLE TEXT ENGINE ---
  const mallCanvas = document.getElementById('starfield-canvas');
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, 500 / 60, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ canvas: mallCanvas, alpha: true, antialias: true });
  renderer.setSize(500, 60);
  renderer.setPixelRatio(window.devicePixelRatio);

  function getTextPoints(text, width, height) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = width;
    canvas.height = height;
    ctx.fillStyle = 'white';
    ctx.font = '900 32px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, width / 2, height / 2);

    const imageData = ctx.getImageData(0, 0, width, height).data;
    const points = [];
    for (let y = 0; y < height; y += 3) {
      for (let x = 0; x < width; x += 3) {
        if (imageData[(y * width + x) * 4 + 3] > 128) {
          points.push({ x: (x - width / 2) * 0.022, y: -(y - height / 2) * 0.022 });
        }
      }
    }
    return points;
  }

  const textPoints = getTextPoints('ENTER ONLINE MALL', 500, 60);
  const starGeometry = new THREE.BufferGeometry();
  const positions = new Float32Array(textPoints.length * 3);
  const originals = new Float32Array(textPoints.length * 3);

  for (let i = 0; i < textPoints.length; i++) {
    positions[i * 3] = textPoints[i].x;
    positions[i * 3 + 1] = textPoints[i].y;
    positions[i * 3 + 2] = 0;
    originals[i * 3] = textPoints[i].x;
    originals[i * 3 + 1] = textPoints[i].y;
    originals[i * 3 + 2] = 0;
  }

  starGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const starMaterial = new THREE.PointsMaterial({ size: 0.035, transparent: true, opacity: 0.9 });
  const starMesh = new THREE.Points(starGeometry, starMaterial);
  scene.add(starMesh);
  camera.position.z = 5;

  let time = 0;
  function animate() {
    requestAnimationFrame(animate);
    time += 0.05;
    const posAttr = starGeometry.attributes.position;
    for (let i = 0; i < textPoints.length; i++) {
      posAttr.array[i * 3] = originals[i * 3] + Math.sin(time + originals[i * 3] * 10) * 0.008;
      posAttr.array[i * 3 + 1] = originals[i * 3 + 1] + Math.cos(time + originals[i * 3 + 1] * 10) * 0.008;
    }
    posAttr.needsUpdate = true;
    starMaterial.color.set(getComputedStyle(document.documentElement).getPropertyValue('--active-color').trim());
    renderer.render(scene, camera);
  }
  animate();

  // --- INTERACTION LOGIC ---
  const root = document.documentElement;
  const responseField = document.getElementById('response-field');
  const statusText = document.getElementById('council-status');

  async function handleTransmit() {
    const query = document.getElementById('guest-cmd').value;
    if (!query) return;

    statusText.textContent = "[DELIBERATING...]";
    responseField.classList.remove('active');

    try {
      // Logic for actual API call
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userQuery: query })
      });
      const data = await response.json();
      
      const colors = { blue: '#00f2ff', gold: '#d4af37', red: '#ff3366' };
      root.style.setProperty('--active-color', colors[data.sentiment] || colors.blue);

      responseField.innerHTML = data.text;
      responseField.classList.add('active');
      statusText.textContent = `[SENSE: ${data.sentiment.toUpperCase()}]`;
      document.getElementById('guest-cmd').value = "";
      
    } catch (err) {
      // Mocking response for demo if API isn't present
      setTimeout(() => {
          responseField.innerHTML = "System link established. Welcome to the Olympian sector. Command recognized.";
          responseField.classList.add('active');
          statusText.textContent = "[SENSE: BLUE]";
      }, 1000);
    }
  }

  document.getElementById('send-btn').addEventListener('click', handleTransmit);
  document.getElementById('guest-cmd').addEventListener('keypress', (e) => { if(e.key === 'Enter') handleTransmit(); });
</script>

</body>
</html>
