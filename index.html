<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARTEMIS | REEF STATION</title>
    <style>
        :root {
            --bio-high: #00f2ff;
            --magma: #ff4500;
            --gold: #FFD700;
            --glass: rgba(0, 20, 30, 0.8);
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Courier New', monospace; color: white; overflow: hidden; }
        
        /* THE REEF BACKDROPS */
        #reef-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -1; filter: brightness(0.6) contrast(1.1);
        }

        /* ARTEMIS SYMBIOTE (Floating Orb) */
        #artemis-orb {
            position: fixed; top: 20%; left: 50%; transform: translate(-50%, -50%);
            width: 120px; height: 120px; border-radius: 50%;
            background: radial-gradient(circle, var(--bio-high) 0%, transparent 70%);
            box-shadow: 0 0 50px var(--bio-high);
            z-index: 5; animation: float 6s ease-in-out infinite;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(5px);
        }

        @keyframes float { 0%, 100% { transform: translate(-50%, -55%); } 50% { transform: translate(-50%, -45%); } }

        #ui-layer { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 20px; }

        /* API NEXUS WINDOW (Floating & Collapsible) */
        #panel-api {
            position: fixed; top: 100px; right: 20px; width: 280px;
            background: var(--glass); border-left: 3px solid var(--magma);
            padding: 15px; border-radius: 8px; display: none;
            backdrop-filter: blur(10px); box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }

        /* COMMON WIDGET PANEL */
        .widget-panel {
            position: fixed; bottom: 220px; width: 90%; max-width: 500px; height: 350px;
            background: var(--glass); border: 1px solid var(--bio-high);
            backdrop-filter: blur(15px); padding: 15px; display: none;
            border-radius: 15px; overflow-y: auto;
        }

        .widget-label { color: var(--gold); font-size: 0.6rem; letter-spacing: 2px; margin-bottom: 10px; border-bottom: 1px solid rgba(0,242,255,0.2); }

        /* ICON DOCK */
        #icon-dock { display: flex; gap: 15px; margin-bottom: 15px; background: rgba(0,0,0,0.4); padding: 10px 20px; border-radius: 30px; border: 1px solid var(--bio-high); }
        .app-icon { width: 50px; height: 50px; border-radius: 12px; border: 1px solid var(--bio-high); background: rgba(0,26,51,0.8); display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* FORGE BOX */
        #forge-container { width: 95%; max-width: 600px; background: rgba(0,0,0,0.8); border: 1px solid var(--bio-high); padding: 15px; border-radius: 10px; }
        textarea { width: 100%; height: 40px; background: transparent; border: none; color: #fff; font-family: inherit; outline: none; resize: none; }
    </style>
</head>
<body>

<video autoplay muted loop playsinline id="reef-bg">
    <source src="https://assets.mixkit.co/videos/preview/mixkit-underwater-coral-reef-with-many-fishes-4152-large.mp4" type="video/mp4">
</video>

<div id="artemis-orb" onclick="speak('Artemis listening. How shall we stewardship the reef today?')">
    <div style="font-size: 0.5rem; color: white; text-align: center;">ARTEMIS_CORE</div>
</div>

<div id="ui-layer">
    <div id="gate-zone" style="text-align:center; margin-bottom: 30vh;">
        <h2 style="letter-spacing: 5px; color: var(--bio-high);">STATION_LOCKED</h2>
        <input type="text" id="gate-input" style="background:transparent; border:none; border-bottom:1px solid var(--bio-high); color:white; text-align:center; outline:none;" placeholder="[ IDENTITY ]">
    </div>

    <div id="panel-api">
        <div class="widget-label">⚡ API_NEXUS (SYSTEM FILES)</div>
        <div style="font-size: 0.65rem; color: #aaa;">
            <div style="margin-bottom:8px;">● transmit.js <span style="color:var(--bio-high)">[READY]</span></div>
            <div style="margin-bottom:8px;">● forge.js <span style="color:var(--bio-high)">[READY]</span></div>
            <div style="margin-bottom:8px;">● cron_tasks.js <span style="color:var(--magma)">[IDLE]</span></div>
        </div>
        <button onclick="togglePanel('panel-api')" style="width:100%; background:transparent; border:1px solid var(--magma); color:var(--magma); font-size:0.5rem; margin-top:10px;">COLLAPSE NEXUS</button>
    </div>

    <div id="panel-logs" class="widget-panel">
        <div class="widget-label">📂 STEWARDSHIP_EXPLORER</div>
        <div id="explorer-content" style="font-size: 0.8rem;"></div>
    </div>

    <div id="main-station" style="display:none; width: 100%; align-items: center; flex-direction: column;">
        <div id="icon-dock">
            <div class="app-icon" onclick="togglePanel('panel-logs')">📂</div>
            <div class="app-icon" onclick="togglePanel('panel-api')">⚡</div>
            <div class="app-icon" onclick="togglePanel('panel-council')">🏛️</div>
        </div>

        <div id="forge-container">
            <textarea id="cmd-input" placeholder="Initiate Forge Sequence..."></textarea>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                <span style="font-size:0.5rem; color:var(--bio-high)">REEL_TIME_SYNC: ACTIVE</span>
                <button onclick="invokeCouncil()" style="background:var(--bio-high); border:none; padding:5px 15px; font-weight:bold; cursor:pointer;">TRANSMIT</button>
            </div>
        </div>
    </div>
</div>

<script>
// --- TOGGLE LOGIC ---
function togglePanel(id) {
    const p = document.getElementById(id);
    const isVisible = p.style.display === 'block';
    p.style.display = isVisible ? 'none' : 'block';
}

// --- SECURITY HANDSHAKE ---
document.getElementById('gate-input').addEventListener('input', (e) => {
    if (e.target.value.toLowerCase() === 'ant') {
        // Simple bypass for this demo - you can add the stage 2 "dad" input here
        document.getElementById('gate-zone').style.display = 'none';
        document.getElementById('main-station').style.display = 'flex';
        speak("Access granted. Artemis Station online.");
    }
});

function speak(text) {
    const u = new SpeechSynthesisUtterance(text);
    u.pitch = 0.9;
    window.speechSynthesis.speak(u);
}

// Simulated data for explorer
const files = ["Artemis Log", "System Files", "Permanent_Record.json"];
document.getElementById('explorer-content').innerHTML = files.map(f => `<div style="padding:10px; border-bottom:1px solid rgba(255,255,255,0.1)">📁 ${f}</div>`).join('');

</script>
</body>
</html>
