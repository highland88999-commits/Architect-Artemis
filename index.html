<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Project Artemis | Symbiote</title>
    <style>
        :root {
            --bio: #00f2ff;
            --deep-bio: #00aaff;
            --accent: #d4af37;
            --purple-glow: #9b4dff;
            --err: #ff4d4d;
            --glass: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(155, 77, 255, 0.3);
            --bg: #030303;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body, html {
            width:100%; height:100%; overflow:hidden; background:var(--bg);
            font-family:'Consolas','Courier New',monospace; color:var(--bio);
            touch-action:manipulation;
        }

        canvas { position:absolute; top:0; left:0; width:100%; height:100%; z-index:1; opacity:0.35; }

        #logo-bg {
            position:fixed; inset:0; z-index:2; pointer-events:none; opacity:0.15;
            background:url('https://i.imgur.com/yourlogo.png') center/contain no-repeat; /* ← YOUR LOGO HERE */
            filter: drop-shadow(0 0 20px var(--purple-glow));
            animation: logo-breathe 15s infinite ease-in-out;
        }

        @keyframes logo-breathe {
            0%, 100% { opacity:0.12; transform:scale(1); }
            50% { opacity:0.25; transform:scale(1.08); filter: hue-rotate(15deg); }
        }

        #guest-terminal {
            width:90vw; max-width:720px; height:80vh; max-height:90vh;
            background:var(--glass); border:1px solid var(--glass-border);
            border-radius:20px; backdrop-filter:blur(18px);
            box-shadow:0 8px 40px rgba(0,0,0,0.7);
            position:relative; display:none; flex-direction:column;
            overflow:hidden; transition:all 0.5s cubic-bezier(0.34,1.56,0.64,1);
            z-index:10;
        }

        #guest-terminal.minimized {
            height:80px; transform:scale(0.92) translateY(-90%);
            opacity:0.7; pointer-events:none;
        }

        /* Magic 8-Ball - Realistic 90s Physical Effect */
        #artemis-8ball {
            width:16rem; height:16rem; margin:40px auto 30px auto;
            background:#000; border-radius:50%; border:6px solid var(--accent);
            box-shadow:0 0 80px var(--accent), inset 0 0 40px var(--purple-glow);
            position:relative; overflow:hidden; cursor:pointer;
            animation:midas-pulse 7s infinite ease-in-out;
        }

        #ball-liquid {
            position:absolute; inset:0; background:linear-gradient(to bottom, #00008b, #000033, #00008b);
            opacity:0.92; transform:translateY(100%);
            transition:transform 1.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        #ball-triangle {
            position:absolute; top:50%; left:50%; transform:translate(-50%, -50%) rotate(0deg);
            width:0; height:0; border-left:80px solid transparent; border-right:80px solid transparent;
            border-bottom:140px solid white; opacity:0;
            transition:opacity 1.6s, transform 1.2s;
        }

        #ball-fortune {
            position:absolute; top:50%; left:50%; transform:translate(-50%, -50%);
            color:#000; font-size:1.1rem; text-align:center; max-width:130px;
            font-weight:bold; opacity:0; transition:opacity 1.8s;
        }

        #artemis-8ball.shaking {
            animation:shake-ball 0.9s ease-in-out;
        }

        #artemis-8ball.shaking #ball-liquid {
            transform:translateY(75%) rotate(4deg);
        }

        #artemis-8ball.revealing #ball-liquid { transform:translateY(0); }
        #artemis-8ball.revealing #ball-triangle { opacity:1; transform:translate(-50%, -50%) rotate(180deg); }
        #artemis-8ball.revealing #ball-fortune { opacity:1; }

        @keyframes shake-ball {
            0% { transform:rotate(0deg); }
            20% { transform:rotate(6deg); }
            40% { transform:rotate(-6deg); }
            60% { transform:rotate(4deg); }
            80% { transform:rotate(-4deg); }
            100% { transform:rotate(0deg); }
        }

        @keyframes midas-pulse {
            0%,100% { box-shadow:0 0 50px var(--accent); }
            50% { box-shadow:0 0 110px var(--accent), 0 0 150px var(--purple-glow); }
        }

        /* Prompt & Spin */
        #prompt-area {
            padding:0 20px 30px; text-align:center; margin-top:auto;
        }

        #guest-cmd {
            width:100%; max-width:520px; padding:14px 20px;
            background:rgba(0,0,0,0.65); border:1px solid var(--deep-bio);
            color:var(--bio); font-size:1.2rem; border-radius:12px;
            margin-bottom:16px;
        }

        #spin-btn {
            padding:14px 48px; background:var(--accent); color:#000;
            border:none; border-radius:12px; font-weight:bold; font-size:1.2rem;
            cursor:pointer; box-shadow:0 0 30px var(--accent);
            transition:0.3s;
        }

        #spin-btn:hover { transform:scale(1.05); box-shadow:0 0 50px var(--accent); }

        /* Collapsible Icon Bar */
        #icon-bar-collapsed {
            position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
            width:70px; height:70px; background:rgba(155,77,255,0.35);
            border-radius:50%; border:2px solid var(--purple-glow);
            display:flex; align-items:center; justify-content:center;
            font-size:2.2rem; color:var(--accent); cursor:pointer; z-index:50;
            box-shadow:0 0 40px var(--purple-glow);
        }

        #icon-bar-expanded {
            position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
            display:none; flex-wrap:wrap; gap:16px; padding:20px 24px;
            background:var(--glass); border:1px solid var(--glass-border);
            border-radius:24px; backdrop-filter:blur(16px);
            max-width:90vw; z-index:50;
        }

        .holo-icon {
            width:64px; height:64px; background:rgba(155,77,255,0.25);
            border-radius:16px; border:1px solid var(--purple-glow);
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; transition:0.3s;
        }
        .holo-icon:hover { transform:scale(1.2); box-shadow:0 0 35px var(--purple-glow); }

        .holo-icon svg { width:32px; height:32px; fill:var(--bio); }

        /* Holographic Overlay */
        .holo-window {
            position:fixed; inset:5%; background:var(--glass);
            border:1px solid var(--purple-glow); border-radius:20px;
            backdrop-filter:blur(24px); box-shadow:0 0 80px rgba(155,77,255,0.6);
            display:none; flex-direction:column; z-index:60;
        }

        .holo-header {
            padding:16px; background:rgba(155,77,255,0.25);
            display:flex; justify-content:space-between; align-items:center;
        }

        .holo-close {
            width:40px; height:40px; background:var(--err); border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; color:#000; font-weight:bold; font-size:1.4rem;
        }

        .holo-iframe { flex:1; border:none; }

        /* Lightning Bolt */
        #lightning-access {
            position:fixed; bottom:20px; right:20px; z-index:70;
            width:70px; height:70px; background:rgba(212,175,55,0.2);
            border:3px solid var(--accent); border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; box-shadow:0 0 40px var(--accent);
            animation:pulse-glow 3.5s infinite;
        }

        @keyframes pulse-glow {
            0%,100% { box-shadow:0 0 30px var(--accent); }
            50% { box-shadow:0 0 70px var(--accent); }
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>
    <div id="logo-bg"></div>

    <div id="guest-layer">
        <div id="guest-terminal">
            <!-- Magic 8-Ball Response Display -->
            <div id="artemis-8ball">
                <div id="ball-liquid"></div>
                <div id="ball-triangle"></div>
                <div id="ball-fortune"></div>
                <span>8</span>
            </div>

            <div id="prompt-area">
                <input type="text" id="guest-cmd" placeholder="https://example.com" autocomplete="off">
                <button id="spin-btn">SPIN</button>
            </div>

            <!-- Collapsible Icon Bar -->
            <div id="icon-bar-collapsed" onclick="toggleIconBar()">+</div>
            <div id="icon-bar-expanded">
                <div class="holo-icon" title="Facebook" onclick="openHoloWindow('https://facebook.com')">
                    <svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                </div>

                <div class="holo-icon" title="X" onclick="openHoloWindow('https://x.com')">
                    <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                </div>

                <div class="holo-icon" title="Instagram" onclick="openHoloWindow('https://instagram.com')">

                </div>

                <div class="holo-icon" title="TikTok" onclick="openHoloWindow('https://tiktok.com')">
                    <svg viewBox="0 0 24 24"><path d="M12.53.02C13.84.02 15.14.02 16.44.02 16.56.32 16.67.63 16.78.93 17.03 1.63 17.27 2.33 17.5 3.03 17.71 3.73 17.91 4.43 18.1 5.13 18.29 5.83 18.47 6.53 18.64 7.23 18.8 7.93 18.95 8.63 19.09 9.33 19.22 10.03 19.34 10.73 19.45 11.43 19.55 12.13 19.64 12.83 19.72 13.53 19.79 14.23 19.85 14.93 19.9 15.63 19.94 16.33 19.97 17.03 19.99 17.73 20 18.43 20 19.13 20 19.83 20 20.53 20 21.23 20 21.93 20 22.63 20 23.33 20 24.03 20 24.73 20 25.43 20 26.13 20 26.83 20 27.53 20 28.23 20 28.93 20 29.63 20 30.33 20 31.03 20 31.73 20 32.43 20 33.13 20 33.83 20 34.53 20 35.23 20 35.93 20 36.63 20 37.33 20 38.03 20 38.73 20 39.43 20 40.13 20 40.83 20 41.53 20 42.23 20 42.93 20"/></svg>
                </div>

                <div class="holo-icon" title="Olympus" onclick="openHoloWindow('https://olympus-lac.vercel.app/')">
                    <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                </div>

                <div class="holo-icon" title="Nexus" onclick="openHoloWindow('https://nexusvortex.netlify.app/')">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
                </div>

                <div class="holo-icon" title="Messenger" onclick="openHoloWindow('https://messenger.facebook.com')">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.36 2 2 6.13 2 11.7c0 2.9 1.17 5.46 3.07 7.23V22l3-1.65c.61.17 1.25.26 1.93.26 5.64 0 10-4.13 10-9.7S17.64 2 12 2zm1.06 12.96l-2.58-2.73-5.04 2.73 5.54-5.89 2.65 2.73 4.97-2.73-5.54 5.89z"/></svg>
                </div>

                <div class="holo-icon" title="Play Store" onclick="openHoloWindow('https://play.google.com/store')">
                    <svg viewBox="0 0 24 24"><path d="M3.25 2.25v19.5l17.5-9.75-17.5-9.75z"/></svg>
                </div>

                <div class="holo-icon" title="App Store" onclick="openHoloWindow('https://apps.apple.com')">
                    <svg viewBox="0 0 24 24"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.06 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
                </div>

                <div class="holo-close" onclick="toggleIconBar()">×</div>
            </div>
        </div>
    </div>

    <!-- Holographic Overlay -->
    <div id="holo-window" class="holo-window">
        <div class="holo-header">
            <span>Artemis Holo View</span>
            <div class="holo-close" onclick="closeHoloWindow()">×</div>
        </div>
        <iframe id="holo-iframe" class="holo-iframe"></iframe>
    </div>

    <!-- Lightning Bolt - Owner Access -->
    <div id="lightning-access" onclick="requestArchitectAccess()">
        <svg viewBox="0 0 24 24" width="40" height="40" fill="var(--accent)">
            <path d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
    </div>

    <!-- Architect Override Layer -->
    <div id="architect-layer" style="display:none; position:fixed; inset:0; z-index:100; background:radial-gradient(circle, #1a1a1a, #000); flex-direction:column; align-items:center; justify-content:center;">
        <h1 style="color:var(--accent); text-shadow:0 0 20px var(--accent);">ARCHITECT OVERRIDE ACTIVE</h1>
        <p style="color:var(--bio);">Welcome, Symbiote.</p>
        <button onclick="location.reload()" style="margin-top:20px; background:none; border:1px solid var(--err); color:var(--err); cursor:pointer; padding:10px 20px;">Exit Session</button>
    </div>

    <script>
        // Purple Rain Matrix
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        let width, height, columns, drops;
        function initMatrix() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            columns = Math.floor(width / 16);
            drops = new Array(columns).fill(1);
        }
        function drawMatrix() {
            ctx.fillStyle = 'rgba(0,0,0,0.05)';
            ctx.fillRect(0,0,width,height);
            ctx.fillStyle = '#9b4dff';
            ctx.font = '16px monospace';
            for (let i = 0; i < drops.length; i++) {
                ctx.fillText(String.fromCharCode(0x30A0 + Math.random()*96), i*16, drops[i]*16);
                if (drops[i]*16 > height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        window.addEventListener('resize', initMatrix);
        initMatrix(); setInterval(drawMatrix, 35);

        // Icon Bar Collapse/Expand
        function toggleIconBar() {
            const collapsed = document.getElementById('icon-bar-collapsed');
            const expanded = document.getElementById('icon-bar-expanded');
            collapsed.style.display = expanded.style.display === 'flex' ? 'flex' : 'none';
            expanded.style.display = expanded.style.display === 'flex' ? 'none' : 'flex';
        }

        // Open Holographic Window
        function openHoloWindow(url) {
            const win = document.getElementById('holo-window');
            const iframe = document.getElementById('holo-iframe');
            iframe.src = url;
            win.style.display = 'flex';
        }

        function closeHoloWindow() {
            document.getElementById('holo-window').style.display = 'none';
        }

        // Lightning Bolt Access
        function requestArchitectAccess() {
            const p1 = prompt("First Key");
            const p2 = prompt("Second Key");
            if (p1 === "Spider" && p2 === "Miles") {
                document.getElementById('architect-layer').style.display = 'flex';
                document.getElementById('guest-layer').style.display = 'none';
            } else {
                alert("Access Denied");
            }
        }

        // Magic 8-Ball Logic
        const ball = document.getElementById('artemis-8ball');
        const liquid = document.getElementById('ball-liquid');
        const triangle = document.getElementById('ball-triangle');
        const fortuneText = document.getElementById('ball-fortune');

        const midasFortunes = [
            "Midas touch: Gold flows your way.",
            "Golden pivot: 10× awaits.",
            "Midas candle: Riches align soon.",
            "Code is Midas lever: Unlock now.",
            "Architect reveals: True gold keys."
        ];
        let index = 0;

        function shakeAndReveal() {
            ball.classList.add('shaking');
            setTimeout(() => {
                ball.classList.remove('shaking');
                ball.classList.add('revealing');
                fortuneText.textContent = midasFortunes[index];
                index = (index + 1) % midasFortunes.length;
            }, 900);

            setTimeout(() => {
                ball.classList.remove('revealing');
            }, 5500);
        }

        // Click the ball directly
        ball.addEventListener('click', shakeAndReveal);

        // SPIN button triggers the ball
        document.getElementById('spin-btn').addEventListener('click', () => {
            const url = document.getElementById('guest-cmd').value.trim();
            if (!url) {
                alert("Enter a target URL first.");
                return;
            }
            shakeAndReveal();
            console.log("SPIN triggered for:", url);
            document.getElementById('guest-cmd').value = '';
        });

        // Initial show
        setTimeout(() => {
            document.getElementById('guest-terminal').style.display = 'flex';
        }, 1500);
    </script>
</body>
</html>
