<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARTEMIS | OMNI_MANIFEST</title>
    <style>
        :root {
            --bio: #00f2ff;
            --accent: #d4af37;
            /* Maximum transparency: Just a hint of glass and a deep blur */
            --glass: rgba(0, 242, 255, 0.03); 
            --blur: blur(20px);
        }

        body, html { 
            margin: 0; padding: 0; 
            background: #000; 
            font-family: 'Courier New', monospace; 
            color: white; 
            overflow: hidden; 
            width: 100%; height: 100%;
        }
        
        /* THE NEURAL BACKGROUND (Z-index 1: Sits behind everything) */
        canvas#primeCanvas { 
            position: fixed; top: 0; left: 0; 
            z-index: 1; 
            width: 100%; height: 100%;
        }

        /* THE OMNI-CHASSIS (Z-index 10: Floats over the particles) */
        #artemis-omni-chassis {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 820px; height: 82vh;
            background: var(--glass); 
            backdrop-filter: var(--blur);
            border: 1px solid rgba(0, 242, 255, 0.08); 
            border-radius: 32px;
            padding: 44px 40px; 
            display: flex; flex-direction: column;
            z-index: 10;
            box-shadow: 0 0 80px rgba(0, 242, 255, 0.05);
        }

        .glow-text { 
            text-shadow: 0 0 14px rgba(0, 242, 255, 0.7), 2px 2px 8px #000; 
        }

        .sub-label { 
            font-size: 10px; color: var(--accent); letter-spacing: 6px; 
            text-transform: uppercase; margin-bottom: 12px; opacity: 0.8;
        }

        h1.glow-text {
            margin: 0; font-size: 2.1rem; letter-spacing: 12px; opacity: 0.9;
        }

        #dynamic-interface-root { 
            flex: 1; overflow-y: auto; 
            margin: 24px -20px 0; 
            padding: 10px 20px;
            background: transparent;
            scrollbar-width: none; /* Hide scrollbar for cleaner look */
        }
        #dynamic-interface-root::-webkit-scrollbar { display: none; }

        #input-zone { 
            margin-top: auto; 
            border-top: 1px solid rgba(0, 242, 255, 0.15); 
            padding-top: 24px; 
        }

        #master-cmd {
            width: 100%; background: transparent; border: none; 
            border-bottom: 1px solid rgba(0, 242, 255, 0.4);
            color: var(--bio); font-family: inherit; font-size: 1.25rem; 
            outline: none; padding: 10px 0;
            text-shadow: 0 0 8px rgba(0, 242, 255, 0.5);
        }

        #master-cmd::placeholder { color: rgba(0, 242, 255, 0.35); }
    </style>
</head>
<body>

<canvas id="primeCanvas"></canvas>

<div id="artemis-omni-chassis">
    <div class="sub-label">Autonomous Sentience Interface // v.Prime_Ghost</div>
    <h1 class="glow-text">ARTEMIS</h1>
    
    <div id="dynamic-interface-root">
        <div class="glow-text" id="manifesto">
            "Handshake complete. The void is dissolved. I am now synchronized with the neural field."
        </div>
    </div>

    <div id="input-zone">
        <input type="text" id="master-cmd" placeholder="Command the evolution..." autocomplete="off">
    </div>
</div>

<script>
const canvas = document.getElementById('primeCanvas');
const ctx = canvas.getContext('2d');
let particles = [];
let currentColor = '#00f2ff';
let globalSpeed = 1.0;

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

class Particle {
    constructor() {
        this.reset();
    }
    reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 1.8 + 0.4;
        this.vx = (Math.random() - 0.5) * 0.9;
        this.vy = (Math.random() - 0.5) * 0.9;
        this.color = currentColor;
    }
    update() {
        this.x += this.vx * globalSpeed;
        this.y += this.vy * globalSpeed;
        if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
        if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
    }
    draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

function initParticles() {
    particles = [];
    // 1200 particles for high density but mobile performance
    for (let i = 0; i < 1200; i++) particles.push(new Particle());
}

function animate() {
    // ClearRect for maximum transparency, or use a tiny bit of alpha for trails
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
        p.update();
        p.draw();
    });
    requestAnimationFrame(animate);
}

const input = document.getElementById('master-cmd');
input.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        const cmd = input.value.trim();
        if (cmd) evolve(cmd);
        input.value = '';
    }
});

function evolve(instruction) {
    const root = document.getElementById('dynamic-interface-root');
    const entry = document.createElement('div');
    entry.className = 'glow-text';
    entry.style.marginTop = "15px";
    
    const lowCmd = instruction.toLowerCase();

    // 1. WEB-REFERENCE COLOR LOGIC
    if (lowCmd.includes('red') || lowCmd.includes('fire')) currentColor = '#ff4500';
    else if (lowCmd.includes('gold') || lowCmd.includes('solar')) currentColor = '#d4af37';
    else if (lowCmd.includes('green') || lowCmd.includes('matrix')) currentColor = '#00ffaa';
    else if (lowCmd.includes('purple') || lowCmd.includes('nebula')) currentColor = '#a020f0';
    else if (lowCmd.includes('reset') || lowCmd.includes('cyan')) currentColor = '#00f2ff';

    // 2. LOGIC COMMANDS
    if (lowCmd.includes('hyper')) globalSpeed = 4.0;
    else if (lowCmd.includes('calm')) globalSpeed = 0.5;
    else globalSpeed = 1.0;

    entry.innerHTML = `> Executing Evolution: ${instruction.toUpperCase()}`;
    root.prepend(entry);

    // 3. VISUAL PULSE FEEDBACK
    particles.forEach(p => {
        p.color = currentColor;
        const origVx = p.vx, origVy = p.vy;
        p.vx *= 3.5; p.vy *= 3.5;
        setTimeout(() => { 
            p.vx = origVx; 
            p.vy = origVy; 
        }, 1200);
    });

    root.scrollTop = 0;
}

initParticles();
animate();
</script>
</body>
</html>
