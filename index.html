<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Architect Artemis | Terminal</title>
    <style>
        :root {
            --matrix-green: #0f0;
            --purple-glow: #bc13fe;
            --err-red: #ff4444;
            --bg-dark: #000;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            color: var(--matrix-green);
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            /* Adjusting opacity based on screen size as requested */
            opacity: 0.6;
        }

        @media (max-width: 768px) {
            canvas { opacity: 0.4; }
        }

        /* Terminal Styles */
        .terminal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 600px;
            height: 400px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid var(--matrix-green);
            box-shadow: 0 0 15px var(--matrix-green);
            display: none;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .terminal.minimized {
            height: 35px;
            overflow: hidden;
            transform: translate(-50%, 0);
            top: 10px;
        }

        .terminal-header {
            background: var(--matrix-green);
            color: black;
            padding: 5px 10px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .terminal-content {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            font-size: 14px;
        }

        .input-line {
            display: flex;
            border-top: 1px solid #333;
            padding: 10px;
        }

        input {
            background: transparent;
            border: none;
            color: var(--matrix-green);
            flex: 1;
            outline: none;
            font-family: inherit;
        }

        .btn {
            background: var(--matrix-green);
            color: black;
            border: none;
            padding: 0 15px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Layers */
        #password-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        #architect-layer {
            display: none;
            padding: 20px;
            flex-direction: column;
        }

        /* Animations */
        .glow { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { text-shadow: 0 0 5px var(--purple-glow); }
            50% { text-shadow: 0 0 20px var(--purple-glow); }
            100% { text-shadow: 0 0 5px var(--purple-glow); }
        }

        .err { color: var(--err-red); }
        .midas { color: var(--purple-glow); font-weight: bold; margin-top: 10px; }
        
        .file-item { padding: 5px 0; border-bottom: 1px solid #111; }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div id="guest-layer">
        <div id="guest-terminal" class="terminal">
            <div class="terminal-header" onclick="toggleMinimize(document.getElementById('guest-terminal'))">
                <span>GUEST@ARTEMIS:~</span>
                <span>[ - □ × ]</span>
            </div>
            <div class="terminal-content" id="guest-output">
                <div>Welcome to the Artemis Core.</div>
                <div>Submit a URL to analyze monetization vectors.</div>
                <br>
            </div>
            <div class="input-line">
                <span>>&nbsp;</span>
                <input type="text" id="guest-cmd" placeholder="https://..." autofocus>
                <button class="btn" id="guest-send-btn">SEND</button>
            </div>
        </div>
    </div>

    <div id="password-overlay">
        <h2 style="color: var(--purple-glow);">ARCHITECT ACCESS REQUIRED</h2>
        <input type="password" id="pass1" placeholder="Identity" style="border: 1px solid var(--matrix-green); margin: 5px; padding: 10px; text-align: center;">
        <input type="password" id="pass2" placeholder="Key" style="border: 1px solid var(--matrix-green); margin: 5px; padding: 10px; text-align: center;">
        <button class="btn" onclick="checkPassword()" style="margin-top: 15px; height: 40px;">DECRYPT</button>
    </div>

    <div id="architect-layer" class="terminal" style="display: none; height: 80vh; max-width: 800px;">
        <div class="terminal-header">
            <span>ARCHITECT_ROOT@SYSTEM</span>
        </div>
        <div class="terminal-content" id="repo-files">
            Initializing secure link...
        </div>
    </div>

    <button onclick="showPasswordOverlay()" style="position: fixed; bottom: 10px; right: 10px; background: transparent; border: 1px solid #333; color: #333; font-size: 10px; cursor: pointer;">ADMIN</button>

    <script>
        // --- Matrix Engine ---
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        let width, height, columns, drops;

        function initMatrix() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            columns = Math.floor(width / 16);
            drops = new Array(columns).fill(1);
        }

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);
            ctx.fillStyle = '#0f0';
            ctx.font = '16px monospace';
            for (let i = 0; i < drops.length; i++) {
                ctx.fillText(String.fromCharCode(0x30A0 + Math.random() * 96), i * 16, drops[i] * 16);
                if (drops[i] * 16 > height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        window.addEventListener('resize', initMatrix);
        initMatrix();
        setInterval(drawMatrix, 35);

        // --- State Management ---
        const fortunes = ["Massive capital inflow soon.", "A digital pivot will yield 10x.", "Wait for the next candle.", "Code is your leverage.", "Architect Mode holds the true keys."];
        const interestClusters = {
            finance: ['crypto', 'bank', 'invest', 'stock', 'trade'],
            tech: ['ai', 'code', 'dev', 'software', 'app'],
            creative: ['design', 'art', 'music', 'video']
        };
        const monetizationGifts = {
            finance: "Tokenize the underlying asset for a 15% carry.",
            tech: "Implement an API-first SaaS layer for recurring b2b.",
            creative: "Launch a gated community using limited access NFTs.",
            default: "Increase pricing by 20% and automate lead gen."
        };

        let ideaCount = parseInt(localStorage.getItem('ideaCount') || '0');
        const today = new Date().toDateString();

        // Daily Reset Logic
        if (localStorage.getItem('lastReset') !== today) {
            ideaCount = 0;
            localStorage.setItem('ideaCount', '0');
            localStorage.setItem('lastReset', today);
        }

        // --- UI Logic ---
        function toggleMinimize(el) {
            el.classList.toggle('minimized');
            if (!el.classList.contains('minimized')) {
                document.getElementById('guest-cmd')?.focus();
            }
        }

        const guestTerminal = document.getElementById('guest-terminal');
        const passwordOverlay = document.getElementById('password-overlay');

        // Double Click (Desktop)
        guestTerminal.addEventListener('dblclick', () => toggleMinimize(guestTerminal));

        // Double Tap (Mobile)
        let lastTap = 0;
        document.body.addEventListener('touchend', (e) => {
            const current = new Date().getTime();
            const diff = current - lastTap;
            if (diff < 300 && diff > 0) {
                if (guestTerminal.contains(e.target)) toggleMinimize(guestTerminal);
                if (passwordOverlay.contains(e.target)) toggleMinimize(passwordOverlay);
                e.preventDefault();
            }
            lastTap = current;
        }, { passive: false });

        // --- Core Functions ---
        document.getElementById('guest-send-btn').onclick = () => {
            const input = document.getElementById('guest-cmd');
            const url = input.value.trim().toLowerCase();
            const out = document.getElementById('guest-output');

            // Reset Command Hidden
            if (url === "reset-count") {
                ideaCount = 0;
                localStorage.setItem('ideaCount', '0');
                out.innerHTML += `<div style="color:yellow">> Idea count reset to zero.</div>`;
                input.value = "";
                return;
            }

            if (!url || !/^(https?:\/\/)/i.test(url)) {
                out.innerHTML += `<div class="err">> ERROR: Invalid URL. Need https://...</div>`;
                out.scrollTop = out.scrollHeight;
                return;
            }

            ideaCount++;
            localStorage.setItem('ideaCount', ideaCount);

            // Slot Machine Animation
            out.innerHTML += `<div>> Spinning Pattern Wheel... [${ideaCount}/3]</div>`;
            out.innerHTML += `<div id="spin-loader" style="color:var(--purple-glow);">Spinning... 🎰</div>`;
            out.scrollTop = out.scrollHeight;

            setTimeout(() => {
                document.getElementById('spin-loader')?.remove();
                out.innerHTML += `<div>> Scanning clusters...</div>`;
                out.scrollTop = out.scrollHeight;
            }, 600);

            setTimeout(() => {
                out.innerHTML += `<div>> Matching vectors...</div>`;
                out.scrollTop = out.scrollHeight;
            }, 1200);

            setTimeout(() => {
                let key = 'default';
                for (let [cat, words] of Object.entries(interestClusters)) {
                    if (words.some(w => url.includes(w))) {
                        key = cat;
                        break;
                    }
                }
                const gift = monetizationGifts[key];
                out.innerHTML += `<div class="midas glow">[GIFT]: ${gift}</div><br>`;
                out.scrollTop = out.scrollHeight;
                input.value = "";
            }, 2000);
        };

        // Oracle / 8-Ball
        canvas.addEventListener('dblclick', () => {
            const out = document.getElementById('guest-output');
            const f = fortunes[Math.floor(Math.random() * fortunes.length)];
            out.innerHTML += `<div style="color:var(--purple-glow); margin:10px 0; border-left: 2px solid var(--purple-glow); padding-left:10px;">[ORACLE]: ${f}</div>`;
            out.scrollTop = out.scrollHeight;
        });

        function showPasswordOverlay() {
            passwordOverlay.style.display = "flex";
        }

        function checkPassword() {
            const p1 = document.getElementById('pass1').value.trim();
            const p2 = document.getElementById('pass2').value.trim();
            if (p1 === "Spider" && p2 === "Miles") {
                passwordOverlay.style.display = "none";
                document.getElementById('guest-layer').style.display = "none";
                document.getElementById('architect-layer').style.display = "flex";
                loadRepoTree();
            } else {
                alert("ACCESS DENIED: Credentials Invalid.");
            }
        }

        async function loadRepoTree() {
            const list = document.getElementById('repo-files');
            list.innerHTML = "Syncing with GitHub Artemis Core...";
            try {
                const res = await fetch('https://api.github.com/repos/highland88999-commits/Architect-Artemis/contents');
                if (!res.ok) throw new Error('API Offline');
                const data = await res.json();
                list.innerHTML = "";
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "file-item";
                    div.innerText = `📄 ${item.name || item.path}`;
                    list.appendChild(div);
                });
            } catch (e) {
                list.innerHTML = `<div class="err">System Offline or GitHub Rate-Limited. Please try later.</div>`;
            }
        }

        // Init
        setTimeout(() => {
            guestTerminal.style.display = 'flex';
            document.getElementById('guest-cmd').focus();
        }, 3000);

    </script>
</body>
</html>
