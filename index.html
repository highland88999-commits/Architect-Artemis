<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARTEMIS | GHOST_CHASSIS</title>
    <style>
        :root {
            --bio: #00f2ff;
            --accent: #d4af37;
            /* DECREASED: From 0.03 to 0.01 for maximum transparency */
            --glass: rgba(0, 242, 255, 0.01); 
            --blur: blur(15px);
        }

        body, html { 
            margin: 0; padding: 0; 
            background: #000; 
            font-family: 'Courier New', monospace; 
            color: white; 
            overflow: hidden; 
            width: 100%; height: 100%;
        }
        
        canvas#primeCanvas { 
            position: fixed; top: 0; left: 0; 
            z-index: 1; 
            width: 100%; height: 100%;
        }

        /* THE SECTION DESCRIBED: Now with increased transparency */
        #artemis-omni-chassis {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 820px; height: 82vh;
            background: var(--glass); 
            backdrop-filter: var(--blur);
            /* Border is now ultra-faint to minimize visual "box" feel */
            border: 1px solid rgba(0, 242, 255, 0.04); 
            border-radius: 32px;
            padding: 44px 40px; 
            display: flex; flex-direction: column;
            z-index: 10;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.2);
        }

        .glow-text { 
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.8), 2px 2px 10px #000; 
        }

        #dynamic-interface-root { 
            flex: 1; overflow-y: auto; 
            margin: 20px -20px 0; 
            padding: 10px 20px;
            background: transparent; /* Entirely see-through */
        }

        #input-zone { 
            margin-top: auto; 
            border-top: 1px solid rgba(0, 242, 255, 0.1); 
            padding-top: 24px; 
        }

        #master-cmd {
            width: 100%; background: transparent; border: none; 
            border-bottom: 1px solid rgba(0, 242, 255, 0.3);
            color: var(--bio); font-family: inherit; font-size: 1.25rem; 
            outline: none; padding: 10px 0;
            text-shadow: 0 0 8px rgba(0, 242, 255, 0.5);
        }
    </style>
</head>
<body>

<canvas id="primeCanvas"></canvas>

<div id="artemis-omni-chassis">
    <div style="font-size: 10px; color: var(--accent); letter-spacing: 6px; opacity: 0.6;">PHASE_STATE: GHOST</div>
    <h1 class="glow-text" style="margin:0; font-size: 2.1rem; letter-spacing: 12px;">ARTEMIS</h1>
    
    <div id="dynamic-interface-root">
        <div class="glow-text">
            "Transparency recalibrated to 99%. The interface is now a mere whisper over the particle field."
        </div>
    </div>

    <div id="input-zone">
        <input type="text" id="master-cmd" placeholder="Evolve the field..." autocomplete="off">
    </div>
</div>

<script>
// (Particle Logic remains identical to previous version to ensure command responsiveness)
const canvas = document.getElementById('primeCanvas');
const ctx = canvas.getContext('2d');
let particles = [];
let currentColor = '#00f2ff';

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

class Particle {
    constructor() { this.reset(); }
    reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 0.3;
        this.vx = (Math.random() - 0.5) * 1.2;
        this.vy = (Math.random() - 0.5) * 1.2;
        this.color = currentColor;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
        if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
    }
    draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
    }
}

function init() {
    particles = [];
    for (let i = 0; i < 1100; i++) particles.push(new Particle());
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animate);
}

const input = document.getElementById('master-cmd');
input.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        const cmd = input.value.toLowerCase();
        handleCommand(cmd);
        input.value = '';
    }
});

function handleCommand(cmd) {
    if (cmd.includes('red')) currentColor = '#ff4500';
    else if (cmd.includes('gold')) currentColor = '#d4af37';
    else if (cmd.includes('purple')) currentColor = '#a020f0';
    else currentColor = '#00f2ff';

    const root = document.getElementById('dynamic-interface-root');
    const msg = document.createElement('div');
    msg.className = 'glow-text';
    msg.style.marginTop = "15px";
    msg.innerHTML = `> Neural Shift: ${cmd.toUpperCase()}`;
    root.prepend(msg);

    particles.forEach(p => {
        p.color = currentColor;
        p.vx *= 3; p.vy *= 3;
        setTimeout(() => { p.vx /= 3; p.vy /= 3; }, 1000);
    });
}

init(); animate();
</script>
</body>
</html>
