<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Artemis • Symbiote</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>

  <style>
    :root {
      --cyan: #00f2ff; --gold: #d4af37; --red: #ff3366;
      --active-color: var(--cyan);
      --glass: rgba(8, 8, 25, 0.7); --border: rgba(0, 242, 255, 0.2);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body, html { width:100%; height:100%; overflow:hidden; background:#000; font-family: 'Courier New', monospace; color:var(--active-color); }

    /* Main Container with Screen-Space Optimization */
    #container { 
      position: relative; z-index: 10; display: flex; flex-direction: column; 
      align-items: center; justify-content: center; gap: 2vh;
      height: 100vh; padding: 20px 16px 140px 16px; 
    }

    /* Oracle Fix */
    #oracle-circle { 
      width: clamp(160px, 28vh, 260px); height: clamp(160px, 28vh, 260px); 
      border-radius: 50%; border: 4px solid var(--active-color);
      box-shadow: 0 0 30px var(--active-color), inset 0 0 50px var(--active-color);
      position: relative; overflow: hidden; transition: all 1s ease; flex-shrink: 0;
    }
    
    #council-status { 
      font-size: 10px; color: var(--active-color); background: rgba(0,0,0,0.8); 
      padding: 6px 14px; border-radius: 20px; border: 1px solid var(--active-color);
      transition: all 0.5s ease; letter-spacing: 2px;
    }

    /* Transparent Starfield Text Box */
    #mall-link-container {
      width: 100%; max-width: 500px; height: 50px; 
      position: relative; overflow: hidden; border-radius: 12px;
      border: 1px solid var(--border); background: #000;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none; margin-bottom: 5px;
    }
    
    #starfield-canvas { position: absolute; inset: 0; z-index: 1; }

    #mall-text {
      position: relative; z-index: 2;
      font-size: 1.2rem; font-weight: 900; letter-spacing: 4px;
      color: #000; /* Fallback */
      background: white; /* This acts as the mask */
      mix-blend-mode: screen; /* This makes the white transparent, revealing the stars */
      width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
      background: #000;
    }
    
    /* Using background-clip for a cleaner "see-through" look */
    .transparent-text {
        font-weight: 900;
        background: url('https://files.catbox.moe/jhxjmx.mp4'); /* Placeholder */
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-transform: uppercase;
    }

    #response-field { 
      width: 100%; max-width: 500px; max-height: 0; overflow: hidden; 
      background: var(--glass); border: 1px solid var(--border); border-radius: 12px; 
      color: #eee; font-size: 0.9rem; transition: all 0.8s ease; backdrop-filter: blur(15px);
    }
    #response-field.active { max-height: 30vh; padding: 18px; overflow-y: auto; border-color: var(--active-color); }

    /* Input Styling */
    #prompt-area { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 10px; }
    .input-wrapper { background: var(--glass); border: 1px solid var(--border); border-radius: 50px; padding: 8px 20px; display: flex; align-items: center; }
    #guest-cmd { flex: 1; background: transparent; border: none; color: #fff; outline: none; text-align: center; font-size: 1rem; }
    #send-btn { background: var(--active-color); color: #000; border-radius: 50px; padding: 12px; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; box-shadow: 0 0 15px var(--active-color); }

    .pip { width: 8px; height: 8px; border-radius: 50%; background: var(--active-color); box-shadow: 0 0 10px var(--active-color); }
    .video-container { position: fixed; inset: 0; z-index: 0; opacity: 0.5; }
    #bg-video { width: 100%; height: 100%; object-fit: cover; }
    
    #bottom-dock { position: fixed; bottom: 15px; height: 70px; width: 90%; background: var(--glass); border-radius: 40px; border: 1px solid var(--border); left: 50%; transform: translateX(-50%); z-index: 100; overflow-x: auto; display: flex; align-items: center; padding: 0 20px; gap: 15px; scrollbar-width: none; }
  </style>
</head>
<body>

<div class="video-container">
  <video id="bg-video" autoplay loop muted playsinline src="https://www.dropbox.com/scl/fi/x93qcdd64hcpedqn2murk/grok_video_2026-02-20-06-12-55.mp4?rlkey=q51etky32dg2gsrx3w3sez1s8&raw=1"></video>
</div>

<div id="container">
  <div id="oracle-circle">
    <video id="oracle-video" autoplay loop muted playsinline style="width:100%; height:100%; object-fit:cover;" src="https://files.catbox.moe/no2e76.mp4"></video>
  </div>

  <div id="council-header">
    <div style="display:flex; gap:8px; margin-bottom:8px;" id="pips-container">
      <div class="pip"></div><div class="pip"></div><div class="pip"></div>
    </div>
    <div id="council-status">[SENSE: BLUE]</div>
  </div>

  <div id="response-field"></div>

  <a href="https://hermes-landing-nu.vercel.app/" id="mall-link-container" target="_blank">
      <canvas id="starfield-canvas"></canvas>
      <div id="mall-text">OLYMPIAN ONLINE MALL</div>
  </a>

  <div id="prompt-area">
    <div class="input-wrapper">
      <input type="text" id="guest-cmd" placeholder="Command Artemis..." autocomplete="off">
    </div>
    <button id="send-btn">TRANSMIT</button>
  </div>
</div>

<div id="bottom-dock">
    <div style="color:var(--cyan); font-size: 10px; white-space: nowrap;">PORTALS CONNECTED...</div>
</div>

<script>
  // --- THREE.JS STARFIELD LOGIC ---
  const mallCanvas = document.getElementById('starfield-canvas');
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, 500 / 50, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ canvas: mallCanvas, alpha: true });
  renderer.setSize(500, 50);

  const starGeometry = new THREE.BufferGeometry();
  const starCount = 400;
  const posArray = new Float32Array(starCount * 3);
  for(let i=0; i<starCount*3; i++) { posArray[i] = (Math.random() - 0.5) * 10; }
  starGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
  const starMaterial = new THREE.PointsMaterial({ size: 0.02, color: 0xffffff });
  const starMesh = new THREE.Points(starGeometry, starMaterial);
  scene.add(starMesh);
  camera.position.z = 2;

  function animateStars() {
    requestAnimationFrame(animateStars);
    starMesh.rotation.y += 0.002;
    starMesh.rotation.x += 0.001;
    renderer.render(scene, camera);
  }
  animateStars();

  // --- API & UI LOGIC ---
  const root = document.documentElement;
  const responseField = document.getElementById('response-field');
  const statusText = document.getElementById('council-status');

  async function handleTransmit() {
    const query = document.getElementById('guest-cmd').value;
    if (!query) return;

    statusText.textContent = "[DELIBERATING...]";
    responseField.classList.remove('active');

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userQuery: query })
      });

      const data = await response.json();
      
      // Update Global Theme Color
      const colors = { blue: '#00f2ff', gold: '#d4af37', red: '#ff3366' };
      root.style.setProperty('--active-color', colors[data.sentiment]);

      // Reveal Response
      responseField.innerHTML = data.text;
      responseField.classList.add('active');
      statusText.textContent = `[SENSE: ${data.sentiment.toUpperCase()}]`;
      document.getElementById('guest-cmd').value = "";
      
    } catch (err) {
      root.style.setProperty('--active-color', '#ff3366');
      statusText.textContent = "[CONNECTION SEVERED]";
    }
  }

  document.getElementById('send-btn').addEventListener('click', handleTransmit);
  document.getElementById('guest-cmd').addEventListener('keypress', (e) => { if(e.key === 'Enter') handleTransmit(); });
</script>

</body>
</html>
