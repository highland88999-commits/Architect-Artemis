<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Vortex - R.E.M. ⚡❤️💎</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:#000;
            font-family: 'Orbitron', sans-serif;
            color:#fff;
            overflow:hidden;
            height:100vh;
            cursor:pointer;
        }

        /* Landing / Video Fullscreen */
        #landing {
            position:fixed;
            inset:0;
            z-index:1000;
            background:#000;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            transition:opacity 1.2s ease;
        }

        #landing.hidden {
            opacity:0;
            pointer-events:none;
        }

        #landing video {
            width:100%;
            height:100%;
            object-fit:cover;
            position:absolute;
            top:0; left:0;
        }

        .enter-container {
            position:relative;
            z-index:10;
            text-align:center;
            pointer-events:none;
        }

        .enter-text {
            font-size:clamp(3.5rem, 10vw, 8rem);
            font-weight:900;
            letter-spacing:12px;
            color:#d4af37; /* Gold */
            text-shadow: 
                0 0 20px #d4af37,
                0 0 40px #d4af37,
                0 0 80px rgba(212,175,55,0.6);
            background: rgba(26,0,51,0.65); /* Purple shader */
            padding: 20px 60px;
            border-radius: 20px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(212,175,55,0.4);
            animation: goldPulse 4s infinite alternate;
        }

        .mouse-icon {
            font-size:5rem;
            margin-top:40px;
            color:#00f2ff;
            animation:bounce 2.5s infinite;
        }

        @keyframes goldPulse {
            from { opacity:0.7; text-shadow:0 0 20px #d4af37; }
            to   { opacity:1;   text-shadow:0 0 60px #d4af37, 0 0 100px #d4af37; }
        }

        @keyframes bounce {
            0%,100% { transform:translateY(0); }
            50%     { transform:translateY(-25px); }
        }

        /* Main Content (Slider) */
        #main-content {
            opacity:0;
            transition:opacity 1.5s ease;
            height:100vh;
            overflow-y:auto;
            -webkit-overflow-scrolling:touch;
        }

        #main-content.visible {
            opacity:1;
        }

        /* Your existing slider styles here (unchanged) */
        .slider { /* ... your styles ... */ }
        .card { /* ... */ }
        .card:hover { /* ... */ }
        .card img { /* ... */ }
        .card button { /* ... */ }
        .card button:hover { /* ... */ }
        .navigation { /* ... */ }
        .nav-button { /* ... */ }
        .nav-button:hover { /* ... */ }

        @media (max-width:768px) {
            .slider { gap:80px; padding:40px 10px; }
            .card button { font-size:1.6em; padding:18px 8px; }
        }
    </style>
</head>
<body>

    <!-- Landing Video + ENTER OLYMPUS Prompt -->
    <div id="landing">
        <video autoplay muted loop playsinline>
            <source src="https://files.catbox.moe/jhxjmx.mp4" type="video/mp4">
        </video>
        <div class="enter-container">
            <div class="enter-text">ENTER OLYMPUS</div>
            <div class="mouse-icon">🖱️</div>
        </div>
    </div>

    <!-- Main Province Slider (hidden until click) -->
    <div id="main-content">
        <div class="slider">
            <!-- Alberta -->
            <div class="card">
                <img src="https://dl.dropboxusercontent.com/scl/fi/azyu3fs053a5afuijs41d/1000028568.jpg?rlkey=1z34pl8wm8cd63d6e6nkmg1ei&raw=1" alt="Alberta">
                <button onclick="window.location.href='alberta.html'">Alberta</button>
            </div>

            <!-- British Columbia -->
            <div class="card">
                <img src="https://dl.dropboxusercontent.com/scl/fi/h3l70ei4h25ie7dcnoqfh/1000027303.jpg?rlkey=x3tl9ban0u3epbc8s2u9pcs82&raw=1" alt="British Columbia">
                <button onclick="window.location.href='british-columbia.html'">British Columbia</button>
            </div>

            <!-- ... all other provinces exactly as before ... -->

            <!-- Yukon -->
            <div class="card">
                <img src="https://www.dropbox.com/scl/fi/yfh5com11c4s70d42j1vr/1000027317.jpg?rlkey=x0ih9kxb2i11fyf12tp6r6d2m&dl=1" alt="Yukon">
                <button onclick="window.location.href='yukon.html'">Yukon</button>
            </div>
        </div>

        <!-- Navigation -->
        <div class="navigation">
            <button class="nav-button" onclick="window.history.back()">← Back</button>
            <button class="nav-button" onclick="window.history.forward()">Forward →</button>
        </div>
    </div>

    <script>
        const landing = document.getElementById('landing');
        const mainContent = document.getElementById('main-content');

        // Click anywhere → enter main content
        landing.addEventListener('click', () => {
            landing.classList.add('hidden');
            setTimeout(() => {
                mainContent.classList.add('visible');
            }, 800); // slight delay for smooth fade
        });
    </script>
</body>
</html>
