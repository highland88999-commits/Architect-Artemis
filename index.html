<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARTEMIS | SYNCHRONIZED CORE</title>
    <style>
        :root {
            --bio-high: #00f2ff;
            --magma: #ff4500;
            --gold: #FFD700;
            --glass: rgba(0, 20, 30, 0.9);
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Courier New', monospace; color: white; overflow: hidden; }
        #reef-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; filter: brightness(0.3); }

        /* FLOATING ARCHIVE WINDOW */
        #archive-window {
            position: fixed; top: 15%; right: 50px; width: 380px; height: 60vh;
            background: var(--glass); border: 1px solid var(--bio-high);
            backdrop-filter: blur(25px); border-radius: 15px; z-index: 200;
            display: flex; flex-direction: column; box-shadow: 0 0 30px rgba(0,0,0,0.5);
            transition: 0.5s; opacity: 0; transform: translateX(50px); pointer-events: none;
        }
        #archive-window.visible { opacity: 1; transform: translateX(0); pointer-events: auto; }

        .archive-header { padding: 15px; border-bottom: 1px solid rgba(0,242,255,0.2); display: flex; justify-content: space-between; align-items: center; }
        #archive-content { flex: 1; padding: 20px; overflow-y: auto; font-size: 0.85rem; line-height: 1.6; color: #ccc; }
        .archive-footer { padding: 15px; border-top: 1px solid rgba(0,242,255,0.2); display: flex; gap: 10px; }

        /* FOLDER SYSTEM (Left Side) */
        #folder-dock { position: fixed; left: 20px; top: 20%; z-index: 150; }
        .folder-tab { 
            background: var(--glass); border: 1px solid var(--bio-high); padding: 10px; 
            margin-bottom: 10px; cursor: pointer; border-radius: 5px; font-size: 0.6rem; 
            transition: 0.3s; width: 120px; text-align: center;
        }
        .folder-tab:hover { background: var(--bio-high); color: #000; }

        /* SHARED BUTTONS */
        .glass-btn { background: transparent; border: 1px solid var(--bio-high); color: var(--bio-high); padding: 6px 12px; font-size: 0.65rem; cursor: pointer; border-radius: 4px; }
        .gold-btn { border-color: var(--gold); color: var(--gold); }

        /* CORE ARTEMIS (From previous version) */
        #core-station { position: fixed; top: 10%; left: 50%; transform: translateX(-50%); text-align: center; z-index: 100; }
        #artemis-prime { width: 140px; height: 140px; border-radius: 50%; border: 2px solid var(--bio-high); display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, var(--bio-high) 0%, transparent 75%); animation: pulse 6s infinite; }
        
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 40px rgba(0,242,255,0.3); } 50% { box-shadow: 0 0 80px var(--bio-high); } }
    </style>
</head>
<body>

<video autoplay muted loop playsinline id="reef-bg">
    <source src="https://assets.mixkit.co/videos/preview/mixkit-underwater-coral-reef-with-many-fishes-4152-large.mp4" type="video/mp4">
</video>

<div id="folder-dock">
    <div class="folder-tab" onclick="syncAndOpen('reports')">📂 HARVESTS</div>
    <div class="folder-tab" onclick="syncAndOpen('ideas')">💡 IDEAS</div>
</div>

<div id="archive-window">
    <div class="archive-header">
        <span id="file-title" style="color:var(--gold); font-size:0.7rem;">LOG_SYNC_STANDBY</span>
        <button onclick="closeArchive()" class="glass-btn" style="border:none; color:var(--magma);">[X]</button>
    </div>
    <div id="archive-content">Select a log from the explorer or wait for Artemis to sync...</div>
    <div class="archive-footer">
        <button class="glass-btn gold-btn" onclick="readAloud()">🔊 READ TO ME</button>
        <button class="glass-btn" onclick="syncGitHub()">🔄 SYNC GITHUB</button>
    </div>
</div>

<div id="core-station">
    <div id="artemis-prime">
        <span style="letter-spacing:4px; font-size:0.8rem;">ARTEMIS</span>
        <span id="status-text" style="font-size:0.4rem; color:var(--bio-high); margin-top:5px;">IDLE</span>
    </div>
</div>

<script>
    let synth = window.speechSynthesis;
    let currentText = "";

    // 🔄 Sync and Open function
    function syncAndOpen(category) {
        document.getElementById('status-text').innerText = "SYNCING_LOGS...";
        speak("Synchronizing with the permanent record.");
        
        // Simulate GitHub Fetch
        setTimeout(() => {
            const archive = document.getElementById('archive-window');
            const content = document.getElementById('archive-content');
            const title = document.getElementById('file-title');
            
            archive.classList.add('visible');
            title.innerText = category.toUpperCase() + "_LOG_LATEST";
            
            if(category === 'reports') {
                currentText = "Harvest Report: Recursive crawl of the target URL revealed 12 internal threads. All data cataloged into the stewardship JSON. Bio-efficiency remains stable at 98%.";
            } else {
                currentText = "Creative Idea: Project Biolume. Utilizing deep-sea spores as a secondary lighting network for the station's perimeter. Logic suggests a 15% energy saving.";
            }
            
            content.innerText = currentText;
            document.getElementById('status-text').innerText = "STATIONARY";
        }, 1500);
    }

    function closeArchive() {
        document.getElementById('archive-window').classList.remove('visible');
        synth.cancel();
    }

    // 🔊 Read to Me Function
    function readAloud() {
        if (synth.speaking) { synth.cancel(); return; }
        const utterThis = new SpeechSynthesisUtterance(currentText);
        utterThis.pitch = 0.85;
        utterThis.rate = 0.9;
        synth.speak(utterThis);
    }

    function syncGitHub() {
        speak("Requesting repository update.");
        document.getElementById('status-text').innerText = "UPDATING_GITHUB";
        setTimeout(() => {
            document.getElementById('status-text').innerText = "SYNC_COMPLETE";
            alert("GitHub Log Folder Synchronized.");
        }, 2000);
    }

    function speak(text) {
        const u = new SpeechSynthesisUtterance(text);
        u.pitch = 0.8;
        synth.speak(u);
    }
</script>
</body>
</html>
