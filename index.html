<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARTEMIS | FINAL_ARCHITECT</title>
    <style>
        :root { 
            --bio: #00f2ff; 
            --accent: #d4af37; 
            --err: #ff4d4d;
            --glass: rgba(0, 242, 255, 0.05);
            --bg: #030303;
        }
        
        body, html { 
            margin: 0; padding: 0; background: var(--bg); 
            font-family: 'Consolas', 'Monaco', monospace; 
            color: #f0f0f0; overflow: hidden; height: 100%; 
        }

        /* The "Digital Rain" Background Subtle Blur */
        body::after {
            content: ""; position: fixed; top:0; left:0; width:100%; height:100%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 242, 255, 0.05) 0%, transparent 80%);
            pointer-events: none; z-index: -1;
        }

        #artemis-omni-chassis {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 98%; height: 96vh; background: var(--glass); 
            backdrop-filter: blur(20px); border: 1px solid rgba(0, 242, 255, 0.15);
            border-radius: 15px; display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 20px rgba(0, 242, 255, 0.05);
        }

        /* Navigation Sidebar */
        #sidebar { 
            width: 240px; border-right: 1px solid rgba(0,242,255,0.1); 
            padding: 20px; background: rgba(0, 0, 0, 0.7); 
            display: flex; flex-direction: column; gap: 20px;
        }
        .nav-header { font-size: 0.6rem; color: var(--accent); letter-spacing: 4px; font-weight: 900; }
        .file-list { flex: 1; overflow-y: auto; font-size: 0.85rem; color: var(--bio); opacity: 0.8; }
        .file-item { padding: 8px 5px; cursor: pointer; border-radius: 4px; transition: 0.2s; white-space: nowrap; }
        .file-item:hover { background: rgba(0,242,255,0.15); opacity: 1; }

        /* Terminal Core */
        #terminal-core { flex: 1; display: flex; flex-direction: column; background: rgba(0,0,0,0.3); }
        #console-output { 
            flex: 1; overflow-y: auto; display: flex; 
            flex-direction: column-reverse; padding: 25px;
        }

        /* Interactive Logs */
        .log { margin-bottom: 12px; font-size: 0.95rem; line-height: 1.6; animation: entry 0.4s ease; }
        @keyframes entry { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .midas { color: var(--accent); border-left: 2px solid var(--accent); padding-left: 15px; margin: 10px 0; }
        .sys { color: var(--bio); font-weight: bold; }
        .res { color: #50fa7b; font-style: italic; }

        /* Input Dock */
        #input-dock { 
            padding: 20px; background: #000; border-top: 1px solid rgba(0,242,255,0.1);
            display: flex; align-items: center; gap: 15px;
        }
        #master-cmd { 
            flex: 1; background: transparent; border: none; 
            color: var(--bio); font-size: 1.1rem; outline: none;
        }

        /* Manual Overlay Card */
        .manual-card { 
            background: rgba(0, 20, 30, 0.9); border: 1px solid var(--accent); 
            padding: 20px; border-radius: 8px; margin: 15px 0; box-shadow: 0 0 20px rgba(212,175,55,0.1);
        }
    </style>
</head>
<body>

<div id="artemis-omni-chassis">
    <div id="main-container" style="display:flex; flex:1; overflow:hidden;">
        <aside id="sidebar">
            <div>
                <div class="nav-header">PROJECT_PATH</div>
                <div style="font-size:0.7rem; margin-top:5px; color:#666;">root/neural_node_v10/</div>
            </div>
            <div class="file-list" id="repo-files">
                <div class="file-item">📄 main.js</div>
                <div class="file-item">📄 index.html</div>
                <div class="file-item">📁 protocols/</div>
                <div class="file-item">📁 assets/</div>
            </div>
        </aside>

        <section id="terminal-core">
            <div id="console-output"></div>
            
            <form id="input-form" style="display:contents">
                <div id="input-dock">
                    <span style="color:var(--bio); font-size:1.3rem;">λ</span>
                    <input type="text" id="master-cmd" placeholder="Directive..." autocomplete="off">
                    <button type="submit" style="display:none"></button>
                </div>
            </form>
        </section>
    </div>
</div>

<script>
const consoleRoot = document.getElementById('console-output');
const masterCmd = document.getElementById('master-cmd');

// --- INTEGRATED MANUAL ---
const docStrings = {
    manual: `
    <div class="manual-card">
        <strong style="color:var(--accent)">[PROTOCOL: ARTEMIS_GUIDE]</strong><br><br>
        <span class="sys">λ run [code]</span> : Direct neural sandbox execution.<br>
        <span class="sys">λ clear</span> : Wipe terminal history.<br>
        <span class="sys">λ status</span> : Check IDE health and cloud link.<br>
        <span class="sys">λ map</span> : Visualizes repository architecture.<br><br>
        <em>Note: Midas Auto-complete is active. Type keywords to trigger.</em>
    </div>`
};

// --- CORE INPUT LOGIC ---
document.getElementById('input-form').onsubmit = (e) => {
    e.preventDefault();
    const cmd = masterCmd.value.trim();
    if(!cmd) return;

    logEvent(`> ${cmd.toUpperCase()}`, "sys");

    const trigger = cmd.toLowerCase();
    if (trigger === 'manual' || trigger === 'help') {
        logEvent(docStrings.manual, "midas");
    } else if (trigger === 'clear') {
        consoleRoot.innerHTML = '';
    } else if (trigger.startsWith('run ')) {
        execute(cmd.substring(4));
    } else if (trigger === 'status') {
        logEvent("All systems nominal. Neural-Link Latency: 4ms. Repository: Online.", "midas");
    } else {
        logEvent(`Acknowledged: Attempting to process "${cmd}" via Council...`, "midas");
    }

    masterCmd.value = '';
};

function execute(code) {
    try {
        const result = eval(code);
        logEvent(`[OUTPUT]: ${result}`, "res");
    } catch(err) {
        logEvent(`[RUNTIME_ERROR]: ${err.message}`, "err");
    }
}

function logEvent(msg, type) {
    const div = document.createElement('div');
    div.className = `log ${type}`;
    div.innerHTML = msg;
    consoleRoot.prepend(div);
}

window.onload = () => {
    logEvent("<strong>ARTEMIS APEX_O_IDE v10.0</strong>", "sys");
    logEvent("Neural interface synchronized. Terminal standby.", "midas");
};
</script>
</body>
</html>
