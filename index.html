        @keyframes logo-breathe {
            0%,100% { opacity: 0.12; transform: scale(1); }
            50% { opacity: 0.25; transform: scale(1.08); filter: hue-rotate(15deg); }
        }

        #guest-terminal {
            width:90vw; max-width:720px; height:80vh; max-height:90vh;
            background:var(--glass); border:1px solid var(--glass-border);
            border-radius:20px; backdrop-filter:blur(18px);
            box-shadow:0 8px 40px rgba(0,0,0,0.7);
            position:relative; display:none; flex-direction:column;
            overflow:hidden; transition:all 0.5s cubic-bezier(0.34,1.56,0.64,1);
            z-index:10; margin: 5vh auto;
        }

        /* 8-Ball UI */
        #artemis-8ball {
            width:14rem; height:14rem; margin:40px auto 20px auto;
            background:#000; border-radius:50%; border:5px solid var(--accent);
            box-shadow:0 0 80px var(--accent), inset 0 0 40px var(--purple-glow);
            position:relative; overflow:hidden; cursor:pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 5rem; color: var(--accent);
        }

        #ball-liquid {
            position:absolute; inset:0; background:linear-gradient(to bottom, #00008b, #000, #00008b);
            opacity:0.9; transform:translateY(100%);
            transition:transform 1.2s ease-out; z-index: 2;
        }

        #ball-triangle {
            position:absolute; top:50%; left:50%; transform:translate(-50%, -50%) rotate(0deg);
            width:0; height:0; border-left:70px solid transparent; border-right:70px solid transparent;
            border-bottom:120px solid #fff; opacity:0;
            transition:opacity 1.8s, transform 1s; z-index: 3;
        }

        #ball-fortune {
            position:absolute; top:50%; left:50%; transform:translate(-50%, -50%);
            color:#000; font-size:0.9rem; text-align:center; max-width:110px;
            font-weight:bold; opacity:0; z-index: 4; pointer-events: none;
        }

        #artemis-8ball.shaking { animation:shake-ball 0.8s ease-in-out; }
        #artemis-8ball.revealing #ball-liquid { transform:translateY(0); }
        #artemis-8ball.revealing #ball-triangle { opacity:1; transform:translate(-50%, -50%) rotate(180deg); }
        #artemis-8ball.revealing #ball-fortune { opacity:1; }

        @keyframes shake-ball {
            0%, 100% { transform:rotate(0deg); }
            25% { transform:rotate(10deg); }
            50% { transform:rotate(-10deg); }
            75% { transform:rotate(10deg); }
        }

        /* Prompt Area */
        #prompt-area { padding:0 20px 30px; text-align:center; margin-top:auto; }
        #guest-cmd {
            width:100%; max-width:520px; padding:14px 20px;
            background:rgba(0,0,0,0.6); border:1px solid var(--deep-bio);
            color:var(--bio); font-size:1.1rem; border-radius:12px;
            margin-bottom:16px; outline: none;
        }
        #spin-btn {
            padding:14px 48px; background:var(--accent); color:#000;
            border:none; border-radius:12px; font-weight:bold; font-size:1.2rem;
            cursor:pointer; box-shadow:0 0 30px var(--accent); transition:0.3s;
        }
        #spin-btn:hover { transform:scale(1.05); box-shadow:0 0 50px var(--accent); }

        /* Icon Bar Styles */
        #icon-bar-collapsed {
            position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
            width:60px; height:60px; background:rgba(155,77,255,0.35);
            border-radius:50%; border:2px solid var(--purple-glow);
            display:flex; align-items:center; justify-content:center;
            font-size:2rem; color:var(--accent); cursor:pointer; z-index:50;
            box-shadow:0 0 30px var(--purple-glow);
        }

        #icon-bar-expanded {
            position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
            display:none; flex-wrap:wrap; gap:12px; padding:20px;
            background:var(--glass); border:1px solid var(--glass-border);
            border-radius:20px; backdrop-filter:blur(16px);
            max-width:95vw; z-index:51; justify-content: center;
        }

        .holo-icon {
            width:56px; height:56px; background:rgba(155,77,255,0.15);
            border-radius:12px; border:1px solid var(--purple-glow);
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; transition:0.3s;
        }
        .holo-icon:hover { transform:scale(1.15); background:rgba(155,77,255,0.4); box-shadow:0 0 20px var(--purple-glow); }

        .holo-close {
            width:56px; height:56px; background:var(--err); border-radius:12px;
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; color:#000; font-weight:bold; font-size:1.5rem;
        }

        /* Architect Layer */
        #architect-layer {
            display:none; position:fixed; inset:0; z-index:100;
            background:radial-gradient(circle, #1a1a1a, #000);
            flex-direction:column; align-items:center; justify-content:center;
        }

        /* Holo Window */
        .holo-window {
            position:fixed; inset:10%; background:rgba(0,0,0,0.9);
            border:1px solid var(--purple-glow); border-radius:20px;
            backdrop-filter:blur(24px); box-shadow:0 0 80px rgba(155,77,255,0.4);
            display:none; flex-direction:column; z-index:60;
        }
        .holo-header { padding:12px; background:rgba(155,77,255,0.2); display:flex; justify-content:space-between; align-items:center; }
        .holo-iframe { flex:1; border:none; width:100%; height:100%; }

        #lightning-access {
            position:fixed; bottom:20px; right:20px; z-index:70;
            width:60px; height:60px; background:rgba(212,175,55,0.1);
            border:2px solid var(--accent); border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; animation: pulse-glow 3s infinite;
        }
        @keyframes pulse-glow { 0%,100% { box-shadow:0 0 15px var(--accent); } 50% { box-shadow:0 0 40px var(--accent); } }
    </style>
</head>

                <svg viewBox="0 0 24 24" width="30" height="30" fill="var(--bio)"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.1 2.48-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.31-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.89 1.22-2.13 1.08-3.37-1.06.04-2.35.71-3.11 1.6-.68.79-1.28 2.05-1.12 3.26 1.18.09 2.39-.57 3.15-1.49z"/></svg>
            </div>
            <div class="holo-icon" title="Artemis" onclick="alert('Artemis System Online')">
                <svg viewBox="0 0 24 24" width="30" height="30" fill="var(--accent)"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
            </div>
            <div class="holo-close" onclick="toggleIconBar()">×</div>
        </div>
    </div>

    <div id="architect-layer">
        <h1 style="color:var(--accent); text-shadow:0 0 20px var(--accent);">ARCHITECT OVERRIDE ACTIVE</h1>
        <p style="color:var(--bio); margin: 15px 0;">Symbiote authorization confirmed.</p>
        <button onclick="location.reload()" style="margin-top:20px; background:none; border:1px solid var(--err); color:var(--err); cursor:pointer; padding:12px 24px; font-family: inherit;">TERMINATE SESSION</button>
    </div>

    <div id="holo-window" class="holo-window">
        <div class="holo-header">
            <span>Artemis Holo View</span>
            <div class="holo-close" style="width:30px; height:30px; font-size: 1rem;" onclick="closeHoloWindow()">×</div>
        </div>
        <iframe id="holo-iframe" class="holo-iframe"></iframe>
    </div>

    <div id="lightning-access" onclick="requestArchitectAccess()">
        <svg viewBox="0 0 24 24" width="35" height="35" fill="var(--accent)">
            <path d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
    </div>

    <script>
        // Matrix Background Effect
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        let width, height, columns, drops;

        function initMatrix() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            columns = Math.floor(width / 18);
            drops = new Array(columns).fill(1);
        }

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0,0,0,0.05)';
            ctx.fillRect(0,0,width,height);
            ctx.fillStyle = '#9b4dff';
            ctx.font = '15px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = String.fromCharCode(0x30A0 + Math.random()*96);
                ctx.fillText(text, i*18, drops[i]*18);
                if (drops[i]*18 > height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        window.addEventListener('resize', initMatrix);
        initMatrix(); 
        setInterval(drawMatrix, 40);

        // Icon Bar Logic
        function toggleIconBar() {
            const collapsed = document.getElementById('icon-bar-collapsed');
            const expanded = document.getElementById('icon-bar-expanded');
            if (expanded.style.display === 'flex') {
                expanded.style.display = 'none';
                collapsed.style.display = 'flex';
            } else {
                expanded.style.display = 'flex';
                collapsed.style.display = 'none';
            }
        }

        // Holo Window Management
        function openHoloWindow(url) {
            const win = document.getElementById('holo-window');
            const iframe = document.getElementById('holo-iframe');
            iframe.src = url;
            win.style.display = 'flex';
        }

        function closeHoloWindow() {
            document.getElementById('holo-window').style.display = 'none';
            document.getElementById('holo-iframe').src = '';
        }

        // Architect Mode Authentication
        function requestArchitectAccess() {
            const p1 = prompt("Identity Recognition:");
            const p2 = prompt("Secret Key:");
            if (p1 === "Spider" && p2 === "Miles") {
                document.getElementById('architect-layer').style.display = 'flex';
                document.getElementById('guest-layer').style.display = 'none';
                document.body.style.border = "2px solid var(--accent)";
            } else {
                alert("ACCESS VIOLATION: Unauthorized Identity");
            }
        }

        // Magic 8-Ball System
        const ball = document.getElementById('artemis-8ball');
        const spinBtn = document.getElementById('spin-btn');
        const inputField = document.getElementById('guest-cmd');
        const fortuneText = document.getElementById('ball-fortune');

        const midasFortunes = [
            "Midas touch: Gold flows your way.",
            "Golden pivot: 10x awaits.",
            "Midas candle: Riches align soon.",
            "Code is Midas lever: Unlock now.",
            "Architect reveals: True gold keys."
        ];
        let fortuneIndex = 0;

        function shakeBall() {
            if (ball.classList.contains('revealing')) {
                ball.classList.remove('revealing');
                return;
            }

            ball.classList.add('shaking');
            
            setTimeout(() => {
                ball.classList.remove('shaking');
                ball.classList.add('revealing');
                fortuneText.textContent = midasFortunes[fortuneIndex];
                fortuneIndex = (fortuneIndex + 1) % midasFortunes.length;
            }, 800);

            // Reset after viewing
            setTimeout(() => {
                ball.classList.remove('revealing');
            }, 6000);
        }

        ball.addEventListener('click', shakeBall);
        spinBtn.addEventListener('click', () => {
            if (!inputField.value) {
                alert("Input required for system spin.");
                return;
            }
            shakeBall();
        });

        // Entrance Animation
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('guest-terminal').style.display = 'flex';
            }, 1000);
        };
    </script>
</body>
</html>
