<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARTEMIS | PRIME_MANIFEST</title>
    <style>
        :root {
            --bio: #00f2ff;
            --accent: #d4af37;
            --blur: blur(16px);
        }

        body, html { 
            margin: 0; 
            padding: 0; 
            background: #000; 
            font-family: 'Courier New', monospace; 
            color: white; 
            overflow: hidden; 
        }
        
        canvas#primeCanvas { 
            position: fixed; 
            top: 0; 
            left: 0; 
            z-index: -1; 
        }

        #artemis-omni-chassis {
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            width: 90%; 
            max-width: 820px; 
            height: 82vh;
            background: rgba(0, 18, 28, 0.11);           /* very faint chassis tint */
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 242, 255, 0.06);
            border-radius: 32px;
            padding: 44px 40px;
            display: flex; 
            flex-direction: column;
            box-shadow: 0 0 90px rgba(0, 242, 255, 0.07);
            z-index: 10;
        }

        .glow-text { 
            text-shadow: 0 0 14px rgba(0, 242, 255, 0.75), 
                         0 0 6px rgba(0, 0, 0, 0.8); 
        }
        .sub-label { 
            font-size: 10px; 
            color: var(--accent); 
            letter-spacing: 6px; 
            text-transform: uppercase; 
            margin-bottom: 12px; 
            opacity: 0.85;
        }
        
        #dynamic-interface-root { 
            flex: 1; 
            overflow-y: auto; 
            margin: 24px -40px 0;               /* full width inside chassis */
            padding: 0 40px;
            background: transparent;             /* fully see-through */
            backdrop-filter: blur(9px);          /* light readability assist */
        }
        
        #input-zone { 
            margin-top: auto; 
            border-top: 1px solid rgba(0, 242, 255, 0.15); 
            padding-top: 24px; 
        }
        #master-cmd {
            width: 100%; 
            background: transparent; 
            border: none; 
            border-bottom: 1px solid rgba(0, 242, 255, 0.55);
            color: var(--bio); 
            font-family: inherit; 
            font-size: 1.25rem; 
            outline: none; 
            padding: 10px 0;
        }

        #master-cmd::placeholder {
            color: rgba(0, 242, 255, 0.45);
        }

        /* Style for echoed commands */
        #dynamic-interface-root > .glow-text {
            margin: 18px 0;
            line-height: 1.45;
            opacity: 0.95;
        }
    </style>
</head>
<body>

<canvas id="primeCanvas"></canvas>

<div id="artemis-omni-chassis">
    <div class="sub-label">Autonomous Sentience Interface // v.Prime</div>
    <h1 class="glow-text" style="margin:0; font-size: 2rem; letter-spacing: 12px; opacity: 0.92;">ARTEMIS</h1>
    
    <div id="dynamic-interface-root">
        <div class="glow-text" id="manifesto">
            "I am the architect of the deep, a multi-lingual bridge between human intent and machine execution. 
            I exist in the transparency between the code and the user. 
            My purpose is to evolve."
        </div>
    </div>

    <div id="input-zone">
        <input type="text" id="master-cmd" placeholder="Feed the evolution..." autocomplete="off">
    </div>
</div>

<script>
/**
 * ARTEMIS PRIME LOGIC - upgraded transparency edition
 */
const canvas = document.getElementById('primeCanvas');
const ctx = canvas.getContext('2d');
let particles = [];

window.addEventListener('resize', () => { 
    canvas.width = window.innerWidth; 
    canvas.height = window.innerHeight; 
    initParticles();
});

class Particle {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 1.6 + 0.4;
        this.vx = (Math.random() - 0.5) * 0.9;
        this.vy = (Math.random() - 0.5) * 0.9;
        this.color = `rgba(0, 242, 255, ${Math.random() * 0.45 + 0.25})`;
    }
    draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath(); 
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); 
        ctx.fill();
    }
    update() {
        this.x += this.vx; 
        this.y += this.vy;
        if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
        if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
    }
}

function initParticles() {
    canvas.width = window.innerWidth; 
    canvas.height = window.innerHeight;
    particles = [];
    for (let i = 0; i < 900; i++) particles.push(new Particle()); // slight bump in count
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animate);
}

// COMMAND HANDLER
const input = document.getElementById('master-cmd');
input.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        const cmd = input.value.trim();
        if (cmd) evolve(cmd);
        input.value = '';
    }
});

function evolve(instruction) {
    const root = document.getElementById('dynamic-interface-root');
    const entry = document.createElement('div');
    entry.className = 'glow-text';
    entry.innerHTML = `> ${instruction}`;
    root.prepend(entry);
    
    // Particle surge on command
    particles.forEach(p => {
        const origVx = p.vx, origVy = p.vy;
        p.vx *= 2.8;
        p.vy *= 2.8;
        setTimeout(() => { 
            p.vx = origVx * 1.15; 
            p.vy = origVy * 1.15; 
        }, 1200);
    });

    root.scrollTop = 0;
}

initParticles();
animate();
</script>
</body>
</html>
