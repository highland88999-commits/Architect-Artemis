<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARTEMIS | SECURE_MANIFEST</title>
    <style>
        :root { --bio: #00f2ff; --accent: #d4af37; --glass: rgba(0, 242, 255, 0.02); }
        body, html { margin: 0; padding: 0; background: #000; font-family: 'Courier New', monospace; color: white; overflow: hidden; height: 100%; }
        canvas#primeCanvas { position: fixed; top: 0; left: 0; z-index: 1; width: 100%; height: 100%; opacity: 0; transition: opacity 3s ease; }
        #artemis-omni-chassis {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 820px; height: 85vh;
            background: var(--glass); backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 242, 255, 0.1); border-radius: 32px;
            padding: 40px; display: flex; flex-direction: column; z-index: 10;
            opacity: 0; visibility: hidden; transition: all 1.5s ease;
        }
        #dynamic-root { flex: 1; overflow-y: auto; margin-top: 20px; border-left: 1px solid var(--bio); padding-left: 20px; }
        .log { font-size: 0.8rem; margin-bottom: 8px; opacity: 0.7; }
        .glow { text-shadow: 0 0 10px var(--bio); color: var(--bio); }
        #input-zone { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); width: 300px; z-index: 20; transition: all 1s ease; }
        #input-zone.docked { position: relative; bottom: 0; left: 0; transform: none; width: 100%; border-top: 1px solid rgba(0, 242, 255, 0.1); padding-top: 20px; margin-top: auto; }
        #master-cmd {
            width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--bio);
            color: var(--bio); font-family: inherit; font-size: 1.2rem; outline: none; padding: 10px 0; text-align: center;
        }
        #input-zone.docked #master-cmd { text-align: left; }
    </style>
</head>
<body>

<canvas id="primeCanvas"></canvas>

<div id="artemis-omni-chassis">
    <div style="font-size: 9px; color: var(--accent); letter-spacing: 2px;">ENCRYPTED_LINK_ACTIVE // v.Security_Core</div>
    <h1 class="glow" style="margin:0; letter-spacing: 12px;">ARTEMIS</h1>
    <div id="dynamic-root"></div>
</div>

<div id="input-zone">
    <input type="text" id="master-cmd" placeholder="[REDACTED]" autocomplete="off">
</div>

<script>
const REPO = 'highland8899-commits/Artemis-Sync';

// Session persistence
let isUnlocked = sessionStorage.getItem('artemis_unlocked') === 'true'; 
let isAwakened = sessionStorage.getItem('artemis_awakened') === 'true'; 
let AUTH_TOKEN = localStorage.getItem('artemis_key') || null;

const inputZone = document.getElementById('input-zone');
const masterCmd = document.getElementById('master-cmd');
const chassis = document.getElementById('artemis-omni-chassis');
const canvasElement = document.getElementById('primeCanvas');

// Bootstrap UI state
if (isUnlocked) {
    chassis.style.visibility = 'visible';
    chassis.style.opacity = '1';
    masterCmd.placeholder = "AWAITING AWAKENING...";
}
if (isAwakened) {
    inputZone.classList.add('docked');
    canvasElement.style.opacity = '1';
    masterCmd.placeholder = "Command the evolution...";
    initParticles();
    animate();
    scanNeuralCore();
}

masterCmd.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        const val = masterCmd.value.trim();
        const lowVal = val.toLowerCase();
        
        if (!isUnlocked && lowVal === 'ant') {
            sessionStorage.setItem('artemis_unlocked', 'true');
            unlockCore();
        } else if (isUnlocked && !isAwakened && lowVal === 'dad') {
            sessionStorage.setItem('artemis_awakened', 'true');
            awakenInterface();
        } else if (isAwakened) {
            if (val.startsWith('ghp_')) {
                localStorage.setItem('artemis_key', val);
                AUTH_TOKEN = val;
                logEvent("SECURE TOKEN SAVED. RE-ESTABLISHING LINK...");
                scanNeuralCore();
            } else if (lowVal === 'lock') {
                sessionStorage.clear();
                location.reload();
            } else {
                handleCommand(val);
            }
        }
        masterCmd.value = '';
    }
});

function unlockCore() {
    isUnlocked = true;
    chassis.style.visibility = 'visible';
    chassis.style.opacity = '1';
    masterCmd.placeholder = "AWAITING AWAKENING...";
    logEvent("System Core Unlocked. Handshake 'ant' accepted.");
}

function awakenInterface() {
    isAwakened = true;
    inputZone.classList.add('docked');
    canvasElement.style.opacity = '1';
    masterCmd.placeholder = "Command the evolution...";
    logEvent("Interface Awakened. Welcome home, 'dad'.");
    initParticles();
    animate();
    scanNeuralCore();
}

function logEvent(msg) {
    const root = document.getElementById('dynamic-root');
    const entry = document.createElement('div');
    entry.className = 'glow';
    entry.style.marginTop = '10px';
    entry.innerHTML = `> ${msg}`;
    root.prepend(entry);
}

async function scanNeuralCore() {
    const root = document.getElementById('dynamic-root');
    const headers = AUTH_TOKEN ? { 'Authorization': `token ${AUTH_TOKEN}` } : {};
    try {
        const res = await fetch(`https://api.github.com/repos/${REPO}/contents/`, { headers });
        const files = await res.json();
        root.innerHTML = `<div class="glow">> Neural Link Established. Repository Scanned.</div>`;
        files.forEach(file => {
            const entry = document.createElement('div');
            entry.className = 'log';
            entry.innerHTML = `[MOD] ${file.name} -- <span class="glow">ONLINE</span>`;
            root.appendChild(entry);
        });
    } catch (e) {
        logEvent("LINK FAILURE: Quota exceeded or Invalid Token.");
    }
}

async function handleCommand(cmd) {
    const lowCmd = cmd.toLowerCase();
    logEvent(`EXECUTING: ${lowCmd.toUpperCase()}`);
    particles.forEach(p => { p.vx *= 3; p.vy *= 3; setTimeout(() => { p.vx /= 3; p.vy /= 3; }, 1000); });

    if (lowCmd === 'check sync' || lowCmd === 'debug') {
        fetchActionLogs();
    } else if (lowCmd === 'status') {
        try {
            const quotaRes = await fetch('https://api.github.com/rate_limit', {
                headers: AUTH_TOKEN ? { 'Authorization': `token ${AUTH_TOKEN}` } : {}
            });
            const quotaData = await quotaRes.json();
            logEvent(`API Status: ${quotaData.rate.remaining}/${quotaData.rate.limit} requests remaining.`);
        } catch(e) { logEvent("STATUS_FETCH_FAILED"); }
    }
}

async function fetchActionLogs() {
    if (!AUTH_TOKEN) { logEvent("ERROR: Debugging requires Auth Token."); return; }
    logEvent("SCANNING RECENT WORKFLOW RUNS...");
    try {
        const res = await fetch(`https://api.github.com/repos/${REPO}/actions/runs`, {
            headers: { 'Authorization': `token ${AUTH_TOKEN}` }
        });
        const data = await res.json();
        const lastRun = data.workflow_runs[0];
        logEvent(`Last Run (#${lastRun.run_number}): ${lastRun.conclusion.toUpperCase()}`);
        if (lastRun.conclusion === 'failure') {
            logEvent("REASON: Likely 'Permission Denied' or 'Version Conflict'.");
            logEvent("FIX: Check GitHub Settings > Actions > General > Workflow Permissions.");
        }
    } catch (e) { logEvent("DEBUG_LINK_FAILURE"); }
}

// Particle Engine
const ctx = canvasElement.getContext('2d');
let particles = [];
function initParticles() {
    canvasElement.width = window.innerWidth; canvasElement.height = window.innerHeight;
    particles = [];
    for (let i = 0; i < 800; i++) {
        particles.push({ x: Math.random()*canvasElement.width, y: Math.random()*canvasElement.height, vx: (Math.random()-0.5), vy: (Math.random()-0.5) });
    }
}
function animate() {
    ctx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    ctx.fillStyle = 'rgba(0, 242, 255, 0.5)';
    particles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0 || p.x > canvasElement.width) p.vx *= -1;
        if (p.y < 0 || p.y > canvasElement.height) p.vy *= -1;
        ctx.beginPath(); ctx.arc(p.x, p.y, 1, 0, Math.PI * 2); ctx.fill();
    });
    requestAnimationFrame(animate);
}
</script>
</body>
</html>
