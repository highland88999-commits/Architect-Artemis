<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARTEMIS | MULTIMODAL CORE</title>
    <style id="dynamic-theme">
        :root {
            --bio-high: #00f2ff;
            --magma: #ff4500;
            --gold: #FFD700;
            --glass: rgba(0, 30, 50, 0.4); 
        }
    </style>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Courier New', monospace; color: white; overflow: hidden; }
        #reef-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; filter: brightness(0.3); transition: 2s; }

        /* ARTEMIS CORE */
        #core-station { position: fixed; top: 4%; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; z-index: 100; }
        #artemis-prime { width: 110px; height: 110px; border-radius: 50%; border: 1px solid var(--bio-high); display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, rgba(0, 242, 255, 0.1) 0%, transparent 85%); cursor: pointer; transition: 0.5s; }
        #status-tag { font-size: 0.5rem; color: var(--bio-high); margin-top: 8px; letter-spacing: 2px; font-weight: bold; text-shadow: 0 0 5px var(--bio-high); }

        /* RESPONSE & MULTIMEDIA FRAME */
        #response-frame { position: fixed; top: 22%; left: 50%; transform: translateX(-50%); width: 650px; max-height: 60vh; background: var(--glass); border: 1px solid rgba(0, 242, 255, 0.3); border-radius: 25px; padding: 25px; z-index: 90; opacity: 0; transition: 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); overflow-y: auto; backdrop-filter: blur(15px); }
        #response-frame.active { opacity: 1; top: 25%; }
        
        .thought-header { font-size: 0.5rem; color: var(--gold); margin-bottom: 12px; border-bottom: 1px solid rgba(255,215,0,0.1); padding-bottom: 5px; display: flex; justify-content: space-between; }
        
        /* VISUAL OUTPUTS */
        #media-output { margin-top: 15px; border-radius: 15px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.1); background: #000; position: relative; min-height: 100px; display: flex; align-items: center; justify-content: center; }
        .gen-image { width: 100%; height: auto; display: block; animation: fadeIn 2s; }
        .gen-video { width: 100%; height: auto; display: block; }
        .gen-loader { color: var(--bio-high); font-size: 0.7rem; letter-spacing: 2px; animation: pulse-text 1.5s infinite; }

        #command-base { position: fixed; bottom: 35px; width: 95%; max-width: 800px; left: 50%; transform: translateX(-50%); z-index: 100; }
        #prompt-field { background: rgba(0, 15, 25, 0.6); border: 1px solid rgba(0, 242, 255, 0.4); border-radius: 12px; display: flex; padding: 12px 20px; backdrop-filter: blur(10px); }
        #cmd-input { flex: 1; background: transparent; border: none; color: white; font-family: inherit; outline: none; font-size: 0.95rem; }
        .btn-main { background: transparent; border: 1px solid var(--bio-high); padding: 8px 18px; cursor: pointer; border-radius: 8px; margin-left: 10px; color: var(--bio-high); font-size: 0.7rem; transition: 0.3s; }
        .btn-main:hover { background: var(--bio-high); color: #000; box-shadow: 0 0 20px var(--bio-high); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pulse-text { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    </style>
</head>
<body>

<img id="reef-bg" src="https://images.unsplash.com/photo-1544551763-46a013bb70d5?auto=format&fit=crop&w=1920&q=80">

<div id="response-frame">
    <div class="thought-header">
        <span>[VISUAL_SYNTHESIS_MOD]</span>
        <span id="gen-status">READY</span>
    </div>
    <div id="response-text">Artemis Multimodal Core online... awaiting visual prompt.</div>
    <div id="media-output"></div>
</div>

<div id="core-station">
    <div id="artemis-prime">
        <span style="letter-spacing:5px; font-size:0.9rem; font-weight:bold;">ARTEMIS</span>
        <span id="status-tag">STATIONARY</span>
    </div>
</div>

<div id="command-base">
    <div id="prompt-field">
        <input type="text" id="cmd-input" placeholder="Ask for an image or video (e.g., 'Generate a video of a neon reef')">
        <button class="btn-main" onclick="handleTransmit()">TRANSMIT</button>
    </div>
</div>

<script>
    const synth = window.speechSynthesis;

    async function handleTransmit() {
        const input = document.getElementById('cmd-input');
        const query = input.value.trim();
        if(!query) return;

        input.value = "";
        visualState(true, "SYNTHESIZING_VISUALS");
        
        const isVideo = query.toLowerCase().includes("video") || query.toLowerCase().includes("motion");
        const isImage = query.toLowerCase().includes("image") || query.toLowerCase().includes("picture") || query.toLowerCase().includes("generate");

        let response = "";
        if (isVideo) {
            response = "I am engaging the Veo engine to manifest cinematic motion. This 'Visual Echo' represents your prompt in the abyssal timeline.";
            processVisual('video', query);
        } else if (isImage) {
            response = "Accessing the Nano Banana generative model. I am crafting a high-fidelity image from your neural input.";
            processVisual('image', query);
        } else {
            response = "Processing text-based inquiry. To manifest visuals, please specify 'image' or 'video' in your request.";
        }

        respond(response);
    }

    function processVisual(type, prompt) {
        const output = document.getElementById('media-output');
        const status = document.getElementById('gen-status');
        
        output.innerHTML = `<div class="gen-loader">MANIFESTING ${type.toUpperCase()}...</div>`;
        status.innerText = "SYNTH_ACTIVE";

        setTimeout(() => {
            if (type === 'image') {
                // Placeholder for generative image output
                output.innerHTML = `<img src="https://picsum.photos/seed/${Math.random()}/800/450" class="gen-image" alt="Generated Image">`;
            } else {
                // Placeholder for generative video output
                output.innerHTML = `<video autoplay loop muted class="gen-video">
                    <source src="https://assets.mixkit.co/videos/preview/mixkit-underwater-ocean-floor-view-with-light-beams-1221-large.mp4" type="video/mp4">
                </video>`;
            }
            status.innerText = "COMPLETE";
        }, 3000);
    }

    function respond(text) {
        const frame = document.getElementById('response-frame');
        document.getElementById('response-text').innerText = text;
        frame.classList.add('active');
        
        synth.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.pitch = 0.85;
        u.rate = 1.0;
        synth.speak(u);

        setTimeout(() => {
            if (!document.getElementById('media-output').innerHTML.includes('gen-loader')) {
                // Keep the frame open if media is present
                // frame.classList.remove('active'); 
            }
            visualState(false, "STATIONARY");
        }, 10000);
    }

    function visualState(active, status) {
        document.getElementById('status-tag').innerText = status;
        document.getElementById('artemis-prime').style.boxShadow = active ? "0 0 50px var(--bio-high)" : "none";
    }
</script>
</body>
</html>
