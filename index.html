<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Architect Artemis | Symbiote</title>
    <style>
        :root {
            --bio: #00f2ff;
            --deep-bio: #00aaff;
            --accent: #d4af37;
            --purple-glow: #9b4dff;
            --err: #ff4d4d;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(155, 77, 255, 0.4);
            --bg: #030303;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%; height: 100%; overflow: hidden; background: var(--bg);
            font-family: 'Consolas', 'Courier New', monospace; color: var(--bio);
        }

        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.6; }

        /* Guest Mode */
        #guest-layer {
            position: absolute; inset: 0; z-index: 10;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle, rgba(155,77,255,0.1) 0%, rgba(0,0,0,0.9) 100%);
        }

        #guest-terminal {
            width: 90vw; max-width: 700px; background: rgba(10, 0, 30, 0.85);
            border: 2px solid var(--purple-glow); border-radius: 12px;
            padding: 25px; box-shadow: 0 0 40px rgba(155, 77, 255, 0.4);
            backdrop-filter: blur(12px); pointer-events: all;
        }

        #guest-output {
            min-height: 120px; max-height: 40vh; overflow-y: auto; margin-bottom: 15px;
            padding: 15px; background: rgba(0,0,0,0.6); border-radius: 8px;
            white-space: pre-wrap; font-size: 0.9em; border: 1px solid var(--glass-border);
        }

        #guest-input-area { display: flex; flex-direction: column; gap: 10px; }
        #guest-prompt { font-size: 1em; color: var(--accent); }
        #guest-cmd {
            background: transparent; border: none; border-bottom: 2px solid var(--bio);
            color: #fff; font-size: 1.1em; outline: none; padding: 5px 0; flex: 1;
        }

        #guest-send-btn {
            background: rgba(155, 77, 255, 0.3); border: 1px solid var(--purple-glow);
            color: var(--accent); padding: 10px 20px; border-radius: 8px; cursor: pointer;
            font-weight: bold; transition: 0.3s;
        }

        /* Social Icons Grid */
        #social-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;
            margin-top: 20px; width: 100%;
        }
        .social-icon {
            background: rgba(155, 77, 255, 0.1); border: 1px solid var(--purple-glow);
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            height: 50px; transition: 0.3s;
        }
        .social-icon:hover { background: var(--purple-glow); transform: translateY(-3px); }
        .social-icon svg { width: 24px; height: 24px; fill: var(--accent); }

        /* Architect Mode */
        #architect-layer {
            position: absolute; inset: 0; z-index: 20; display: none;
            background: #000; flex-direction: row;
        }
        #architect-sidebar {
            width: 280px; background: rgba(5, 10, 20, 0.95); border-right: 1px solid var(--deep-bio);
            padding: 20px; display: flex; flex-direction: column; gap: 15px;
        }
        #architect-terminal { flex: 1; display: flex; flex-direction: column; }
        #architect-output { flex: 1; overflow-y: auto; padding: 25px; font-size: 0.95em; line-height: 1.6; }
        #architect-input-dock { padding: 15px; border-top: 1px solid var(--deep-bio); display: flex; gap: 10px; }
        #architect-cmd { flex: 1; background: #080808; border: 1px solid var(--deep-bio); color: var(--bio); padding: 10px; }

        /* Overlays */
        #password-overlay {
            position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center;
        }
        .file-item { padding: 8px; background: rgba(0,242,255,0.05); margin: 4px 0; border-radius: 4px; font-size: 0.85em; cursor: pointer; }
        .file-item:hover { background: rgba(0,242,255,0.2); }

        #architect-icon {
            position: fixed; bottom: 20px; right: 20px; z-index: 50;
            width: 50px; height: 50px; background: rgba(0, 242, 255, 0.1);
            border: 2px solid var(--deep-bio); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .midas { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>

    <div id="guest-layer">
        <div id="guest-terminal">
            <div id="guest-output">System initialized... Welcome, Guest.
Enter a URL below to receive an Architect-grade UI optimization idea.</div>
            <div id="guest-input-area">
                <p id="guest-prompt">Target URL:</p>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="guest-cmd" placeholder="https://your-site.com">
                    <button id="guest-send-btn">Request</button>
                </div>
            </div>

            </div>
        </div>
    </div>

    <div id="architect-layer">
        <div id="architect-sidebar">
            <div style="color:var(--accent); font-weight:bold; border-bottom:1px solid var(--deep-bio); padding-bottom:10px;">REPOSITORY_SCAN</div>
            <div id="repo-files">Loading symbiote files...</div>
        </div>
        <div id="architect-terminal">
            <div id="architect-output"></div>
            <div id="architect-input-dock">
                <span style="color:var(--bio)">λ</span>
                <input type="text" id="architect-cmd" placeholder="Execute directive..." autocomplete="off">
            </div>
        </div>
    </div>

    <div id="password-overlay">
        <div style="background:#000; padding:30px; border:1px solid var(--accent); text-align:center;">
            <p style="margin-bottom:15px; letter-spacing:2px;">SECURE CHANNEL REQUIRED</p>
            <input type="password" id="pass-input" placeholder="ACCESS_KEY" style="background:#111; color:#fff; border:1px solid var(--bio); padding:10px; text-align:center;">
            <button id="auth-submit" style="display:block; width:100%; margin-top:10px; padding:10px; background:var(--accent); border:none; cursor:pointer; font-weight:bold;">DECRYPT</button>
        </div>
    </div>

    <div id="architect-icon">
        <svg viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
    </div>

    <script>
        // --- MATRIX ENGINE ---
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        let width, height, columns;
        const fontSize = 16;
        let drops = [];

        function initMatrix() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            columns = Math.floor(width / fontSize);
            drops = new Array(columns).fill(1);
        }

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);
            ctx.fillStyle = '#0f0';
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = String.fromCharCode(0x30A0 + Math.random() * 96);
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        window.addEventListener('resize', initMatrix);
        initMatrix();
        setInterval(drawMatrix, 35);

        // --- UI LOGIC ---
        const guestOut = document.getElementById('guest-output');
        const archOut = document.getElementById('architect-output');
        const passOverlay = document.getElementById('password-overlay');
        const archLayer = document.getElementById('architect-layer');
        const guestLayer = document.getElementById('guest-layer');

        // Idea Generator
        document.getElementById('guest-send-btn').onclick = () => {
            const url = document.getElementById('guest-cmd').value;
            if(!url) return;
            guestOut.innerHTML += `\n> Scoping target: ${url}...`;
            setTimeout(() => {
                guestOut.innerHTML += `\n<span class="midas">[SYMBIO-ADVICE]: Integration of SVG-based noise textures on background layers detected. Recommend shifting to 8-bit alpha channel for smoother rendering.</span>`;
                guestOut.scrollTop = guestOut.scrollHeight;
            }, 1200);
        };

        // Access Control
        document.getElementById('architect-icon').onclick = () => {
            passOverlay.style.display = 'flex';
        };

        document.getElementById('auth-submit').onclick = () => {
            const val = document.getElementById('pass-input').value;
            if(val === "1337") { // Set your key here
                passOverlay.style.display = 'none';
                guestLayer.style.display = 'none';
                archLayer.style.display = 'flex';
                initArchitectMode();
            } else {
                alert("VOID: CREDENTIALS REJECTED");
            }
        };

        async function initArchitectMode() {
            archOut.innerHTML = "> Session Started. Initializing Artemis Core...\n> Fetching Repository Data...";
            try {
                const res = await fetch('https://api.github.com/repos/highland88999-commits/Architect-Artemis/contents');
                const files = await res.json();
                const container = document.getElementById('repo-files');
                container.innerHTML = '';
                files.forEach(f => {
                    const item = document.createElement('div');
                    item.className = 'file-item';
                    item.innerHTML = `λ ${f.name}`;
                    container.appendChild(item);
                });
                archOut.innerHTML += "\n> Repository synchronized. All systems connected.";
            } catch(e) {
                archOut.innerHTML += "\n> ERROR: Failed to sync repository.";
            }
        }

        // Terminal Emulation
        document.getElementById('architect-cmd').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                const cmd = e.target.value;
                archOut.innerHTML += `\n<span style="color:var(--accent)">Guest@Artemis:~$</span> ${cmd}`;
                archOut.innerHTML += `\n> Directive received. Processing "${cmd}"...`;
                e.target.value = '';
                archOut.scrollTop = archOut.scrollHeight;
            }
        });
    </script>
</body>
</html>
