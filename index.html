<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Architect Artemis | Symbiote</title>
    <style>
        :root {
            --bio: #00f2ff;
            --deep-bio: #00aaff;
            --accent: #d4af37;
            --purple-glow: #9b4dff;
            --err: #ff4d4d;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(155, 77, 255, 0.4);
            --bg: #030303;
            --matrix-green: #0f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%; height: 100%; overflow: hidden; background: var(--bg);
            font-family: 'Consolas', 'Courier New', monospace; color: var(--bio);
            touch-action: manipulation;
        }

        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* Guest Mode - Matrix Rain Landing + Idea Request + Icons */
        #guest-layer {
            position: absolute; inset: 0; z-index: 10;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(155,77,255,0.15));
        }

        #guest-terminal {
            width: 90vw; max-width: 700px; background: rgba(10, 0, 30, 0.85);
            border: 2px solid var(--purple-glow); border-radius: 12px;
            padding: 25px; box-shadow: 0 0 40px rgba(155, 77, 255, 0.6), inset 0 0 20px rgba(155, 77, 255, 0.2);
            backdrop-filter: blur(12px); pointer-events: all; display: none;
        }

        #guest-output {
            min-height: 120px; max-height: 50vh; overflow-y: auto; margin-bottom: 15px;
            padding: 15px; background: rgba(0,0,0,0.6); border-radius: 8px;
            white-space: pre-wrap; word-break: break-all; font-size: 1.05em;
            transition: all 0.6s ease; transform-origin: top;
        }

        #guest-output.expanded { max-height: 80vh; transform: scale(1.02); }

        #guest-input-area { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        #guest-prompt { font-size: 1.3em; color: var(--accent); text-shadow: 0 0 10px var(--accent); }
        #guest-cmd {
            background: transparent; border: none; border-bottom: 2px solid var(--bio);
            color: #fff; font-size: 1.2em; outline: none; padding: 10px 0; flex: 1;
        }

        #guest-send-btn {
            background: rgba(155, 77, 255, 0.3); border: 1px solid var(--purple-glow);
            color: var(--accent); padding: 10px 20px; border-radius: 8px; cursor: pointer;
            font-weight: bold; transition: all 0.3s;
        }
        #guest-send-btn:hover { background: rgba(155, 77, 255, 0.6); box-shadow: 0 0 20px var(--purple-glow); }

        /* Social Icons Grid */
        #social-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
            gap: 15px;
            margin-top: 20px;
            max-width: 90vw;
        }

        .social-icon {
            width: 60px; height: 60px; background: rgba(155, 77, 255, 0.15);
            border: 1px solid var(--purple-glow); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(155, 77, 255, 0.3);
        }

        .social-icon:hover {
            transform: scale(1.15);
            box-shadow: 0 0 30px var(--purple-glow);
        }

        .social-icon svg {
            width: 32px; height: 32px; fill: var(--accent);
        }

        /* Architect Mode - Protected Console */
        #architect-layer {
            position: absolute; inset: 0; z-index: 20; display: none;
            background: linear-gradient(to bottom, rgba(0, 10, 20, 0.9), rgba(0, 170, 255, 0.15));
        }

        #architect-chassis { flex: 1; display: flex; overflow: hidden; }
        #architect-sidebar {
            width: 260px; background: rgba(0, 0, 0, 0.85); border-right: 1px solid var(--deep-bio);
            padding: 20px; overflow-y: auto; display: none;
        }
        #architect-sidebar.active { display: block; }

        #architect-terminal { flex: 1; display: flex; flex-direction: column; }
        #architect-output { flex: 1; overflow-y: auto; padding: 20px; background: rgba(0,0,0,0.5); }

        .log { margin: 8px 0; line-height: 1.5; }
        .sys { color: var(--bio); font-weight: bold; }
        .res { color: #50fa7b; font-style: italic; }
        .midas { color: var(--accent); border-left: 3px solid var(--accent); padding-left: 12px; }

        #architect-input-dock {
            padding: 15px; background: #000; border-top: 1px solid var(--deep-bio);
            display: flex; align-items: center; gap: 10px;
        }
        #architect-cmd {
            flex: 1; background: rgba(10, 20, 30, 0.8); border: 1px solid var(--deep-bio);
            color: var(--bio); font-size: 1.1em; outline: none; padding: 12px; border-radius: 6px;
        }

        /* Common Glass Overlay with Bloom/Neon */
        .glass-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.4);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: 12px;
            box-shadow: 0 0 40px rgba(155, 77, 255, 0.5), inset 0 0 20px rgba(155, 77, 255, 0.2);
            pointer-events: none; display: none;
        }

        .glow-border { box-shadow: 0 0 25px var(--purple-glow), inset 0 0 15px var(--purple-glow); }

        /* Lightning Bolt Icon (bottom-right) */
        #architect-icon {
            position: fixed; bottom: 20px; right: 20px; z-index: 30;
            width: 60px; height: 60px; background: rgba(0, 242, 255, 0.15);
            border: 2px solid var(--deep-bio); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 0 20px var(--deep-bio);
            animation: pulse-glow 3s infinite;
        }

        #architect-icon:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px var(--deep-bio);
        }

        #architect-icon svg {
            width: 32px; height: 32px; fill: var(--accent);
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px var(--deep-bio); }
            50% { box-shadow: 0 0 40px var(--deep-bio); }
        }

        /* Prettier File Display */
        .file-item {
            padding: 10px; cursor: pointer; border-radius: 4px; transition: all 0.3s;
            background: rgba(0,0,0,0.3); margin: 5px 0;
        }
        .file-item:hover {
            background: rgba(0,242,255,0.1); box-shadow: 0 0 10px var(--bio);
        }
    </style>
</head>
