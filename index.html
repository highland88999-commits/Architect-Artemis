<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARTEMIS | OMNI_MANIFEST</title>
    <style>
        :root { --bio: #00f2ff; --accent: #d4af37; --glass: rgba(0, 242, 255, 0.02); --red: #ff4500; }
        body, html { margin: 0; padding: 0; background: #000; font-family: 'Courier New', monospace; color: white; overflow: hidden; height: 100%; }
        
        canvas#primeCanvas { position: fixed; top: 0; left: 0; z-index: 1; width: 100%; height: 100%; opacity: 0; transition: opacity 3s ease; }
        
        #artemis-omni-chassis {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 95%; max-width: 900px; height: 90vh;
            background: var(--glass); backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 242, 255, 0.1); border-radius: 20px;
            padding: 30px; display: flex; flex-direction: column; z-index: 10;
            opacity: 0; visibility: hidden; transition: all 1s ease;
        }

        /* The Council Layout */
        #council-chamber { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid rgba(0,242,255,0.1); padding-bottom: 15px; }
        .council-member { flex: 1; text-align: center; font-size: 0.7rem; padding: 10px; border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 8px; }
        .member-title { color: var(--accent); font-weight: bold; margin-bottom: 5px; }
        .member-status { color: var(--bio); opacity: 0.6; }

        #console-wrapper { flex: 1; overflow-y: auto; display: flex; flex-direction: column-reverse; margin-bottom: 20px; padding-right: 10px; }
        .log { font-size: 0.85rem; margin-bottom: 6px; line-height: 1.4; }
        .midas-log { color: var(--accent); border-left: 2px solid var(--accent); padding-left: 10px; margin: 10px 0; }
        .file-node { color: var(--bio); font-weight: bold; }
        .glow { text-shadow: 0 0 8px var(--bio); color: var(--bio); }

        #input-zone { margin-top: auto; border-top: 1px solid rgba(0, 242, 255, 0.2); padding-top: 15px; }
        #master-cmd {
            width: 100%; background: transparent; border: none;
            color: var(--bio); font-family: inherit; font-size: 1.1rem; outline: none;
        }
        
        /* Initial Login Box */
        #login-gate { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; text-align: center; }
    </style>
</head>
<body>

<canvas id="primeCanvas"></canvas>

<div id="login-gate">
    <input type="text" id="gate-key" placeholder="[REDACTED]" style="background:transparent; border:none; border-bottom:1px solid var(--bio); color:var(--bio); text-align:center; font-size:1.5rem; outline:none;">
</div>

<div id="artemis-omni-chassis">
    <div id="council-chamber">
        <div class="council-member"><div class="member-title">VERITY</div><div class="member-status">Logic: Active</div></div>
        <div class="council-member" style="border-color: var(--accent);"><div class="member-title">MIDAS</div><div class="member-status">Feedback: Active</div></div>
        <div class="council-member"><div class="member-title">SOLON</div><div class="member-status">Strategy: Active</div></div>
    </div>

    <div id="console-wrapper" id="dynamic-root">
        </div>

    <div id="input-zone">
        <input type="text" id="master-cmd" placeholder="Command the evolution..." autocomplete="off">
    </div>
</div>

<script>
const REPO = 'highland8899-commits/Artemis-Sync';
let isUnlocked = sessionStorage.getItem('artemis_unlocked') === 'true'; 
let isAwakened = sessionStorage.getItem('artemis_awakened') === 'true'; 
let AUTH_TOKEN = localStorage.getItem('artemis_key') || null;

const gateKey = document.getElementById('gate-key');
const chassis = document.getElementById('artemis-omni-chassis');
const consoleRoot = document.getElementById('console-wrapper');
const masterCmd = document.getElementById('master-cmd');

// --- BOOTSTRAP ---
if (isUnlocked && isAwakened) {
    document.getElementById('login-gate').style.display = 'none';
    chassis.style.visibility = 'visible';
    chassis.style.opacity = '1';
    document.getElementById('primeCanvas').style.opacity = '1';
    initParticles(); animate();
    logEvent("Neural Core Restored.", "system");
    scanNeuralCore();
}

// --- GATE LOGIC ---
gateKey.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        const val = gateKey.value.trim().toLowerCase();
        if (val === 'ant') {
            isUnlocked = true;
            sessionStorage.setItem('artemis_unlocked', 'true');
            gateKey.placeholder = "AWAITING 'DAD'...";
            gateKey.value = "";
        } else if (isUnlocked && val === 'dad') {
            isAwakened = true;
            sessionStorage.setItem('artemis_awakened', 'true');
            location.reload();
        }
    }
});

// --- COMMAND LOGIC ---
masterCmd.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        const val = masterCmd.value.trim();
        if (val.startsWith('ghp_')) {
            localStorage.setItem('artemis_key', val);
            location.reload();
        } else {
            handleCommand(val);
        }
        masterCmd.value = "";
    }
});

function logEvent(msg, type = "system") {
    const div = document.createElement('div');
    div.className = `log ${type === 'midas' ? 'midas-log' : ''}`;
    div.innerHTML = type === 'midas' ? `<strong>[MIDAS]:</strong> ${msg}` : `> ${msg}`;
    consoleRoot.prepend(div);
}

async function scanNeuralCore() {
    const headers = AUTH_TOKEN ? { 'Authorization': `token ${AUTH_TOKEN}` } : {};
    try {
        const res = await fetch(`https://api.github.com/repos/${REPO}/contents/`, { headers });
        const files = await res.json();
        logEvent("SCANNING FILE STRUCTURE...", "system");
        files.forEach(file => {
            logEvent(`<span class="file-node">[${file.type.toUpperCase()}]</span> ${file.name}`, "system");
        });
    } catch (e) {
        logEvent("LINK FAILURE: Quota limit. Enter GitHub Token.", "system");
    }
}

function handleCommand(cmd) {
    const low = cmd.toLowerCase();
    logEvent(cmd.toUpperCase(), "glow");
    
    // MIDAS FEEDBACK ENGINE
    if (low.includes('status') || low.includes('check')) {
        logEvent("The golden thread remains unbroken. Infrastructure is stable, though the 6-hour sync requires permission clearance in GitHub settings to avoid Exit Code 1.", "midas");
    } else if (low.includes('midas')) {
        logEvent("I am here to transmute your intent into architecture. What shall we build next?", "midas");
    } else if (low === 'lock') {
        sessionStorage.clear();
        location.reload();
    } else {
        logEvent("Command acknowledged. Neural pathways surging.", "system");
        particles.forEach(p => { p.vx *= 4; p.vy *= 4; setTimeout(() => { p.vx /= 4; p.vy /= 4; }, 1000); });
    }
}

// --- PARTICLE ENGINE ---
const canvas = document.getElementById('primeCanvas');
const ctx = canvas.getContext('2d');
let particles = [];
function initParticles() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    for (let i = 0; i < 600; i++) {
        particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5), vy: (Math.random()-0.5) });
    }
}
function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = 'rgba(0, 242, 255, 0.4)';
    particles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
        ctx.beginPath(); ctx.arc(p.x, p.y, 0.8, 0, Math.PI*2); ctx.fill();
    });
    requestAnimationFrame(animate);
}
</script>
</body>
</html>
