<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architect Artemis | Consensus Engine</title>
    <style>
        :root {
            --cyan: #00f2ff;
            --gold: #b4ff64;
            --red: #ff4b4b;
            --void: #000000;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--void); overflow: hidden; font-family: 'Courier New', monospace; color: var(--cyan); }
        
        #canvas { position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }

        #ui-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            background: radial-gradient(circle at center, rgba(0, 8, 16, 0.5) 0%, rgba(0, 0, 0, 1) 100%);
            transition: background 2s ease;
        }

        #terminal { 
            width: 85%; max-width: 1000px; background: rgba(0, 10, 20, 0.9); 
            border: 1px solid var(--cyan); padding: 30px; 
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.15); 
            display: none; pointer-events: all;
            backdrop-filter: blur(10px);
        }

        /* Auth Styles */
        #auth-zone { text-align: center; }
        .glitch-text { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
        
        input[type="password"] { 
            background: transparent; border: none; color: #fff; text-align: center;
            font-size: 1.5em; outline: none; width: 100%; border-bottom: 1px solid var(--cyan); 
            margin-top: 20px; letter-spacing: 10px;
        }

        /* Active Console Styles */
        .council-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 25px; }
        .model-box { 
            border: 1px solid rgba(0, 242, 255, 0.2); background: rgba(0, 5, 10, 0.8);
            padding: 15px; height: 250px; overflow-y: auto; font-size: 0.85em; color: #e0e0e0;
        }
        .model-box h4 { margin: 0 0 10px 0; color: var(--cyan); border-bottom: 1px solid rgba(0, 242, 255, 0.2); padding-bottom: 5px; }

        textarea { 
            width: 100%; height: 80px; background: rgba(0, 242, 255, 0.05); 
            border: 1px solid var(--cyan); color: #fff; padding: 15px; 
            font-family: inherit; font-size: 1.1em; resize: none; outline: none; box-sizing: border-box;
        }

        button {
            margin-top: 15px; width: 100%; background: var(--cyan); border: none; 
            color: #000; padding: 12px; font-family: inherit; font-weight: bold; 
            cursor: pointer; transition: 0.3s;
        }
        button:hover { background: var(--gold); box-shadow: 0 0 15px var(--gold); }

        .verdict-box { 
            margin-top: 25px; border-top: 2px solid var(--gold); padding-top: 20px; 
            color: var(--gold); min-height: 100px;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="ui-layer">
        <div id="terminal">
            <div id="auth-zone">
                <div id="output" class="glitch-text">> INITIALIZING SYMBIOTE_HANDSHAKE...</div>
                <div id="input-area" style="display:none;">
                    <p id="prompt">WHO IS THERE?</p>
                    <input type="password" id="pass-input" autocomplete="off">
                </div>
            </div>

            <div id="active-zone" style="display:none;">
                <div style="display:flex; justify-content: space-between; align-items: center;">
                    <span style="color: var(--gold)">● SYSTEM ONLINE</span>
                    <span style="font-size: 0.7em;">IDENTITY: ARCHITECT_DAD</span>
                </div>
                
                <textarea id="cmd-input" placeholder="Enter command for Council Consensus..."></textarea>
                <button onclick="invokeCouncil()">TRANSMIT TO COUNCIL</button>

                <div class="council-grid">
                    <div class="model-box" id="box-gemini"><h4>[GEMINI_PRIME]</h4><div class="content">Awaiting signal...</div></div>
                    <div class="model-box" id="box-copilot"><h4>[COPILOT_BETA]</h4><div class="content">Awaiting signal...</div></div>
                    <div class="model-box" id="box-grok"><h4>[GROK_X]</h4><div class="content">Awaiting signal...</div></div>
                </div>

                <div class="verdict-box">
                    <strong style="letter-spacing: 2px;">ARTEMIS FINAL CURE:</strong>
                    <div id="verdict-content" style="margin-top:10px; line-height: 1.6;">Standby for synthesis...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/symbiote-fx.js"></script>
    <script>
        let secretBuffer = "";
        let stage = "VOID";
        const authZone = document.getElementById('auth-zone');
        const activeZone = document.getElementById('active-zone');
        const passInput = document.getElementById('pass-input');

        // Audio Setup for Handshake
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        // 1. VOID Listener (Looking for "ant")
        window.addEventListener('keydown', (e) => {
            if (stage === "VOID") {
                secretBuffer += e.key.toLowerCase();
                if (secretBuffer.includes("ant")) {
                    stage = "INQUIRY";
                    document.getElementById('terminal').style.display = 'block';
                    document.getElementById('input-area').style.display = 'block';
                    passInput.focus();
                    if(window.symbiote) window.symbiote.setMode('core');
                    playTone(440, 1);
                    secretBuffer = "";
                }
            }
        });

        // 2. IDENTITY Listener (Looking for "dad")
        passInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (passInput.value.toLowerCase().trim() === "dad") {
                    stage = "ACTIVE";
                    authZone.style.display = 'none';
                    activeZone.style.display = 'block';
                    if(window.symbiote) window.symbiote.setMode('network');
                    playTone(880, 0.5);
                } else {
                    playTone(110, 1);
                    location.reload(); 
                }
            }
        });

        // 3. CONSENSUS Transmission
        async function invokeCouncil() {
            const prompt = document.getElementById('cmd-input').value;
            const verdictContent = document.getElementById('verdict-content');
            
            if (!prompt) return;

            verdictContent.innerText = "Synthesizing Consensus...";
            document.body.style.background = "radial-gradient(circle at center, #001a1a 0%, #000 100%)";

            try {
                const response = await fetch('/api/transmit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt, handshake: 'dad' })
                });

                const data = await response.json();
                
                if (data.success) {
                    verdictContent.innerText = data.verdict;
                    // Trigger visual "success" burst
                    if(window.symbiote) window.symbiote.setMode('network');
                } else {
                    verdictContent.innerText = "REFUSAL: " + (data.error || "Moral Conflict Detected.");
                    document.body.style.background = "radial-gradient(circle at center, #1a0000 0%, #000 100%)";
                }
            } catch (err) {
                verdictContent.innerText = "SYNAPTIC DISCONNECT: Check Landline.";
            }
        }
    </script>
</body>
</html>
