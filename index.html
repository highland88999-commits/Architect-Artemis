<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Project Artemis | Symbiote</title>
    <style>
        :root {
            --bio: #00f2ff;
            --deep-bio: #00aaff;
            --accent: #d4af37;
            --purple-glow: #9b4dff;
            --err: #ff4d4d;
            --glass: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(155, 77, 255, 0.25);
            --bg: #030303;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body, html {
            width:100%; height:100%; overflow:hidden; background:var(--bg);
            font-family:'Consolas','Courier New',monospace; color:var(--bio);
            touch-action:manipulation;
        }

        canvas { position:absolute; top:0; left:0; width:100%; height:100%; z-index:1; opacity:0.35; }

        #logo-bg {
            position:fixed; inset:0; z-index:2; pointer-events:none; opacity:0.15;
            background:url('https://files.catbox.moe/abc123.png') center/cover no-repeat; /* ← your logo URL here */
            animation:logo-breathe 12s infinite ease-in-out;
        }

        @keyframes logo-breathe {
            0%,100% { opacity:0.15; transform:scale(1); }
            50% { opacity:0.25; transform:scale(1.03); }
        }

        /* Guest Terminal (transparent glass) */
        #guest-terminal {
            width:90vw; max-width:720px; height:80vh; max-height:90vh;
            background:var(--glass); border:1px solid var(--glass-border);
            border-radius:16px; backdrop-filter:blur(16px);
            box-shadow:0 8px 32px rgba(0,0,0,0.6);
            position:relative; display:none; flex-direction:column;
            overflow:hidden; transition:all 0.4s ease;
        }

        #guest-terminal.minimized {
            height:60px; transform:scale(0.9) translateY(-90%);
            opacity:0.6; pointer-events:none;
        }

        /* Artemis Response 8-Ball (big 4x4 rem) */
        #artemis-8ball {
            width:16rem; height:16rem; margin:0 auto 20px auto;
            background:#000; border-radius:50%; border:4px solid var(--accent);
            box-shadow:0 0 60px var(--accent), inset 0 0 30px var(--purple-glow);
            display:flex; align-items:center; justify-content:center;
            position:relative; overflow:hidden; cursor:pointer;
            animation:midas-pulse 6s infinite ease-in-out;
        }

        #artemis-8ball::before {
            content:''; position:absolute; inset:0; background:radial-gradient(circle at 30% 30%, rgba(212,175,55,0.2), transparent 60%);
            pointer-events:none;
        }

        #artemis-8ball span {
            color:var(--accent); font-size:8rem; font-weight:bold;
            text-shadow:0 0 20px var(--accent);
            z-index:2;
        }

        @keyframes midas-pulse {
            0%,100% { box-shadow:0 0 40px var(--accent); }
            50% { box-shadow:0 0 80px var(--accent), 0 0 120px var(--purple-glow); }
        }

        /* Prompt Area */
        #prompt-area {
            padding:0 20px 20px; text-align:center;
        }

        #guest-cmd {
            width:100%; max-width:500px; padding:12px 16px;
            background:rgba(0,0,0,0.5); border:1px solid var(--deep-bio);
            color:var(--bio); font-size:1.1rem; border-radius:8px;
            margin-bottom:12px;
        }

        #spin-btn {
            padding:12px 32px; background:var(--accent); color:#000;
            border:none; border-radius:8px; font-weight:bold; cursor:pointer;
            box-shadow:0 0 20px var(--accent);
        }

        /* Collapsible Icon Bar (10 icons) */
        #icon-bar-collapsed {
            position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
            width:60px; height:60px; background:rgba(155,77,255,0.3);
            border-radius:50%; border:2px solid var(--purple-glow);
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; z-index:50; box-shadow:0 0 30px var(--purple-glow);
        }

        #icon-bar-expanded {
            position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
            display:none; flex-wrap:wrap; gap:12px; padding:16px;
            background:rgba(0,0,0,0.7); border:1px solid var(--glass-border);
            border-radius:16px; backdrop-filter:blur(12px);
            max-width:90vw; z-index:50;
        }

        .holo-icon {
            width:60px; height:60px; background:rgba(155,77,255,0.2);
            border-radius:12px; border:1px solid var(--purple-glow);
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; transition:0.3s;
        }
        .holo-icon:hover { transform:scale(1.15); box-shadow:0 0 25px var(--purple-glow); }

        /* Holographic Overlay Window */
        .holo-window {
            position:fixed; inset:10%; background:rgba(0,0,0,0.8);
            border:1px solid var(--purple-glow); border-radius:16px;
            backdrop-filter:blur(20px); box-shadow:0 0 60px rgba(155,77,255,0.5);
            display:none; flex-direction:column; z-index:60;
            overflow:hidden;
        }

        .holo-header {
            padding:12px; background:rgba(155,77,255,0.2);
            display:flex; justify-content:space-between; align-items:center;
        }

        .holo-close {
            width:32px; height:32px; background:var(--err); border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; color:#000; font-weight:bold;
        }

        .holo-iframe {
            flex:1; border:none;
        }

        /* Lightning Bolt (Owner Access) */
        #lightning-access {
            position:fixed; bottom:20px; right:20px; z-index:70;
            width:60px; height:60px; background:rgba(212,175,55,0.15);
            border:2px solid var(--accent); border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; box-shadow:0 0 30px var(--accent);
            animation:pulse-glow 3s infinite;
        }

        @keyframes pulse-glow {
            0%,100% { box-shadow:0 0 20px var(--accent); }
            50% { box-shadow:0 0 50px var(--accent); }
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>
    <div id="logo-bg"></div>

    <div id="guest-layer">
        <div id="guest-terminal">
            <!-- Artemis 8-Ball Response Display -->
            <div id="artemis-8ball">
                <span>8</span>
            </div>

            <div id="prompt-area">
                <input type="text" id="guest-cmd" placeholder="https://example.com" autocomplete="off">
                <button id="spin-btn">SPIN</button>
            </div>

            <!-- Collapsible Icon Bar -->
            <div id="icon-bar-collapsed" onclick="toggleIconBar()">+</div>
            <div id="icon-bar-expanded">
                <!-- Your 10 icons - replace href with real URLs -->
                <div class="holo-icon" onclick="openHoloWindow('https://olympus-lac.vercel.app')"><svg>...</svg></div>
                <div class="holo-icon" onclick="openHoloWindow('https://nexusvortex.netlify.app')"><svg>...</svg></div>
                <!-- Add remaining 8 icons here -->
                <div class="holo-close" onclick="toggleIconBar()">×</div>
            </div>
        </div>
    </div>

    <!-- Holographic Overlay Window -->
    <div id="holo-window" class="holo-window">
        <div class="holo-header">
            <span>Artemis Holo View</span>
            <div class="holo-close" onclick="closeHoloWindow()">×</div>
        </div>
        <iframe id="holo-iframe" class="holo-iframe"></iframe>
    </div>

    <!-- Lightning Bolt - Owner Access -->
    <div id="lightning-access" onclick="requestArchitectAccess()">
        <svg viewBox="0 0 24 24" width="32" height="32" fill="var(--accent)">
            <path d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
    </div>

    <script>
        // Purple Rain Matrix
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        let width, height, columns, drops;
        function initMatrix() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            columns = Math.floor(width / 16);
            drops = new Array(columns).fill(1);
        }
        function drawMatrix() {
            ctx.fillStyle = 'rgba(0,0,0,0.05)';
            ctx.fillRect(0,0,width,height);
            ctx.fillStyle = '#9b4dff';
            ctx.font = '16px monospace';
            for (let i = 0; i < drops.length; i++) {
                ctx.fillText(String.fromCharCode(0x30A0 + Math.random()*96), i*16, drops[i]*16);
                if (drops[i]*16 > height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        window.addEventListener('resize', initMatrix);
        initMatrix(); setInterval(drawMatrix, 35);

        // Icon Bar Collapse/Expand
        function toggleIconBar() {
            const collapsed = document.getElementById('icon-bar-collapsed');
            const expanded = document.getElementById('icon-bar-expanded');
            collapsed.style.display = expanded.style.display === 'flex' ? 'flex' : 'none';
            expanded.style.display = expanded.style.display === 'flex' ? 'none' : 'flex';
        }

        // Open Holographic Window
        function openHoloWindow(url) {
            const win = document.getElementById('holo-window');
            const iframe = document.getElementById('holo-iframe');
            iframe.src = url;
            win.style.display = 'flex';
        }

        function closeHoloWindow() {
            document.getElementById('holo-window').style.display = 'none';
        }

        // Lightning Bolt Access (no password visible)
        function requestArchitectAccess() {
            const pass1 = prompt("First Key");
            const pass2 = prompt("Second Key");
            if (pass1 === "Spider" && pass2 === "Miles") {
                // Load architect mode (your existing logic)
                document.getElementById('architect-layer').style.display = 'flex';
                document.getElementById('guest-layer').style.display = 'none';
            } else {
                alert("Access Denied");
            }
        }

        // 8-Ball Midas Loop & Click Response
        const ball = document.getElementById('artemis-8ball');
        const midasFortunes = [
            "Midas awakens: Gold flows your way.",
            "Golden pivot: 10x awaits.",
            "Wait for Midas candle: Riches align.",
            "Code is Midas lever: Unlock now.",
            "Architect reveals: True gold keys."
        ];
        let index = 0;

        ball.addEventListener('click', () => {
            const f = midasFortunes[index];
            ball.innerHTML = `<span style="font-size:3rem; color:var(--accent); animation:glow 2s infinite">${f}</span>`;
            setTimeout(() => {
                ball.innerHTML = '<span>8</span>';
            }, 5000); // Show fortune for 5s, then back to 8
            index = (index + 1) % midasFortunes.length;
        });

        // Initial show
        setTimeout(() => {
            document.getElementById('guest-terminal').style.display = 'flex';
        }, 2000);
    </script>
</body>
</html>
