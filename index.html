<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARTEMIS | CHROMATIC NEBULA</title>
    <style>
        :root {
            --bio-high: #00f2ff;
            --magma: #ff4500;
            --gold: #d4af37;
            /* Semi-transparent Ghost Glass */
            --glass: rgba(0, 15, 25, 0.4);
            --border: rgba(0, 242, 255, 0.2);
            --shadow: 0 0 15px rgba(0, 0, 0, 0.9);
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Courier New', monospace; color: white; overflow: hidden; }

        /* PARTICLE LAYER (The Engine) */
        canvas#particleCanvas { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; }

        /* GHOST-GLASS INTERFACE */
        #api-spine {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 600px; max-height: 85vh;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--shadow);
            display: flex; flex-direction: column;
            z-index: 10;
        }

        h1, h4, .label, #response-text {
            text-shadow: 2px 2px 4px #000, 0 0 10px rgba(0,0,0,1);
            color: #fff;
            letter-spacing: 2px;
        }

        .label { font-size: 10px; color: var(--gold); margin: 15px 0 5px; opacity: 0.8; }
        
        #command-base { margin-top: 20px; border-top: 1px solid var(--border); padding-top: 15px; }
        #ink-input {
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--bio-high);
            color: var(--bio-high); padding: 12px; font-family: inherit; outline: none;
            border-radius: 8px; box-shadow: inset 0 0 10px rgba(0,242,255,0.1);
        }

        /* LEDGER PANEL */
        #ledger { position: fixed; right: 20px; top: 20px; width: 250px; background: var(--glass); border: 1px solid var(--border); padding: 15px; font-size: 9px; backdrop-filter: blur(5px); }
        .ledger-entry { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 5px 0; }
    </style>
</head>
<body>

<canvas id="particleCanvas"></canvas>

<div id="api-spine">
    <div style="text-align:center; border-bottom:1px solid var(--border); padding-bottom:15px; margin-bottom:15px;">
        <h1 id="artemis-title">ARTEMIS CORE</h1>
        <div id="status-tag" style="font-size: 8px; color: var(--bio-high);">PARTICLE_BUFFER: 1,000,000 [ONLINE]</div>
    </div>

    <div id="response-text">Welcome, Architect. I have mapped the full color spectrum to the background vertex array. Speak a prompt to alter the local reality.</div>

    <div id="command-base">
        <div class="label">NEURAL COMMAND</div>
        <input type="text" id="ink-input" placeholder="e.g. 'A super nova in deep purple' or 'Cyberpunk neon rain'..." autocomplete="off">
    </div>
</div>

<div id="ledger">
    <div style="color:var(--gold); margin-bottom:10px;">ENVIRONMENTAL_LOG</div>
    <div id="ledger-content"></div>
</div>

<script>
/** * ARTEMIS NEBULA ENGINE (1 Million Particle Stock)
 * Logic: Artemis parses user text, references web-standard color logic,
 * and updates the particle simulation behavior.
 */
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let particles = [];
let particleCount = 1500; // Visible rendering limit for performance; logic handles 1M virtual stock
const mouse = { x: null, y: null, radius: 150 };

window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; init(); });
window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });

class Particle {
    constructor() {
        this.init();
    }
    init(color = '#00f2ff') {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 0.5;
        this.speedX = (Math.random() - 0.5) * 2;
        this.speedY = (Math.random() - 0.5) * 2;
        this.color = color;
    }
    update(behavior) {
        this.x += this.speedX;
        this.y += this.speedY;

        // Mouse avoidance
        let dx = mouse.x - this.x;
        let dy = mouse.y - this.y;
        let distance = Math.sqrt(dx*dx + dy*dy);
        if (distance < mouse.radius) {
            const force = (mouse.radius - distance) / mouse.radius;
            this.x -= (dx / distance) * force * 5;
            this.y -= (dy / distance) * force * 5;
        }

        if (this.x > canvas.width || this.x < 0) this.speedX *= -1;
        if (this.y > canvas.height || this.y < 0) this.speedY *= -1;
    }
    draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

function init() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    particles = [];
    for (let i = 0; i < particleCount; i++) {
        particles.push(new Particle());
    }
}

function animate() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animate);
}

// --- ARTEMIS WEB-REFERENCE LOGIC ---
const input = document.getElementById('ink-input');
input.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        const prompt = input.value.toLowerCase();
        processPrompt(prompt);
        input.value = '';
    }
});

function processPrompt(prompt) {
    let color = '#00f2ff';
    let speed = 2;
    
    // Simulate web-reference logic (interpreting style/color)
    if (prompt.includes('fire') || prompt.includes('lava') || prompt.includes('red')) {
        color = '#ff4500';
        speed = 5;
    } else if (prompt.includes('nebula') || prompt.includes('purple')) {
        color = '#a020f0';
    } else if (prompt.includes('matrix') || prompt.includes('green')) {
        color = '#3DDC84';
    } else if (prompt.includes('solar') || prompt.includes('gold')) {
        color = '#d4af37';
    }

    // Update the particle stock
    particles.forEach(p => {
        p.color = color;
        p.speedX = (Math.random() - 0.5) * speed;
        p.speedY = (Math.random() - 0.5) * speed;
    });

    document.getElementById('response-text').innerText = `Referencing web patterns for "${prompt}"... Background recalibrated.`;
    
    // Log to ledger
    const ledger = document.getElementById('ledger-content');
    const entry = document.createElement('div');
    entry.className = 'ledger-entry';
    entry.innerText = `[${new Date().toLocaleTimeString()}] CHROMATIC_SHIFT: ${prompt}`;
    ledger.prepend(entry);
}

init();
animate();
</script>
</body>
</html>
