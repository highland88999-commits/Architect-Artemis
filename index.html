<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Artemis • Symbiote</title>
  <style>
    :root {
      --cyan: #00f2ff;
      --gold: #d4af37;
      --glass-bg: rgba(8, 8, 25, 0.6);
      --glass-border: rgba(0, 242, 255, 0.4);
      --glow-cyan: 0 0 30px rgba(0, 242, 255, 0.6);
      --glow-gold: 0 0 40px rgba(212, 175, 55, 0.6);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    
    body, html {
      width:100%; height:100%; overflow:hidden;
      background:#000; font-family: 'Courier New', monospace;
      color:var(--cyan); touch-action:manipulation;
    }

    /* BACKGROUND VIDEO OPTIMIZATION */
    #bg-video {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; z-index: -10;
      opacity: 0.55; pointer-events: none;
      filter: brightness(1.1) contrast(1.2);
      animation: bg-pulse 25s infinite ease-in-out;
      will-change: opacity, transform;
    }

    @keyframes bg-pulse {
      0%, 100% { opacity: 0.45; transform: scale(1.0); }
      50%      { opacity: 0.65; transform: scale(1.05); }
    }

    #main {
      height: 100%; width: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 20px; position: relative; z-index: 10;
    }

    /* 8-BALL REFINEMENT */
    #artemis-8ball {
      width: 18rem; height: 18rem;
      background: radial-gradient(circle at 35% 35%, #00152e, #000);
      border-radius: 50%; border: 6px solid var(--gold);
      box-shadow: var(--glow-cyan), inset 0 0 60px rgba(0,242,255,0.3);
      position: relative; overflow: hidden;
      cursor: pointer; margin-bottom: 5vh;
      transition: transform 0.2s;
    }

    #artemis-8ball:active { transform: scale(0.95); }

    #ball-liquid {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #00008b, #0a001f);
      opacity: 0.9; transform: translateY(100%);
      transition: transform 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    #ball-triangle {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 0; height: 0;
      border-left: 80px solid transparent;
      border-right: 80px solid transparent;
      border-bottom: 140px solid #fff;
      opacity: 0; transition: opacity 1s;
    }

    #ball-fortune {
      position: absolute; top: 55%; left: 50%;
      transform: translate(-50%,-50%);
      color: #000; font-size: 1rem; font-weight: bold;
      text-align: center; width: 110px; opacity: 0;
      transition: opacity 1.5s; pointer-events: none;
    }

    .shaking { animation: shake 0.5s infinite; }
    @keyframes shake {
      0% { transform: translate(2px, 2px) rotate(0deg); }
      25% { transform: translate(-2px, -2px) rotate(1deg); }
      50% { transform: translate(2px, -2px) rotate(-1deg); }
      100% { transform: translate(-2px, 2px) rotate(0deg); }
    }

    .revealing #ball-liquid { transform: translateY(0); }
    .revealing #ball-triangle { opacity: 1; }
    .revealing #ball-fortune { opacity: 1; }

    /* UI ELEMENTS */
    #prompt-area {
      width: 100%; max-width: 500px;
      display: flex; flex-direction: column; gap: 15px;
    }

    #guest-cmd {
      width: 100%; padding: 15px 25px;
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      border-radius: 30px; color: var(--cyan); font-size: 1.1rem;
      backdrop-filter: blur(10px); outline: none;
      box-shadow: inset 0 0 15px rgba(0,242,255,0.1);
    }

    #send-btn {
      padding: 12px; background: var(--cyan); color: #000;
      border: none; border-radius: 30px; font-weight: bold;
      cursor: pointer; box-shadow: 0 0 20px var(--cyan);
      transition: 0.3s;
    }

    /* NAVIGATION */
    #dock-orb {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      width: 60px; height: 60px; background: var(--glass-bg);
      border-radius: 50%; border: 2px solid var(--cyan);
      backdrop-filter: blur(15px); display: flex; align-items: center;
      justify-content: center; font-size: 2rem; cursor: pointer; z-index: 100;
    }

    #dock-expanded {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      display: none; grid-template-columns: repeat(3, 1fr); gap: 15px;
      padding: 20px; background: var(--glass-bg); border-radius: 25px;
      border: 1px solid var(--glass-border); backdrop-filter: blur(20px); z-index: 100;
    }

    .app-icon {
      width: 60px; height: 60px; background: rgba(0,242,255,0.1);
      border-radius: 15px; border: 1px solid var(--cyan);
      display: flex; align-items: center; justify-content: center; cursor: pointer;
    }

    #lightning-orb {
      position: fixed; bottom: 30px; right: 30px;
      width: 60px; height: 60px; background: rgba(212,175,55,0.1);
      border: 2px solid var(--gold); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; box-shadow: var(--glow-gold); z-index: 100;
    }

    #holo-overlay {
      display:none; position:fixed; inset:2%; background:var(--glass-bg);
      border:1px solid var(--cyan); border-radius:20px; backdrop-filter:blur(20px);
      z-index:200; flex-direction:column; overflow: hidden;
    }
  </style>
</head>
<body>

  <video id="bg-video" autoplay loop muted playsinline>
    <source src="https://files.catbox.moe/uuixld.mp4" type="video/mp4">
  </video>

  <div id="main">
    <div id="artemis-8ball">
      <div id="ball-liquid"></div>
      <div id="ball-triangle"></div>
      <div id="ball-fortune"></div>
      <span id="ball-number" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:10rem; color:var(--gold); opacity: 0.8;">8</span>
    </div>

    <div id="prompt-area">
      <input type="text" id="guest-cmd" placeholder="Speak to Artemis..." autocomplete="off"/>
      <button id="send-btn">TRANSMIT</button>
    </div>
  </div>

  <div id="dock-orb" onclick="toggleDock()">+</div>

  <div id="dock-expanded">
    <div class="app-icon" onclick="openHolo('https://x.com')">𝕏</div>
    <div class="app-icon" onclick="openHolo('https://nexusvortex.netlify.app/')">🌀</div>
    <div class="app-icon" onclick="openHolo('https://olympus-lac.vercel.app/')">🏛️</div>
    <div class="app-icon" onclick="toggleDock()" style="color:red">×</div>
  </div>

  <div id="lightning-orb" onclick="requestArchitectAccess()">⚡</div>

  <div id="holo-overlay">
    <div style="padding:15px; background:rgba(0,242,255,0.1); display:flex; justify-content:space-between; align-items:center;">
      <span>ARTEMIS_LINK</span>
      <button onclick="closeHolo()" style="background:red; color:white; border:none; padding:5px 15px; border-radius:5px; cursor:pointer;">CLOSE</button>
    </div>
    <iframe id="holo-iframe" style="flex:1; border:none; background: #fff;"></iframe>
  </div>

  <script>
    const ball = document.getElementById('artemis-8ball');
    const ballNum = document.getElementById('ball-number');
    const fortunes = [
      "MIDAS TOUCH DETECTED",
      "10x GROWTH IMMINENT",
      "ALIGNING WITH ARCHITECT",
      "GOLDEN RATIO ACHIEVED",
      "ACCESSING THE VORTEX"
    ];

    function toggleDock() {
      const dock = document.getElementById('dock-expanded');
      dock.style.display = (dock.style.display === 'grid') ? 'none' : 'grid';
    }

    function openHolo(url) {
      document.getElementById('holo-iframe').src = url;
      document.getElementById('holo-overlay').style.display = 'flex';
      toggleDock();
    }

    function closeHolo() {
      document.getElementById('holo-overlay').style.display = 'none';
      document.getElementById('holo-iframe').src = '';
    }

    function shakeAndReveal() {
      if (ball.classList.contains('revealing')) return;
      
      ball.classList.add('shaking');
      ballNum.style.opacity = '0';
      
      setTimeout(() => {
        ball.classList.remove('shaking');
        ball.classList.add('revealing');
        document.getElementById('ball-fortune').textContent = fortunes[Math.floor(Math.random() * fortunes.length)];
      }, 1000);

      setTimeout(() => {
        ball.classList.remove('revealing');
        ballNum.style.opacity = '0.8';
      }, 6000);
    }

    ball.addEventListener('click', shakeAndReveal);

    document.getElementById('send-btn').addEventListener('click', () => {
      const cmd = document.getElementById('guest-cmd');
      if (cmd.value.trim()) {
        shakeAndReveal();
        cmd.value = '';
      }
    });

    function requestArchitectAccess() {
      const k1 = prompt("First Key");
      const k2 = prompt("Second Key");
      if (k1 === "Spider" && k2 === "Miles") {
        alert("ACCESS GRANTED");
      } else {
        alert("DENIED");
      }
    }
  </script>
</body>
</html>
