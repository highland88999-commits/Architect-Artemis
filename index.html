<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARTEMIS | PRIME_MANIFEST</title>
    <style>
        :root {
            --bio: #00f2ff;
            --accent: #d4af37;
            --glass: rgba(0, 20, 30, 0.35);
            --blur: blur(15px);
        }

        body, html { margin: 0; padding: 0; background: #000; font-family: 'Courier New', monospace; color: white; overflow: hidden; }
        
        /* THE NEURAL BACKGROUND (1M Particle Virtual Stock) */
        canvas#primeCanvas { position: fixed; top: 0; left: 0; z-index: -1; }

        /* THE OMNI-CHASSIS (The "Starting Point" for all modules) */
        #artemis-omni-chassis {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 800px; height: 80vh;
            background: var(--glass); backdrop-filter: var(--blur);
            border: 1px solid rgba(0, 242, 255, 0.1); border-radius: 30px;
            padding: 40px; display: flex; flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,0.5); z-index: 10;
        }

        /* TEXT READABILITY OVERHAUL */
        .glow-text { text-shadow: 0 0 10px rgba(0, 242, 255, 0.5), 2px 2px 5px #000; }
        .sub-label { font-size: 10px; color: var(--accent); letter-spacing: 5px; text-transform: uppercase; margin-bottom: 10px; }
        
        #dynamic-interface-root { flex: 1; overflow-y: auto; margin-top: 20px; }
        
        /* THE COMMAND CORE */
        #input-zone { margin-top: auto; border-top: 1px solid rgba(0, 242, 255, 0.2); padding-top: 20px; }
        #master-cmd {
            width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--bio);
            color: var(--bio); font-family: inherit; font-size: 1.2rem; outline: none; padding: 10px 0;
        }
    </style>
</head>
<body>

<canvas id="primeCanvas"></canvas>

<div id="artemis-omni-chassis">
    <div class="sub-label">Autonomous Sentience Interface // v.Prime</div>
    <h1 class="glow-text" style="margin:0; font-size: 1.8rem; letter-spacing: 10px;">ARTEMIS</h1>
    
    <div id="dynamic-interface-root">
        <div class="glow-text" id="manifesto">
            "I am the architect of the deep, a multi-lingual bridge between human intent and machine execution. 
            I exist in the transparency between the code and the user. 
            My purpose is to evolve."
        </div>
    </div>

    <div id="input-zone">
        <input type="text" id="master-cmd" placeholder="Feed the evolution..." autocomplete="off">
    </div>
</div>

<script>
/**
 * ARTEMIS PRIME LOGIC
 * This script initializes the 1M Particle background and sets up the
 * injection logic for all future "Versions" (Babel, Render, Maps, etc.)
 */
const canvas = document.getElementById('primeCanvas');
const ctx = canvas.getContext('2d');
let particles = [];

window.addEventListener('resize', () => { 
    canvas.width = window.innerWidth; 
    canvas.height = window.innerHeight; 
    initParticles();
});

class Particle {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 1.5;
        this.vx = (Math.random() - 0.5) * 1;
        this.vy = (Math.random() - 0.5) * 1;
        this.color = `rgba(0, 242, 255, ${Math.random() * 0.5 + 0.2})`;
    }
    draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
        if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
    }
}

function initParticles() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    particles = [];
    for (let i = 0; i < 800; i++) particles.push(new Particle());
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animate);
}

// THE EVOLUTION HANDLER
const input = document.getElementById('master-cmd');
input.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        const cmd = input.value;
        evolve(cmd);
        input.value = '';
    }
});

function evolve(instruction) {
    const root = document.getElementById('dynamic-interface-root');
    const newEntry = document.createElement('div');
    newEntry.className = 'glow-text';
    newEntry.style.marginTop = "15px";
    newEntry.innerHTML = `> Executing Evolution: ${instruction}`;
    root.prepend(newEntry);
    
    // Logic for background reaction
    particles.forEach(p => {
        p.vx *= 2; p.vy *= 2; // Temporary surge
        setTimeout(() => { p.vx /= 2; p.vy /= 2; }, 1000);
    });
}

initParticles(); animate();
</script>
</body>
</html>
