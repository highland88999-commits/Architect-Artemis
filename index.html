<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Artemis • Olympus Portal</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>

  <style>
    :root {
      --cyan: #00f2ff; --gold: #d4af37; --red: #ff3366;
      --active-color: var(--cyan);
      --glass: rgba(8, 8, 25, 0.75); 
      --border: rgba(0, 242, 255, 0.3);
      --bloom: 0 0 15px var(--active-color), 0 0 30px var(--active-color);
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    body, html { 
      width:100%; height:100%; overflow:hidden; 
      background:#000; font-family: 'Courier New', monospace; 
      color:var(--active-color); 
    }

    .video-container { position: fixed; inset: 0; z-index: 0; opacity: 0.35; pointer-events: none; }
    #bg-video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6); }

    #container { 
      position: relative; z-index: 10; display: flex; flex-direction: column; 
      align-items: center; justify-content: center; gap: 2.5vh;
      height: 100vh; padding: 20px 20px 120px 20px; 
    }

    #oracle-circle { 
      width: clamp(180px, 30vh, 280px); height: clamp(180px, 30vh, 280px); 
      border-radius: 50%; border: 3px solid var(--active-color);
      box-shadow: var(--bloom), inset 0 0 40px var(--active-color);
      position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.5);
    }
    
    #oracle-video { width: 105%; height: 105%; object-fit: cover; mix-blend-mode: screen; }

    #council-status { 
      font-size: 11px; color: var(--active-color); background: rgba(0,0,0,0.85); 
      padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border);
      letter-spacing: 3px; text-transform: uppercase; text-shadow: var(--bloom);
    }

    /* THE MALL PORTAL - MAX FIT FRAME */
    #mall-link-container {
      width: 100%; max-width: 480px; height: 80px; 
      position: relative; overflow: hidden; border-radius: 14px;
      border: 1px solid var(--border); background: rgba(0,0,0,0.98);
      display: flex; align-items: center; justify-content: center;
      text-decoration: none; transition: 0.4s ease;
      box-shadow: inset 0 0 25px rgba(0,0,0,1);
    }
    
    #mall-link-container:hover {
        border-color: var(--active-color);
        transform: scale(1.01);
        box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
    }

    #starfield-canvas { 
      position: absolute; inset: 0; z-index: 1; 
      filter: drop-shadow(0 0 6px var(--active-color)); 
    }

    #response-field { 
      width: 100%; max-width: 480px; max-height: 0; overflow: hidden; 
      background: var(--glass); border: 1px solid var(--border); border-radius: 12px; 
      color: #fff; font-size: 0.95rem; transition: all 0.6s ease; backdrop-filter: blur(20px);
    }
    #response-field.active { max-height: 25vh; padding: 18px; overflow-y: auto; border-color: var(--active-color); }

    #prompt-area { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 12px; }
    .input-wrapper { 
      background: var(--glass); border: 1px solid var(--border); 
      border-radius: 50px; padding: 10px 24px; display: flex; align-items: center;
    }
    #guest-cmd { 
      flex: 1; background: transparent; border: none; color: #fff; 
      outline: none; text-align: center; font-size: 1.1rem; 
    }
    #send-btn { 
      background: var(--active-color); color: #000; border-radius: 50px; 
      padding: 14px; font-weight: 900; border: none; cursor: pointer; 
      letter-spacing: 2px; transition: 0.3s; box-shadow: var(--bloom); 
    }

    .pip { width: 6px; height: 6px; border-radius: 50%; background: var(--active-color); box-shadow: var(--bloom); margin: 0 4px; }
    
    #bottom-dock { 
      position: fixed; bottom: 20px; height: 50px; width: 85%; 
      background: var(--glass); border-radius: 40px; border: 1px solid var(--border); 
      left: 50%; transform: translateX(-50%); z-index: 100; 
      display: flex; align-items: center; justify-content: center;
    }
  </style>
</head>
<body>

<div class="video-container">
  <video id="bg-video" autoplay loop muted playsinline src="https://www.dropbox.com/scl/fi/x93qcdd64hcpedqn2murk/grok_video_2026-02-20-06-12-55.mp4?rlkey=q51etky32dg2gsrx3w3sez1s8&raw=1"></video>
</div>

<div id="container">
  <div id="oracle-circle">
    <video id="oracle-video" autoplay loop muted playsinline src="https://files.catbox.moe/no2e76.mp4"></video>
  </div>

  <div id="council-header">
    <div style="display:flex; justify-content: center; margin-bottom:10px;">
      <div class="pip"></div><div class="pip"></div><div class="pip"></div>
    </div>
    <div id="council-status">[SENSE: NEUTRAL]</div>
  </div>

  <div id="response-field"></div>

  <a href="https://hermes-landing-nu.vercel.app/" id="mall-link-container" target="_blank">
      <canvas id="starfield-canvas"></canvas>
  </a>

  <div id="prompt-area">
    <div class="input-wrapper">
      <input type="text" id="guest-cmd" placeholder="Command Artemis..." autocomplete="off">
    </div>
    <button id="send-btn">TRANSMIT</button>
  </div>
</div>

<div id="bottom-dock">
    <div style="color:var(--active-color); font-size: 9px; letter-spacing: 3px; font-weight: bold;">
      PORTALS CONNECTED // OLYMPUS_ROOT_STAGING
    </div>
</div>

<script>
  // --- THREE.JS NEON PARTICLE ENGINE (MAX-FIT EDITION) ---
  const mallCanvas = document.getElementById('starfield-canvas');
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, 480 / 80, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ canvas: mallCanvas, alpha: true, antialias: true });
  renderer.setSize(480, 80);
  renderer.setPixelRatio(window.devicePixelRatio);

  function getTextPoints(text, width, height) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = width;
    canvas.height = height;
    
    // MAX WEIGHT: Using 900 weight and 44px to command the frame
    ctx.fillStyle = 'white';
    ctx.font = '900 44px "Courier New", monospace'; 
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, width / 2, height / 2);

    const imageData = ctx.getImageData(0, 0, width, height).data;
    const points = [];
    const density = 2; 

    for (let y = 0; y < height; y += density) {
      for (let x = 0; x < width; x += density) {
        if (imageData[(y * width + x) * 4 + 3] > 128) {
          // Centering and scaling points to 95% of container width
          points.push({ 
            x: (x - width / 2) * 0.029, 
            y: -(y - height / 2) * 0.029 
          });
        }
      }
    }
    return points;
  }

  const textPoints = getTextPoints('ENTER ONLINE MALL', 480, 80);
  const starGeometry = new THREE.BufferGeometry();
  const positions = new Float32Array(textPoints.length * 3);
  const originals = new Float32Array(textPoints.length * 3);

  for (let i = 0; i < textPoints.length; i++) {
    positions[i * 3] = textPoints[i].x;
    positions[i * 3 + 1] = textPoints[i].y;
    positions[i * 3 + 2] = 0;
    originals[i * 3] = textPoints[i].x;
    originals[i * 3 + 1] = textPoints[i].y;
    originals[i * 3 + 2] = 0;
  }

  starGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  
  const starMaterial = new THREE.PointsMaterial({ 
    size: 0.055, 
    transparent: true, 
    opacity: 1.0,
    blending: THREE.AdditiveBlending 
  });

  const starMesh = new THREE.Points(starGeometry, starMaterial);
  scene.add(starMesh);
  camera.position.z = 6.5; 

  let time = 0;
  function animate() {
    requestAnimationFrame(animate);
    time += 0.045;
    
    const posAttr = starGeometry.attributes.position;
    for (let i = 0; i < textPoints.length; i++) {
      const xIdx = i * 3;
      const yIdx = i * 3 + 1;
      // High-frequency symbiotic drift
      posAttr.array[xIdx] = originals[xIdx] + Math.sin(time + originals[xIdx] * 4) * 0.006;
      posAttr.array[yIdx] = originals[yIdx] + Math.cos(time + originals[yIdx] * 4) * 0.006;
    }
    posAttr.needsUpdate = true;
    
    const currentColor = getComputedStyle(document.documentElement).getPropertyValue('--active-color').trim();
    starMaterial.color.set(currentColor);
    
    renderer.render(scene, camera);
  }
  animate();

  // --- INTERFACE LOGIC ---
  const root = document.documentElement;
  const responseField = document.getElementById('response-field');
  const statusText = document.getElementById('council-status');

  async function handleTransmit() {
    const query = document.getElementById('guest-cmd').value;
    if (!query) return;

    statusText.textContent = "[PROCESSING...]";
    
    setTimeout(() => {
      statusText.textContent = "[SENSE: BLUE]";
      responseField.innerHTML = "Olympus link verified. Text scaling optimized for 2026 Web Summit Gatekeepers.";
      responseField.classList.add('active');
      document.getElementById('guest-cmd').value = "";
    }, 800);
  }

  document.getElementById('send-btn').addEventListener('click', handleTransmit);
  document.getElementById('guest-cmd').addEventListener('keypress', (e) => { if(e.key === 'Enter') handleTransmit(); });
</script>

</body>
</html>
