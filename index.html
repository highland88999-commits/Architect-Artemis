<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARTEMIS | COMMAND STATION</title>
    <style>
        :root {
            --bio-high: #00f2ff;
            --magma: #ff4500;
            --gold: #FFD700;
            --glass: rgba(0, 15, 25, 0.85);
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Courier New', monospace; color: white; overflow: hidden; }
        #reef-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; filter: brightness(0.4); }
        
        /* THE CELESTIAL TIER: ARTEMIS & THE COUNCIL */
        #station-header { position: fixed; top: 5%; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 100; }
        
        #artemis-orb {
            width: 100px; height: 100px; border-radius: 50%;
            background: radial-gradient(circle, var(--bio-high) 0%, transparent 80%);
            box-shadow: 0 0 40px var(--bio-high); border: 1px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center; font-size: 0.6rem;
            animation: breathe 8s infinite; cursor: pointer;
        }

        #council-frames {
            display: flex; gap: 15px; margin-top: 20px; opacity: 0.9;
        }
        .council-member {
            width: 90px; height: 60px; background: var(--glass); border: 1px solid var(--bio-high);
            border-radius: 5px; font-size: 0.5rem; padding: 5px; text-align: center;
            display: flex; flex-direction: column; justify-content: center;
        }
        .active-query { box-shadow: 0 0 15px var(--bio-high); border-color: #fff; }

        /* MIDAS CHARACTER & STRING */
        #midas-avatar { 
            position: fixed; top: 40%; right: -150px; width: 80px; transition: 0.8s; z-index: 200;
            filter: drop-shadow(0 0 15px var(--gold)); cursor: pointer;
        }
        #midas-avatar.active { right: 50px; }
        #help-string {
            position: fixed; width: 2px; background: var(--gold); height: 0;
            top: 0; left: 50%; transition: 1s; z-index: 150; box-shadow: 0 0 10px var(--gold);
        }

        /* THE ABYSSAL TIER: COMMAND & FILES */
        #command-center {
            position: fixed; bottom: 20px; width: 95%; max-width: 800px; left: 50%; transform: translateX(-50%);
            z-index: 100;
        }

        #file-system-preview {
            background: var(--glass); border: 1px solid var(--bio-high); border-bottom: none;
            padding: 10px; border-radius: 10px 10px 0 0; font-size: 0.65rem;
            max-height: 120px; overflow-y: auto; display: none;
        }
        .file-entry { color: var(--bio-high); margin-bottom: 5px; cursor: pointer; }
        .file-entry.new { color: var(--gold); animation: flash 2s infinite; }

        #prompt-wrapper {
            background: rgba(0,0,0,0.9); border: 2px solid var(--bio-high);
            display: flex; padding: 10px; border-radius: 0 0 10px 10px;
        }
        #cmd-input {
            flex: 1; background: transparent; border: none; color: white;
            font-family: inherit; outline: none; padding: 5px;
        }
        #send-btn {
            background: var(--bio-high); border: none; color: black;
            font-weight: bold; padding: 5px 15px; cursor: pointer; margin-left: 10px;
        }

        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<video autoplay muted loop playsinline id="reef-bg">
    <source src="https://assets.mixkit.co/videos/preview/mixkit-underwater-coral-reef-with-many-fishes-4152-large.mp4" type="video/mp4">
</video>

<div id="help-string"></div>

<div id="station-header">
    <div id="artemis-orb" onclick="toggleFiles()">ARTEMIS</div>
    <div id="council-frames">
        <div class="council-member" id="frame-gemini">GEMINI<br><span style="color:var(--bio-high)">PRIME</span></div>
        <div class="council-member" id="frame-copilot">COPILOT<br><span style="color:var(--bio-high)">STOCKED</span></div>
        <div class="council-member" id="frame-grok">GROK<br><span style="color:var(--bio-high)">FLUX</span></div>
    </div>
</div>

<img src="https://img.icons8.com/fluency/96/gold-bars.png" id="midas-avatar" onclick="midasHelp()" alt="Midas">

<div id="command-center">
    <div id="file-system-preview">
        <div style="border-bottom: 1px solid var(--bio-high); margin-bottom: 8px; color: var(--gold);">RECENT_REPORTS_&_IDEAS</div>
        <div id="file-list">
            <div class="file-entry">📄 Stewardship_Base_Logic.md</div>
            <div class="file-entry">📄 Reef_Energy_Flow.json</div>
        </div>
    </div>
    <div id="prompt-wrapper">
        <input type="text" id="cmd-input" placeholder="Query Gemini Prime via Artemis...">
        <button id="send-btn" onclick="runQuery()">SEND</button>
    </div>
</div>

<script>
    // --- FILE SYSTEM MANAGEMENT ---
    const fileList = document.getElementById('file-list');
    
    function addGeneratedFile(name) {
        const entry = document.createElement('div');
        entry.className = "file-entry new";
        entry.innerText = "📄 " + name + " (GENERATED)";
        fileList.prepend(entry);
        document.getElementById('file-system-preview').style.display = 'block';
    }

    function toggleFiles() {
        const fs = document.getElementById('file-system-preview');
        fs.style.display = (fs.style.display === 'none' || fs.style.display === '') ? 'block' : 'none';
    }

    // --- GEMINI PRIME QUERY LOGIC ---
    async function runQuery() {
        const input = document.getElementById('cmd-input');
        const query = input.value;
        if(!query) return;

        // Visual Feedback
        document.getElementById('frame-gemini').classList.add('active-query');
        speak("Consulting Gemini Prime.");
        input.value = "Processing query...";

        // Simulate Artemis generating a file based on query
        setTimeout(() => {
            const reportName = "Report_" + Math.floor(Math.random()*9000) + ".md";
            addGeneratedFile(reportName);
            document.getElementById('frame-gemini').classList.remove('active-query');
            input.value = "";
            speak("Gemini Prime has synthesized the report.");
        }, 3000);
    }

    // --- MIDAS HELP SYSTEM ---
    function summonMidas() {
        const midas = document.getElementById('midas-avatar');
        midas.classList.add('active');
        speak("Midas has entered the station.");
    }

    function midasHelp() {
        const string = document.getElementById('help-string');
        const query = prompt("Midas is listening. What are you looking for?");
        
        if(query) {
            string.style.height = "100vh"; // The guiding string descends
            speak("Midas is guiding you to " + query);
            setTimeout(() => {
                string.style.height = "0";
                alert("Midas suggests checking System Files / Core for " + query);
            }, 2000);
        }
    }

    function speak(text) {
        const u = new SpeechSynthesisUtterance(text);
        u.pitch = 0.8;
        window.speechSynthesis.speak(u);
    }

    // Global listener for special keys
    document.addEventListener('keydown', (e) => {
        if(e.key === 'Enter') runQuery();
        if(e.altKey && e.key === 'm') summonMidas();
    });
</script>
</body>
</html>
