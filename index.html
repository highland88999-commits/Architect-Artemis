<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Artemis • AI</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --cyan: #00f2ff;
            --gold: #d4af37;
            --purple-shader: rgba(26, 0, 51, 0.82);
            --glass: rgba(8, 8, 25, 0.45);
            --border: rgba(0, 242, 255, 0.35);
            --glow-c: 0 0 40px rgba(0, 242, 255, 0.75);
            --glow-g: 0 0 45px rgba(212, 175, 55, 0.65);
            
            /* Label Colors */
            --c-maps: #00D2FF;
            --c-city: #A259FF;
            --c-pearl: #FFF5E1;
            --c-gully: #FF4B2B;
            --c-finance: #00FF87;
            --c-hoodie: #FF8C00;
            --c-symbiote: #00FFFF;
            --c-starblood: #ff3333;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        
        body, html { 
            width:100%; height:100%; overflow:hidden; background:#000; 
            font-family: 'Courier New', monospace; color:var(--cyan); touch-action: manipulation; 
        }

        #landing-page {
            position: fixed; inset: 0; z-index: 1000; background: #000;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1), transform 1.5s ease-in;
        }
        #landing-video { position: absolute; width: 100%; height: 100%; object-fit: cover; }
        #landing-prompt {
            position: relative; z-index: 1001; font-size: 1.2rem; letter-spacing: 4px;
            text-transform: uppercase; text-shadow: 0 0 20px var(--cyan);
            animation: pulseFade 3s infinite; pointer-events: none;
        }
        @keyframes pulseFade { 0%, 100% { opacity: 0.3; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1); } }
        .dissolve-effect { opacity: 0 !important; transform: scale(1.5); filter: brightness(2) blur(20px); pointer-events: none; }

        #rain-container { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        .drop {
            position: absolute; background: linear-gradient(transparent, var(--cyan));
            width: 1px; height: 80px; top: -100px; animation: fall 1.5s linear infinite; opacity: 0.3;
        }
        @keyframes fall { to { transform: translateY(110vh); } }

        #auth-btn-wrapper { position: fixed; top: 20px; right: 20px; z-index: 2000; }
        .holo-btn {
            background: rgba(0, 242, 255, 0.15); border: 1px solid var(--cyan);
            padding: 8px 16px; border-radius: 8px; cursor: pointer; color: var(--cyan);
            font-weight: bold; font-size: 0.9rem; transition: 0.2s; backdrop-filter: blur(10px);
            font-family: 'Courier New', monospace; text-transform: uppercase; white-space: nowrap;
        }
        .holo-btn:active { background: var(--cyan); color: #000; }

        #auth-modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            z-index: 4000; justify-content: center; align-items: center; backdrop-filter: blur(8px);
        }
        #auth-modal {
            background: rgba(8, 8, 25, 0.9); border: 2px solid var(--gold); border-radius: 16px;
            padding: 30px; width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 15px;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.3); text-align: center;
        }
        .auth-input {
            width: 100%; padding: 12px; background: rgba(0, 242, 255, 0.05); border: 1px solid var(--border);
            border-radius: 8px; color: var(--cyan); font-family: 'Courier New', monospace; outline: none;
        }
        .auth-input:focus { border-color: var(--cyan); box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.2); }

        #container { 
            position: relative; z-index: 10; display: flex; flex-direction: column; 
            align-items: center; justify-content: flex-start; height: 100vh; text-align: center; padding: 20px; 
            padding-top: 5vh; overflow-y: auto; scrollbar-width: none;
        }
        #container::-webkit-scrollbar { display: none; }

        #oracle-circle { 
            width: min(320px, 70vw); height: min(320px, 70vw); border-radius: 50%; 
            border: 9px solid var(--gold); box-shadow: var(--glow-c), inset 0 0 90px rgba(0,242,255,0.55); 
            position: relative; overflow: hidden; margin-bottom: 2vh; cursor: pointer; transition: 0.3s;
            flex-shrink: 0;
        }
        #oracle-circle:active { transform: scale(0.95); }
        #oracle-video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; }
        #shader-overlay { position: absolute; inset: 0; background: var(--purple-shader); opacity: 0; transition: opacity 0.5s ease; pointer-events: none; }
        #oracle-message { 
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; 
            color: var(--cyan); font-size: clamp(1.1rem, 3.5vw, 1.6rem); font-weight: bold; 
            text-align: center; padding: 20px; opacity: 0; transition: opacity 0.6s ease; 
            text-shadow: 0 0 15px rgba(0,242,255,0.8); pointer-events: none; 
            letter-spacing: 1px; line-height: 1.4; text-transform: uppercase; animation: textPulse 2s infinite; 
        }
        @keyframes textPulse { 0%, 100% { text-shadow: 0 0 10px rgba(0,242,255,0.8); } 50% { text-shadow: 0 0 20px rgba(0,242,255,1); } }

        #council-pips { display: flex; gap: 8px; margin-bottom: 8px; }
        .pip { width: 6px; height: 6px; border-radius: 50%; background: var(--pip-color); box-shadow: 0 0 10px var(--pip-color); animation: pipPulse 1.5s infinite ease-in-out; }
        .pip:nth-child(1) { --pip-color: #00f2ff; animation-delay: 0s; }
        .pip:nth-child(2) { --pip-color: #ff3366; animation-delay: 0.2s; }
        .pip:nth-child(3) { --pip-color: #66ff66; animation-delay: 0.4s; }
        @keyframes pipPulse { 0%, 100% { opacity: 0.3; transform: scale(0.8); filter: blur(1px); } 50% { opacity: 1; transform: scale(1.2); filter: blur(0px); } }

        #prompt-area { width: 100%; max-width: 600px; display: flex; flex-direction: column; align-items: center; gap: 18px; flex-shrink: 0; }
        #guest-cmd { width: 100%; padding: 18px 28px; background: var(--glass); border: 1px solid var(--border); border-radius: 26px; color: var(--cyan); font-size: 1.2rem; backdrop-filter: blur(18px); text-align: center; transition: 0.3s; }
        
        .btn-group { display: flex; gap: 10px; width: 100%; justify-content: center; }
        #send-btn { padding: 14px 60px; background: linear-gradient(90deg, var(--cyan), #00aaff); color: #000; border: none; border-radius: 999px; font-weight: bold; cursor: pointer; box-shadow: 0 0 30px var(--cyan); transition: 0.3s; }
        #forge-trigger-btn { padding: 14px 30px; background: rgba(0, 242, 255, 0.1); color: var(--cyan); border: 1px solid var(--cyan); border-radius: 999px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        #forge-trigger-btn:hover { background: rgba(0, 242, 255, 0.3); }

        /* Artemis Modular UI Components */
        #dynamic-modules {
            width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 15px; margin-top: 25px; padding-bottom: 130px; /* INCREASED FOR FOOTER CLEARANCE */
        }
        .artemis-panel {
            background: rgba(8, 8, 25, 0.7); border: 1px solid var(--border); border-radius: 16px;
            padding: 15px; text-align: left; box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
            backdrop-filter: blur(12px); overflow-y: auto; display: none; transition: all 0.3s ease;
        }
        .artemis-panel.expanded { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #council-header { cursor: pointer; transition: 0.2s; }
        #council-header:hover { text-shadow: 0 0 10px var(--cyan); }
        
        .agent-bubble {
            margin-bottom: 10px; padding: 12px; border-radius: 8px; background: rgba(0, 242, 255, 0.05);
            border-left: 3px solid var(--cyan); font-family: 'Courier New', monospace; font-size: 0.9rem; line-height: 1.4;
        }
        .agent-bubble.gemini-prime { border-left-color: var(--cyan); }
        .agent-bubble.copilot-beta { border-left-color: var(--c-city); }
        .agent-bubble.grok-x { border-left-color: var(--c-starblood); }

        #bottom-dock { 
            position: fixed; bottom: 60px; /* INCREASED FOR FOOTER CLEARANCE */ left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 100; background: var(--glass); 
            padding: 12px 18px; border-radius: 60px; border: 1px solid var(--border); backdrop-filter: blur(20px); width: fit-content; max-width: 95vw; overflow-x: auto; scrollbar-width: none;
        }
        #bottom-dock::-webkit-scrollbar { display: none; }
        
        #holo-overlay { display: none; position: fixed; inset: 5%; background: var(--glass); border: 3px solid var(--cyan); border-radius: 36px; backdrop-filter: blur(30px); z-index: 4000; flex-direction: column; overflow: hidden; }
        
        #text-holo-overlay {
            display: none; position: fixed; inset: 10% 5%; background: rgba(8, 8, 25, 0.95); 
            border: 2px solid var(--gold); border-radius: 20px; backdrop-filter: blur(30px); 
            z-index: 3000; flex-direction: column; overflow: hidden; box-shadow: 0 0 50px rgba(212, 175, 55, 0.25);
        }
        #text-holo-content {
            flex: 1; padding: 25px; overflow-y: auto; color: var(--cyan); 
            font-size: 1.1rem; line-height: 1.6; white-space: normal; word-wrap: break-word;
            text-align: left; text-shadow: 0 0 5px rgba(0, 242, 255, 0.4);
        }
        #text-holo-content pre { background: rgba(0, 242, 255, 0.1); padding: 15px; border-radius: 8px; overflow-x: auto; margin-bottom: 15px; border: 1px solid var(--border); }
        #text-holo-content code { font-family: 'Courier New', monospace; color: #ff3366; }

        .holo-header { padding: 15px 20px; background: rgba(0,242,255,0.1); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0, 242, 255, 0.2); }
        .holo-title { font-weight: bold; letter-spacing: 2px; }
        .holo-close { width: 35px; height: 35px; background: #ff3366; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; font-weight: bold; font-size: 1.2rem; flex-shrink: 0; }
        #holo-iframe { flex: 1; border: none; width: 100%; height: 100%; background: #fff; }
        
        #preview-code-btn { display: none; border-color: #00ff87; color: #00ff87; box-shadow: 0 0 10px rgba(0, 255, 135, 0.3); }
        #deploy-code-btn { display: none; border-color: #A259FF; color: #A259FF; box-shadow: 0 0 10px rgba(162, 89, 255, 0.3); }

        /* Starblood Game Link */
        #starblood-car-tab {
            position: fixed; bottom: 65px; /* INCREASED FOR FOOTER CLEARANCE */ right: 25px; z-index: 9999; width: 65px; height: 65px; border-radius: 12px;
            background: rgba(40, 0, 0, 0.45); border: 1px solid var(--c-starblood); box-shadow: 0 0 15px rgba(255, 51, 51, 0.3); 
            cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(12px); transition: all 0.3s ease;
        }
        #starblood-car-tab:hover { box-shadow: 0 0 25px var(--c-starblood); transform: scale(1.08); }
        .holo-car-svg { width: 40px; height: 40px; filter: drop-shadow(0 0 6px var(--c-starblood)); animation: holoCarFloat 3s infinite ease-in-out; }
        @keyframes holoCarFloat { 0%, 100% { transform: translateY(0) scale(1); filter: drop-shadow(0 0 4px var(--c-starblood)); } 50% { transform: translateY(-4px) scale(1.03); filter: drop-shadow(0 0 15px var(--c-starblood)); } }

        /* Multiverse Tracker CSS Integration */
        .cyber-footer {
            position: fixed; bottom: 0; left: 0; width: 100%; text-align: center; padding: 12px 0;
            background: rgba(5, 5, 5, 0.85); backdrop-filter: blur(4px);
            border-top: 1px solid rgba(0, 255, 255, 0.15); z-index: 9999;
            font-family: 'Courier New', Courier, monospace;
        }
        .visit-count {
            color: #00ffff; font-size: 0.75rem; font-weight: bold;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.8), 0 0 15px rgba(0, 255, 255, 0.4);
            letter-spacing: 1.5px; text-transform: uppercase;
        }
        .loading { animation: pulse 1.5s infinite; }
    </style>
</head>
<body>

    <script>
        window.enterNexus = function() {
            const landing = document.getElementById('landing-page');
            landing.classList.add('dissolve-effect');
            
            const v = document.getElementById('oracle-video');
            if (v) v.play().catch(e => console.log("Video auto-play delayed."));
            
            createRain(); 

            // WAKE UP GITHUB ACTIONS: Connected to Unified Gateway
            fetch('/api/gateway', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'wake' })
            })
            .then(res => res.json())
            .then(data => console.log("Artemis Engine Warming Up...", data))
            .catch(err => console.error("Engine Wake Failed:", err));
            
            setTimeout(() => { landing.style.display = 'none'; }, 1500);
        };

        function createRain() {
            const container = document.getElementById('rain-container');
            if (!container || container.children.length > 0) return;
            for(let i=0; i<60; i++) {
                const drop = document.createElement('div');
                drop.className = 'drop';
                drop.style.left = Math.random() * 100 + 'vw';
                drop.style.animationDuration = (Math.random() * 0.5 + 0.5) + 's';
                drop.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(drop);
            }
        }
    </script>

    <div id="landing-page" onclick="enterNexus()">
        <video id="landing-video" autoplay loop muted playsinline>
            <source src="https://files.catbox.moe/jhxjmx.mp4" type="video/mp4">
        </video>
        <div id="landing-prompt">Click anywhere to enter</div>
    </div>

    <div id="auth-btn-wrapper">
        <button class="holo-btn" id="top-auth-btn" onclick="toggleAuthModal()">AUTHENTICATE</button>
    </div>

    <div id="auth-modal-overlay">
        <div id="auth-modal">
            <h3 style="color: var(--gold); margin-bottom: 5px;">TERMINAL ACCESS</h3>
            <p style="font-size: 0.8rem; color: var(--cyan); margin-bottom: 15px; opacity: 0.7;">Secure link required for memory retention.</p>
            <input type="email" id="auth-email" placeholder="Identifier (Email)" class="auth-input">
            <input type="password" id="auth-pass" placeholder="Passcode" class="auth-input">
            <div style="display: flex; gap: 10px; margin-top: 15px; justify-content: center;">
                <button class="holo-btn" onclick="submitAuth('login')">LOGIN</button>
                <button class="holo-btn" onclick="submitAuth('signup')">SIGN UP</button>
            </div>
            <button class="holo-btn" style="border-color: #ff3366; color: #ff3366; margin-top: 10px;" onclick="closeAuthModal()">CONTINUE AS GUEST</button>
            <div id="auth-error" style="color: #ff3366; font-size: 0.8rem; margin-top: 10px;"></div>
        </div>
    </div>

    <div id="rain-container"></div>

    <div id="container">
        <div id="oracle-circle" onclick="openTextHolo()">
            <video id="oracle-video" loop muted playsinline>
                <source src="https://files.catbox.moe/no2e76.mp4" type="video/mp4">
            </video>
            <div id="shader-overlay"></div>
            <div id="oracle-message"></div>
        </div>

        <div id="council-header" style="display: flex; flex-direction: column; align-items: center;">
            <div id="council-pips">
                <div class="pip"></div><div class="pip"></div><div class="pip"></div>
            </div>
            <div id="council-status" style="font-size: 9px; color: var(--cyan); margin-bottom: 10px; opacity: 0.6; letter-spacing: 2px;">
                [COUNCIL: FEED] <span id="harvest-stats">[OPTIMIZING_NODES...]</span>
            </div>
        </div>

        <div id="prompt-area">
            <input type="text" id="guest-cmd" placeholder="Speak to Artemis..." autocomplete="off"/>
            <div class="btn-group">
                <button id="send-btn" onclick="handleSendClick()">SEND</button>
                <button id="forge-trigger-btn" onclick="window.generateAsset('forge', { prompt: document.getElementById('guest-cmd').value })">FORGE</button>
            </div>
        </div>

        <div id="dynamic-modules">
            
            <div id="artemis-forge-panel" class="artemis-panel" style="border-color: var(--cyan);">
                <div id="forge-header" style="color:var(--cyan); font-weight:bold; margin-bottom:10px; letter-spacing: 2px; text-transform: uppercase;">The Forge ▼</div>
                
                <div id="artemis-forge-container" class="forge-container" style="display: flex; flex-direction: column; align-items: center;">
                    <video 
                        id="artemis-loading-video" 
                        src="/assets/gemini_generated_video_8916378C.mp4" 
                        muted 
                        loop 
                        playsinline
                        style="display: none; width: 100%; max-width: 600px; border-radius: 8px; box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);">
                    </video>

                    <div id="artemis-result-display" style="display: none; opacity: 0; transition: opacity 0.5s ease; width: 100%;">
                    </div>
                </div>
            </div>

            <div id="council-body" class="artemis-panel"></div>

            <div id="artemis-response-panel" class="artemis-panel">
                <div id="response-header" style="color:var(--c-city); font-weight:bold; margin-bottom:10px; cursor:pointer;">Artemis Core Response ▼</div>
                <div id="response-content"></div>
            </div>

            <div id="stewardship-folder-contents" class="artemis-panel expanded" style="border-color: var(--gold);">
            </div>
        </div>
    </div>

    <div id="holo-overlay">
        <div class="holo-header">
            <span class="holo-title" style="color:#00ff87;">Live Sandbox Render</span>
            <div class="holo-close" onclick="closeHolo()">×</div>
        </div>
        <iframe id="holo-iframe"></iframe>
    </div>

    <div id="text-holo-overlay">
        <div class="holo-header">
            <span class="holo-title" style="color: var(--gold);">Transmission</span>
            <div style="display: flex; gap: 8px; align-items: center; overflow-x: auto; padding-bottom: 4px;">
                <div class="holo-btn" id="deploy-code-btn" onclick="deploySandboxCode()">DEPLOY</div>
                <div class="holo-btn" id="preview-code-btn" onclick="executeSandboxCode()">PREVIEW</div>
                <div class="holo-btn" id="download-txt-btn" onclick="downloadTxt()">TXT</div>
                <div class="holo-btn" id="download-pdf-btn" onclick="downloadPdf()">PDF</div>
                <div class="holo-btn" id="copy-btn" onclick="copyOracleText()">COPY</div>
                <div class="holo-close" onclick="closeTextHolo()">×</div>
            </div>
        </div>
        <div id="text-holo-content"></div>
    </div>

    <div id="starblood-car-tab">
        <svg class="holo-car-svg" viewBox="0 0 24 24" fill="none" stroke="var(--c-starblood)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect>
            <polyline points="17 2 12 7 7 2"></polyline>
        </svg>
    </div>

    <footer class="cyber-footer">
        <div class="visit-count" id="counter-display">
            UPLINK ESTABLISHING <span class="loading">...</span>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDrt1J430kPVADh7Sqbdn6nOu371h3rHHI",
            authDomain: "artemis-f2d47.firebaseapp.com",
            projectId: "artemis-f2d47",
            storageBucket: "artemis-f2d47.firebasestorage.app",
            messagingSenderId: "60116392103",
            appId: "1:60116392103:web:a75384427cce708b52a382"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let latestArtemisText = "";
        let typingTimer;
        let isGenerating = false;
        let currentAbortController = null;
        
        window.currentExtractedCode = "";

        window.generateAsset = async function(actionName, payloadData) {
            const panelObj = document.getElementById('artemis-forge-panel');
            const videoObj = document.getElementById('artemis-loading-video');
            const resultObj = document.getElementById('artemis-result-display');

            panelObj.classList.add('expanded');
            
            resultObj.style.display = 'none';
            resultObj.style.opacity = '0';
            videoObj.style.display = 'block';
            videoObj.play();

            try {
                const response = await fetch('/api/gateway', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: actionName, payload: payloadData })
                });
                
                const data = await response.json();

                videoObj.pause();
                videoObj.currentTime = 0;
                videoObj.style.display = 'none';

                resultObj.style.display = 'block';
                
                if (data.url) {
                    resultObj.innerHTML = `
                        <div style="padding: 20px; border: 1px solid rgba(0, 242, 255, 0.4); border-radius: 8px; text-align: center; background: rgba(0,242,255,0.05);">
                            <h3 style="color: #0ff; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px;">Forge Complete</h3>
                            <p style="color: #fff; font-family: monospace;">Asset [${data.filename || 'data-module'}] successfully materialized.</p>
                            <a href="${data.url}" download="${data.filename || 'download'}" 
                               style="display: inline-block; padding: 10px 20px; background: linear-gradient(90deg, #00f2ff, #00aaff); color: #000; text-decoration: none; font-weight: bold; border-radius: 4px; margin-top: 15px; box-shadow: 0 0 15px rgba(0, 242, 255, 0.4); transition: transform 0.2s;">
                               [ DOWNLOAD ASSET ]
                            </a>
                        </div>
                    `;
                } else {
                    resultObj.innerHTML = `<pre style="white-space: pre-wrap; font-size: 12px; color: #0ff; text-align: left; padding: 10px;">${JSON.stringify(data, null, 2)}</pre>`;
                }

                setTimeout(() => resultObj.style.opacity = '1', 50);

            } catch (error) {
                videoObj.pause();
                videoObj.style.display = 'none';
                resultObj.style.display = 'block';
                resultObj.style.opacity = '1';
                resultObj.innerHTML = `<p style="color: #ff3366; border: 1px solid #ff3366; padding: 10px; border-radius: 8px;">⚠️ Matrix Sync Failed: ${error.message}</p>`;
            }
        };

        setInterval(() => {
            const stats = document.getElementById('harvest-stats');
            if (!stats) return;
            const minutes = new Date().getMinutes();
            if (minutes % 20 < 5) {
                stats.textContent = `[SYSTEM_BREAK: COOLING]`;
                stats.style.color = '#ff3366';
            } else {
                stats.textContent = `[HARVESTING: ${Math.floor(Math.random()*5)+15}/20 URLS]`;
                stats.style.color = 'var(--cyan)';
            }
        }, 5000);

        onAuthStateChanged(auth, (user) => {
            const topBtn = document.getElementById('top-auth-btn');
            if (user) {
                currentUser = user;
                topBtn.textContent = "SIGN OUT";
                topBtn.style.borderColor = "#66ff66";
                topBtn.style.color = "#66ff66";
                closeAuthModal();
            } else {
                currentUser = null;
                topBtn.textContent = "AUTHENTICATE";
                topBtn.style.borderColor = "var(--cyan)";
                topBtn.style.color = "var(--cyan)";
            }
        });

        window.submitAuth = async function(action) {
            const email = document.getElementById('auth-email').value.trim();
            const pass = document.getElementById('auth-pass').value;
            const errorDiv = document.getElementById('auth-error');
            if (!email || !pass) return errorDiv.textContent = "Email and Passcode required.";
            errorDiv.textContent = "Connecting to mainframe...";
            try { action === 'login' ? await signInWithEmailAndPassword(auth, email, pass) : await createUserWithEmailAndPassword(auth, email, pass); } 
            catch (error) { errorDiv.textContent = error.message.replace("Firebase:", "").trim(); }
        };

        function fadeInMessage(text) {
            const colors = ['#ff3366', '#ff6f00', '#d4af37', '#66ff66', '#00f2ff', '#3366ff', '#9933ff', '#ff33cc'];
            const newColor = colors[Math.floor(Math.random() * colors.length)];
            const oracleCircle = document.getElementById('oracle-circle');
            const shaderOverlay = document.getElementById('shader-overlay');
            const oracleMessage = document.getElementById('oracle-message');
            
            clearTimeout(typingTimer);
            oracleMessage.textContent = '';
            oracleCircle.style.borderColor = newColor;
            oracleCircle.style.boxShadow = `0 0 40px ${newColor}, inset 0 0 90px rgba(0,242,255,0.55)`;
            shaderOverlay.style.opacity = 0.82;
            oracleMessage.style.opacity = 1;
            
            let i = 0;
            function type() { if (i < text.length) { oracleMessage.textContent += text.charAt(i); i++; typingTimer = setTimeout(type, 30); } }
            setTimeout(type, 300);
        }

        function fadeOutMessage() {
            const shaderOverlay = document.getElementById('shader-overlay');
            const oracleMessage = document.getElementById('oracle-message');
            const oracleCircle = document.getElementById('oracle-circle');
            shaderOverlay.style.opacity = 0; oracleMessage.style.opacity = 0;
            setTimeout(() => {
                oracleCircle.style.borderColor = 'var(--gold)';
                oracleCircle.style.boxShadow = 'var(--glow-c), inset 0 0 90px rgba(0,242,255,0.55)';
            }, 500);
        }

        const cmd = document.getElementById('guest-cmd');
        cmd.addEventListener('keypress', e => { if (e.key === 'Enter') { e.preventDefault(); window.handleSendClick(); } });
        cmd.addEventListener('focus', function() { this.select(); });

        function lockUI() {
            isGenerating = true;
            document.getElementById('send-btn').textContent = "STOP";
            document.getElementById('send-btn').style.background = "#ff3366";
            document.getElementById('guest-cmd').disabled = true;
        }

        function resetUI() {
            isGenerating = false;
            document.getElementById('send-btn').textContent = "SEND";
            document.getElementById('send-btn').style.background = "linear-gradient(90deg, var(--cyan), #00aaff)";
            document.getElementById('guest-cmd').disabled = false;
        }

        window.handleSendClick = function() {
            if (isGenerating) {
                if (currentAbortController) currentAbortController.abort();
                resetUI();
                latestArtemisText = "[Transmission Aborted]";
                fadeOutMessage(); setTimeout(() => fadeInMessage(latestArtemisText), 600);
            } else {
                fetch('/api/gateway', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'wake' })
                })
                .then(res => res.json())
                .then(data => console.log("Engine Awakened:", data))
                .catch(err => console.error("Engine Wake Failed:", err));
                    
                window.sendToArtemis(); 
            }
        };

        window.sendToArtemis = async function(isPolling = false, pollingJobId = null) {
            const promptText = isPolling ? "" : cmd.value.trim(); 
            if (!promptText && !isPolling) return;
            
            if (!isPolling) {
                lockUI();
                currentAbortController = new AbortController();
                const oracleMsg = document.getElementById('oracle-message');
                oracleMsg.textContent = 'Artemis is awakening the council...';
                oracleMsg.style.opacity = 1; 
            }

            try {
                const payload = { prompt: promptText, handshake: 'CONNECTED', mode: 'council' };
                const response = await fetch('/api/transmit', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                    signal: currentAbortController.signal
                });
                const data = await response.json();
                
                const aiReply = data.verdict || data.response || data.error || 'The council has spoken...';
                latestArtemisText = aiReply; 
                
                fadeOutMessage(); setTimeout(() => fadeInMessage('Analysis Complete.'), 600);

                if (window.artemisUI) {
                    window.artemisUI.showResponse(aiReply, true);
                }

                if (currentUser && !data.error && !isPolling) {
                    await addDoc(collection(db, "users", currentUser.uid, "history"), { 
                        prompt: promptText, response: aiReply, timestamp: serverTimestamp() 
                    });
                }
            } catch (err) {
                if (err.name !== 'AbortError') {
                    latestArtemisText = "Synaptic link unstable...";
                    fadeOutMessage(); setTimeout(() => fadeInMessage('Synaptic link unstable...'), 600);
                }
            } finally {
                if (isGenerating && !isPolling) resetUI();
            }
        };

        window.openTextHolo = function() {
            if (!latestArtemisText) return;
            document.getElementById('text-holo-content').innerHTML = marked.parse(latestArtemisText);
            
            const codeBlockRegex = /(?:html|css|javascript|js)?\n([\s\S]*?)```/gi;
            let combinedCode = "";
            let match;
            while ((match = codeBlockRegex.exec(latestArtemisText)) !== null) { combinedCode += match[1] + "\n"; }
            
            if (combinedCode.trim().length > 0) {
                document.getElementById('preview-code-btn').style.display = 'block';
                document.getElementById('deploy-code-btn').style.display = 'block';
                window.currentExtractedCode = combinedCode;
            } else {
                document.getElementById('preview-code-btn').style.display = 'none';
                document.getElementById('deploy-code-btn').style.display = 'none';
                window.currentExtractedCode = "";
            }
            document.getElementById('text-holo-overlay').style.display = 'flex';
        };

        window.executeSandboxCode = function() {
            if (!window.currentExtractedCode) return;
            document.getElementById('holo-iframe').srcdoc = window.currentExtractedCode;
            document.getElementById('holo-overlay').style.display = 'flex';
        };

        window.deploySandboxCode = async function() {
            if (!window.currentExtractedCode) return;
            const btn = document.getElementById('deploy-code-btn');
            try {
                btn.textContent = "UPLOADING...";
                const docRef = await addDoc(collection(db, "deployments"), {
                    code: window.currentExtractedCode,
                    timestamp: serverTimestamp(),
                    author: currentUser ? currentUser.uid : 'guest'
                });
                const deployLink = window.location.origin + "/sandbox.html?id=" + docRef.id;
                navigator.clipboard.writeText(deployLink);
                btn.textContent = "LINK COPIED!";
                setTimeout(() => { btn.textContent = "DEPLOY"; }, 3000);
            } catch (error) { btn.textContent = "ERROR"; }
        };

        window.closeTextHolo = function() { document.getElementById('text-holo-overlay').style.display = 'none'; };
        window.closeHolo = function() { document.getElementById('holo-overlay').style.display = 'none'; document.getElementById('holo-iframe').removeAttribute('srcdoc'); };
    </script>

    <script>
        async function updateMultiverseCount() {
            const displayElement = document.getElementById('counter-display');
            
            try {
                const API_ENDPOINT = '[https://multiverse-tracker-5sgfxx5nr-merlin-ambros-projects.vercel.app/api/increment-view](https://multiverse-tracker-5sgfxx5nr-merlin-ambros-projects.vercel.app/api/increment-view)';
                
                const response = await fetch(API_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                if (!response.ok) throw new Error('Network fault');

                const data = await response.json();
                displayElement.innerHTML = `MULTIVERSE NODE ACCESSED: [ ${data.count} ] TIMES`;
                displayElement.classList.remove('loading');

            } catch (error) {
                console.error('Uplink failed:', error);
                displayElement.innerHTML = `MULTIVERSE NODE: [ OFFLINE ]`;
                displayElement.classList.remove('loading');
            }
        }

        window.addEventListener('DOMContentLoaded', updateMultiverseCount);
    </script>
