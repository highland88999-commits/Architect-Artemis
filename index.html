<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Artemis • Symbiote</title>
  <style>
    :root {
      --cyan:     #00f2ff;
      --gold:     #d4af37;
      --purple-shader: rgba(26, 0, 51, 0.75);
      --glass:    rgba(8, 8, 25, 0.45);
      --border:   rgba(0, 242, 255, 0.35);
      --glow-c:   0 0 40px rgba(0, 242, 255, 0.75);
      --glow-g:   0 0 45px rgba(212, 175, 55, 0.65);
      --neon-glow: 0 0 20px #00f2ff, 0 0 40px #00f2ff, inset 0 0 20px #00f2ff;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body, html {
      width:100%; height:100%; overflow:hidden; background:#000;
      font-family: 'Courier New', monospace; color:var(--cyan);
      touch-action: manipulation;
    }

    #bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -20;
      opacity: 0.75;
      pointer-events: none;
    }

    #enter-prompt {
      position: absolute;
      bottom: 22vh;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      text-align: center;
      pointer-events: none;
    }

    #enter-btn {
      font-size: clamp(4.5rem, 14vw, 12rem);
      font-weight: 900;
      letter-spacing: 18px;
      color: var(--gold);
      background: var(--purple-shader);
      padding: 30px 100px;
      border-radius: 40px;
      border: 2px solid rgba(212,175,55,0.5);
      box-shadow: 0 0 60px rgba(212,175,55,0.8), inset 0 0 30px rgba(212,175,55,0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      animation: goldPulse 5s infinite alternate;
    }

    .mouse-clicker {
      font-size: 8rem;
      margin-top: 40px;
      color: var(--cyan);
      animation: bounce 3s infinite;
    }

    @keyframes goldPulse {
      from { opacity: 0.7; box-shadow: 0 0 40px var(--gold); }
      to   { opacity: 1;   box-shadow: 0 0 100px var(--gold), 0 0 160px var(--gold); }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-40px); }
    }

    /* Rain effect */
    #rain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -10;
      opacity: 0.35;
    }

    .rain-drop {
      position: absolute;
      width: 2px;
      height: 80px;
      background: linear-gradient(transparent, #00f2ff);
      opacity: 0.6;
      animation: fall linear infinite;
    }

    @keyframes fall {
      to { transform: translateY(120vh); }
    }

    /* Bottom dock with holo icons */
    #bottom-dock {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 28px;
      z-index: 100;
      background: var(--glass);
      padding: 18px 40px;
      border-radius: 70px;
      border: 1px solid var(--border);
      backdrop-filter: blur(22px);
      box-shadow: 0 10px 50px rgba(0,0,0,0.7);
    }

    .dock-icon {
      width: 80px;
      height: 80px;
      background: rgba(0,242,255,0.15);
      border-radius: 24px;
      border: 1px solid var(--cyan);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .dock-icon:hover {
      transform: scale(1.18) translateY(-10px);
      box-shadow: var(--glow-c);
      background: rgba(0,242,255,0.35);
    }

    .dock-icon svg {
      width: 44px;
      height: 44px;
      fill: var(--cyan);
    }

    /* Holo Glass Overlay */
    #holo-overlay {
      display: none;
      position: fixed;
      inset: 4%;
      background: var(--glass);
      border: 4px solid var(--cyan);
      border-radius: 40px;
      backdrop-filter: blur(32px);
      box-shadow: var(--neon-glow);
      z-index: 200;
      flex-direction: column;
      overflow: hidden;
      animation: neon-pulse 4.5s infinite alternate;
    }

    @keyframes neon-pulse {
      0%   { box-shadow: 0 0 30px var(--cyan), 0 0 60px var(--cyan); }
      100% { box-shadow: 0 0 80px var(--cyan), 0 0 160px var(--cyan); }
    }

    .holo-header {
      padding: 20px 30px;
      background: rgba(0,242,255,0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .holo-title {
      font-size: 1.6rem;
      font-weight: bold;
      color: var(--cyan);
      text-shadow: 0 0 12px var(--cyan);
    }

    .holo-close {
      width: 50px;
      height: 50px;
      background: #ff3366;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: white;
      font-size: 1.9rem;
      font-weight: bold;
      box-shadow: 0 0 25px #ff3366;
      transition: all 0.25s;
    }

    .holo-close:hover {
      transform: scale(1.12);
      box-shadow: 0 0 50px #ff3366;
    }

    #holo-iframe {
      flex: 1;
      border: none;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

  <!-- Full-screen landing video -->
  <video id="bg-video" autoplay muted loop playsinline>
    <source src="https://files.catbox.moe/jhxjmx.mp4" type="video/mp4">
  </video>

  <!-- ENTER prompt – bottom centered -->
  <div id="enter-prompt">
    <button id="enter-btn">ENTER</button>
    <div class="mouse-clicker">🖱️</div>
  </div>

  <!-- Rain effect layer -->
  <div id="rain"></div>

  <!-- Bottom dock with your 5 sites -->
  <div id="bottom-dock">
    <div class="dock-icon" data-url="https://rem-psi-mauve.vercel.app/" title="R.E.M. Provinces">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <div class="dock-icon" data-url="https://mega-city-liard.vercel.app/" title="Mega City">
      <svg viewBox="0 0 24 24"><path d="M3 21h18v-2H3v2zm0-4h18v-2H3v2zm0-4h18v-2H3v2zm0-4h18V9H3v2zm0-4h18V5H3v2z"/></svg>
    </div>
    <div class="dock-icon" data-url="https://axiom-repository.vercel.app/" title="Axiom Repository">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
    </div>
    <div class="dock-icon" data-url="https://grief-gully.vercel.app/" title="Grief Gully">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 22h20L12 2zm0 4l6 12H6l6-12z"/></svg>
    </div>
    <div class="dock-icon" data-url="https://olympian-finances.vercel.app/" title="Olympian Finances">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93s3.05-7.44 7-7.93V17.93zm2-13.86c3.95.49 7 3.85 7 7.93s-3.05 7.44-7 7.93V4.07z"/></svg>
    </div>
  </div>

  <!-- Holo Glass Overlay -->
  <div id="holo-overlay">
    <div class="holo-header">
      <span class="holo-title">Artemis View</span>
      <div class="holo-close" onclick="closeHolo()">×</div>
    </div>
    <iframe id="holo-iframe"></iframe>
  </div>

  <script>
    // Mobile Autoplay Fix
    window.addEventListener('load', () => {
      document.querySelectorAll('video').forEach(vid => {
        vid.play().catch(() => {
          document.body.addEventListener('touchstart', () => vid.play(), {once:true});
        });
      });
    });

    // Rain effect
    function createRain() {
      const rainContainer = document.getElementById('rain');
      for(let i = 0; i < 120; i++) {
        const drop = document.createElement('div');
        drop.className = 'rain-drop';
        drop.style.left = Math.random() * 100 + 'vw';
        drop.style.animationDuration = (0.5 + Math.random() * 1.2) + 's';
        drop.style.animationDelay = Math.random() * 5 + 's';
        drop.style.opacity = Math.random() * 0.4 + 0.3;
        rainContainer.appendChild(drop);
      }
    }
    createRain();

    // ENTER click → proceed
    document.getElementById('enter-prompt').addEventListener('click', () => {
      document.getElementById('enter-prompt').style.display = 'none';
    });
    document.body.addEventListener('click', function handler(e) {
      if (e.target.id !== 'enter-prompt' && e.target.closest('#enter-prompt') === null) {
        document.getElementById('enter-prompt').style.display = 'none';
        document.body.removeEventListener('click', handler);
      }
    });

    // Holo Overlay Controls
    const holoOverlay = document.getElementById('holo-overlay');
    const holoIframe = document.getElementById('holo-iframe');

    function openHolo(url) {
      holoIframe.src = url;
      holoOverlay.style.display = 'flex';
    }

    function closeHolo() {
      holoOverlay.style.display = 'none';
      holoIframe.src = ''; // Clear to stop loading
    }

    // Dock icons open in holo overlay
    document.querySelectorAll('.dock-icon').forEach(icon => {
      icon.addEventListener('click', () => {
        const url = icon.getAttribute('data-url');
        if (url) openHolo(url);
      });
    });
  </script>
</body>
</html>
