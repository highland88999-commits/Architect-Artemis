<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Artemis • Symbiote</title>
  <style>
    :root {
      --cyan:     #00f2ff;
      --gold:     #d4af37;
      --purple-shader: rgba(26, 0, 51, 0.82);
      --glass:    rgba(8, 8, 25, 0.45);
      --border:   rgba(0, 242, 255, 0.35);
      --glow-c:   0 0 40px rgba(0, 242, 255, 0.75);
      --glow-g:   0 0 45px rgba(212, 175, 55, 0.65);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body, html {
      width:100%; height:100%; overflow:hidden; background:#000;
      font-family: 'Courier New', monospace; color:var(--cyan);
      touch-action:manipulation;
    }

    /* Background Video Layer */
    #bg-video {
      position: fixed !important;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -20 !important;
      opacity: 0.7;
      pointer-events: none;
      filter: brightness(1.05) contrast(1.1) drop-shadow(0 0 35px #00f2ff);
    }

    #container {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4vh 6vw;
      position: relative;
    }

    /* Oracle circle */
    #oracle-circle {
      width: 21rem;
      height: 21rem;
      border-radius: 50%;
      border: 9px solid var(--gold);
      box-shadow: var(--glow-c), inset 0 0 90px rgba(0,242,255,0.55);
      position: relative;
      overflow: hidden;
      cursor: pointer;
      margin-bottom: 7vh;
      transition: all 0.5s ease;
    }

    #oracle-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #shader-overlay {
      position: absolute;
      inset: 0;
      background: var(--purple-shader);
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }

    #oracle-message {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--cyan);
      font-size: 1.6rem;
      font-weight: bold;
      text-align: center;
      padding: 30px;
      opacity: 0;
      text-shadow: 0 0 15px rgba(0,242,255,0.8);
      pointer-events: none;
      font-family: 'Courier New', monospace;
      letter-spacing: 1px;
      line-height: 1.4;
      text-transform: uppercase;
      animation: textPulse 2s infinite;
    }

    @keyframes textPulse {
      0%, 100% { text-shadow: 0 0 10px rgba(0,242,255,0.8); }
      50% { text-shadow: 0 0 20px rgba(0,242,255,1), 0 0 30px rgba(0,242,255,0.5); }
    }

    /* Input area */
    #prompt-area {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    #guest-cmd {
      width: 100%;
      padding: 18px 28px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 26px;
      color: var(--cyan);
      font-size: 1.2rem;
      backdrop-filter: blur(18px);
      box-shadow: inset 0 0 35px rgba(0,242,255,0.22);
      outline: none;
    }

    #send-btn {
      padding: 16px 68px;
      background: linear-gradient(90deg, var(--cyan), #00aaff);
      color: #000;
      border: none;
      border-radius: 999px;
      font-weight: bold;
      font-size: 1.35rem;
      cursor: pointer;
      box-shadow: 0 0 40px var(--cyan);
      transition: all 0.3s;
    }

    #send-btn:hover { transform: scale(1.05); box-shadow: 0 0 60px var(--cyan); }

    /* Docking and Apps */
    #dock-orb {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 80px;
      background: var(--glass);
      border-radius: 50%;
      border: 3px solid var(--cyan);
      backdrop-filter: blur(22px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: var(--gold);
      cursor: pointer;
      box-shadow: var(--glow-c);
      z-index: 100;
    }

    #dock-expanded {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 25px;
      background: var(--glass);
      border-radius: 40px;
      border: 1px solid var(--border);
      backdrop-filter: blur(26px);
      max-width: 90vw;
      z-index: 101;
    }

    .app-icon {
      width: 65px;
      height: 65px;
      background: rgba(0,242,255,0.1);
      border-radius: 18px;
      border: 1px solid var(--cyan);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s;
    }

    .app-icon:hover { transform: scale(1.15); box-shadow: var(--glow-c); }
    .app-icon svg { width: 35px; height: 35px; fill: var(--cyan); }

    #lightning-orb {
      position: fixed;
      bottom: 36px;
      right: 36px;
      width: 70px;
      height: 70px;
      background: rgba(212,175,55,0.2);
      border: 3px solid var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 110;
      animation: pulse-gold 4.5s infinite;
    }

    @keyframes pulse-gold {
      0%,100% { box-shadow: 0 0 30px var(--gold); }
      50%     { box-shadow: 0 0 70px var(--gold); }
    }

    #holo-overlay {
      display: none;
      position: fixed;
      inset: 5%;
      background: var(--glass);
      border: 1px solid var(--cyan);
      border-radius: 30px;
      backdrop-filter: blur(30px);
      z-index: 200;
      flex-direction: column;
    }

    .holo-header {
      padding: 15px;
      background: rgba(0,242,255,0.15);
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .holo-close {
      width: 35px; height: 35px; background: #ff3366;
      border-radius: 50%; cursor: pointer; display: flex;
      align-items: center; justify-content: center; color: #000; font-weight: bold;
    }
  </style>
</head>
<body>

  <video id="bg-video" autoplay loop muted playsinline preload="auto">
    <source src="https://files.catbox.moe/jhxjmx.mp4" type="video/mp4">
  </video>

  <div id="container">
    <div id="oracle-circle">
      <video id="oracle-video" autoplay loop muted playsinline>
        <source src="https://files.catbox.moe/no2e76.mp4" type="video/mp4">
      </video>
      <div id="shader-overlay"></div>
      <div id="oracle-message"></div>
    </div>

    <div id="prompt-area">
      <input type="text" id="guest-cmd" placeholder="Speak to Artemis..." autocomplete="off"/>
      <button id="send-btn">SEND</button>
    </div>

    <div id="dock-orb" onclick="toggleDock()">+</div>

    <div id="dock-expanded">
      <div class="app-icon" onclick="openApp('https://facebook.com')"><svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg></div>
      <div class="app-icon" onclick="openApp('https://x.com')"><svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></div>
      <div class="app-icon" onclick="openApp('https://instagram.com')"><svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073z"/></svg></div>
      <div class="app-icon" onclick="toggleDock()">×</div>
    </div>
  </div>

  <div id="lightning-orb" onclick="requestArchitectAccess()">
    <svg viewBox="0 0 24 24" width="40" height="40" fill="var(--gold)"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
  </div>

  <div id="holo-overlay">
    <div class="holo-header"><span>Artemis View</span><div class="holo-close" onclick="closeHolo()">×</div></div>
    <iframe id="holo-iframe" style="flex:1; border:none;"></iframe>
  </div>

  <script>
    // Robust Mobile Autoplay Fix
    window.addEventListener('load', function() {
      const videos = document.querySelectorAll('video');
      const enableMedia = () => {
        videos.forEach(v => v.play());
        document.removeEventListener('touchstart', enableMedia);
      };
      document.addEventListener('touchstart', enableMedia, { passive: true });
    });

    function toggleDock() {
      const orb = document.getElementById('dock-orb');
      const expanded = document.getElementById('dock-expanded');
      const isVisible = expanded.style.display === 'flex';
      orb.style.display = isVisible ? 'flex' : 'none';
      expanded.style.display = isVisible ? 'none' : 'flex';
    }

    function openApp(url) { window.open(url, '_blank'); toggleDock(); }
    function closeHolo() { document.getElementById('holo-overlay').style.display = 'none'; }

    function requestArchitectAccess() {
      if (prompt("First Key") === "Spider" && prompt("Second Key") === "Miles") {
        alert("Architect Access Granted");
      } else { alert("Access Denied"); }
    }

    // --- Oracle Logic with Typewriter ---
    let typingTimer;
    const oracleCircle = document.getElementById('oracle-circle');
    const shaderOverlay = document.getElementById('shader-overlay');
    const oracleMessage = document.getElementById('oracle-message');

    function getRandomColor() {
      const palette = ['#ff3366','#ff6f00','#d4af37','#66ff66','#00f2ff','#3366ff','#9933ff'];
      return palette[Math.floor(Math.random() * palette.length)];
    }

    function fadeInMessage(text) {
      clearTimeout(typingTimer);
      const newColor = getRandomColor();
      
      // UI Preparation
      oracleMessage.textContent = '';
      oracleMessage.style.opacity = 1;
      oracleCircle.style.borderColor = newColor;
      oracleCircle.style.boxShadow = `0 0 45px ${newColor}, inset 0 0 90px rgba(0,242,255,0.5)`;
      shaderOverlay.style.opacity = 0.85;

      let i = 0;
      function type() {
        if (i < text.length) {
          oracleMessage.textContent += text.charAt(i);
          i++;
          typingTimer = setTimeout(type, 50); // Speed
        } else {
          // Finished typing: schedule fade out
          setTimeout(() => {
            oracleMessage.style.opacity = 0.5; // Visual warning before close
            setTimeout(() => fadeOutMessage(), 1500);
          }, 8000);
        }
      }
      setTimeout(type, 300);
    }

    function fadeOutMessage() {
      shaderOverlay.style.opacity = 0;
      oracleMessage.style.opacity = 0;
      oracleCircle.style.borderColor = 'var(--gold)';
      oracleCircle.style.boxShadow = 'var(--glow-c)';
    }

    const cmd = document.getElementById('guest-cmd');
    document.getElementById('send-btn').addEventListener('click', () => {
      if (cmd.value.trim()) {
        fadeOutMessage();
        setTimeout(() => fadeInMessage(cmd.value.trim()), 400);
        cmd.value = '';
      }
    });

    cmd.addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('send-btn').click(); });
  </script>
</body>
</html>
