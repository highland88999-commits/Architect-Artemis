<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Artemis • Symbiote</title>
  <style>
    :root {
      --cyan:     #00f2ff;
      --gold:     #d4af37;
      --purple-shader: rgba(26, 0, 51, 0.82);
      --glass:    rgba(8, 8, 25, 0.45);
      --border:   rgba(0, 242, 255, 0.35);
      --glow-c:   0 0 40px rgba(0, 242, 255, 0.75);
      --glow-g:   0 0 45px rgba(212, 175, 55, 0.65);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body, html {
      width:100%; height:100%; overflow:hidden; background:#000;
      font-family: 'Courier New', monospace; color:var(--cyan);
      touch-action: none; /* improved drag precision */
    }

    /* Background video */
    #bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -20;
      opacity: 0.65;
      pointer-events: none;
      filter: brightness(1.1) contrast(1.15) drop-shadow(0 0 40px #00f2ff);
    }

    #container {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4vh 6vw;
      position: relative;
    }

    /* Oracle circle */
    #oracle-circle {
      width: 21rem;
      height: 21rem;
      border-radius: 50%;
      border: 9px solid var(--gold);
      box-shadow: var(--glow-c), inset 0 0 90px rgba(0,242,255,0.55);
      position: relative;
      overflow: hidden;
      cursor: pointer;
      margin-bottom: 7vh;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    #oracle-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center center;
    }

    #shader-overlay {
      position: absolute;
      inset: 0;
      background: var(--purple-shader);
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }

    #oracle-message {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--cyan);
      font-size: 1.8rem;
      font-weight: bold;
      text-align: center;
      padding: 20px;
      opacity: 0;
      transition: opacity 0.6s ease;
      text-shadow: 0 0 15px rgba(0,242,255,0.8);
      pointer-events: none;
      font-family: 'Courier New', monospace;
      letter-spacing: 1px;
      line-height: 1.4;
      text-transform: uppercase;
      animation: textPulse 2s infinite;
    }

    @keyframes textPulse {
      0%, 100% { text-shadow: 0 0 10px rgba(0,242,255,0.8); }
      50% { text-shadow: 0 0 20px rgba(0,242,255,1), 0 0 30px rgba(0,242,255,0.5); }
    }

    /* Prompt area */
    #prompt-area {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    #guest-cmd {
      width: 100%;
      padding: 18px 28px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 26px;
      color: var(--cyan);
      font-size: 1.35rem;
      backdrop-filter: blur(18px);
      box-shadow: inset 0 0 35px rgba(0,242,255,0.22);
    }

    #send-btn {
      padding: 16px 68px;
      background: linear-gradient(90deg, var(--cyan), #00aaff);
      color: #000;
      border: none;
      border-radius: 999px;
      font-weight: bold;
      font-size: 1.35rem;
      cursor: pointer;
      box-shadow: 0 0 55px var(--cyan);
      transition: all 0.3s;
    }

    #send-btn:hover {
      transform: scale(1.09);
      box-shadow: 0 0 90px var(--cyan);
    }

    /* Dock orb */
    #dock-orb {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      width: 96px;
      height: 96px;
      background: var(--glass);
      border-radius: 50%;
      border: 3px solid var(--cyan);
      backdrop-filter: blur(22px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: var(--gold);
      cursor: pointer;
      box-shadow: var(--glow-c);
      z-index: 100;
    }

    #dock-expanded {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      flex-wrap: wrap;
      gap: 26px;
      padding: 32px 44px;
      background: var(--glass);
      border-radius: 44px;
      border: 1px solid var(--border);
      backdrop-filter: blur(26px);
      max-width: 96vw;
      z-index: 100;
      user-select: none; /* prevent text selection during drag */
    }

    .app-icon, .folder {
      width: 76px;
      height: 76px;
      background: rgba(0,242,255,0.18);
      border-radius: 24px;
      border: 1px solid var(--cyan);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .app-icon:hover, .folder:hover {
      transform: scale(1.1);
      box-shadow: var(--glow-c);
    }

    .app-icon svg {
      width: 42px;
      height: 42px;
      fill: var(--cyan);
    }

    /* Folder style – stacked icons */
    .folder {
      background: rgba(0,242,255,0.28);
      overflow: hidden;
    }

    .folder.expanded {
      width: auto;
      height: auto;
      padding: 12px;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 12px;
    }

    .folder .app-icon {
      width: 60px;
      height: 60px;
      margin: 4px;
    }

    /* Lightning orb – symbiote backend */
    #lightning-orb {
      position: fixed;
      bottom: 36px;
      right: 36px;
      width: 84px;
      height: 84px;
      background: rgba(212,175,55,0.22);
      border: 4px solid var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: var(--glow-g);
      z-index: 110;
      animation: pulse-gold 4.5s infinite;
    }

    @keyframes pulse-gold {
      0%,100% { box-shadow: 0 0 45px var(--gold); }
      50%     { box-shadow: 0 0 95px var(--gold); }
    }

    /* Holo overlay */
    #holo-overlay {
      display: none;
      position: fixed;
      inset: 5%;
      background: var(--glass);
      border: 1px solid var(--cyan);
      border-radius: 36px;
      backdrop-filter: blur(30px);
      box-shadow: 0 0 110px rgba(0,242,255,0.65);
      z-index: 200;
      flex-direction: column;
    }

    .holo-header {
      padding: 22px;
      background: rgba(0,242,255,0.22);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .holo-close {
      width: 48px;
      height: 48px;
      background: #ff3366;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #000;
      font-weight: bold;
      font-size: 1.7rem;
    }

    #holo-iframe {
      flex: 1;
      border: none;
    }

    /* Dragging style */
    .dragging {
      opacity: 0.7;
      transform: scale(1.15);
      z-index: 9999;
      pointer-events: none;
    }

    .drag-target {
      box-shadow: 0 0 20px var(--cyan);
      transform: scale(1.15);
    }
  </style>
</head>
<body>

  <!-- Background video -->
  <video id="bg-video" autoplay loop muted playsinline preload="auto">
    <source src="https://files.catbox.moe/jhxjmx.mp4" type="video/mp4">
  </video>

  <div id="container">
    <!-- Oracle circle -->
    <div id="oracle-circle">
      <video id="oracle-video" autoplay loop muted playsinline>
        <source src="https://files.catbox.moe/no2e76.mp4" type="video/mp4">
      </video>
      <div id="shader-overlay"></div>
      <div id="oracle-message"></div>
    </div>

    <!-- Prompt area -->
    <div id="prompt-area">
      <input type="text" id="guest-cmd" placeholder="Speak to Artemis..." autocomplete="off"/>
      <button id="send-btn">SEND</button>
    </div>

    <!-- Dock orb -->
    <div id="dock-orb" onclick="toggleDock()">+</div>

    <!-- Expanded dock with drag & folder support -->
    <div id="dock-expanded">

      <div class="app-icon" data-url="https://instagram.com"><svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073z"/></svg></div>

      <div class="app-icon" data-url="https://messenger.facebook.com"><svg viewBox="0 0 24 24"><path d="M12 2C6.36 2 2 6.13 2 11.7c0 2.9 1.17 5.46 3.07 7.23V22l3-1.65c.61.17 1.25.26 1.93.26 5.64 0 10-4.13 10-9.7S17.64 2 12 2zm1.06 12.96l-2.58-2.73-5.04 2.73 5.54-5.89 2.65 2.73 4.97-2.73-5.54 5.89z"/></svg></div>

      <!-- Native Olympian apps – holo iframe -->
      <div class="app-icon" data-url="https://olympus-lac.vercel.app/" data-holo="true"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>

      <div class="app-icon" data-url="https://play.google.com/store" data-holo="true"><svg viewBox="0 0 24 24"><path d="M3.25 2.25v19.5l17.5-9.75-17.5-9.75z"/></svg></div>

      <div class="app-icon" onclick="toggleDock()">×</div>
    </div>
  </div>

  <!-- Lightning orb – symbiote backend -->
  <div id="lightning-orb" onclick="openApp('https://nexus-symbiote.onrender.com/')">
    <svg viewBox="0 0 24 24" width="46" height="46" fill="var(--gold)">
      <path d="M13 10V3L4 14h7v7l9-11h-7z"/>
    </svg>
  </div>

  <!-- Holo overlay -->
  <div id="holo-overlay" style="display:none;">
    <div class="holo-header">
      <span>Artemis View</span>
      <div class="holo-close" onclick="closeHolo()">×</div>
    </div>
    <iframe id="holo-iframe"></iframe>
  </div>

  <script>
    // Mobile Autoplay Fix
    window.addEventListener('load', function() {
      const videos = document.querySelectorAll('video');
      videos.forEach(video => {
        const playPromise = video.play();
        if (playPromise !== undefined) {
          playPromise.catch(() => {
            document.body.addEventListener('touchstart', () => video.play(), { once: true });
          });
        }
      });
    });

    // Dock & App Opening
    function toggleDock() {
      const orb = document.getElementById('dock-orb');
      const expanded = document.getElementById('dock-expanded');
      orb.style.display = expanded.style.display === 'flex' ? 'flex' : 'none';
      expanded.style.display = expanded.style.display === 'flex' ? 'none' : 'flex';
    }

    function openApp(url) {
      window.open(url, '_blank');
      toggleDock();
    }

    function openHolo(url) {
      document.getElementById('holo-iframe').src = url;
      document.getElementById('holo-overlay').style.display = 'flex';
      toggleDock();
    }

    function closeHolo() {
      document.getElementById('holo-overlay').style.display = 'none';
    }

    // === Drag & Drop + Folder System ===
    let draggedIcon = null;
    let holdTimer;
    const holdDelay = 500; // ms to start drag

    const dockExpanded = document.getElementById('dock-expanded');

    dockExpanded.addEventListener('touchstart', (e) => {
      const icon = e.target.closest('.app-icon:not([onclick])'); // avoid close button
      if (!icon) return;

      holdTimer = setTimeout(() => {
        draggedIcon = icon;
        draggedIcon.classList.add('dragging');
        draggedIcon.style.position = 'absolute';
        draggedIcon.style.zIndex = '9999';
        moveAt(e.touches[0]);
      }, holdDelay);

      e.preventDefault();
    });

    document.addEventListener('touchmove', (e) => {
      if (!draggedIcon) return;
      e.preventDefault();
      moveAt(e.touches[0]);
    });

    document.addEventListener('touchend', (e) => {
      clearTimeout(holdTimer);
      if (!draggedIcon) return;

      const target = e.changedTouches[0];
      const dropTarget = getElementAtPoint(target.clientX, target.clientY);

      if (dropTarget && dropTarget.classList.contains('folder')) {
        // Drop into folder
        dropTarget.appendChild(draggedIcon);
        draggedIcon.classList.remove('dragging');
        draggedIcon.style.position = '';
        draggedIcon.style.zIndex = '';
      } else if (dropTarget && dropTarget.classList.contains('app-icon')) {
        // Swap positions
        const parent = dockExpanded;
        const children = Array.from(parent.children);
        const draggedIdx = children.indexOf(draggedIcon);
        const targetIdx = children.indexOf(dropTarget);
        if (draggedIdx < targetIdx) {
          parent.insertBefore(draggedIcon, dropTarget.nextSibling);
        } else {
          parent.insertBefore(draggedIcon, dropTarget);
        }
      } else {
        // Drop back to original position or anywhere
      }

      draggedIcon.classList.remove('dragging');
      draggedIcon.style.position = '';
      draggedIcon.style.zIndex = '';
      draggedIcon = null;
    });

    function moveAt(touch) {
      if (!draggedIcon) return;
      draggedIcon.style.left = touch.clientX - draggedIcon.offsetWidth / 2 + 'px';
      draggedIcon.style.top = touch.clientY - draggedIcon.offsetHeight / 2 + 'px';
    }

    function getElementAtPoint(x, y) {
      const elem = document.elementFromPoint(x, y);
      return elem ? elem.closest('.app-icon, .folder') : null;
    }

    // Long-press on folder to expand/collapse (optional visual feedback)
    dockExpanded.addEventListener('touchstart', (e) => {
      const folder = e.target.closest('.folder');
      if (!folder) return;
      // Toggle expanded state on long press if needed
    });

    // Prompt submission (unchanged)
    const cmd = document.getElementById('guest-cmd');
    document.getElementById('send-btn').addEventListener('click', () => {
      const text = cmd.value.trim();
      if (text) {
        fadeInMessage(text);
        cmd.value = '';
      }
    });

    cmd.addEventListener('keypress', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('send-btn').click();
      }
    });

    // Fade-in message (typewriter already in previous code – keep it)
    // ... (paste your existing fadeInMessage, fadeOutMessage, getRandomColor here) ...
  </script>
</body>
</html>
