<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Artemis • Architect Symbiote</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>

  <style>
    :root {
      --cyan: #00f2ff; --gold: #d4af37; --red: #ff3366; --purple: #8a2be2;
      --active-color: var(--cyan);
      --glass: rgba(8, 8, 25, 0.92); 
      --border: rgba(0, 242, 255, 0.35);
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    body, html { 
      width:100%; height:100%; overflow:hidden; 
      background:#000; font-family: 'Courier New', monospace; 
      color:var(--active-color); 
    }

    .video-container { position: fixed; inset: 0; z-index: 0; opacity: 0.28; pointer-events: none; }
    #bg-video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.45) contrast(1.1); }

    #container { 
      position: relative; z-index: 10; 
      display: flex; flex-direction: column; 
      align-items: center; justify-content: space-between;
      height: 100dvh; 
      padding: 20px 20px 120px 20px; 
    }

    #oracle-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    #oracle-circle { 
      width: clamp(160px, 28vh, 260px); height: clamp(160px, 28vh, 260px); 
      border-radius: 50%; border: 4px solid var(--active-color);
      box-shadow: 0 0 35px var(--active-color), inset 0 0 45px var(--active-color), 0 0 80px rgba(0, 242, 255, 0.15);
      position: relative; overflow: hidden; background: #000;
      transition: all 0.6s ease;
    }
    #oracle-video { width: 100%; height: 100%; object-fit: cover; mix-blend-mode: screen; filter: contrast(1.15) saturate(1.3); }

    #council-status { 
      font-size: 11px; color: var(--active-color); background: rgba(0,0,0,0.92); 
      padding: 6px 18px; border-radius: 30px; border: 1px solid var(--border);
      letter-spacing: 4px; text-transform: uppercase;
      box-shadow: 0 0 12px var(--active-color);
      transition: all 0.4s ease;
    }

    #mall-link-container {
      width: 100%; max-width: 520px; height: 88px; 
      position: relative; overflow: hidden; border-radius: 16px;
      border: 2px solid var(--border); background: rgba(0,0,0,0.96);
      display: flex; align-items: center; justify-content: center;
      text-decoration: none; transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      box-shadow: 0 0 25px rgba(0, 242, 255, 0.2);
    }
    #mall-link-container:hover { border-color: var(--active-color); box-shadow: 0 0 40px var(--active-color); transform: translateY(-2px); }

    #starfield-canvas { position: absolute; inset: 0; z-index: 1; transition: filter 0.6s ease; }

    #input-stack { width: 100%; max-width: 520px; display: flex; flex-direction: column; gap: 14px; }
    .input-wrapper { 
      background: var(--glass); border: 1px solid var(--border); 
      border-radius: 50px; padding: 14px 28px;
      box-shadow: inset 0 0 20px rgba(0, 242, 255, 0.1);
    }
    #guest-cmd { 
      width: 100%; background: transparent; border: none; color: #fff; 
      outline: none; text-align: center; font-size: 1.05rem; 
    }
    #guest-cmd::placeholder { color: rgba(255,255,255,0.45); letter-spacing: 1px; }

    #send-btn { 
      background: var(--active-color); color: #000; border-radius: 50px; 
      padding: 16px 0; font-weight: 900; border: none; cursor: pointer; 
      letter-spacing: 3px; font-size: 0.95rem;
      box-shadow: 0 0 25px var(--active-color);
      transition: all 0.3s ease;
    }
    #send-btn:hover { transform: scale(1.03); box-shadow: 0 0 35px var(--active-color); }

    /* NEW: RESPONSE AREA */
    #response-area {
      width: 100%; max-width: 520px;
      background: var(--glass); 
      border: 1px solid var(--border); 
      border-radius: 16px;
      padding: 18px 24px;
      min-height: 120px;
      font-size: 1rem;
      line-height: 1.5;
      color: #fff;
      display: none;
      position: relative;
      box-shadow: 0 0 20px rgba(0, 242, 255, 0.15);
      cursor: pointer;
    }
    #response-area.show { display: block; }
    #response-area:hover { border-color: var(--active-color); }

    #read-aloud-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(212, 175, 55, 0.9);
      color: #000;
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      font-size: 18px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 15px #d4af37;
    }
    #response-area.show #read-aloud-btn { display: flex; }

    .pip-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 8px; }
    .pip { 
      width: 6px; height: 6px; border-radius: 50%; background: var(--active-color); 
      box-shadow: 0 0 10px var(--active-color); 
      animation: pip-pulse 2s infinite alternate ease-in-out;
    }
    @keyframes pip-pulse { from { opacity: 0.4; transform: scale(0.85); } to { opacity: 1; transform: scale(1.15); } }

    #bottom-dock { 
      position: fixed; bottom: 22px; height: 54px; width: 92%; max-width: 520px;
      background: var(--glass); border-radius: 40px; border: 1px solid var(--border); 
      left: 50%; transform: translateX(-50%); z-index: 100; 
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }
    #dock-text { color:var(--active-color); font-size: 9px; letter-spacing: 3px; font-weight: bold; opacity: 0.75; }
  </style>
</head>
<body>

<div class="video-container">
  <video id="bg-video" autoplay loop muted playsinline src="https://www.dropbox.com/scl/fi/x93qcdd64hcpedqn2murk/grok_video_2026-02-20-06-12-55.mp4?rlkey=q51etky32dg2gsrx3w3sez1s8&raw=1"></video>
</div>

<div id="container">
  <div id="oracle-wrap">
    <div id="oracle-circle">
      <video id="oracle-video" autoplay loop muted playsinline src="https://files.catbox.moe/no2e76.mp4"></video>
    </div>
    <div class="pip-row">
      <div class="pip"></div><div class="pip"></div><div class="pip"></div>
    </div>
    <div id="council-status">[SENSE: NEUTRAL]</div>
  </div>

  <a href="https://hermes-landing-nu.vercel.app/" id="mall-link-container" target="_blank">
      <canvas id="starfield-canvas"></canvas>
  </a>

  <div id="input-stack">
    <div class="input-wrapper">
      <input type="text" id="guest-cmd" placeholder="Command Artemis..." autocomplete="off">
    </div>
    <button id="send-btn">TRANSMIT TO OLYMPUS</button>
  </div>

  <!-- NEW RESPONSE FIELD -->
  <div id="response-area">
    <div id="response-text">Artemis is listening...</div>
    <button id="read-aloud-btn" title="Read aloud">🔊</button>
  </div>
</div>

<div id="bottom-dock">
    <div id="dock-text">OLYMPUS ROOT • STAGING v0.8.5 // PORTALS ALIGNED</div>
</div>

<script>
  // --- THREE.JS STARFIELD (unchanged from previous) ---
  const mallCanvas = document.getElementById('starfield-canvas');
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, 520 / 88, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ canvas: mallCanvas, alpha: true, antialias: true });
  renderer.setSize(520, 88);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2.5));

  function getTextPoints(text, width, height) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = width; canvas.height = height;
    ctx.fillStyle = 'white';
    ctx.font = '900 48px "Courier New", monospace'; 
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = '#00f2ff';
    ctx.shadowBlur = 12;
    ctx.fillText(text, width / 2, height / 2);
    const data = ctx.getImageData(0, 0, width, height).data;
    const points = [];
    for (let y = 0; y < height; y += 2) {
      for (let x = 0; x < width; x += 2) {
        if (data[(y * width + x) * 4 + 3] > 140) {
          points.push({ x: (x - width / 2) * 0.027, y: -(y - height / 2) * 0.027 });
        }
      }
    }
    return points;
  }

  const textPoints = getTextPoints('ENTER THE MALL', 520, 88);
  const starGeo = new THREE.BufferGeometry();
  const posArr = new Float32Array(textPoints.length * 3);
  const origArr = new Float32Array(textPoints.length * 3);

  for (let i = 0; i < textPoints.length; i++) {
    posArr[i*3] = origArr[i*3] = textPoints[i].x;
    posArr[i*3+1] = origArr[i*3+1] = textPoints[i].y;
    posArr[i*3+2] = origArr[i*3+2] = Math.random() * 0.6 - 0.3;
  }

  starGeo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
  const starMat = new THREE.PointsMaterial({ size: 0.048, transparent: true, opacity: 0.95, blending: THREE.AdditiveBlending, depthTest: false });
  scene.add(new THREE.Points(starGeo, starMat));
  camera.position.z = 7.2;

  let time = 0;
  let currentHue = new THREE.Color(0x00f2ff);
  let state = 'neutral';
  const colors = [0x00f2ff, 0xd4af37, 0x8a2be2, 0xff3366];

  function animate() {
    requestAnimationFrame(animate);
    time += 0.035;
    const p = starGeo.attributes.position;
    for (let i = 0; i < textPoints.length; i++) {
      const idx = i * 3;
      p.array[idx]     = origArr[idx]     + Math.sin(time * 1.8 + origArr[idx] * 5) * 0.008;
      p.array[idx + 1] = origArr[idx + 1] + Math.cos(time * 1.6 + origArr[idx + 1] * 4) * 0.008;
      p.array[idx + 2] = Math.sin(time * 2 + i) * 0.15;
    }
    p.needsUpdate = true;

    if (state === 'neutral') {
      const target = colors[Math.floor((time * 0.07) % colors.length)];
      currentHue.lerp(new THREE.Color(target), 0.008);
      starMat.color.copy(currentHue);
    }

    const hex = "#" + starMat.color.getHexString();
    mallCanvas.style.filter = `drop-shadow(0 0 12px ${hex})`;
    renderer.render(scene, camera);
  }
  animate();

  // --- RESPONSE HANDLING ---
  const responseArea = document.getElementById('response-area');
  const responseText = document.getElementById('response-text');
  const readAloudBtn = document.getElementById('read-aloud-btn');
  const statusEl = document.getElementById('council-status');
  const root = document.documentElement;
  const oracleCircle = document.getElementById('oracle-circle');

  function showResponse(message) {
    responseText.textContent = message;
    responseArea.classList.add('show');
    
    // Auto-scroll to response on mobile
    responseArea.scrollIntoView({ behavior: "smooth" });
  }

  // Read aloud function (user-initiated)
  function readResponse() {
    if (!('speechSynthesis' in window)) {
      alert("Text-to-speech not supported on this device.");
      return;
    }
    const utterance = new SpeechSynthesisUtterance(responseText.textContent);
    utterance.rate = 0.95;
    utterance.pitch = 1.05;
    utterance.volume = 0.9;
    speechSynthesis.speak(utterance);
  }

  readAloudBtn.addEventListener('click', readResponse);

  // Click anywhere on response area also triggers read (optional, can remove if too sensitive)
  responseArea.addEventListener('click', (e) => {
    if (e.target !== readAloudBtn) {
      readResponse();
    }
  });

  // --- TRANSMIT LOGIC ---
  async function transmit() {
    const input = document.getElementById('guest-cmd');
    const val = input.value.trim();
    if (!val) return;

    statusEl.textContent = "[SIGNAL ACQUIRED...]";
    statusEl.style.color = "#ff3366";

    // Simulate thinking + response (replace this with real backend call later)
    setTimeout(() => {
      state = 'active';
      starMat.color.set(0xd4af37);
      statusEl.textContent = "[SENSE: GOLD — AWAKENED]";
      statusEl.style.color = "#d4af37";
      root.style.setProperty('--active-color', '#d4af37');
      oracleCircle.style.borderColor = '#d4af37';
      oracleCircle.style.boxShadow = '0 0 45px #d4af37, inset 0 0 55px #d4af37, 0 0 90px rgba(212, 175, 55, 0.25)';

      // Example dynamic response (customize based on input)
      let reply = `Command received: "${val}".\n\nThe Edmonton airbourifier factory is aligned. 100 units in Year 1 will ship to New Delhi to begin reversing pollution. The floating forest vision is locked in Phase 2 — funded by clean air revenue. Bio-culture protocols active. What is your next directive, Olympus?`;

      if (val.toLowerCase().includes("factory") || val.toLowerCase().includes("airbourifier")) {
        reply = "Factory status: Land secured. Workforce ready in Edmonton. Suppliers confirmed. First 100 large-scale 7–10m outdoor units scheduled for production. Bio-remediation systems will re-use live cultures. Ready for deployment to high-pollution zones.";
      }

      showResponse(reply);
      input.value = "";
    }, 850);
  }

  document.getElementById('send-btn').onclick = transmit;
  document.getElementById('guest-cmd').onkeypress = (e) => { if(e.key==='Enter') transmit(); };

  // Hermes easter egg
  let secretBuffer = "";
  document.addEventListener('keydown', (e) => {
    secretBuffer += e.key.toLowerCase();
    if (secretBuffer.length > 10) secretBuffer = secretBuffer.slice(-10);
    if (secretBuffer.includes("hermes")) {
      state = 'active';
      starMat.color.set(0xd4af37);
      statusEl.textContent = "[SENSE: GOLD — HERMES PROTOCOL]";
      root.style.setProperty('--active-color', '#d4af37');
      oracleCircle.style.borderColor = '#d4af37';
      secretBuffer = "";
    }
  });
</script>
</body>
</html>
