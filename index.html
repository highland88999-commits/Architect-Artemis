<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARTEMIS | INTEGRATED CORE</title>
    <style>
        :root {
            --bio-high: #00f2ff;
            --magma: #ff4500;
            --gold: #FFD700;
            --glass: rgba(0, 15, 25, 0.92);
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Courier New', monospace; color: white; overflow: hidden; }
        #reef-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; filter: brightness(0.3); }

        /* ARTEMIS CORE */
        #core-station { position: fixed; top: 8%; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; z-index: 100; }
        #artemis-prime { width: 150px; height: 150px; border-radius: 50%; border: 2px solid var(--bio-high); display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, var(--bio-high) 0%, transparent 75%); animation: pulse 6s infinite; cursor: pointer; }
        #council-grid { display: flex; gap: 15px; margin-top: 20px; }
        .intellect-node { width: 70px; height: 40px; border: 1px solid rgba(0, 242, 255, 0.2); background: rgba(0, 0, 0, 0.6); font-size: 0.5rem; color: #555; display: flex; align-items: center; justify-content: center; border-radius: 4px; transition: 0.4s; }
        .node-active { border-color: var(--bio-high); color: var(--bio-high); box-shadow: 0 0 10px var(--bio-high); }

        /* EXPLORER PANEL (Left) */
        #explorer-panel {
            position: fixed; left: -350px; top: 10%; width: 320px; height: 75%;
            background: var(--glass); border-right: 2px solid var(--bio-high);
            backdrop-filter: blur(20px); z-index: 300; transition: 0.5s ease-in-out;
            padding: 20px; border-radius: 0 15px 15px 0; display: flex; flex-direction: column;
        }
        #explorer-panel.open { left: 0; }
        .folder-header { font-size: 0.6rem; color: var(--gold); letter-spacing: 2px; border-bottom: 1px solid rgba(255,215,0,0.3); margin-bottom: 10px; padding-bottom: 5px; margin-top: 15px; }
        .file-item { font-size: 0.75rem; padding: 8px; cursor: pointer; border-radius: 4px; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .file-item:hover { background: rgba(0, 242, 255, 0.15); color: var(--bio-high); }

        /* FLOATING ARCHIVE WINDOW (Right) */
        #archive-window {
            position: fixed; top: 15%; right: 50px; width: 380px; height: 60vh;
            background: var(--glass); border: 1px solid var(--bio-high);
            backdrop-filter: blur(25px); border-radius: 15px; z-index: 200;
            display: flex; flex-direction: column; opacity: 0; transform: translateX(50px); pointer-events: none; transition: 0.5s;
        }
        #archive-window.visible { opacity: 1; transform: translateX(0); pointer-events: auto; }
        #archive-content { flex: 1; padding: 20px; overflow-y: auto; font-size: 0.85rem; line-height: 1.6; color: #ccc; }

        /* COMMAND PROMPT */
        #command-base { position: fixed; bottom: 30px; width: 90%; max-width: 800px; left: 50%; transform: translateX(-50%); z-index: 100; }
        #prompt-field { background: var(--glass); border: 2px solid var(--bio-high); border-radius: 12px; display: flex; padding: 10px; align-items: center; }
        #cmd-input { flex: 1; background: transparent; border: none; color: white; font-family: inherit; outline: none; }
        .btn-main { background: var(--bio-high); border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 6px; margin-left: 10px; font-family: inherit; }

        @keyframes pulse { 0%, 100% { box-shadow: 0 0 30px rgba(0,242,255,0.2); } 50% { box-shadow: 0 0 70px var(--bio-high); } }
    </style>
</head>
<body>

<video autoplay muted loop playsinline id="reef-bg">
    <source src="https://assets.mixkit.co/videos/preview/mixkit-underwater-coral-reef-with-many-fishes-4152-large.mp4" type="video/mp4">
</video>

<div id="explorer-panel">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <span style="font-size: 0.8rem; font-weight: bold; color: var(--bio-high);">STEWARDSHIP_EXPLORER</span>
        <button onclick="toggleExplorer()" style="background:transparent; border:none; color:var(--bio-high); cursor:pointer;">[CLOSE]</button>
    </div>
    <div class="folder-header">📂 HARVESTED_REPORTS</div>
    <div id="folder-harvests"></div>
    <div class="folder-header">💡 CREATIVE_IDEAS</div>
    <div id="folder-ideas"></div>
</div>

<div id="archive-window">
    <div style="padding:15px; border-bottom:1px solid rgba(0,242,255,0.2); display:flex; justify-content:space-between;">
        <span id="file-title" style="color:var(--gold); font-size:0.7rem;">READY</span>
        <button onclick="closeArchive()" style="background:transparent; border:none; color:var(--magma); cursor:pointer;">[X]</button>
    </div>
    <div id="archive-content">Select a record to read...</div>
    <div style="padding:15px; border-top:1px solid rgba(0,242,255,0.2); display:flex; gap:10px;">
        <button class="btn-main" style="font-size:0.6rem; padding:5px 10px;" onclick="readAloud()">🔊 READ TO ME</button>
        <button class="btn-main" style="background:transparent; border:1px solid var(--gold); color:var(--gold); font-size:0.6rem; padding:5px 10px;" onclick="syncGitHub()">🔄 SYNC GITHUB</button>
    </div>
</div>

<div id="core-station">
    <div id="artemis-prime" onclick="toggleExplorer()">
        <span style="letter-spacing:4px; font-size:0.8rem;">ARTEMIS</span>
        <span id="status-tag" style="font-size:0.4rem; color:var(--bio-high); margin-top:5px;">IDLE</span>
    </div>
    <div id="council-grid">
        <div class="intellect-node" id="node-gemini">GEMINI</div>
        <div class="intellect-node" id="node-copilot">COPILOT</div>
        <div class="intellect-node" id="node-grok">GROK</div>
    </div>
</div>

<div id="command-base">
    <div style="margin-bottom:10px; display:flex; align-items:center; gap:10px;">
        <input type="checkbox" id="recursive-toggle" style="accent-color: var(--gold);">
        <label for="recursive-toggle" style="font-size: 0.6rem; color: var(--gold);">RECURSIVE_DIVE</label>
    </div>
    <div id="prompt-field">
        <input type="text" id="cmd-input" placeholder="Query or URL...">
        <button class="btn-main" onclick="handleTransmit()">TRANSMIT</button>
    </div>
</div>

<script>
    const synth = window.speechSynthesis;
    let currentText = "";

    const stewardshipArchive = {
        harvests: [{ name: "Initial_Scan.json", content: "Initial reef stability cataloged at 94%." }],
        ideas: [{ name: "Symbiote_Prime.md", content: "Concept for an autonomous protection layer." }]
    };

    // --- INTEGRATED LOGIC ---

    function handleTransmit() {
        const input = document.getElementById('cmd-input');
        const val = input.value.trim();
        if(!val) return;

        if(val.startsWith('http')) {
            runHarvest(val, document.getElementById('recursive-toggle').checked);
        } else {
            runLogicQuery(val);
        }
    }

    function runHarvest(url, recursive) {
        visualState(true, recursive ? "MAPPING_NETWORK" : "CRAWLING");
        speak("Artemis is harvesting from the surface.");

        setTimeout(() => {
            const name = recursive ? `Map_${Date.now()}.json` : `Crawl_${Date.now()}.json`;
            const content = `Target: ${url}\nType: ${recursive ? 'Recursive Map' : 'Standard Catalog'}\nStatus: Secured in GitHub.`;
            stewardshipArchive.harvests.unshift({ name, content });
            renderExplorer();
            visualState(false, "STATIONARY");
            inputReset();
        }, 3000);
    }

    function runLogicQuery(query) {
        visualState(true, "UTILIZING_COUNCIL");
        speak("Synthesizing intellect.");

        setTimeout(() => {
            const name = `Idea_${Math.floor(Math.random()*999)}.md`;
            const content = `Query: ${query}\nAnalysis: Artemis + Council have optimized this logic for deep-sea application.`;
            stewardshipArchive.ideas.unshift({ name, content });
            renderExplorer();
            visualState(false, "STATIONARY");
            inputReset();
        }, 3000);
    }

    // --- UI FUNCTIONS ---

    function toggleExplorer() {
        document.getElementById('explorer-panel').classList.toggle('open');
        if(document.getElementById('explorer-panel').classList.contains('open')) {
            renderExplorer();
            speak("Accessing the permanent record.");
        }
    }

    function renderExplorer() {
        const hDiv = document.getElementById('folder-harvests');
        const iDiv = document.getElementById('folder-ideas');
        hDiv.innerHTML = stewardshipArchive.harvests.map(f => `<div class="file-item" onclick="openFile('${f.name}', 'harvests')">📄 ${f.name}</div>`).join('');
        iDiv.innerHTML = stewardshipArchive.ideas.map(f => `<div class="file-item" onclick="openFile('${f.name}', 'ideas')">💡 ${f.name}</div>`).join('');
    }

    function openFile(name, cat) {
        const file = stewardshipArchive[cat].find(f => f.name === name);
        currentText = file.content;
        document.getElementById('file-title').innerText = name.toUpperCase();
        document.getElementById('archive-content').innerText = file.content;
        document.getElementById('archive-window').classList.add('visible');
    }

    function closeArchive() {
        document.getElementById('archive-window').classList.remove('visible');
        synth.cancel();
    }

    function readAloud() {
        if(synth.speaking) { synth.cancel(); return; }
        const u = new SpeechSynthesisUtterance(currentText);
        u.pitch = 0.8;
        synth.speak(u);
    }

    function visualState(active, status) {
        document.getElementById('artemis-prime').style.animation = active ? "pulse 1.5s infinite" : "pulse 6s infinite";
        document.getElementById('status-tag').innerText = status;
    }

    function inputReset() { document.getElementById('cmd-input').value = ""; }

    function speak(t) { synth.speak(new SpeechSynthesisUtterance(t)); }
    
    function syncGitHub() {
        speak("Synchronizing with GitHub repository.");
        visualState(true, "SYNCING_GIT");
        setTimeout(() => visualState(false, "STATIONARY"), 2000);
    }
</script>
</body>
</html>
