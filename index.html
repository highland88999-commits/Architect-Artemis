<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARTEMIS | MIDAS_INTEL</title>
    <style>
        :root { --bio: #00f2ff; --accent: #d4af37; --glass: rgba(0, 242, 255, 0.08); }
        body, html { margin: 0; padding: 0; background: #000; font-family: 'Courier New', monospace; color: white; overflow: hidden; height: 100%; }
        
        #artemis-omni-chassis {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 98%; height: 95vh; background: var(--glass); backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 242, 255, 0.15); border-radius: 8px;
            display: flex; flex-direction: column; z-index: 10;
        }

        #main-container { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 240px; border-right: 1px solid rgba(0,242,255,0.1); padding: 15px; overflow-y: auto; background: rgba(0,0,0,0.6); }
        #terminal-core { flex: 1; display: flex; flex-direction: column; position: relative; }
        #console-output { flex: 1; overflow-y: auto; display: flex; flex-direction: column-reverse; padding: 20px; }

        /* NEURAL EDITOR */
        #neural-editor {
            position: absolute; top: 5%; left: 5%; width: 90%; height: 80%;
            background: rgba(0, 10, 20, 0.98); border: 1px solid var(--bio);
            border-radius: 8px; z-index: 100; display: none; flex-direction: column;
        }

        /* AUTO-COMPLETE BOX */
        #autocomplete-box {
            position: absolute; bottom: 70px; left: 45px; background: #001a1d;
            border: 1px solid var(--bio); border-radius: 4px; display: none;
            flex-direction: column; min-width: 150px; z-index: 200; box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
        }
        .suggestion { padding: 8px 12px; font-size: 0.8rem; color: var(--bio); cursor: pointer; border-bottom: 1px solid rgba(0,242,255,0.1); }
        .suggestion:hover { background: var(--bio); color: #000; }

        .file-item { padding: 8px 10px; cursor: pointer; color: var(--bio); font-size: 0.8rem; }
        #input-dock { border-top: 1px solid rgba(0,242,255,0.2); padding: 15px; display: flex; gap: 10px; align-items: center; background: rgba(0,0,0,0.8); }
        #master-cmd { flex: 1; background: transparent; border: none; color: var(--bio); font-size: 1.1rem; outline: none; }
        
        .log { margin-bottom: 8px; font-size: 0.8rem; line-height: 1.4; white-space: pre-wrap; }
        .midas-log { color: var(--accent); border-left: 2px solid var(--accent); padding-left: 12px; }
    </style>
</head>
<body>

<div id="artemis-omni-chassis">
    <div id="main-container">
        <aside id="sidebar">
            <div style="color:var(--accent); font-size:0.7rem; font-weight:bold; margin-bottom:10px;">FILESYSTEM</div>
            <div id="repo-files"></div>
        </aside>

        <section id="terminal-core">
            <div id="autocomplete-box"></div>
            
            <div id="neural-editor">
                <div style="padding:10px; display:flex; justify-content:space-between; background:rgba(0,242,255,0.1)">
                    <span id="editor-filename">file.js</span>
                    <button onclick="document.getElementById('neural-editor').style.display='none'">CLOSE</button>
                </div>
                <textarea id="editor-text" style="flex:1; background:transparent; color:var(--bio); padding:20px; border:none; outline:none; font-family:monospace;"></textarea>
            </div>

            <div id="console-output"></div>
            
            <form id="input-form" style="display:contents">
                <div id="input-dock">
                    <span style="color:var(--bio); font-weight:bold;">λ</span>
                    <input type="text" id="master-cmd" placeholder="Type run, map, or code..." autocomplete="off">
                </div>
            </form>
        </section>
    </div>
</div>

<script>
const REPO = 'highland8899-commits/Artemis-Sync';
const masterCmd = document.getElementById('master-cmd');
const acBox = document.getElementById('autocomplete-box');

// --- MIDAS PREDICTION DATA ---
const dictionary = [
    'run ', 'map', 'ls', 'cd ', 'clear', 'status',
    'console.log(', 'function ', 'const ', 'let ', 'return ',
    'Math.random()', 'document.querySelector(', 'Artemis.sync()'
];

// --- AUTO-COMPLETE LOGIC ---
masterCmd.addEventListener('input', (e) => {
    const val = e.target.value.toLowerCase();
    const lastWord = val.split(' ').pop();
    
    if (lastWord.length < 1) { acBox.style.display = 'none'; return; }

    const matches = dictionary.filter(s => s.toLowerCase().startsWith(lastWord));
    
    if (matches.length > 0) {
        acBox.innerHTML = '';
        matches.slice(0, 5).forEach(m => {
            const div = document.createElement('div');
            div.className = 'suggestion';
            div.innerText = m;
            div.onclick = () => {
                const words = val.split(' ');
                words.pop();
                masterCmd.value = (words.join(' ') + ' ' + m).trim();
                acBox.style.display = 'none';
                masterCmd.focus();
            };
            acBox.appendChild(div);
        });
        acBox.style.display = 'flex';
    } else {
        acBox.style.display = 'none';
    }
});

// --- EXECUTION CORE ---
document.getElementById('input-form').onsubmit = (e) => {
    e.preventDefault();
    const cmd = masterCmd.value;
    logEvent(cmd.toUpperCase(), "system");
    
    if (cmd.startsWith('run ')) {
        try {
            const res = eval(cmd.substring(4));
            logEvent(`[RESULT]: ${res}`, "midas");
        } catch(err) { logEvent(`[ERROR]: ${err.message}`, "error"); }
    }
    
    masterCmd.value = '';
    acBox.style.display = 'none';
};

function logEvent(msg, type) {
    const div = document.createElement('div');
    div.className = `log ${type === 'midas' ? 'midas-log' : ''}`;
    div.innerHTML = msg;
    document.getElementById('console-output').prepend(div);
}

window.onload = () => logEvent("Midas Intelligence Layer v8.0 Active.", "midas");
</script>
</body>
</html>
