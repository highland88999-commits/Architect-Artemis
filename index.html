<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARTEMIS | RENDER_FLOW</title>
    <style id="dynamic-theme">
        :root {
            --bio-high: #00f2ff;
            --render-hex: #4642ff;
            --glass-ultra: rgba(0, 242, 255, 0.02);
            --border-glow: rgba(0, 242, 255, 0.15);
        }
    </style>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Courier New', monospace; color: white; overflow: hidden; }
        #reef-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; filter: brightness(0.5); transition: 1.5s; }

        /* CORE */
        #core-station { position: fixed; top: 5%; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; z-index: 100; }
        #artemis-prime { width: 90px; height: 90px; border-radius: 50%; border: 1px solid var(--border-glow); display: flex; align-items: center; justify-content: center; background: transparent; cursor: pointer; backdrop-filter: blur(5px); transition: 0.5s; }
        #artemis-label { font-size: 0.7rem; font-weight: bold; text-shadow: 0 0 10px var(--bio-high); letter-spacing: 3px; }

        /* GHOST TERMINAL */
        #response-frame { position: fixed; top: 20%; left: 50%; transform: translateX(-50%); width: 750px; max-height: 70vh; background: var(--glass-ultra); border: 1px solid var(--border-glow); padding: 25px; z-index: 90; opacity: 0; transition: 0.6s; backdrop-filter: blur(8px); border-radius: 15px; }
        #response-frame.active { opacity: 1; top: 24%; }
        
        .infra-header { font-size: 0.5rem; color: var(--render-hex); margin-bottom: 15px; border-bottom: 1px solid rgba(70, 66, 255, 0.2); padding-bottom: 8px; display: flex; justify-content: space-between; font-weight: bold; }
        
        /* PROGRESS BAR */
        #build-bar-container { width: 100%; height: 2px; background: rgba(255,255,255,0.05); margin-bottom: 20px; display: none; overflow: hidden; position: relative; }
        #build-bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, transparent, var(--bio-high), var(--render-hex)); transition: width 0.4s ease; box-shadow: 0 0 10px var(--bio-high); }

        #terminal-out { font-family: 'Consolas', monospace; font-size: 0.85rem; color: #d1d1d1; line-height: 1.4; height: 250px; overflow-y: auto; }
        .log-entry { margin-bottom: 5px; animation: slideIn 0.2s ease-out; }
        .status-up { color: #00ffaa; font-weight: bold; }
        .status-deploy { color: var(--render-hex); font-weight: bold; }

        /* COMMAND BASE */
        #command-base { position: fixed; bottom: 40px; width: 85%; max-width: 900px; left: 50%; transform: translateX(-50%); z-index: 100; }
        #prompt-field { background: transparent; border-bottom: 1px solid var(--border-glow); display: flex; padding: 10px 0; }
        #cmd-input { flex: 1; background: transparent; border: none; color: white; font-family: inherit; outline: none; font-size: 1rem; }
        .btn-main { background: transparent; border: 1px solid var(--bio-high); padding: 5px 20px; cursor: pointer; color: var(--bio-high); font-size: 0.65rem; transition: 0.3s; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-5px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

<img id="reef-bg" src="https://images.unsplash.com/photo-1544551763-46a013bb70d5?auto=format&fit=crop&w=1920&q=80">

<div id="response-frame">
    <div class="infra-header">
        <span>[RENDER_BUILD_PIPELINE]</span>
        <span id="build-status">IDLE</span>
    </div>
    
    <div id="build-bar-container">
        <div id="build-bar-fill"></div>
    </div>

    <div id="terminal-out">
        <div class="log-entry">> Artemis Core standing by for deployment instructions...</div>
    </div>
</div>

<div id="core-station">
    <div id="artemis-prime" onclick="simulateDeploy()">
        <span id="artemis-label">ARTEMIS</span>
    </div>
</div>

<div id="command-base">
    <div id="prompt-field">
        <input type="text" id="cmd-input" placeholder="Type 'deploy' to initiate Render build...">
        <button class="btn-main" onclick="handleTransmit()">TRANSMIT</button>
    </div>
</div>

<script>
    const synth = window.speechSynthesis;

    function log(msg, type = "info") {
        const term = document.getElementById('terminal-out');
        const div = document.createElement('div');
        div.className = 'log-entry';
        let prefix = type === "success" ? "<span class='status-up'>[OK]</span>" : 
                     type === "deploy" ? "<span class='status-deploy'>[BUILD]</span>" : ">";
        div.innerHTML = `${prefix} ${msg}`;
        term.appendChild(div);
        term.scrollTop = term.scrollHeight;
    }

    async function handleTransmit() {
        const input = document.getElementById('cmd-input');
        const query = input.value.trim().toLowerCase();
        if(!query) return;
        input.value = "";

        document.getElementById('response-frame').classList.add('active');

        if (query.includes("deploy")) {
            simulateDeploy();
        } else {
            log(`Instruction received: ${query}`);
            speak(`Acknowledged. Awaiting deployment authorization.`);
        }
    }

    function simulateDeploy() {
        const barContainer = document.getElementById('build-bar-container');
        const barFill = document.getElementById('build-bar-fill');
        const statusTag = document.getElementById('build-status');
        const frame = document.getElementById('response-frame');

        frame.classList.add('active');
        barContainer.style.display = 'block';
        barFill.style.width = '0%';
        statusTag.innerText = 'IN_PROGRESS';
        
        log("Triggering Render.com Blueprint sync...", "deploy");
        speak("Initiating build sequence. Synchronizing logic strings with Render infrastructure.");

        const buildSteps = [
            { p: 15, msg: "Cloning repository 'artemis-sentient-core'..." },
            { p: 35, msg: "Installing dependencies (npm install)..." },
            { p: 60, msg: "Compiling neural assets and visual shaders..." },
            { p: 85, msg: "Uploading build artifacts to global edge..." },
            { p: 100, msg: "Deployment successful. Service is LIVE." }
        ];

        buildSteps.forEach((step, index) => {
            setTimeout(() => {
                barFill.style.width = `${step.p}%`;
                log(step.msg, step.p === 100 ? "success" : "info");
                
                if(step.p === 100) {
                    statusTag.innerText = 'STABLE';
                    document.getElementById('reef-bg').style.filter = "brightness(0.7) saturate(1.5)";
                    setTimeout(() => {
                        document.getElementById('reef-bg').style.filter = "brightness(0.5) saturate(1)";
                        barContainer.style.display = 'none';
                    }, 3000);
                }
            }, (index + 1) * 1200);
        });
    }

    function speak(text) {
        synth.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.pitch = 0.95;
        synth.speak(u);
    }
</script>
</body>
</html>
