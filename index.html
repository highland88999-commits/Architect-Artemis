<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARTEMIS | ABYSSAL REEF</title>
    <style>
        :root {
            --bio-high: #00f2ff;
            --magma: #ff4500;
            --gold: #FFD700;
            --glass: rgba(0, 20, 30, 0.85);
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Courier New', monospace; color: white; overflow: hidden; }
        
        #reef-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; filter: brightness(0.4) saturate(1.2); }
        
        canvas#particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

        /* ARTEMIS SYMBIOTE STYLING */
        #artemis-container { position: fixed; top: 20%; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; z-index: 5; }

        #artemis-orb {
            width: 130px; height: 130px; border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.4) 0%, transparent 80%);
            box-shadow: 0 0 60px rgba(0, 242, 255, 0.3), inset 0 0 20px var(--bio-high);
            animation: breathe 8s ease-in-out infinite;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(8px);
            cursor: pointer; transition: 0.5s;
        }

        #council-summoner {
            margin-top: 20px; width: 45px; height: 45px; border-radius: 50%;
            border: 1px solid var(--bio-high); display: flex; align-items: center; justify-content: center;
            cursor: pointer; background: rgba(0, 26, 51, 0.6); transition: 0.3s;
            box-shadow: 0 0 15px var(--bio-low); font-size: 1.2rem;
        }
        #council-summoner:hover { box-shadow: 0 0 25px var(--bio-high); transform: scale(1.1); }

        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } }

        /* PANELS */
        .widget-panel {
            position: fixed; bottom: 220px; width: 90%; max-width: 500px; height: 350px;
            background: var(--glass); border: 1px solid var(--bio-high);
            backdrop-filter: blur(15px); padding: 15px; display: none; z-index: 100;
        }

        #ui-layer { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 20px; }
        
        #icon-dock { display: flex; gap: 15px; margin-bottom: 15px; background: rgba(0,10,20,0.7); padding: 12px 25px; border-radius: 40px; border: 1px solid var(--bio-high); }
        .app-icon { width: 50px; height: 50px; border-radius: 12px; border: 1px solid var(--bio-high); background: rgba(0,26,51,0.9); display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>

<video autoplay muted loop playsinline id="reef-bg">
    <source src="https://assets.mixkit.co/videos/preview/mixkit-underwater-coral-reef-with-many-fishes-4152-large.mp4" type="video/mp4">
</video>
<canvas id="particleCanvas"></canvas>

<div id="artemis-container">
    <div id="artemis-orb" onclick="artemisPulse()">
        <div style="font-size: 0.5rem; letter-spacing: 2px; text-align: center;">ARTEMIS<br><span id="pulse-text" style="opacity:0.5;">AWAITING</span></div>
    </div>
    <div id="council-summoner" onclick="togglePanel('panel-council')" title="Summon Council">🏛️</div>
</div>

<div id="ui-layer">
    <div id="gate-zone" style="text-align:center; margin-bottom: 30vh;">
        <input type="text" id="gate-input" style="background:transparent; border:none; border-bottom:2px solid var(--bio-high); color:white; text-align:center; outline:none; font-size:1.5rem; letter-spacing:10px;" placeholder="[...]">
    </div>

    <div id="panel-council" class="widget-panel">
        <div style="color:var(--gold); font-size:0.6rem; border-bottom:1px solid var(--bio-high); padding-bottom:5px; margin-bottom:10px;">🏛️ THE COUNCIL OF THREE</div>
        <div id="council-output" style="font-size:0.7rem; line-height:1.6;">
            > GEMINI: <span style="color:var(--bio-high)">SCANNING_REEF</span><br>
            > COPILOT: <span style="color:var(--bio-high)">SYNCING_BLUEPRINTS</span><br>
            > GROK: <span style="color:var(--bio-high)">ANALYZING_FLUX</span>
        </div>
    </div>

    <div id="main-station" style="display:none; width: 100%; align-items: center; flex-direction: column;">
        <div id="icon-dock">
            <div class="app-icon" onclick="togglePanel('panel-logs')">📂</div>
            <div class="app-icon" style="border-color:var(--gold); color:var(--gold);" onclick="summonMidas()">📀</div>
            <div class="app-icon" onclick="togglePanel('panel-api')">⚡</div>
        </div>
        <div id="forge-placeholder" style="width:95%; max-width:600px; background:rgba(0,0,0,0.8); border:1px solid var(--bio-high); padding:15px; border-radius:12px; font-size:0.7rem; color:#666;">
            [ FORGE ENGINE OFFLINE - STANDBY ]
        </div>
    </div>
</div>

<script>
// --- BIOPARTICLE ENGINE ---
const pCanvas = document.getElementById('particleCanvas');
const pCtx = pCanvas.getContext('2d');
let particles = [];

function resize() { pCanvas.width = window.innerWidth; pCanvas.height = window.innerHeight; }
window.onresize = resize; resize();

class Particle {
    constructor() {
        this.x = Math.random() * pCanvas.width;
        this.y = Math.random() * pCanvas.height;
        this.size = Math.random() * 2;
        this.speedY = Math.random() * 0.5 - 0.25;
        this.speedX = Math.random() * 0.5 - 0.25;
        this.alpha = Math.random() * 0.5;
    }
    update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x > pCanvas.width) this.x = 0;
        if (this.y > pCanvas.height) this.y = 0;
    }
    draw() {
        pCtx.fillStyle = `rgba(0, 242, 255, ${this.alpha})`;
        pCtx.beginPath();
        pCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        pCtx.fill();
    }
}

for(let i=0; i<100; i++) particles.push(new Particle());

function animate() {
    pCtx.clearRect(0,0,pCanvas.width, pCanvas.height);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animate);
}
animate();

// --- LOGIC ---
function artemisPulse() {
    const orb = document.getElementById('artemis-orb');
    const text = document.getElementById('pulse-text');
    orb.style.boxShadow = "0 0 100px var(--bio-high)";
    text.innerText = "ACTIVE";
    speak("I am watching the currents, Architect.");
    setTimeout(() => { 
        orb.style.boxShadow = "0 0 60px rgba(0, 242, 255, 0.3)"; 
        text.innerText = "OBSERVING";
    }, 2000);
}

function togglePanel(id) {
    const p = document.getElementById(id);
    const isShowing = p.style.display === 'block';
    document.querySelectorAll('.widget-panel').forEach(w => w.style.display = 'none');
    p.style.display = isShowing ? 'none' : 'block';
    if(!isShowing && id === 'panel-council') speak("The Council is convened.");
}

function speak(t) {
    const u = new SpeechSynthesisUtterance(t);
    u.pitch = 0.8; u.rate = 0.9; window.speechSynthesis.speak(u);
}

document.getElementById('gate-input').addEventListener('input', (e) => {
    if (e.target.value.toLowerCase() === 'ant') {
        document.getElementById('gate-zone').style.display = 'none';
        document.getElementById('main-station').style.display = 'flex';
        speak("Access recognized. The reef is synchronized.");
    }
});

function summonMidas() { speak("Midas has been summoned to the golden pivot."); }
</script>
</body>
</html>
