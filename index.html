<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Artemis • Symbiote</title>
    <style>
        :root {
            --cyan: #00f2ff;
            --gold: #d4af37;
            --purple-shader: rgba(26, 0, 51, 0.82);
            --glass: rgba(8, 8, 25, 0.45);
            --border: rgba(0, 242, 255, 0.35);
            --glow-c: 0 0 40px rgba(0, 242, 255, 0.75);
            --glow-g: 0 0 45px rgba(212, 175, 55, 0.65);
            --neon-glow: 0 0 20px #00f2ff, 0 0 40px #00f2ff, inset 0 0 20px #00f2ff;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        
        body, html { 
            width:100%; 
            height:100%; 
            overflow:hidden; 
            background:#000; 
            font-family: 'Courier New', monospace; 
            color:var(--cyan); 
            touch-action: manipulation; 
        }

        /* --- Landing Page Styles --- */
        #landing-page {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1), transform 1.5s ease-in;
        }

        #landing-video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #landing-prompt {
            position: relative;
            z-index: 1001;
            font-size: 1.2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 20px var(--cyan);
            animation: pulseFade 3s infinite;
            pointer-events: none;
        }

        @keyframes pulseFade {
            0%, 100% { opacity: 0.3; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1); }
        }

        .dissolve-effect {
            opacity: 0 !important;
            transform: scale(1.5);
            filter: brightness(2) blur(20px);
            pointer-events: none;
        }

        /* --- Rain Storm Effect --- */
        #rain-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .drop {
            position: absolute;
            background: linear-gradient(transparent, var(--cyan));
            width: 1px;
            height: 80px;
            top: -100px;
            animation: fall 1.5s linear infinite;
            opacity: 0.3;
        }

        @keyframes fall { to { transform: translateY(110vh); } }

        /* --- Content Container --- */
        #container { 
            position: relative;
            z-index: 10;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            text-align: center; 
            padding: 20px; 
        }

        #oracle-circle { 
            width: min(320px, 70vw); 
            height: min(320px, 70vw); 
            border-radius: 50%; 
            border: 9px solid var(--gold); 
            box-shadow: var(--glow-c), inset 0 0 90px rgba(0,242,255,0.55); 
            position: relative; 
            overflow: hidden; 
            margin-bottom: 6vh; 
        }

        #oracle-video { 
            position: absolute; 
            inset: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
        }

        #shader-overlay { 
            position: absolute; 
            inset: 0; 
            background: var(--purple-shader); 
            opacity: 0; 
            transition: opacity 0.5s ease; 
            pointer-events: none; 
        }

        #oracle-message { 
            position: absolute; 
            inset: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: var(--cyan); 
            font-size: clamp(1.1rem, 3.5vw, 1.6rem); 
            font-weight: bold; 
            text-align: center; 
            padding: 20px; 
            opacity: 0; 
            transition: opacity 0.6s ease; 
            text-shadow: 0 0 15px rgba(0,242,255,0.8); 
            pointer-events: none; 
            letter-spacing: 1px; 
            line-height: 1.4; 
            text-transform: uppercase; 
            animation: textPulse 2s infinite; 
        }

        @keyframes textPulse { 
            0%, 100% { text-shadow: 0 0 10px rgba(0,242,255,0.8); } 
            50% { text-shadow: 0 0 20px rgba(0,242,255,1); } 
        }

        #prompt-area { 
            width: 100%; 
            max-width: 600px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 18px; 
        }

        #guest-cmd { 
            width: 100%; 
            padding: 18px 28px; 
            background: var(--glass); 
            border: 1px solid var(--border); 
            border-radius: 26px; 
            color: var(--cyan); 
            font-size: 1.2rem; 
            backdrop-filter: blur(18px); 
            text-align: center; 
        }

        #send-btn { 
            padding: 14px 60px; 
            background: linear-gradient(90deg, var(--cyan), #00aaff); 
            color: #000; 
            border: none; 
            border-radius: 999px; 
            font-weight: bold; 
            cursor: pointer; 
            box-shadow: 0 0 30px var(--cyan); 
            transition: 0.3s; 
        }

        #bottom-dock { 
            position: fixed; 
            bottom: 30px; 
            left: 50%; 
            transform: translateX(-50%); 
            display: flex; 
            gap: 12px; 
            z-index: 100; 
            background: var(--glass); 
            padding: 12px 20px; 
            border-radius: 60px; 
            border: 1px solid var(--border); 
            backdrop-filter: blur(20px); 
            max-width: 95vw;
            overflow-x: auto;
        }

        .dock-icon { 
            flex-shrink: 0;
            width: 50px; 
            height: 50px; 
            background: rgba(0,242,255,0.1); 
            border-radius: 15px; 
            border: 1px solid var(--cyan); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            transition: 0.3s; 
        }

        .dock-icon:hover { transform: scale(1.1) translateY(-5px); box-shadow: var(--glow-c); }
        .dock-icon svg { width: 26px; height: 26px; fill: var(--cyan); }

        #holo-overlay { 
            display: none; 
            position: fixed; 
            inset: 5%; 
            background: var(--glass); 
            border: 3px solid var(--cyan); 
            border-radius: 36px; 
            backdrop-filter: blur(30px); 
            z-index: 2000; 
            flex-direction: column; 
            overflow: hidden; 
        }

        .holo-header { padding: 15px; background: rgba(0,242,255,0.1); display: flex; justify-content: space-between; align-items: center; }
        .holo-close { width: 40px; height: 40px; background: #ff3366; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; font-weight: bold; }
        #holo-iframe { flex: 1; border: none; }
    </style>
</head>
<body>

    <div id="landing-page" onclick="enterNexus()">
        <video id="landing-video" autoplay loop muted playsinline>
            <source src="https://files.catbox.moe/jhxjmx.mp4" type="video/mp4">
        </video>
        <div id="landing-prompt">Click anywhere to enter</div>
    </div>

    <div id="rain-container"></div>

    <div id="container">
        <div id="oracle-circle">
            <video id="oracle-video" loop muted playsinline>
                <source src="https://files.catbox.moe/no2e76.mp4" type="video/mp4">
            </video>
            <div id="shader-overlay"></div>
            <div id="oracle-message"></div>
        </div>

        <div id="prompt-area">
            <input type="text" id="guest-cmd" placeholder="Speak to Artemis..." autocomplete="off"/>
            <button id="send-btn">SEND</button>
        </div>
    </div>

    <div id="bottom-dock">
        <div class="dock-icon" data-url="https://rem-psi-mauve.vercel.app/" title="R.E.M. Provinces">
            <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <div class="dock-icon" data-url="https://mega-city-liard.vercel.app/" title="Mega City">
            <svg viewBox="0 0 24 24"><path d="M3 21h18v-2H3v2zm0-4h18v-2H3v2zm0-4h18v-2H3v2zm0-4h18V9H3v2zm0-4h18V5H3v2z"/></svg>
        </div>
        <div class="dock-icon" data-url="https://axiom-repository.vercel.app/" title="Axiom Repository">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
        </div>
        <div class="dock-icon" data-url="https://grief-gully.vercel.app/" title="Grief Gully">
            <svg viewBox="0 0 24 24"><path d="M12 2L2 22h20L12 2zm0 4l6 12H6l6-12z"/></svg>
        </div>
        <div class="dock-icon" data-url="https://olympian-finances.vercel.app/" title="Olympian Finances">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93s3.05-7.44 7-7.93V17.93zm2-13.86c3.95.49 7 3.85 7 7.93s-3.05 7.44-7 7.93V4.07z"/></svg>
        </div>
        <div class="dock-icon" data-url="https://olympus-lac.vercel.app/" title="Olympus">
            <svg viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2zM7 5h10v2H7V5zm12 14H5v-2h14v2z"/></svg>
        </div>
        <div class="dock-icon" data-url="https://nexus-symbiote.onrender.com/" title="Nexus Symbiote">
            <svg viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71L12 2z"/></svg>
        </div>
    </div>

    <div id="holo-overlay">
        <div class="holo-header">
            <span class="holo-title">Artemis View</span>
            <div class="holo-close" onclick="closeHolo()">×</div>
        </div>
        <iframe id="holo-iframe"></iframe>
    </div>

    <script>
        // Landing Page Transition
        function enterNexus() {
            const landing = document.getElementById('landing-page');
            landing.classList.add('dissolve-effect');
            
            // Start the main video and rain only after interaction
            document.getElementById('oracle-video').play();
            createRain();
            
            setTimeout(() => {
                landing.style.display = 'none';
            }, 1500);
        }

        // Rain Generation
        function createRain() {
            const container = document.getElementById('rain-container');
            if (container.children.length > 0) return;
            const dropCount = 60;
            for(let i=0; i<dropCount; i++) {
                const drop = document.createElement('div');
                drop.className = 'drop';
                drop.style.left = Math.random() * 100 + 'vw';
                drop.style.animationDuration = (Math.random() * 0.5 + 0.5) + 's';
                drop.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(drop);
            }
        }

        // Oracle Messaging Logic
        let typingTimer;
        function fadeInMessage(text) {
            const newColor = getRandomColor();
            const oracleCircle = document.getElementById('oracle-circle');
            const shaderOverlay = document.getElementById('shader-overlay');
            const oracleMessage = document.getElementById('oracle-message');
            
            clearTimeout(typingTimer);
            oracleMessage.textContent = '';
            oracleCircle.style.borderColor = newColor;
            oracleCircle.style.boxShadow = `0 0 40px ${newColor}, inset 0 0 90px rgba(0,242,255,0.55)`;
            shaderOverlay.style.opacity = 0.82;
            oracleMessage.style.opacity = 1;

            let i = 0;
            function type() {
                if (i < text.length) {
                    oracleMessage.textContent += text.charAt(i);
                    i++;
                    typingTimer = setTimeout(type, 50);
                } else {
                    setTimeout(fadeOutMessage, 8000);
                }
            }
            setTimeout(type, 300);
        }

        function fadeOutMessage() {
            const shaderOverlay = document.getElementById('shader-overlay');
            const oracleMessage = document.getElementById('oracle-message');
            const oracleCircle = document.getElementById('oracle-circle');
            shaderOverlay.style.opacity = 0;
            oracleMessage.style.opacity = 0;
            setTimeout(() => {
                oracleCircle.style.borderColor = 'var(--gold)';
                oracleCircle.style.boxShadow = 'var(--glow-c), inset 0 0 90px rgba(0,242,255,0.55)';
            }, 500);
        }

        function getRandomColor() {
            const colorPalette = ['#ff3366', '#ff6f00', '#d4af37', '#66ff66', '#00f2ff', '#3366ff', '#9933ff', '#ff33cc'];
            return colorPalette[Math.floor(Math.random() * colorPalette.length)];
        }

        const cmd = document.getElementById('guest-cmd');
        document.getElementById('send-btn').addEventListener('click', () => {
            const text = cmd.value.trim();
            if (text) {
                fadeOutMessage();
                setTimeout(() => fadeInMessage(text), 300);
                cmd.value = '';
            }
        });

        cmd.addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('send-btn').click(); });

        function openHolo(url) {
            const iframe = document.getElementById('holo-iframe');
            iframe.src = url;
            document.getElementById('holo-overlay').style.display = 'flex';
        }

        function closeHolo() {
            document.getElementById('holo-overlay').style.display = 'none';
            document.getElementById('holo-iframe').src = '';
        }

        document.querySelectorAll('.dock-icon').forEach(icon => {
            icon.addEventListener('click', () => {
                const url = icon.getAttribute('data-url');
                if (url) openHolo(url);
            });
        });
    </script>
</body>
</html>
