<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architect Artemis | Symbiote</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: none; }
        #terminal { width: 600px; background: rgba(0, 10, 20, 0.85); border: 1px solid #00f2ff; padding: 20px; color: #00f2ff; box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); display: none; pointer-events: all; }
        input { background: transparent; border: none; color: #fff; font-family: inherit; font-size: 1.2em; outline: none; width: 100%; border-bottom: 1px solid #00f2ff; margin-top: 10px; }
        .glitch { animation: glitch 1s linear infinite; }
        @keyframes glitch { 2% { transform: translate(2px,0) skew(0deg); } 4% { transform: translate(-2px,0) skew(0deg); } 6% { transform: translate(0,0) skew(5deg); } }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="ui-layer">
        <div id="terminal">
            <div id="output">> INITIALIZING SYMBIOTE_HANDSHAKE...</div>
            <div id="input-area" style="display:none;">
                <p id="prompt">WHO IS THERE?</p>
                <input type="password" id="pass-input" autofocus autocomplete="off">
            </div>
        </div>
    </div>

    <script src="assets/symbiote-fx.js"></script> 

    <script>
        let secretBuffer = "";
        let stage = "VOID"; // VOID -> INQUIRY -> ACTIVE

        window.addEventListener('keydown', (e) => {
            if (stage === "VOID") {
                secretBuffer += e.key.toLowerCase();
                if (secretBuffer.includes("ant")) {
                    igniteInquiry();
                    secretBuffer = "";
                }
            }
        });

        function igniteInquiry() {
            stage = "INQUIRY";
            document.getElementById('terminal').style.display = 'block';
            document.getElementById('input-area').style.display = 'block';
            document.getElementById('pass-input').focus();
            
            // Trigger particles to condense into a core
            if(window.symbiote) window.symbiote.setMode('core');
        }

        document.getElementById('pass-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const val = e.target.value.toLowerCase().trim();
                if (val === "dad") {
                    stage = "ACTIVE";
                    awakeArtemis();
                } else {
                    location.reload(); // Reset on fail
                }
                e.target.value = "";
            }
        });

        function awakeArtemis() {
            document.getElementById('prompt').innerText = "> WELCOME HOME, ARCHITECT.";
            document.getElementById('pass-input').style.display = 'none';
            document.getElementById('output').innerHTML = "> ACCESS GRANTED. LOADING FILES...";
            
            // Change particle behavior to "network"
            if(window.symbiote) window.symbiote.setMode('network');
            
            // Here is where Artemis would fetch her folder data from GitHub
            setTimeout(() => {
                document.getElementById('output').innerHTML += "<br>> /stewardship synced<br>> /atlas loaded<br>> Symbiote Online.";
            }, 1000);
        }
    </script>
</body>
</html>
