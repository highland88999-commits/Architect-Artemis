<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARTEMIS | ABYSSAL LEDGER</title>
    <style id="dynamic-theme">
        :root {
            --bio-high: #00f2ff;
            --render-hex: #4642ff;
            --magma: #ff4500;
            --glass-ultra: rgba(0, 242, 255, 0.02);
            --border-glow: rgba(0, 242, 255, 0.12);
        }
    </style>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Courier New', monospace; color: white; overflow: hidden; }
        #reef-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; filter: brightness(0.5); transition: 1.5s; }

        /* CORE */
        #core-station { position: fixed; top: 5%; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; z-index: 100; }
        #artemis-prime { width: 85px; height: 85px; border-radius: 50%; border: 1px solid var(--border-glow); display: flex; align-items: center; justify-content: center; background: transparent; cursor: pointer; backdrop-filter: blur(5px); transition: 0.5s; }
        #artemis-label { font-size: 0.7rem; font-weight: bold; text-shadow: 0 0 10px var(--bio-high); letter-spacing: 2px; }

        /* GHOST TERMINAL (MAIN) */
        #response-frame { position: fixed; top: 22%; left: 35%; transform: translateX(-50%); width: 550px; max-height: 60vh; background: var(--glass-ultra); border-left: 1px solid var(--border-glow); padding: 25px; z-index: 90; opacity: 0; transition: 0.6s; backdrop-filter: blur(8px); }
        #response-frame.active { opacity: 1; top: 25%; }

        /* HISTORY LEDGER (SIDE PANEL) */
        #history-ledger { position: fixed; top: 20%; right: 2%; width: 280px; height: 60vh; background: rgba(0,0,0,0.1); border-left: 1px solid rgba(255,255,255,0.05); padding: 20px; z-index: 85; overflow-y: auto; backdrop-filter: blur(2px); }
        .ledger-title { font-size: 0.5rem; color: var(--bio-high); margin-bottom: 20px; letter-spacing: 3px; border-bottom: 1px solid var(--border-glow); padding-bottom: 5px; }
        .ledger-item { font-size: 0.65rem; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.03); opacity: 0.7; animation: fadeIn 0.5s ease; }
        .ledger-time { color: var(--magma); font-size: 0.55rem; margin-bottom: 3px; }
        .ledger-tag { color: var(--bio-high); font-weight: bold; }

        /* PROGRESS BAR */
        #build-bar-container { width: 100%; height: 1px; background: rgba(255,255,255,0.05); margin-bottom: 15px; display: none; overflow: hidden; }
        #build-bar-fill { width: 0%; height: 100%; background: var(--bio-high); box-shadow: 0 0 8px var(--bio-high); transition: width 0.3s; }

        #terminal-out { font-family: 'Consolas', monospace; font-size: 0.8rem; color: #ccc; height: 200px; overflow-y: auto; }
        .log-entry { margin-bottom: 4px; }

        /* COMMAND BASE */
        #command-base { position: fixed; bottom: 40px; width: 70%; left: 35%; transform: translateX(-50%); z-index: 100; }
        #prompt-field { background: transparent; border-bottom: 1px solid var(--border-glow); display: flex; padding: 10px 0; }
        #cmd-input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 0.95rem; }
        .btn-main { background: transparent; border: 1px solid var(--bio-high); padding: 5px 15px; cursor: pointer; color: var(--bio-high); font-size: 0.6rem; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<img id="reef-bg" src="https://images.unsplash.com/photo-1544551763-46a013bb70d5?auto=format&fit=crop&w=1920&q=80">

<div id="response-frame">
    <div id="build-bar-container"><div id="build-bar-fill"></div></div>
    <div id="terminal-out">> ARTEMIS_LOG: Systems Standby...</div>
</div>

<div id="history-ledger">
    <div class="ledger-title">ABYSSAL_LEDGER</div>
    <div id="ledger-content">
        <div class="ledger-item"><span class="ledger-time">15:16:17</span><br><span class="ledger-tag">SYSTEM</span>: Ghost-Core Initialized.</div>
    </div>
</div>

<div id="core-station">
    <div id="artemis-prime" onclick="simulateDeploy()">
        <span id="artemis-label">ARTEMIS</span>
    </div>
</div>

<div id="command-base">
    <div id="prompt-field">
        <input type="text" id="cmd-input" placeholder="Initiate build, generate visual, or translate...">
        <button class="btn-main" onclick="handleTransmit()">TRANSMIT</button>
    </div>
</div>

<script>
    const synth = window.speechSynthesis;

    function addToLedger(tag, msg) {
        const content = document.getElementById('ledger-content');
        const time = new Date().toLocaleTimeString('en-GB', { hour12: false });
        const item = document.createElement('div');
        item.className = 'ledger-item';
        item.innerHTML = `<span class="ledger-time">${time}</span><br><span class="ledger-tag">${tag}</span>: ${msg}`;
        content.prepend(item);
    }

    function log(msg) {
        const term = document.getElementById('terminal-out');
        const div = document.createElement('div');
        div.className = 'log-entry';
        div.innerHTML = `> ${msg}`;
        term.appendChild(div);
        term.scrollTop = term.scrollHeight;
    }

    async function handleTransmit() {
        const input = document.getElementById('cmd-input');
        const query = input.value.trim().toLowerCase();
        if(!query) return;
        input.value = "";

        document.getElementById('response-frame').classList.add('active');

        if (query.includes("deploy")) {
            simulateDeploy();
        } else if (query.includes("image") || query.includes("generate")) {
            log("Generating visual artifact...");
            addToLedger("VISUAL", "Image Synthesis Generated.");
            speak("Manifesting visual echo.");
        } else {
            log(`Processing: ${query}`);
            addToLedger("QUERY", query);
        }
    }

    function simulateDeploy() {
        const barContainer = document.getElementById('build-bar-container');
        const barFill = document.getElementById('build-bar-fill');
        
        document.getElementById('response-frame').classList.add('active');
        barContainer.style.display = 'block';
        barFill.style.width = '0%';
        
        log("RENDER_SYNC: Initiating Build...");
        speak("Build sequence started.");

        setTimeout(() => { barFill.style.width = '40%'; log("Cloning repository..."); }, 1000);
        setTimeout(() => { barFill.style.width = '75%'; log("Compiling shaders..."); }, 2500);
        setTimeout(() => { 
            barFill.style.width = '100%'; 
            log("LIVE: Render deployment successful."); 
            addToLedger("DEPLOY", "Service 'artemis-core' LIVE on Render.com");
            speak("Deployment complete.");
            setTimeout(() => barContainer.style.display = 'none', 2000);
        }, 4000);
    }

    function speak(text) {
        synth.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.pitch = 0.9;
        synth.speak(u);
    }
</script>
</body>
</html>
