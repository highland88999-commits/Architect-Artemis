<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Artemis • Symbiote</title>
  <style>
    :root {
      --cyan: #00f2ff; --gold: #d4af37; --red: #ff3366;
      --active-color: var(--cyan);
      --glass: rgba(8, 8, 25, 0.6); --border: rgba(0, 242, 255, 0.2);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body, html { width:100%; height:100%; overflow:hidden; background:#000; font-family: 'Courier New', monospace; color:var(--cyan); }

    /* Layout Fixes from Screenshot */
    #container { 
      position: relative; z-index: 10; display: flex; flex-direction: column; 
      align-items: center; justify-content: center; gap: 2vh;
      height: 100vh; padding: 20px 16px 110px 16px; 
    }

    #oracle-circle { 
      width: clamp(160px, 30vh, 280px); height: clamp(160px, 30vh, 280px); 
      border-radius: 50%; border: 4px solid var(--active-color);
      box-shadow: 0 0 30px var(--active-color), inset 0 0 50px var(--active-color);
      position: relative; overflow: hidden; transition: all 1s ease; flex-shrink: 0;
    }
    
    #gold-bloom {
      position: absolute; inset: 0; background: radial-gradient(circle, var(--active-color) 0%, transparent 70%);
      mix-blend-mode: screen; opacity: 0; transition: opacity 1.5s ease; z-index: 6;
    }
    .powered-up #gold-bloom { opacity: 0.5; }

    #council-status { 
      font-size: 10px; color: var(--active-color); background: rgba(0,0,0,0.7); 
      padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
      transition: all 0.5s ease;
    }

    #response-field { 
      width: 100%; max-width: 500px; max-height: 0; overflow: hidden; 
      background: var(--glass); border: 1px solid var(--border); border-radius: 12px; 
      color: #eee; font-size: 0.95rem; transition: all 0.8s ease; backdrop-filter: blur(15px);
    }
    #response-field.active { max-height: 35vh; padding: 18px; overflow-y: auto; border-color: var(--active-color); }

    /* Input Styling */
    #prompt-area { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 12px; }
    .input-wrapper { 
      background: var(--glass); border: 1px solid var(--border); border-radius: 50px; 
      padding: 10px 20px; display: flex; align-items: center;
    }
    #guest-cmd { flex: 1; background: transparent; border: none; color: #fff; outline: none; text-align: center; font-size: 1rem; }
    #send-btn { 
      padding: 12px; background: var(--active-color); color: #000; border-radius: 50px; 
      font-weight: bold; border: none; cursor: pointer; transition: 0.3s;
    }

    /* Backgrounds */
    .video-container { position: fixed; inset: 0; z-index: 0; }
    #bg-video { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }

    /* Thinking Animation */
    .thinking .pip { animation: bounce 0.5s infinite alternate; }
    @keyframes bounce { to { transform: translateY(-8px); filter: brightness(1.5); } }
    #council-pips { display: flex; gap: 8px; margin-bottom: 5px; }
    .pip { width: 8px; height: 8px; border-radius: 50%; background: var(--active-color); box-shadow: 0 0 10px var(--active-color); }

    /* Dock Placeholder */
    #bottom-dock { position: fixed; bottom: 20px; height: 60px; width: 80%; background: var(--glass); border-radius: 40px; border: 1px solid var(--border); left: 50%; transform: translateX(-50%); z-index: 100; }
  </style>
</head>
<body>

<div class="video-container">
  <video id="bg-video" autoplay loop muted playsinline src="https://www.dropbox.com/scl/fi/x93qcdd64hcpedqn2murk/grok_video_2026-02-20-06-12-55.mp4?rlkey=q51etky32dg2gsrx3w3sez1s8&raw=1"></video>
</div>

<div id="container">
  <div id="oracle-circle">
    <div id="gold-bloom"></div>
    <video id="oracle-video" autoplay loop muted playsinline style="width:100%; height:100%; object-fit:cover;" src="https://files.catbox.moe/no2e76.mp4"></video>
  </div>

  <div id="council-header">
    <div id="council-pips">
      <div class="pip"></div><div class="pip"></div><div class="pip"></div>
    </div>
    <div id="council-status">[AWAITING CONNECTION]</div>
  </div>

  <div id="response-field"></div>

  <div id="prompt-area">
    <div class="input-wrapper">
      <input type="text" id="guest-cmd" placeholder="Command Artemis..." autocomplete="off">
    </div>
    <button id="send-btn">TRANSMIT</button>
  </div>
</div>

<div id="bottom-dock"></div>

<script>
  const root = document.documentElement;
  const statusEl = document.getElementById('council-status');
  const responseEl = document.getElementById('response-field');
  const oracle = document.getElementById('oracle-circle');
  const councilHeader = document.getElementById('council-header');

  async function handleTransmit() {
    const query = document.getElementById('guest-cmd').value;
    if (!query) return;

    // UI: Processing State
    councilHeader.classList.add('thinking');
    oracle.classList.add('powered-up');
    statusEl.textContent = "[CONSULTING COUNCIL...]";
    responseEl.classList.remove('active');

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userQuery: query })
      });

      const data = await response.json();

      // THE MAGIC: Update Color based on Sentiment
      const colorMap = { blue: '#00f2ff', gold: '#d4af37', red: '#ff3366' };
      const themeColor = colorMap[data.sentiment] || colorMap.blue;
      
      root.style.setProperty('--active-color', themeColor);
      
      // Release Answer
      setTimeout(() => {
        councilHeader.classList.remove('thinking');
        responseEl.innerHTML = data.text;
        responseEl.classList.add('active');
        statusEl.textContent = `[SENSE: ${data.sentiment.toUpperCase()}]`;
        document.getElementById('guest-cmd').value = "";
      }, 1000);

    } catch (err) {
      statusEl.textContent = "[OFFLINE]";
      root.style.setProperty('--active-color', '#ff3366');
    }
  }

  document.getElementById('send-btn').addEventListener('click', handleTransmit);
  document.getElementById('guest-cmd').addEventListener('keypress', (e) => { if(e.key === 'Enter') handleTransmit(); });
</script>

</body>
</html>
