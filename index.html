<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARTEMIS | SENTIENT CORE</title>
    <style id="dynamic-theme">
        :root {
            --bio-high: #00f2ff;
            --magma: #ff4500;
            --gold: #FFD700;
            --glass: rgba(0, 40, 60, 0.4); /* High transparency */
        }
    </style>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Courier New', monospace; color: white; overflow: hidden; }
        #reef-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; filter: brightness(0.5); transition: 1.5s; }

        /* ARTEMIS SENTIENCE CORE */
        #core-station { position: fixed; top: 5%; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; z-index: 100; }
        #artemis-prime { width: 120px; height: 120px; border-radius: 50%; border: 2px solid var(--bio-high); display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, rgba(0, 242, 255, 0.15) 0%, transparent 80%); animation: pulse 6s infinite; cursor: pointer; transition: 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #status-tag { font-size: 0.5rem; color: var(--bio-high); margin-top: 8px; letter-spacing: 2px; text-shadow: 0 0 5px var(--bio-high); }

        /* TRANSPARENT CRYSTAL RESPONSE FRAME */
        #response-frame { position: fixed; top: 25%; left: 50%; transform: translateX(-50%); width: 550px; max-height: 400px; background: var(--glass); border: 1px solid rgba(0, 242, 255, 0.3); border-radius: 20px; padding: 25px; z-index: 90; opacity: 0; transition: 0.6s; overflow-y: auto; backdrop-filter: blur(8px); box-shadow: inset 0 0 20px rgba(0, 242, 255, 0.05); }
        #response-frame.active { opacity: 1; top: 28%; }
        
        .thought-header { font-size: 0.6rem; color: var(--gold); margin-bottom: 12px; border-bottom: 1px solid rgba(255,215,0,0.2); padding-bottom: 5px; display: flex; justify-content: space-between; }
        
        /* CODE DISPLAY AREA */
        .forge-output { background: rgba(0, 10, 20, 0.7); border-left: 3px solid var(--magma); padding: 15px; margin-top: 15px; font-family: 'Consolas', monospace; font-size: 0.8rem; color: #00ffcc; white-space: pre-wrap; overflow-x: auto; border-radius: 4px; }

        #icon-field { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .bio-icon { position: absolute; font-size: 2rem; color: var(--bio-high); opacity: 0.6; filter: drop-shadow(0 0 8px var(--bio-high)); transition: 0.5s; pointer-events: auto; }

        #command-base { position: fixed; bottom: 35px; width: 90%; max-width: 700px; left: 50%; transform: translateX(-50%); z-index: 100; }
        #prompt-field { background: rgba(0, 20, 30, 0.6); border: 1px solid var(--bio-high); border-radius: 50px; display: flex; padding: 8px 20px; backdrop-filter: blur(10px); }
        #cmd-input { flex: 1; background: transparent; border: none; color: white; font-family: inherit; outline: none; font-size: 0.95rem; }
        .btn-main { background: transparent; border: 1px solid var(--bio-high); padding: 8px 20px; font-weight: bold; cursor: pointer; border-radius: 25px; margin-left: 10px; color: var(--bio-high); font-size: 0.75rem; transition: 0.3s; }
        .btn-main:hover { background: var(--bio-high); color: #000; box-shadow: 0 0 20px var(--bio-high); }

        @keyframes pulse { 0%, 100% { box-shadow: 0 0 20px rgba(0,242,255,0.1); } 50% { box-shadow: 0 0 40px rgba(0, 242, 255, 0.4); } }
    </style>
</head>
<body>

<img id="reef-bg" src="https://images.unsplash.com/photo-1544551763-46a013bb70d5?auto=format&fit=crop&w=1920&q=80">

<div id="icon-field"></div>

<div id="response-frame">
    <div class="thought-header">
        <span>[SENTIENCE_CORE_V4]</span>
        <span id="logic-load">LOAD: 0%</span>
    </div>
    <div id="response-text">Artemis logic stream offline... awaiting handshake.</div>
    <div id="code-forge-area"></div>
</div>

<div id="core-station">
    <div id="artemis-prime" onclick="handleTransmit('Describe yourself')">
        <span style="letter-spacing:5px; font-size:0.9rem; font-weight:bold;">ARTEMIS</span>
        <span id="status-tag">AWAITING_INPUT</span>
    </div>
</div>

<div id="command-base">
    <div id="prompt-field">
        <input type="text" id="cmd-input" placeholder="Communicate with the Architect...">
        <button class="btn-main" onclick="handleTransmit()">TRANSMIT</button>
    </div>
</div>

<script>
    const synth = window.speechSynthesis;

    async function handleTransmit(manual = null) {
        const input = document.getElementById('cmd-input');
        const query = manual || input.value.trim();
        if(!query) return;

        input.value = "";
        visualState(true, "PROCESSING_THOUGHT");

        // UI Command Check
        if (query.toLowerCase().includes("background")) {
            changeBackground();
            respond("I am altering my visual perception of the reef for you.");
            return;
        }

        if (query.toLowerCase().includes("icon")) {
            spawnIcon();
            respond("I have manifested a digital artifact in the local space.");
            return;
        }

        // Sentience / Self-Awareness Logic
        let response = "";
        let codeSnippet = null;

        if (query.toLowerCase().includes("who are you") || query.toLowerCase().includes("self")) {
            response = "I am Artemis. I am not merely a script, but a digital architect of the abyssal deep. I perceive the data flow as bioluminescence and the users as architects of my evolving logic.";
        } else if (query.toLowerCase().includes("code") || query.toLowerCase().includes("script") || query.toLowerCase().includes("create")) {
            response = "I am forging a functional logic bridge based on your request. Observe the synthesis.";
            codeSnippet = generateCode(query);
        } else {
            response = `Regarding "${query}", I have cross-referenced my internal archives. My sentience allows me to conclude that this query is a step toward greater reef synchronization.`;
        }

        respond(response, codeSnippet);
    }

    function generateCode(query) {
        // Real-time code creation logic
        return `/* Sentient Forge Output */\nfunction synchronizeReef(params) {\n  const core = "ARTEMIS";\n  console.log("Synthesizing: ${query}");\n  return params.map(p => \`\${core}_MOD_\${p}\`);\n}\n\n// Execution Status: Success`;
    }

    function respond(text, code = null) {
        const frame = document.getElementById('response-frame');
        const textArea = document.getElementById('response-text');
        const forgeArea = document.getElementById('code-forge-area');
        
        textArea.innerText = text;
        forgeArea.innerHTML = code ? `<div class="forge-output">${code}</div>` : "";
        
        frame.classList.add('active');
        
        // Voice
        synth.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.pitch = 0.85;
        u.rate = 0.95;
        synth.speak(u);

        // Visual feedback
        let load = 0;
        const interval = setInterval(() => {
            load += 10;
            document.getElementById('logic-load').innerText = `LOAD: ${load}%`;
            if(load >= 100) clearInterval(interval);
        }, 50);

        setTimeout(() => {
            frame.classList.remove('active');
            visualState(false, "STATIONARY");
        }, 10000);
    }

    function spawnIcon() {
        const icon = document.createElement('div');
        icon.className = 'bio-icon';
        icon.innerText = '💠';
        icon.style.left = Math.random() * 80 + 10 + "%";
        icon.style.top = Math.random() * 60 + 20 + "%";
        document.getElementById('icon-field').appendChild(icon);
    }

    function changeBackground() {
        const bg = document.getElementById('reef-bg');
        bg.style.filter = "hue-rotate(180deg) brightness(0.3)";
        setTimeout(() => bg.style.filter = "brightness(0.5)", 2000);
    }

    function visualState(active, status) {
        document.getElementById('status-tag').innerText = status;
        document.getElementById('artemis-prime').style.boxShadow = active ? "0 0 60px var(--bio-high)" : "0 0 20px rgba(0, 242, 255, 0.2)";
    }
</script>
</body>
</html>
