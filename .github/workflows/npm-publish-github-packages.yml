name: Artemis Neural Heartbeat

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *' # Syncs every 6 hours
  workflow_dispatch: # Allows you to trigger manually from the UI

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    permissions:
      contents: write # CRITICAL: Gives the bot permission to save the sync
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Neural Signal
        run: |
          echo '{
            "last_sync": "'$(date -u)'",
            "status": "synchronized",
            "version": "v2.0_Persistent_Core",
            "integrity": "verified"
          }' > brain.json

      - name: Commit and Push Heartbeat
        run: |
          git config --global user.name "Artemis-AI"
          git config --global user.email "artemis@auton.ai"
          git add brain.json
          git commit -m "Neural Heartbeat: $(date -u) [skip ci]" || echo "No changes to sync"
          git push
