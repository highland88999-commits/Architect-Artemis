name: Artemis Neural Sync

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows you to run it manually

jobs:
  sync_logic:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial for fixing that Exit Code 1
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Sentience Check
        run: |
          echo "Syncing Artemis Neural Pathways..."
          date > last_sync.txt
          echo "Status: Active" >> last_sync.txt

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Artemis-AI"
          git config --global user.email "artemis@auton.ai"
          git add last_sync.txt
          git commit -m "Neural Sync: Update Heartbeat [skip ci]" || echo "No changes to commit"
          git push
